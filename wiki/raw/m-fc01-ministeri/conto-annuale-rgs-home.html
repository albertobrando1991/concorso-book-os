.text-style {
    border-radius: 6px;
    width: 215px;
    height: 30px;
    background-color: white;
    border: 1px solid #ebecf7;
}

.text-style .box-text {
    width: 100%;
    border-right: 1px solid #ebecf7;
}

.text-style .box-text button {
    padding: 0;
    border: none;
    color: inherit;
    width: 100%;
    height: 100%;
    background-color: transparent;
}

.text-style .box-text button .iconmoon {
    font-size: 30px;
    color: #c3c6e9;
}

.text-style .box-text button:focus {
    box-shadow: none;
    outline: 0;
}

.text-style .box-text:last-child {
    border-right: none;
}

.text-style .box-text.active {
    background-color: #3943b7;
    color: white;
    box-shadow: 0 5px 10px 0 rgba(57, 67, 183, 0.2);
}

.text-style .box-text.active:first-child {
    border-top-left-radius: 6px;
    border-bottom-left-radius: 6px;
}

.text-style .box-text.active:last-child {
    border-top-right-radius: 6px;
    border-bottom-right-radius: 6px;
}

.editor-text {
    border-radius: 6px 6px 0 0;
    border: solid 1px #ebecf7;
    background-color: #f4f4f4;
    padding: 10px 5px;
}

.container-editor-text .form-group {
    position: relative;
    top: -25px;
}

.container-editor-text .form-group .form-control {
    border-top-left-radius: 0;
    border-top-right-radius: 0;
}

.dropdown-autocomplete {
    display: flex;
    flex-direction: column;
    list-style: none;
    width: 100%;
    position: absolute;
    top: 55px;
    left: 0;
    border-radius: 0 0 6px 6px;
    box-shadow: 0 0 20px 0 rgba(16, 19, 58, 0.15);
    border-top: 2px solid #3943b7;
    background-color: white;
    padding: 0;
    margin: 0;
    z-index: 5;
}

.dropdown-autocomplete .item-autocomplete:last-child a {
    border-radius: 0 0 6px 6px;
}

.item-autocomplete {
    background: transparent;
    border: none;
    text-align: left;
    width: 100%;
}


.dropdown-autocomplete a {
    display: flex;
    flex-direction: column;
    color: #10133a;
    padding: 10px;
    font-size: 14px;
    font-weight: 300;
}

.dropdown-autocomplete a:hover {
    background-color: #104f55;
    text-decoration: none;
    color: white;
}

.box {
    display: flex;
    flex-direction: column;
}

.box .container-title-box {
    display: flex;

html,
body {
    margin: 0;
    padding: 0;
    width: 100%;
    font-family: "Montserrat", sans-serif;
    color: #10133a;
    min-width: 768px;
}

.page-section {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    min-width: 768px;
}

.container-fluid {
    max-width: 1050px;
    width: 100%;
    min-width: 768px;
}

.wrap-table {
    border-radius: 6px;
    box-shadow: 0 0 20px 0 rgba(16, 19, 58, 0.15);
    background-color: white;
}

.wrap-table.no-overflow {
    overflow: hidden;
}

.wrap-table .table-intestation {
    background-color: white;
    padding: 20px 20px 10px 15px;
    border-radius: 6px;
}

.wrap-table .table-intestation .support-text .c-text-information-secondary {
    color: #10133a;
}

.wrap-table .table-intestation .btn-filter {
    background: transparent;
    outline: none;
    border: none;
}

.wrap-table .table-intestation .btn-filter:hover {
    text-decoration: none;
}

.wrap-table .table-intestation .btn-filter .iconmoon {
    position: relative;
    font-size: 30px;
    color: #3943b7;
}

.wrap-table .table-intestation .btn-filter.btn-filters-applied .iconmoon:after {
    content: "";
    position: absolute;
    display: block;
    right: 0;
    top: 0;
    width: 12px;
    height: 12px;
    border-radius: 100%;
    background-color: #8acca0;
}

.wrap-table .table-intestation .wrap-filters-open {
    border-top: 1px solid #8acca0;
    padding: 20px 0;
}

.wrap-table .table-intestation .wrap-filters-open .c-title-section {
    color: #10133a;
}

.wrap-table .table-intestation .wrap-filters-open .divider-left {
    position: relative;
}

.wrap-table .table-intestation .wrap-filters-open .divider-left:after {
    content: "";
    position: absolute;
    left: -15px;
    top: 0;
    height: 100%;
    width: 1px;
    background-color: #ebecf7;
}

.wrap-table .c-table {
    width: 100%;
    border-top: 1px solid #8acca0;
}

.wrap-table .c-table .c-thead {
    background-color: #e8f5ec;
}

.wrap-table .c-table .c-thead .c-th {
    padding: 10px 20px;
    vertical-align: top;
}

.wrap-table .c-table .c-tbody {
    color: #10133a;
}

.wrap-table .c-table .c-tbody .c-td {
    padding: 20px;
}

.wrap-table .c-table .c-tbody .iconmoon {
    font-size: 30px;
}

.wrap-table .c-table .c-tbody .iconmoon.iconmoon-ok {
    color: #3ce54b;
}

.wrap-table .c-table .c-tbody .iconmoon.iconmoon-allert {
    color: #ff7f00;
}

.wrap-table .c-table .c-tbody .iconmoon.iconmoon-errore {
    color: #ff0045;
}

.wrap-table .c-table .dropdown.drop-menu {
    float: right;
}

.wrap-table .c-table strong {
    font-weight: 400;
}

.wrap-table .c-t-header {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    height: 40px;
    background-color: #e8f5ec;
    padding: 0 15px;
    border-top: solid 1px #8acca0;
}

.wrap-table .c-t-tr {
    position: relative;
}

.wrap-table .c-t-tr:after {
    content: "";
    position: absolute;
    left: 15px;
    width: calc(100% - 30px);
    height: 1px;
    background-color: #d8ebde;
}

.wrap-table .wrap-t-tr {
    display: flex;
    align-items: center;
    padding: 0 15px;
    width: 100%;
}

.wrap-table .wrap-t-tr .c-t-th {
    display: flex;
    align-items: center;
    background-color: #e8f5ec;
    height: 100%;
}

.wrap-table .wrap-t-tr .c-t-th .title {
    font-size: 1rem;
    letter-spacing: 0.12rem;
    word-spacing: 0.16rem;
    font-weight: bold;
    line-height: 24px;
    color: #10133a;
    padding: 12px 15px;
    text-transform: uppercase;
}

.wrap-table .wrap-t-tr .c-t-td {
    display: flex;
    height: 100%;
}

.wrap-table .wrap-t-tr .c-t-td .description {
    padding: 10px 25px;
}

.wrap-table .wrap-t-tr .c-t-td .description-icon {
    padding: 3px 25px;
}

.wrap-table .wrap-t-tr .c-t-td .first-line-description {
    padding: 10px 25px 0px 25px;
}

.wrap-table .wrap-t-tr .c-t-td .second-line-description {
    padding: 0px 25px 10px 25px;
}

.wrap-table .c-t-tr:first-child::after {
    content: none;
}

.wrap-table .table-footer {
    display: flex;
    align-items: center;
    border-top: 1px solid #8acca0;
    background-color: #e8f5ec;
    border-radius: 0 0 6px 6px;
    padding: 20px;
}

.modal {
    background-color: rgba(16, 19, 58, 0.8);
}

.modal.modal-xs .modal-content {
    max-width: 480px;
    width: 100%;
}

.modal .modal-content {
    border-radius: 6px;
    box-shadow: 0 0 20px 0 rgba(16, 19, 58, 0.15);
    background-color: white;
    border: none;
}

.modal .modal-content .modal-header {
    border: none;
}

.modal .modal-content .modal-header .close {
    opacity: 1;
    padding: 0;
    padding-bottom: 0;
    margin: 0;
}

.modal .modal-content .modal-header .close:focus,
.modal .modal-content .modal-header .close:focus-within {
    box-shadow: none;
    outline: 0;
    text-decoration: none;
}

.modal .modal-content .modal-header .close:hover .iconmoon {
    color: #104f55;
}

.modal .modal-content .modal-header .modal-title {
