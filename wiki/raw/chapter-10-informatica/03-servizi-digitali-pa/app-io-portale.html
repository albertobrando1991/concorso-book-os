disponibile su **IO, l’applicazione dei servizi pubblici** ([io.italia.it](https://io.italia.it/)) la nuova funzionalità per richiedere e utilizzare, a partire **da oggi e fino al 31 dicembre**, il [Bonus Vacanze](https://www.agenziaentrate.gov.it/portale/web/guest/bonus-vacanze1): l’agevolazione prevista dal “Decreto Rilancio” (art. 176 del DL n. 34 del 19 maggio 2020) come misura di sostegno al turismo in Italia dopo l’emergenza Covid-19.\n\nIl Bonus è rivolto ai nuclei familiari con un **reddito ISEE non superiore a 40 mila euro** e offre un **contributo fino a 500 euro** per soggiorni in alberghi, campeggi, villaggi turistici, agriturismi e bed\u0026breakfast sul territorio italiano. L’importo del Bonus dipende dal numero dei componenti del nucleo familiare: 500 euro per i nuclei composti da 3 o più persone, 300 euro per quelli composti da 2 persone, 150 euro per quelli composti da 1 persona. Il Bonus può essere utilizzato per l’80% sotto forma di sconto sul corrispettivo dovuto alla struttura turistica e per il 20% in detrazione d’imposta nella prossima dichiarazione dei redditi. Come stabilito dal [Provvedimento del Direttore dell’Agenzia delle Entrate](https://www.agenziaentrate.gov.it/portale/documents/20143/2522870/RU+237174+del+17-6-2020.pdf/d7001a95-ba1f-0299-c947-0c706adebc3c) del 17 giugno 2020, il contributo può essere **richiesto ed erogato esclusivamente in forma digitale attraverso l’app IO**, sviluppata da **PagoPA S.p.A.** e disponibile gratuitamente negli store online per dispositivi [Android](https://play.google.com/store/apps/details?id=it.pagopa.io.app) e [iOS (iPhone)](https://apps.apple.com/it/app/io/id1501681835).\n\n**Come si richiede il Bonus Vacanze dall’app IO?**\nDopo aver installato l’app sul proprio telefono, per i cittadini in possesso dei requisiti necessari l’attivazione del Bonus Vacanze tramite IO avviene rapidamente, in pochi passaggi, come descritto su [io.italia.it/bonus-vacanze](https://io.italia.it/bonus-vacanze/).\n\n**1. Accedi con SPID o CIE**\nPer iniziare a utilizzare l’app IO, l’utente deve accedere con la propria identità digitale **[SPID*](https://www.spid.gov.it/)** o, in alternativa, con la **[Carta d’Identità Elettronica (CIE 3.0**)](https://www.cartaidentita.interno.gov.it/)** abbinata al PIN ricevuto al momento del rilascio della nuova carta. In seguito, sarà possibile accedere all’app digitando semplicemente un codice numerico o tramite il riconoscimento biometrico (impronta digitale o riconoscimento del volto) scelti dall’utente alla prima registrazione.\n\n**Per i cittadini sprovvisti di **SPID**, è possibile consultare la lista dei fornitori di identità digitale (dentity provider) e richiederlo su: [spid.gov.it/richiedi-spid](https://www.spid.gov.it/cos-e-spid/come-attivare-spid/)*\n***Al momento, la funzionalità “Entra con CIE” sull’app IO è disponibile su dispositivi Android (versione 6.0 e superiori) dotati di tecnologia NFC. Nelle prossime settimane, lo sarà anche su dispositivi con sistema operativo iOS (versione 13 e superiori).*\n\n**2. Vai nella sezione “Portafoglio” alla voce “Bonus e Sconti”**\nEntrando nella sezione “Portafoglio” dell’app e cliccando su **“Aggiungi”** in corrispondenza della funzionalità **“Bonus e Sconti”**, l’utente maggiorenne può selezionare “Bonus Vacanze” dalla lista di quelli disponibili. Prima di cliccare su **“Richiedi il Tuo Bonus”**, l’app IO ricorda all’utente come funziona e a chi spetta l’agevolazione.\n\n**3. Verifica il tuo ISEE e ottieni il Bonus**\nDopo aver richiesto il Bonus l’app verifica con i sistemi di INPS che l’ISEE* del nucleo familiare del richiedente sia in corso di validità e rientri nella soglia prevista. Il processo di verifica è pressoché immediato. In caso di esito positivo, l’app IO conferma al cittadino che la sua richiesta è valida e mostra in anteprima **l’importo massimo** dell’agevolazione che spetta al suo nucleo familiare, oltre all’**elenco degli altri componenti** che potranno spendere il Bonus. Se i dati sono corretti, è sufficiente cliccare su **“Attiva il Bonus”**: dopo qualche secondo, il cittadino potrà visualizzare il proprio Bonus Vacanze nella sezione “Portafoglio” dell’app.\n\n**Per il calcolo dell’indicatore ISEE del proprio nucleo familiare, occorre presentare all’INPS la Dichiarazione Sostitutiva Unica (DSU) [tramite i canali messi a disposizione dall’Istituto](https://www.inps.it/it/it.html?itemdir=49961)*\n\n**Utilizza personalmente o condividi il tuo Bonus**\nIl Bonus attribuito al proprio nucleo familiare è identificato da **un codice univoco alfanumerico**, a cui è associato anche un codice QR. Per ottenere lo sconto (pari all’80% dell’importo massimo indicato nella schermata di riepilogo del Bonus, oppure all’80% del corrispettivo dovuto per il soggiorno, se questo è inferiore all’importo massimo riconosciuto), **basta comunicare alla struttura turistica questo codice, insieme al proprio codice fiscale**, al momento di pagare presso la struttura dove si trascorreranno le vacanze.\n\nSe il cittadino che ne ha fatto richiesta sull’app IO non utilizzerà personalmente il Bonus, attraverso la funzione **“Condividi”** potrà inoltrarne facilmente una copia agli altri componenti del proprio nucleo familiare che non hanno accesso all’app.\n\nIl Bonus Vacanze rimarrà sempre disponibile nella sezione “Portafoglio” dell’app IO. **Dopo l’avvenuto utilizzo** presso la struttura turistica prescelta, da “attivo” il Bonus **risulterà “speso” e non potrà più essere utilizzato** da nessuno dei componenti del nucleo familiare a cui è stato attribuito.\n\nPer le strutture turistico-ricettive, lo sconto applicato all’ospite in possesso del Bonus Vacanze sarà rimborsato sotto forma di credito d’imposta utilizzabile in compensazione senza limiti di importo, attraverso il modello F24. In alternativa può essere ceduto a terzi, compresi gli istituti di credito e gli intermediari finanziari. Il credito d’imposta non utilizzato dal cessionario, in tutto o in parte, può essere oggetto di ulteriori cessioni.\n\n**Maggiori informazioni**\n- Per dettagli su **come funziona il servizio sull’app IO** per richiedere il Bonus Vacanze, vai su [io.italia.it/bonus-vacanze](https://io.italia.it/bonus-vacanze/) e consulta le relative FAQ [io.italia.it/bonus-vacanze/faq](https://io.italia.it/bonus-vacanze/faq)\n- Per dettagli sulla misura fiscale ed eventuali dubbi su come si utilizza il Bonus Vacanze: consulta la Guida d’Uso disponibile sul sito di Agenzia delle Entrate\nContatti stampa\nMinistero per i Beni e le Attività Culturali e per il Turismo: mattia.morandi@beniculturali.it\n\nAgenzia delle Entrate: ae.ufficiostampa@agenziaentrate.it\n\nMinistro per l’Innovazione Tecnologica e la Digitalizzazione: laura.sala@teamdigitale.governo.it\n\nPagoPA S.p.A, per informazioni sull’app IO: media@io.italia.it"])</script><script>self.__next_f.push([1,"6a:{\"title\":\"Bonus Vacanze: da oggi è possibile richiederlo tramite l’app IO in pochi semplici passaggi\",\"subtitle\":\"È attiva su IO, l’applicazione dei servizi pubblici, la funzione per richiedere fino al 31 dicembre 2020 il Bonus Vacanze. Necessario possedere un’identità digitale SPID per accedere all’app e aver presentato all’INPS una DSU per il calcolo ISEE.\",\"body\":\"$6b\",\"sectionID\":null,\"date\":\"2020-07-01\",\"backlink\":null}\n68:{\"slug\":\"bonus-vacanze-io\",\"updatedAt\":\"2025-02-19T11:46:01.694Z\",\"publishedAt\":\"2025-02-19T11:46:01.806Z\",\"seo\":\"$69\",\"credits\":null,\"pressRelease\":\"$6a\"}\n6d:{\"metaTitle\":\"IO: arriva l’app per i cittadini progettata con i cittadini\",\"metaDescription\":\"IO: arriva l’app per i cittadini progettata con i cittadini\",\"keywords\":null,\"canonicalURL\":null,\"ogTitle\":null,\"ogDescription\":null,\"structuredData\":null,\"hideFromSearchEngines\":null}\n6f:T1ab9,"])</script><script>self.__next_f.push([1,"**Sul sito internet del Comune le modalità per richiedere l’accesso e le istruzioni per scaricare la app. Obbligatorio risiedere sul territorio e avere l’identità digitale SPID**\n\nValsamoggia, 26 novembre 2019 – Pagare il bollo auto, ricevere avvisi e informazioni sui bandi per l’iscrizione ai servizi scolastici o gestire il pagamento di nido d’infanzia, del trasporto scolastico, del prolungamento d’orario e dei buoni pasto a debito; ricevere un promemoria della scadenza di pagamento della TARI o l’avviso di accertamento per il mancato pagamento della TARI dell’anno prima e pagare il relativo importo; ricevere eventuali avvisi di contravvenzione al codice della strada e pagare le sanzioni previste. Ma anche ricevere messaggi informativi di tipo istituzionale ed essere sempre aggiornati in caso di integrazione di nuovi servizi. Tutto questo dal proprio smartphone, in pochi clic e attraverso un’unica applicazione grazie a **IO, l’app dei servizi pubblici**, la cui sperimentazione arriva anche a Valsamoggia: comune di oltre 30mila abitanti della seconda cintura bolognese, primo ente in Emilia-Romagna a entrare nella fase di test in corso in diversi territori (tra cui Milano, Torino e Palermo) grazie al coinvolgimento di migliaia di cittadini. Attualmente, l’app IO è disponibile solo per chi partecipa alla sperimentazione. Nei prossimi mesi, IO sarà disponibile negli app store online con una prima versione beta pubblica.\n**IO** è il progetto ideato e sviluppato dal Team per la Trasformazione Digitale della Presidenza del Consiglio dei Ministri e oggi in carico alla società PagoPA Spa, che ha l’obiettivo di realizzare **l’app che faciliterà l’accesso dei cittadini italiani ai servizi digitali della Pubblica Amministrazione.**\n*“La app IO* – spiega **Federica Govoni**, Assessora all’Innovazione e alla semplificazione del Comune di Valsamoggia – *mette il cittadino al centro del processo di erogazione dei servizi pubblici. Attraverso un’unica applicazione, le amministrazioni locali e nazionali potranno contattare direttamente i singoli cittadini via smartphone in maniera semplice e sicura per avvisarli delle prossime scadenze come ad esempio pagare un tributo, oppure per condividere informazioni relative alle pratiche in corso o ai servizi richiesti, inviando messaggi personalizzati sulle specifiche esigenze dell’utente. Perché tutto questo possa entrare a regime ci serve anche il contributo dei cittadini, che invitiamo a iniziare a testare l’app IO e a segnalare gli aspetti più graditi o eventuali malfunzionamenti, per aiutarci a migliorarla partecipando all’evoluzione di questo progetto nazionale”.*\n\n*«IO è frutto di un progetto open source, aperto e collaborativo, che è nato coinvolgendo i cittadini e gli Enti pubblici sin dall’inizio. Ora che la prima versione beta dell’app è pronta, continuare a raccogliere input dall’esperienza diretta degli utenti finali ci consente di renderla ancora più vicina alle esigenze delle persone, ad esempio aggiungendo man mano nuove funzionalità richieste proprio da chi sta testando IO. Siamo felici di poter estendere la sperimentazione anche al Comune di Valsamoggia e speriamo faccia da traino per l’adesione di altri Enti del territorio: solo portando sull’app IO un numero crescente di servizi digitali potremo fare davvero la differenza per i cittadini»*, ha commentato **Matteo De Santi, Chief Product \u0026 Design Officer di PagoPA Spa** e responsabile del progetto IO.\n\n**Per candidarsi a diventare i primi fruitori della app nell’ambito della sperimentazione è necessario essere residenti sul territorio di Valsamoggia**, possedere uno smartphone Android o iOS, una carta di credito e **un’identità SPID** che si può ottenere in 24 ore in tutti gli sportelli polifunzionali di Valsamoggia previa pre-registrazione online.\n\nIn questa fase sperimentale – che in gergo tecnico si definisce closed-beta – i cittadini che aderiscono a IO hanno una duplice opportunità: da un lato, iniziare a interagire con servizi reali ed effettuare operazioni e pagamenti validi a tutti gli effetti, comodamente da un unico canale sul proprio smartphone; dall’altro, aiutare il team di sviluppo a migliorare continuamente l’efficacia dell’app e l’esperienza utente.\n\nPer esempio, un importante contributo arrivato dagli utenti ha permesso agli sviluppatori di collegare al calendario personale del proprio smartphone tutti i messaggi ricevuti su IO che implicano una scadenza per il cittadino come per esempio gli avvisi di pagamento. Un promemoria che consente di non mancare la scadenza. Un esempio di come non sono più gli utenti a doversi ricordare le scadenze ma è la app che tramite una notifica e un clic, aggiorna il nostro calendario.\n\n**I servizi di Enti pubblici nazionali su IO ad oggi e cosa si riceverà sullo smartphone:**\n\n**ACI**\n- **Bollo auto:** l’intestatario riceve un promemoria in prossimità della scadenza del pagamento del Bollo Auto, con la possibilità di pagare direttamente dall’app e ricevere conferma del pagamento avvenuto.\n- **Certificati di proprietà:** l’intestatario riceve una notifica relativa al certificato di proprietà digitale disponibile per un nuovo veicolo e un riepilogo dei propri certificati di proprietà digitali.\n\n**I servizi del Comune di Valsamoggia su IO e cosa si riceverà sullo smartphone:**\n**Servizio tributi – GIÀ ATTIVO**\n\n- l’intestatario riceve un promemoria all’approssimarsi della scadenza di pagamento della TARI 2019;\n- l’intestatario riceve la visura degli immobili per cui sta pagando la TARI;\n- l’intestatario riceve l’avviso di accertamento per il mancato pagamento della TARI degli anni precedenti e può pagare il relativo importo, oltre a promemoria sulla scadenza IMU.\n\n**Pagamenti per Servizi scolastici – DA GENNAIO 2020**\n\n- il genitore intestatario può gestire il pagamento di nido d’infanzia, trasporto scolastico e prolungamento d’orario.\nAvvisi per Servizi scolastici – DA GENNAIO 2020\n- il genitore intestatario riceve avvisi e informazioni sui bandi per l’iscrizione ai servizi scolastici.\n\n**Polizia Municipale: verbali codice della strada e altre violazioni – DA GENNAIO 2020**\n- si ricevono eventuali avvisi di contravvenzione al codice della strada, con la possibilità di pagare le sanzioni previste;\n- si ricevono avvisi di pre-ruolo per contravvenzioni al codice della strada non pagate e si può procedere al pagamento.\n\n---------------------------------------------\n\n**APP IO – INFORMAZIONI:**\n\nWeb: https://io.italia.it/\nVideo di alcune funzionalità della versione closed-beta di IO: https://bit.ly/35fTqeC\nArticoli di approfondimento sul progetto IO: https://medium.com/team-per-la-trasformazione-digitale/progetto-io-app-servizi-pubblici/home"])</script><script>self.__next_f.push([1,"6e:{\"title\":\"IO: arriva l’app per i cittadini progettata con i cittadini\",\"subtitle\":\"Valsamoggia (Bo), primo Comune in Emilia-Romagna, entra nella sperimentazione della app che faciliterà l’accesso ai servizi digitali della PA. \\nI cittadini sono invitati a testare IO, per contribuire a migliorare l’app in base alla propria esperienza\",\"body\":\"$6f\",\"sectionID\":null,\"date\":\"2019-12-02\",\"backlink\":null}\n6c:{\"slug\":\"arriva-io\",\"updatedAt\":\"2025-02-24T16:11:05.457Z\",\"publishedAt\":\"2025-02-24T16:11:05.865Z\",\"seo\":\"$6d\",\"credits\":null,\"pressRelease\":\"$6e\"}\n71:{\"metaTitle\":\"Palermo invita i cittadini a testare IO\",\"metaDescription\":\"Palermo invita i cittadini a testare IO, l’app dei servizi pubblici\",\"keywords\":null,\"canonicalURL\":null,\"ogTitle\":null,\"ogDescription\":null,\"structuredData\":null,\"hideFromSearchEngines\":null}\n73:Tbd0,"])</script><script>self.__next_f.push([1,"Palermo, 15 ottobre 2019 - Mettere le persone e i loro bisogni al centro del processo di innovazione della Pubblica Amministrazione, per rendere più semplice ed efficace l’interazione tra i cittadini e gli enti pubblici. È questo lo spirito con cui il Comune di Palermo prosegue il percorso di adesione alle piattaforme nazionali per l’erogazione dei servizi locali in modalità digitale: dopo l’attivazione dei pagamenti digitali con pagoPA e il recente ingresso nell’Anagrafe Nazionale della Popolazione Residente (ANPR), è la volta della sperimentazione di **[IO, l’app dei servizi pubblici](https://io.italia.it/) con il coinvolgimento dei cittadini.**\n\nIdeata e sviluppata dal [Team per la Trasformazione Digitale](https://teamdigitale.governo.it/) della Presidenza del Consiglio dei Ministri, l’app IO propone un nuovo modello per l’erogazione dei servizi pubblici e rappresenta l’attuazione dell’[articolo 64 bis del Codice dell’Amministrazione Digitale](https://docs.italia.it/italia/piano-triennale-ict/codice-amministrazione-digitale-docs/it/v2017-12-13/_rst/capo5_sezione3_art64-bis.html), che istituisce un unico punto di accesso ai cittadini per tutti i servizi digitali.\n\nSe oggi il cittadino deve scoprire da solo dove e come usare i servizi digitali che ciascun ente eroga, identificando quale sito o app risponde alla propria esigenza, in futuro basterà una sola applicazione. **Con IO, infatti, sono gli enti a informare il cittadino, inviandogli messaggi semplici e personalizzati direttamente sullo smartphone**: tramite la stessa app, ogni pubblica amministrazione potrà contattare un cittadino per ricordargli una scadenza - ad esempio, di un documento o di un tributo, che sarà possibile pagare in pochi clic dal telefono grazie a [pagoPA](https://www.pagopa.gov.it/) - oppure inviargli il riepilogo di informazioni e documenti di suo interesse.\n\nDopo Milano e Torino, Palermo è la terza grande città a livello nazionale a offrire la possibilità ai propri cittadini di iniziare a usare l’app, con l’obiettivo di aiutare il Team per la Trasformazione Digitale a migliorarla prima del suo arrivo sugli store online nei prossimi mesi. Già un centinaio di persone si sono candidate a diventare tester di IO a Palermo, ma l’obiettivo è di estendere questa opportunità a molte più persone: per partecipare basta compilare il modulo online all’indirizzo io.italia.it/palermo/ seguendo le indicazioni fornite sul [sito del Comune](https://www.comune.palermo.it/io-app.php).\n\nI cittadini selezionati potranno provare la app nella vita di tutti i giorni e interagire con una prima serie di servizi reali, effettuando operazioni e pagamenti validi a tutti gli effetti; tra cui:\n\n- ricevere promemoria in prossimità della scadenza del proprio pass ZTL\n- ricevere eventuali avvisi di contravvenzione al codice della strada e procedere al pagamento online delle sanzioni previste\n- ricevere un promemoria alla scadenza delle rate della TARI e procedere al pagamento online."])</script><script>self.__next_f.push([1,"72:{\"title\":\"Palermo invita i cittadini a testare IO, l’app dei servizi pubblici\",\"subtitle\":\"Il Dirigente del Servizio Innovazione comunica che, dopo Milano e Torino, il Comune aderisce all’innovativo progetto di cittadinanza digitale e mette alla prova sul territorio l’app che porterà tutti i servizi della Pubblica Amministrazione su smartphone. Oltre 100 cittadini si sono già candidati. I primi risultati saranno presentati in un evento il 30 ottobre prossimo\",\"body\":\"$73\",\"sectionID\":null,\"date\":\"2019-10-15\",\"backlink\":null}\n70:{\"slug\":\"palermo-cittadini-io\",\"updatedAt\":\"2025-02-24T15:58:05.360Z\",\"publishedAt\":\"2025-02-24T15:58:05.501Z\",\"seo\":\"$71\",\"credits\":null,\"pressRelease\":\"$72\"}\n75:{\"metaTitle\":\"Ripalta Cremasca inizia la sperimentazione di IO\",\"metaDescription\":\"Ripalta Cremasca inizia la sperimentazione di IO, l’app dei servizi pubblici\",\"keywords\":null,\"canonicalURL\":null,\"ogTitle\":null,\"ogDescription\":null,\"structuredData\":null,\"hideFromSearchEngines\":null}\n77:T1316,"])</script><script>self.__next_f.push([1,"*Il Comune di Ripalta Cremasca insieme a Milano e Torino, è fra i primi enti ad avviare la sperimentazione (in gergo closed beta) sul territorio del progetto IO del Team Digitale. Il Sindaco invita i cittadini a candidarsi come beta-tester per contribuire a perfezionare la app prima del suo arrivo negli store entro la fine dell’anno.*\n\nRipalta Cremasca, 24 Giugno 2019 - Prosegue lo spirito innovativo del Comune di Ripalta Cremasca. Dopo la digitalizzazione del servizio mensa, l’inaugurazione dello sportello telematico polifunzionale, l’attivazione dei pagamenti digitali con pagoPA è la volta della **sperimentazione del [Progetto IO](https://io.italia.it/).**\n\nIdeato e sviluppato dal [Team per la Trasformazione Digitale](https://teamdigitale.governo.it/), IO ha l’obiettivo di realizzare l’app che faciliterà l’accesso dei cittadini italiani ai servizi digitali della Pubblica Amministrazione e propone un nuovo modello per l’erogazione dei servizi pubblici. Se oggi il cittadino deve scoprire autonomamente dove e come usare i servizi digitali che ciascun ente eroga, identificando quale sito o app risponde alla propria esigenza, in futuro basterà una sola applicazione. IO potrà essere usata da tutti gli enti pubblici, locali e nazionali, per contattare i cittadini: sarà l’ente stesso a preoccuparsi di avvisare attivamente il cittadino quando questi debba compiere qualche azione - ad esempio il pagamento di un tributo, che sarà possibile effettuare direttamente dall’app grazie a [pagoPA](https://www.pagopa.gov.it/) - oppure a inviargli il riepilogo di informazioni e documenti che potrebbero essere di suo interesse, attraverso messaggi personalizzati sulle specifiche esigenze dell’utente.\n\nIl Sindaco è intervenuto con parole di apprezzamento verso il programma di sperimentazione «Sono orgoglioso che Ripalta Cremasca possa contribuire alla crescita del Paese e allo sviluppo della digitalizzazione, in cui noi crediamo molto».\n\nOggi, infatti, in vista dell’arrivo dell’ app negli store entro la fine del 2019, IO si apre anche al contributo degli abitanti di Ripalta Cremasca. «IO è un progetto open source, che è nato coinvolgendo i cittadini sin dall’inizio e che vogliamo far crescere e migliorare progressivamente facendo tesoro anche di competenze esterne e dell’esperienza diretta degli utenti finali», ha commentato Matteo De Santi, Chief Product \u0026 Design Officer del Team per la Trasformazione Digitale. «Dall’avvio della sperimentazione ad aprile, sono già centinaia i cittadini che stanno testando l’app per aiutarci a individuare e risolvere malfunzionamenti e a ottimizzare alcune funzionalità. Ne siamo entusiasti, perché sono proprio i feedback delle persone a fare la differenza nello sviluppo di IO».\n\nI cittadini selezionati come beta tester potranno provare la app nella vita di tutti i giorni e interagire con una prima serie di servizi reali, effettuando operazioni e pagamenti validi a tutti gli effetti. Quelli che il Comune di Ripalta Cremasca testerà includono ad esempio: Servizio Mensa Scolastica, Carta d’identità Elettronica; Pagamento della TARI.\n\nLa app che useranno i beta-tester è un work in progress, quindi sarà oggetto di frequenti aggiornamenti nel corso del tempo. Durante la sperimentazione, i cittadini dovranno inviare feedback precisi e con un approccio costruttivo. Essi avranno un ruolo di contributor del progetto IO, prima ancora di fruitori dell’app, consapevoli del valore del proprio impegno che permetterà di far evolvere uno dei pilastri della trasformazione digitale della Pubblica Amministrazione italiana.\n\n**Come diventare beta-tester?**\n**Per l’avvio della sperimentazione è previsto un evento pubblico di presentazione che si terrà presso la Villa San Michele, in via Fontanoni, 4 a Ripalta Cremasca, il prossimo 4 Luglio alle ore 21.00.**\n\nI cittadini che desiderano partecipare alla sperimentazione nel comune di Ripalta Cremasca, devono essere residenti, avere uno smartphone Android o iOS ed essere in possesso di un’identità digitale SPID per accedere all’app. Per candidarsi, è sufficiente compilare il modulo online disponibile al link https://io.italia.it/ripalta/ inserendo il codice **invito 5003**, raggiungibile anche dal sito web comunale. Inserire questo codice invito consentirà ai cittadini di avere la priorità su altri eventuali partecipanti al test.\n\nNei giorni successivi l’accreditamento, i tester riceveranno le istruzioni per scaricare l’app. Non tutti i cittadini che ne faranno richiesta potranno partecipare da subito alla sperimentazione. Il bacino di utenti della versione beta di IO sarà ampliato progressivamente, così da consentire agli sviluppatori del Team Digitale di tenere sotto controllo la risposta dei sistemi e dell’infrastruttura del progetto, nonché l’integrazione dei vari servizi."])</script><script>self.__next_f.push([1,"76:{\"title\":\"Ripalta Cremasca inizia la sperimentazione di IO, l’app dei servizi pubblici\",\"subtitle\":\"Il Comune di Ripalta Cremasca insieme a Milano e Torino, è fra i primi enti ad avviare la sperimentazione (in gergo closed beta) sul territorio del progetto IO del Team Digitale. Il Sindaco invita i cittadini a candidarsi come beta-tester per contribuire a perfezionare la app prima del suo arrivo negli store entro la fine dell’anno.\",\"body\":\"$77\",\"sectionID\":null,\"date\":\"2019-06-24\",\"backlink\":null}\n74:{\"slug\":\"ripalta-cremasca-io\",\"updatedAt\":\"2025-02-24T16:12:02.699Z\",\"publishedAt\":\"2025-02-24T16:12:02.789Z\",\"seo\":\"$75\",\"credits\":null,\"pressRelease\":\"$76\"}\n79:{\"metaTitle\":\"IO si apre al contributo di Torino\",\"metaDescription\":\"IO, l'app dei servizi pubblici, si apre al contributo di Torino\",\"keywords\":null,\"canonicalURL\":null,\"ogTitle\":null,\"ogDescription\":null,\"structuredData\":null,\"hideFromSearchEngines\":null}\n7b:T12f3,"])</script><script>self.__next_f.push([1,"Torino - 28 maggio 2019 - È stato presentato oggi a Torino, presso il Museo Egizio, IO, il progetto ideato e sviluppato dal [Team per la Trasformazione Digitale della Presidenza del Consiglio dei Ministri](https://teamdigitale.governo.it/) per lo sviluppo dell’applicazione che faciliterà l’accesso dei cittadini italiani ai servizi digitali della Pubblica Amministrazione.\n\nL’Amministrazione del capoluogo piemontese, già impegnata nel rendere più facile e diretto il dialogo con il cittadino come dimostra il portale [TorinoFacile](https://servizi.torinofacile.it/info/), da tempo collabora attivamente con il Team per la Trasformazione Digitale sul fronte della digitalizzazione dei servizi pubblici.\n\n*«Come città abbiamo sempre puntato sulla digitalizzazione e sulla semplificazione dei servizi al cittadino. Siamo in un’epoca in cui tutto deve essere di facile utilizzo e veloce. Questo è l’impegno dell’amministrazione di Torino»* spiega **Paola Pisano**, Assessore all’Innovazione del capoluogo piemontese. *«Siamo partiti con TorinoFacile, il portale digitale per i servizi al cittadino e oggi presentiamo un nuovo progetto del Team per la Trasformazione Digitale, invitando i nostri cittadini a dare il proprio contributo alla sua evoluzione per essere, in futuro, sempre più connessi con la PA».*\n\nIO propone un cambio di paradigma nell’erogazione dei servizi pubblici, portando il cittadino al centro del processo. Attraverso un’unica applicazione, tutti gli enti pubblici locali e nazionali potranno contattare direttamente i singoli cittadini via smartphone in maniera semplice, moderna e sicura; per avvisarli delle prossime scadenze - ad esempio pagare un tributo, anche tramite la stessa app grazie all’integrazione di [pagoPA](https://www.pagopa.gov.it/) - oppure per condividere informazioni relative alle pratiche in corso o ai servizi richiesti , inviando messaggi personalizzati sulle specifiche esigenze dell’utente.\n\n*«IO è un progetto open source, che è nato coinvolgendo i cittadini sin dall’inizio e che vogliamo far crescere e migliorare progressivamente facendo tesoro anche di competenze esterne e dell’esperienza diretta degli utenti finali»*, ha commentato **Matteo De Santi**, Chief Product \u0026 Design Officer del Team per la Trasformazione Digitale. *«Dall’avvio della fase di closed beta ad aprile, sono già centinaia i cittadini che stanno testando l’app per aiutarci a individuare e risolvere diversi bug, a ottimizzare alcune funzionalità, a scoprire nuove opportunità e nuovi servizi. Siamo entusiasti di poter estendere la sperimentazione anche ai torinesi, perché sono i feedback delle persone a fare la differenza nello sviluppo di IO, in vista del suo arrivo negli store nella seconda metà del 2019»*.\n\n*«Siamo orgogliosi di aver dato il nostro contributo per la realizzazione di un progetto così strategico, di portata nazionale, come quello di IO, che porterà i servizi digitali pubblici negli smartphone dei cittadini»* spiega **Pietro Pacini**, Direttore Generale CSI Piemonte *«Il CSI, integrando i servizi di notifica del portale Torino Facile con l’app IO, ha permesso alla Città di Torino di essere tra le prime città pilota di questo importante servizio»*. L’app IO è in continuo aggiornamento e oggi è stata lanciata la call for testers anche dal Comune di Torino. I cittadini selezionati potranno provare la app nella vita di tutti i giorni e interagire con una prima serie di servizi reali, effettuando operazioni e pagamenti validi a tutti gli effetti.\n\nL’invito è rivolto a tutti i torinesi: i cittadini che desiderano partecipare alla sperimentazione dovranno essere residenti nel capoluogo piemontese, essere in possesso di uno smartphone Android o iOS e di un’identità digitale SPID per accedere all’app. Per candidarsi a diventare beta tester è sufficiente compilare il modulo online disponibile al link https://io.italia.it/torino/ inserendo il **codice invito 4003**. Inserire questo codice invito consentirà ai cittadini di avere la priorità su altri eventuali partecipanti al test.\n\nEntro metà giugno, i candidati selezionati riceveranno le istruzioni per scaricare l’app. Non tutti i cittadini che ne faranno richiesta potranno partecipare da subito alla sperimentazione. Il bacino di utenti della versione beta di IO sarà ampliato progressivamente, così da consentire agli sviluppatori del Team per la Trasformazione Digitale di tenere sotto controllo la risposta dei sistemi e dell’infrastruttura del progetto, nonché l’integrazione dei vari servizi.\n\nCome Torino, anche altri enti locali e agenzie centrali hanno aderito al progetto e stanno per avviare la sperimentazione, così da far crescere sempre di più su tutto il territorio italiano questa importante azione di digitalizzazione nella PA."])</script><script>self.__next_f.push([1,"7a:{\"title\":\"IO si apre al contributo di Torino\",\"subtitle\":\"IO, l’app dei servizi pubblici, si apre al contributo dei torinesi per migliorare l’interazione tra cittadino e Amministrazione Pubblica\",\"body\":\"$7b\",\"sectionID\":null,\"date\":\"2019-05-28\",\"backlink\":null}\n78:{\"slug\":\"io-contributo-torino\",\"updatedAt\":\"2025-02-19T11:46:33.187Z\",\"publishedAt\":\"2025-02-19T11:46:33.346Z\",\"seo\":\"$79\",\"credits\":null,\"pressRelease\":\"$7a\"}\n7d:{\"metaTitle\":\"IO, l’app dei servizi pubblici, alla prova dei milanesi\",\"metaDescription\":\"IO, l’app dei servizi pubblici, alla prova dei milanesi\",\"keywords\":null,\"canonicalURL\":null,\"ogTitle\":null,\"ogDescription\":null,\"structuredData\":null,\"hideFromSearchEngines\":null}\n7f:T180c,"])</script><script>self.__next_f.push([1,"Milano, 15 marzo 2019 - Mettere le persone e i loro bisogni al centro del processo di innovazione della Pubblica Amministrazione, coinvolgendo i cittadini nello sviluppo delle piattaforme digitali di cui saranno diretti fruitori. È questo lo spirito con cui il [Team per la Trasformazione Digitale della Presidenza del Consiglio](https://teamdigitale.governo.it/) dà il via, insieme al Comune di Milano, all’ultima fase della sperimentazione del [progetto IO](https://ioapp.it/), **ideato e sviluppato per realizzare la app che porterà i servizi pubblici negli smartphone degli italiani**.\n\nIO vuole proporre un nuovo modello per l’erogazione dei servizi pubblici. Se oggi il cittadino deve scoprire autonomamente dove e come usare i servizi digitali che ciascun ente eroga, identificando quale sito o app risponde alla propria esigenza, in futuro basterà una sola applicazione. IO potrà essere usata da tutti gli enti pubblici, locali e nazionali, per contattare i cittadini: sarà l’ente stesso a preoccuparsi di avvisare attivamente il cittadino quando questi debba compiere qualche azione - ad esempio il pagamento di un tributo, che sarà possibile effettuare direttamente dall’app grazie a [pagoPA](https://www.pagopa.gov.it/) - oppure a inviargli il riepilogo di informazioni e documenti che potrebbero essere di suo interesse, attraverso messaggi personalizzati sulle specifiche esigenze dell’utente.\n\n*«Dopo il test su un prototipo realizzato nell’estate 2018 e la [demo condotta lo scorso novembre](https://medium.com/team-per-la-trasformazione-digitale/progetto-io-app-store-versione-beta-demo-cittadino-servizi-pubblica-amministrazione-1e5805666997) con un centinaio di stakeholder tra parlamentari ed esperti, sta per partire la sperimentazione dell’app IO in contesti reali»*, spiega Matteo De Santi, Chief Product \u0026 Design Officer del Team per la Trasformazione Digitale della Presidenza del Consiglio dei Ministri. ***«In linea con la natura open source del progetto, nelle prossime settimane migliaia di cittadini in tutta Italia saranno invitati a contribuire all’evoluzione di IO.** Vogliamo testarne l’effettiva funzionalità, mettendo a fattor comune le competenze e l’esperienza diretta degli utenti finali; questo ci permetterà di realizzare un prodotto migliore sin dalla prima release della app, in arrivo negli store nella seconda metà del 2019»*.\n\nTra gli enti che aderiscono alla sperimentazione sul territorio nazionale, **il Comune di Milano è il primo a lanciare questa fase, in gergo *closed beta***, invitando i milanesi a candidarsi come beta-tester. I cittadini selezionati potranno **provare la app nella vita di tutti i giorni** e interagire con una prima serie di servizi reali, effettuando **operazioni e pagamenti validi a tutti gli effetti**. Quelli che il Comune di Milano testerà includono ad esempio: i messaggi di riepilogo dei dati anagrafici, dell’occupazione immobiliare e delle rette scolastiche; gli avvisi di scadenza della carta d’identità o del pass mobilità; gli avvisi di contravvenzione al codice della strada o di accertamento della TARI e la possibilità di pagare gli importi dovuti ai rispettivi enti direttamente dalla app.\n\n*«La app che useranno i beta-tester è un work in progress, quindi sarà oggetto di frequenti aggiornamenti nel corso del tempo»*, aggiunge Matteo De Santi. *«Durante la sperimentazione, chiederemo ai cittadini di inviarci feedback precisi e con un approccio costruttivo. Per questo, è importante che abbiano chiaro il proprio ruolo di contributor del progetto IO - prima ancora di fruitori dell’app - consapevoli del valore del proprio impegno per far evolvere uno dei pilastri della trasformazione digitale della Pubblica Amministrazione italiana»*.\n\nL’invito ai milanesi a partecipare alla closed-beta dell’app IO arriva nel contesto della Digital Week, declinando appieno il significato di “Intelligenza urbana” prescelto come tema portante di questa edizione. *«Continua la stretta collaborazione tra Team Digitale e Comune di Milano, che adesso si concretizza in un nuovo progetto. **Non è un caso che la sperimentazione sul territorio parta proprio da Milano, città in piena trasformazione digitale che può contare su cittadini e city user che apprezzano la tecnologia - in special modo in versione mobile** - soprattutto quando permette loro di accedere facilmente ai servizi, evitando per esempio code agli sportelli o lunghi spostamenti in città. A loro è rivolto il mio invito a candidarsi per offrire contributi preziosi alla realizzazione di questo ambizioso progetto»*, afferma Roberta Cocco, Assessore alla Trasformazione Digitale e Servizi Civici del Comune di Milano.\n\n**Come diventare beta-tester?**\nI cittadini che desiderano partecipare alla sperimentazione sul territorio milanese, devono essere residenti nel capoluogo lombardo, avere uno smartphone Android o iOS ed essere in possesso di un’identità digitale **[SPID](https://www.spid.gov.it/)** per accedere all’app. Per candidarsi, è sufficiente compilare il **modulo online** disponibile al link **[io.italia.it/milano](https://io.italia.it/milano/)** inserendo il **codice invito 1003**. Inserire questo codice invito consentirà ai cittadini di avere la priorità su altri eventuali partecipanti al test.\n\nDai primi giorni di aprile, i tester riceveranno le istruzioni per scaricare l’app. Non tutti i cittadini che ne faranno richiesta potranno partecipare da subito alla sperimentazione. Il bacino di utenti della versione beta di IO sarà ampliato progressivamente, così da consentire agli sviluppatori del Team Digitale di tenere sotto controllo la risposta dei sistemi e dell’infrastruttura del progetto, nonché l’integrazione dei vari servizi.\n\nNei prossimi mesi, la closed beta entrerà nel vivo anche in altre città e regioni, grazie all’adesione di enti locali e centrali su tutto il territorio.\n\n**Contatti stampa**\n\n*Team per la Trasformazione Digitale* -   Simona Mercandalli\nmedia.teamdigitale@governo.it\n338.6989849\n\n*Comune di Milano* - Paola D’Antuono\npaola.dantuono@comune.milano.it \n347.5225835"])</script><script>self.__next_f.push([1,"7e:{\"title\":\"IO, l’app dei servizi pubblici, alla prova dei milanesi\",\"subtitle\":\"Il Comune di Milano, primo ente ad avviare la sperimentazione sul territorio del progetto IO del Team Digitale, invita i cittadini a candidarsi come beta-tester per contribuire a perfezionare la app prima del suo arrivo negli store nella seconda metà del 2019\",\"body\":\"$7f\",\"sectionID\":null,\"date\":\"2019-03-15\",\"backlink\":null}\n7c:{\"slug\":\"io-prova-milano\",\"updatedAt\":\"2025-02-24T16:16:54.471Z\",\"publishedAt\":\"2025-02-24T16:16:54.558Z\",\"seo\":\"$7d\",\"credits\":null,\"pressRelease\":\"$7e\"}\n81:{\"metaTitle\":\"IO, l’app dei servizi pubblici, negli store entro fine anno\",\"metaDescription\":\"IO, l’app dei servizi pubblici, negli store entro fine anno\",\"keywords\":null,\"canonicalURL\":null,\"ogTitle\":null,\"ogDescription\":null,\"structuredData\":null,\"hideFromSearchEngines\":null}\n83:T1019,"])</script><script>self.__next_f.push([1,"Roma, 21 gennaio 2019 - *«Il [Progetto IO](https://ioapp.it/) è una delle attività più entusiasmanti del [Team per la Trasformazione Digitale](https://teamdigitale.governo.it/), perché sfrutta le potenzialità di alcune piattaforme abilitanti ([SPID](https://innovazione.gov.it/progetti/identita-digitale-spid-cie/), [pagoPA](https://www.pagopa.gov.it/), [ANPR](https://innovazione.gov.it/progetti/anagrafe-nazionale-della-popolazione-residente/)), il nuovo modello di interoperabilità tramite API, gli strumenti e le linee guide delle community di designers.italia.it e developers.italia.it, per offrire ai cittadini **una app semplice da utilizzare sul proprio smartphone, dove far convergere progressivamente tutti i servizi pubblici**»* scrive [Matteo de Santi](https://teamdigitale.governo.it/it/people/34-profile.htm), Chief Product \u0026 Design Officer del Team per la Trasformazione Digitale della Presidenza del Consiglio dei Ministri.\n\nAnnunciando la pubblicazione della app negli store entro la fine dell’anno, nel suo post Matteo de Santi ripercorre tutti i passaggi che hanno portato il Team Digitale dall’idea alla realizzazione dell’**app dei servizi pubblici che consentirà al cittadino di gestire il rapporto con le Pubbliche Amministrazioni**.\n\nDopo la visione delineata dall’ex Commissario Straordinario per l’attuazione dell’Agenda Digitale [Diego Piacentini](https://teamdigitale.governo.it/it/people/1-profile.htm) nel post [Anna e il progetto IO](https://medium.com/team-per-la-trasformazione-digitale/progetto-io-app-cittadino-servizi-pubblica-amministrazione-22e8bbfec3ed) e una prima fase di test nell’estate 2018, a novembre è stata installata sugli smartphone di 100 partecipanti per un periodo di 15 giorni **una demo funzionante dell’applicazione** (in gergo una versione alpha).\n\n*«Abbiamo coinvolto **38 parlamentari, insieme ad una sessantina di altre persone selezionate dal Team Digitale** tra collaboratori ed esponenti degli enti interessati dalla sperimentazione»*, continua Matteo de Santi.\n\nNel post sul blog vengono quindi delineati i prossimi passi della sperimentazione della app: a partire dalla primavera verrà rilasciata una fase di closed-beta, un test su invito che coinvolgerà qualche migliaio di cittadini in tutta Italia, selezionati come beta tester dagli enti che partecipano alla sperimentazione, tra cui i Comuni di Milano, Palermo, Brescia, Cagliari, Cesena, Valsamoggia, Ripalta Cremasca e agenzie centrali come ACI e Agenzia delle Entrate-Riscossione e che permetterà di interagire con servizi reali, effettuando operazioni e pagamenti validi a tutti gli effetti. Terminata questa fase, sarà rilasciata una prima release pubblica entro la fine del 2019. Disponibile nelle versioni Android e iOS, la app sarà promossa solo nei territori in cui l’adesione degli enti locali avrà già permesso la disponibilità di un ampio numero di servizi integrati all’interno.\n\n*«L’[articolo 64-bis del Codice dell’Amministrazione Digitale](https://docs.italia.it/italia/piano-triennale-ict/codice-amministrazione-digitale-docs/it/v2017-12-13/_rst/capo5_sezione3_art64-bis.html) assegna alla Presidenza del Consiglio dei Ministri la responsabilità di attivare il “punto di accesso telematico” attraverso cui tutti gli enti pubblici “rendono fruibili i propri servizi”»* aggiunge Matteo De Santi, *«è questa la sfida che il Team per la Trasformazione Digitale ha raccolto con il progetto IO»* citando nel post il ruolo fondamentale di cittadini, Comuni, Regioni, agenzie ed enti centrali senza i quali questo progetto non sarebbe stato possibile.\n\n*«Il progetto IO»* conclude il Chief Product \u0026 Design Officer del Team per la Trasformazione Digitale *«vuole quindi rappresentare anche un modo diverso e innovativo di concepire una nuova piattaforma digitale: un pezzo del [“sistema operativo” del Paese](https://medium.com/team-per-la-trasformazione-digitale/nuovo-sistema-operativo-paese-competenze-tecnologiche-programmi-be0d71b3f84b) che, prima ancora della tecnologia, mette al centro le persone ed i loro bisogni»*."])</script><script>self.__next_f.push([1,"82:{\"title\":\"IO, l’app dei servizi pubblici, negli store entro fine anno\",\"subtitle\":\"Il percorso che porterà nella seconda metà di quest’anno alla pubblicazione negli store di IO, l’app dei servizi pubblici, prevede una prima sperimentazione con i cittadini che avverrà in primavera.\",\"body\":\"$83\",\"sectionID\":null,\"date\":\"2019-01-21\",\"backlink\":null}\n80:{\"slug\":\"io-store-fine-anno\",\"updatedAt\":\"2025-02-24T16:22:41.390Z\",\"publishedAt\":\"2025-02-24T16:22:41.446Z\",\"seo\":\"$81\",\"credits\":null,\"pressRelease\":\"$82\"}\n85:{\"metaTitle\":\"Nasce IO, l'app dei servizi pubblici\",\"metaDescription\":\"Nasce IO, il progetto per sviluppare l'app dei servizi pubblici\",\"keywords\":null,\"canonicalURL\":null,\"ogTitle\":null,\"ogDescription\":null,\"structuredData\":null,\"hideFromSearchEngines\":null}\n87:Td99,"])</script><script>self.__next_f.push([1,"Segui il progetto su [io.italia.it](https://io.italia.it/) - **#progettoIO**\n\nRoma, 22 maggio 2018 - Il Team per la Trasformazione Digitale della Presidenza del Consiglio, in collaborazione con AgID (Agenzia per l’Italia Digitale), annuncia *la nascita di IO*, il progetto per lo sviluppo di un’applicazione sperimentale che permetterà ai cittadini di gestire direttamente dal proprio smartphone i rapporti con la Pubblica Amministrazione e l’accesso ai servizi pubblici. L’anteprima del prototipo e i dettagli del progetto sono disponibili su io.italia.it. Grazie alla nuova app, ogni utente potrà chiedere e conservare documenti e certificati, accettare ed effettuare pagamenti, ricevere comunicazioni, messaggi e promemoria.\n\n*“L’app permetterà di ridurre drasticamente i tempi degli adempimenti del cittadino verso la Pubblica Amministrazione.”* afferma **Diego Piacentini**, Commissario Straordinario per l’attuazione dell’Agenda Digitale, che continua *“Con un sistema di notifiche, pagamenti e scadenze, in pochi minuti si potranno svolgere operazioni che prima richiedevano molto più tempo”*\n\nL’applicazione non è attualmente presente negli app store e inizierà presto la fase di “closed beta”: infatti, a partire dall’estate 2018, alcuni servizi locali e nazionali verranno erogati anche attraverso l’app. In alcuni territori, quelli in cui il numero e l’importanza dei servizi saranno più alti, inviteremo i cittadini a partecipare al test dell’applicazione che entrerà così a far parte della loro vita quotidiana. Con l’aumento di funzioni e servizi sarà ampliato progressivamente il bacino di utenti della versione beta.\n\n**Come funzionerà l’app?**\nL’app si baserà sull’integrazione di altri sistemi già in funzione che convergeranno facilitando l’esperienza del cittadino e il lavoro delle pubbliche amministrazioni, le quali potranno usare le funzionalità della piattaforma IO per erogare tutti i propri servizi.\n\n*“Stiamo lavorando alle piattaforme abilitanti, quei componenti necessari, ma non sufficienti, per rendere l’app completamente operativa”* spiega **Diego Piacentini** *“l’anagrafe unica ANPR permetterà di sincronizzare tutti i dati dei cittadini che a oggi sono sparsi in circa 8000 anagrafi diverse, SPID ne garantirà un accesso sicuro e unico, il nodo dei pagamenti PagoPA diventerà il motore del borsellino digitale dell’app”.*\n\n**Quali vantaggi per le Pubbliche Amministrazioni?**\nIO parte dall’analisi dalle necessità dei cittadini, ma costituisce un vantaggio anche per tutti i soggetti pubblici che erogano servizi digitali. Il progetto mette infatti a disposizione, anche grazie all’integrazione di PagoPA, ANPR e SPID, la maggior parte delle funzioni che sono comuni a tutti i servizi della Pubblica Amministrazione.\n\n*“IO è un progetto aperto”* dice **Matteo De Santi**, responsabile UX/UI \u0026 Product Design del Team per la Trasformazione Digitale, *“qualunque ente pubblico può partecipare alla sperimentazione, anzi, è invitato a farlo. IO è pensato con una logica open source, cioè tutto il processo di realizzazione sia della app che dell’infrastruttura è completamente pubblica, e chiunque può vedere come la stiamo portando avanti e darci una mano. Il Team per la Trasformazione Digitale, inoltre, sta utilizzando tecnologie e metodologie che ci auguriamo costituiscano delle best practices per tutti i servizi digitali del nostro Paese”.*"])</script><script>self.__next_f.push([1,"86:{\"title\":\"Nasce IO, il progetto per sviluppare l'app dei servizi pubblici\",\"subtitle\":\"Il Team per la Trasformazione Digitale presso la Presidenza del Consiglio dei Ministri annuncia la nascita di IO, progetto per lo sviluppo della app dei servizi pubblici che consentirà al cittadino di gestire il rapporto con le Pubbliche Amministrazioni e che avvierà una fase di test con alcuni cittadini e alcune amministrazioni in estate.\",\"body\":\"$87\",\"sectionID\":null,\"date\":\"2018-05-22\",\"backlink\":null}\n84:{\"slug\":\"nasce-io\",\"updatedAt\":\"2025-02-19T11:46:49.126Z\",\"publishedAt\":\"2025-02-19T11:46:49.238Z\",\"seo\":\"$85\",\"credits\":null,\"pressRelease\":\"$86\"}\n27:[\"$28\",\"$2c\",\"$30\",\"$34\",\"$38\",\"$3c\",\"$40\",\"$44\",\"$48\",\"$4c\",\"$50\",\"$54\",\"$58\",\"$5c\",\"$60\",\"$64\",\"$68\",\"$6c\",\"$70\",\"$74\",\"$78\",\"$7c\",\"$80\",\"$84\"]\n"])</script><script>self.__next_f.push([1,"5:[\"$\",\"main\",null,{\"children\":[null,[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\
