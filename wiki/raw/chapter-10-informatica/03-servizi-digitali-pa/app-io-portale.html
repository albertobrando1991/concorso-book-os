e83d7c3b94b0d87.js\",\"573\",\"static/chunks/app/%5B%5B...slug%5D%5D/page-7465e5ef3caad5ed.js\"],\"default\"]\ne:T101e,"])</script><script>self.__next_f.push([1,"_Roma, 17 novembre 2025_ – Da domani, **martedì 18 novembre 2025**, alle ore 7:00, si aprono i termini per la richiesta del **Bonus Elettrodomestici**, l’iniziativa promossa dal Ministero delle Imprese e del Made in Italy (MIMIT) che incentiva la sostituzione di apparecchi obsoleti con modelli ad alta efficienza energetica, favorendo la transizione ecologica. L'accesso all'agevolazione è gestito attraverso l’**app IO** e la piattaforma **PARI** di PagoPA a cui è integrata, garantendo così un processo interamente digitale, semplice e veloce per i cittadini. \n## Come richiedere e usare il Bonus con l'app IO\nLa richiesta del bonus sarà possibile **da martedì 18 novembre alle 7:00** ed è aperta a tutti i maggiorenni residenti in Italia. Per procedere, l'utente - una volta scelto l'elettrodomestico obsoleto da smaltire tra le categorie ammesse - dovrà **aggiornare l'app IO all'ultima versione disponibile**, accedere alla sezione **Servizi** e selezionare “Bonus Elettrodomestici”. A questo punto sarà sufficiente seguire la procedura guidata indicata in app per completare la richiesta e ricevere il relativo voucher.\nIn alternativa, sarà possibile fare richiesta del bonus accedendo con SPID o CIE al sito dedicato: https://bonuselettrodomestici.it/utente. Per maggiori informazioni di dettaglio sull'iniziativa, è disponibile consultare il **[centro assistenza online](https://assistenza.ioapp.it/hc/it/sections/38759512549393-Bonus-Elettrodomestici)** sul sito dell’app IO.\n## Tempi e utilizzo sull’app IO\nGli utenti riceveranno un messaggio su IO con l'esito positivo della richiesta dopo la verifica dei requisiti. I tempi possono variare da poche ore a qualche giorno, in base al volume di richieste. Se approvato, il bonus sarà disponibile nella sezione Portafoglio dell’app e dovrà essere speso **entro 15 giorni dal messaggio di conferma dell’attivazione** per acquisti presso i commercianti convenzionati, il cui elenco è consultabile nella sezione dedicata sul sito: https://bonuselettrodomestici.it/lista-punti-vendita \nSi specifica che l’erogazione dei voucher sarà gestita **fino a esaurimento fondi**. Le richieste pervenute successivamente al termine delle risorse disponibili verranno automaticamente inserite in una **lista d'attesa**. In linea con le dinamiche dell'iniziativa, qualora i voucher precedentemente erogati non venissero spesi dai primi beneficiari entro il periodo massimo di **15 giorni** dall'attivazione, i fondi torneranno disponibili e gli utenti in lista d'attesa riceveranno  un messaggio tramite l’app IO che conferma il diritto al contributo.\nQuesto sistema riflette il paradigma che sta alla base dell’ecosistema digitale formato dalle soluzioni tecnologiche in capo a PagoPA il cui obiettivo è mettere **il cittadino al centro**. Agli utenti è sufficiente una richiesta sull’app IO per attivare il beneficio, mentre l'infrastruttura digitale gestisce autonomamente la coda e si occupa di notificare l'utente non appena i fondi tornano disponibili. Un approccio abilitato dalla piattaforma PARI. \n## Il ruolo strategico di PARI\nIl Bonus Elettrodomestici è gestito tramite **PARI**, la nuova soluzione digitale sviluppata da PagoPA che semplifica l'accesso ai bonus e agli incentivi pubblici. La piattaforma permette agli Enti di gestire tutti gli incentivi in un unico luogo in modo standard e automatico, mentre i cittadini possono aderire e utilizzare il beneficio attraverso l'app IO e presso i commercianti convenzionati. Questa architettura garantisce trasparenza, tempestività nell'erogazione e una verifica dei requisiti in tempo reale.\n\nLa gestione del Bonus Elettrodomestici tramite PARI e app IO è un esempio tangibile di come la tecnologia possa superare la complessità burocratica. Questo progetto si inserisce pienamente nella mission di PagoPA di garantire che l’accesso ai servizi pubblici, inclusi i benefici economici, sia semplice, equo e inclusivo, contribuendo così a rafforzare la fiducia nel rapporto tra Stato e cittadino e a trasformare le misure di sostegno in opportunità immediatamente fruibili.\n"])</script><script>self.__next_f.push([1,"f:T965,"])</script><script>self.__next_f.push([1,"È partita sabato 1 novembre la nuova campagna istituzionale dedicata all’app IO, promossa dal **Dipartimento per la trasformazione digitale della Presidenza del Consiglio dei ministri** in collaborazione con il **Dipartimento per l'informazione e l'editoria** e la società **PagoPA**, responsabile dello sviluppo dell’app dei servizi pubblici.\n\nL’iniziativa punta a far conoscere ai cittadini i vantaggi di avere in un unico punto di accesso i servizi della Pubblica Amministrazione – **dai pagamenti alle comunicazioni a valore legale, passando per i messaggi e le scadenze dagli enti, fino ai documenti nell’IT-Wallet** – direttamente dal proprio smartphone.\n\n“_App IO è il punto unico di accesso ai servizi digitali della Pubblica Amministrazione, sempre a portata di mano degli italiani. È uno strumento che semplifica la vita di tutti i giorni. Grazie a IO possiamo tenere i nostri documenti nel portafoglio digitale - l’IT-Wallet, ricevere una notifica a valore legale, pagare una multa o dialogare con la PA senza code e in massima sicurezza_” ha dichiarato il **Sottosegretario Alessio Butti**. “_Più di 40 milioni di persone hanno già scaricato app IO: con la nuova campagna intendiamo accompagnarli nell’uso quotidiano, dimostrando che accedere e gestire i servizi dall’app è immediato e consente un reale risparmio di tempo._”\n\n## La Campagna\nAttraverso il claim “**Ci pensa IO**”, la nuova campagna mira a scardinare la convinzione secondo cui utilizzare i servizi della Pubblica Amministrazione comporti spesso un grande numero di azioni e invita i cittadini a scoprire come, invece, l’app IO renda tutto più facile e veloce. La creatività fa leva sul gesto del “tap” (il tocco dello schermo di un dispositivo con un dito), che rende semplice per chiunque gestire molte incombenze della vita quotidiana in digitale, anche quando si tratta di interagire con un ente pubblico.\n\n**Lo spot andrà in onda dal primo novembre** fino alla metà del mese sulle reti televisive e sulle emittenti radiofoniche **Rai**. Nei giorni successivi, la campagna sarà distribuita anche su altre **emittenti radio nazionali**, nei cinema del circuito gestito da Rai Pubblicità, sulle **piattaforme digitali** e attraverso una pianificazione Out-Of-Home in alcune città italiane, per raggiungere un pubblico più ampio e promuovere l'utilizzo consapevole di app IO."])</script><script>self.__next_f.push([1,"10:T67d,**IO, l’app dei servizi pubblici** sviluppata e gestita da PagoPA S.p.A., ha ricevuto la Menzione d’Onore nella categoria Service and social design durante la consegna del Compasso d’Oro International Award, la versione globale del più autorevole riconoscimento del design Made in Italy, promosso dall’[ADI – Associazione per il Disegno Industriale](https://www.adi-design.org/homepage.html), tenutasi oggi presso l’Auditorium del Padiglione Italia all’Expo 2025 di Osaka con il patrocinio del Ministero degli Affari Esteri e della Cooperazione Internazionale, del Ministero delle Imprese e del Made in Italy e il supporto del Bureau International des Expositions (BIE).\n\nNel corso dell’evento sono stati assegnati 20 Compassi d’Oro International e 35 Menzioni d’Onore, selezionati da una giuria internazionale di esperti per l’intuizione nell’interpretare il tema dell’Esposizione Universale **“Designing Future Society for Our Lives”**. Tra i progetti premiati, IO si distingue come servizio pubblico che porta l’eccellenza del design italiano al al servizio di una migliore fruizione dei servizi pubblici a misura di cittadino\n\nL'app IO aveva già vinto il Compasso d'Oro nell'edizione 2022. Ricevere due premi, a distanza di tempo, in uno dei concorsi di design più importanti a livello mondiale rende quindi questa occasione ancora più prestigiosa: un doppio riconoscimento alla qualità del design e all’esperienza utente dell’app e della scelta strategica del Governo italiano di puntare sempre di più su questo asset della Presidenza del Consiglio, per la continua innovazione nel rapporto tra le persone e la PA.11:T1013,"])</script><script>self.__next_f.push([1,"Roma, 5 giugno 2025 – Prosegue lo sviluppo di **IO, l’app dei servizi pubblici**, per ospitare la prima soluzione di portafoglio digitale italiano nell’ambito del **Sistema IT-Wallet**. Il **Dipartimento per la trasformazione digitale della Presidenza del Consiglio dei ministri**, in collaborazione con la società **PagoPA** e l’**Istituto Poligrafico e Zecca dello Stato** annuncia l’introduzione di una nuova funzionalità a beneficio di una migliore esperienza utente: aggiornando l’app IO all’ultima versione, i cittadini potranno sempre accedere ai Documenti digitali salvati nel Portafoglio anche **in modalità offline**.\n\nQuesta innovazione nasce per rispondere all’esigenza di garantire continuità e affidabilità, anche in futuro, nell’accesso a credenziali, certificati o attestazioni fondamentali in tutti quei contesti in cui la connettività è assente o instabile. Una funzione pensata per assicurare alle persone la disponibilità di servizi essenziali, anche in situazioni critiche o impreviste.\n\n_“Da oggi tutti i cittadini potranno accedere ai propri documenti digitali, anche in assenza di rete, aggiornando IO, l’app dei servizi pubblici. Grazie al lavoro congiunto del Dipartimento per la trasformazione digitale, PagoPA e l’Istituto Poligrafico e Zecca dello Stato, rispondiamo a un’esigenza concreta degli oltre 5 milioni di utenti che hanno già attivato quasi 9 milioni di documenti utilizzando la prima versione dell’IT-Wallet. Questa innovazione è un tassello chiave per garantire l’efficacia del portafoglio digitale italiano, avvicinandoci alla piena operatività del Sistema IT- Wallet\"_ ha dichiarato il **Sottosegretario alla Presidenza del Consiglio con delega all’innovazione tecnologica Alessio Butti**. \n\n**Come funziona l’accesso offline ai Documenti su IO**\n\nIn caso di assenza di rete – dovuta a mancanza di segnale, connessione troppo lenta o disservizi infrastrutturali – l’app IO individua lo stato offline del dispositivo e abilita una versione “base” che consente all’utente di accedere al proprio portafoglio digitale tramite autenticazione biometrica o PIN, senza la necessità di una sessione attiva (cioè anche se non si utilizza l’app da diverso tempo).\n\nAll’apertura della sezione Portafoglio con i relativi documenti aggiunti in precedenza (Patente di guida, Tessera Sanitaria - TEAM e/o Carta Europea della Disabilità), un banner informa l’utente dell’assenza di connessione chiarendo che la validità della versione digitale di quei documenti è aggiornata all’ultimo accesso in app online. Questo consente di rendere sempre facilmente consultabili in sicurezza i dettagli dei\ndocumenti su IO anche in ambienti privi di connessione o con una rete instabile, come mezzi pubblici, aree rurali o situazioni d’emergenza.\n\nAd esempio, questa novità consente di recuperare rapidamente la Patente di guida in versione digitale durante un controllo stradale da parte delle Forze dell’Ordine in galleria o in una strada di montagna, grazie a un’esperienza di navigazione in app progettata per rimanere fluida e coerente anche senza internet.\n\nNel momento in cui la connessione viene ripristinata, un banner avvisa l’utente che il dispositivo è di nuovo online e invita a ricaricare IO per accedere alla versione completa dell’app con tutti i servizi funzionanti.\n\n**I Documenti su IO in numeri**\n\nAl 3 giugno 2025, i numeri dei Documenti su IO ne confermano la diffusione costante, con un totale di **oltre 5,3 milioni di singoli utenti attivi **a partire dal rilascio della funzionalità lo scorso 4 dicembre 2024.\n\nComplessivamente, i documenti digitali attivi nel Portafoglio degli utenti dell’app hanno raggiunto quota **8,9 milioni**, a testimonianza di un’adozione sempre più estesa tra i cittadini. Nel dettaglio, sono **4,6 milioni** le versioni digitali della **Tessera Sanitaria**, seguite dalla **Patente di guida** con **4,2 milioni** di versioni caricate. Cresce anche la diffusione della **Carta Europea della Disabilità**, che ha superato\nle **100 mila carte digitalizzate**."])</script><script>self.__next_f.push([1,"12:Te27,"])</script><script>self.__next_f.push([1,"_Roma, 26 febbraio 2025 -_ È online il nuovo sito dell’app IO, pensato per rispondere in modo più efficace e puntuale ai bisogni informativi di chiunque voglia saperne di più sull’app dei servizi pubblici, grazie alla nuova organizzazione dei contenuti e alla veste grafica rinnovata in linea con il design dell’interfaccia utente del prodotto. \n\nIl restyling del sito, ideato e sviluppato internamente dal team di PagoPA, è ora disponibile all’indirizzo **[ioapp.it](https://ioapp.it/)** e nasce dall’esigenza di raccontare al meglio l’evoluzione di IO, che a poco meno di cinque anni dal lancio non è più un progetto in beta ma un **prodotto solido**, usato negli ultimi dodici mesi da 11,2 milioni di cittadini nella relazione con oltre 15 mila enti e più di 340 mila servizi integrati. Con le funzionalità introdotte nel corso del 2024, dall’accesso rapido alla nuova sezione Pagamenti e da ultima la possibilità di aggiungere al Portafoglio le versioni digitali dei documenti, l’app IO ha infatti rafforzato la sua promessa di posizionarsi come **strumento d’elezione nel rapporto fra cittadino e pubblica amministrazione digitale**, integrato alle principali piattaforme nazionali (come SPID, CIE, pagoPA, ANPR, SEND) per offrire gratuitamente l’accesso a numerose tipologie di servizi tramite un unico canale dal proprio smartphone.\n\nCon l’obiettivo di rappresentare tutto ciò che oggi un cittadino può fare con IO, il nuovo menu di navigazione del sito dà priorità alla descrizione delle **Funzioni** offerte dall’app come l’[aggiunta di documenti](https://ioapp.it/documenti-su-io), la [gestione di scadenze e pagamenti](https://ioapp.it/paga-gli-enti), la [ricezione di comunicazioni dagli enti](https://ioapp.it/ricevi-messaggi-dagli-enti) e [notifiche digitali](https://ioapp.it/leggi-le-notifiche) e la possibilità di richiedere la [Carta Giovani Nazionale](https://ioapp.it/carta-giovani-nazionale). Inoltre, per agevolare la scoperta delle diverse occasioni in cui IO può semplificare la vita alle persone, i contenuti relativi ai servizi disponibili sono suddivisi per ambito: [Educazione e formazione](https://ioapp.it/educazione-e-formazione), [Mobilità e trasporti](https://ioapp.it/mobilita-e-trasporti), [Vita lavorativa](https://ioapp.it/vita-lavorativa), [Casa e utenze](https://ioapp.it/casa-e-utenze) e [Salute](https://ioapp.it/salute) per poter esplorare al meglio i servizi nazionali e locali che è possibile fruire in app, dalla mensa scolastica al cedolino della pensione.\n\nNon mancano, alla voce **Visione e risultati** il racconto della genesi e delle principali tappe dello sviluppo di IO, insieme alla pagina [IO in numeri](https://ioapp.it/numeri) con i dati sulla diffusione e sull'utilizzo dell'app aggiornati quotidianamente. La sezione **Risorse** offre invece spunti e link a materiali di approfondimento dedicati a enti e sviluppatori interessati a comprendere le modalità di adesione e integrazione all’app IO, nonché una raccolta di comunicati e immagini per la stampa. Infine, il menu ospita una sezione di **Aiuto** agli utenti, dove è possibile consultare le risposte alle domande frequenti (FAQ), il collegamento al [centro assistenza](https://assistenza.ioapp.it/hc/it) e gli strumenti per bloccare o disattivare dal sito l’accesso a IO in caso di necessità.\n\nSempre disponibile nella homepage del sito, totalmente riprogettata per accogliere tutti i contenuti e semplificare la leggibilità anche da mobile, vi è anche il modulo per **iscriversi alla newsletter** e restare informati sulle principali novità di prodotto. "])</script><script>self.__next_f.push([1,"13:Tf96,"])</script><script>self.__next_f.push([1,"Roma, 4 dicembre 2024. Da oggi, tutti i cittadini possono accedere alla prima fase di IT-Wallet e ottenere la versione digitale dei propri documenti su app IO. Con la nuova funzionalità “Documenti su IO” è possibile aggiungere nella sezione “Portafoglio” di app IO la versione digitale della Patente di guida, della Tessera Sanitaria - Tessera Europea di Assicurazione Malattia e della Carta Europea della Disabilità.\n\n*“Oggi, con l’introduzione della prima fase di IT-Wallet, inizia una vera e propria rivoluzione digitale per il nostro Paese. Grazie alla possibilità di ottenere i propri documenti in versione digitale, come la Patente di guida, la Tessera Sanitaria e la Carta Europea della Disabilità, i cittadini potranno toccare con mano su app IO, se lo vorranno, un’innovazione che semplifica il rapporto tra Stato, cittadini e imprese, e apre nuove prospettive per l’evoluzione dei servizi pubblici e privati. Dopo due anni di intenso lavoro di squadra con alcune tra le istituzioni più rilevanti del nostro Paese, passiamo da una fase di sperimentazione a un’innovazione concreta che sarà accessibile a tutti coloro che esprimeranno il proprio consenso. Chi lo desidera potrà infatti continuare a utilizzare i documenti fisici nelle modalità tradizionali,”* ha dichiarato il **Sottosegretario alla Presidenza del Consiglio con delega all’innovazione tecnologica Alessio Butti**.\n\nUna volta aggiunti nel Portafoglio dell’app IO, sarà possibile in questa prima fase utilizzare la versione digitale dei documenti in specifici contesti d’uso dal vivo, al posto dei corrispettivi fisici:\n\n- la Patente di guida potrà essere utilizzata in Italia per dimostrare di essere abilitato alla guida in caso di controlli delle forze dell’ordine;\n- la Tessera Sanitaria - Tessera Europea di Assicurazione Malattia permetterà di accedere alle prestazioni fornite dal Servizio Sanitario Nazionale;\n- la Carta Europea della Disabilità avrà gli stessi usi già previsti dalla versione fisica del documento in Italia.\n\n**Come attivare “Documenti su IO”**\nL’attivazione di “Documenti su IO” è gratuita, facoltativa e disponibile per tutte le persone maggiorenni titolari dei documenti in corso di validità. Per ottenere i documenti in versione digitale basta aggiornare o installare app IO sul proprio dispositivo e accedere con la propria identità digitale. I dati digitali sono resi disponibili dagli stessi enti che emettono i documenti fisici, garantendo autenticità e sicurezza grazie all’accesso con CIE o SPID. Come avviene per i documenti fisici, i dati rimangono sotto il controllo esclusivo del cittadino e dell’Amministrazione pubblica titolare. Il processo è conforme alla normativa sulla protezione dei dati personali.\n\nNessun documento viene aggiunto al portafoglio digitale di IO senza l’esplicita richiesta degli utenti. I cittadini che lo preferiscono potranno quindi continuare a usare esclusivamente i documenti fisici.\n\n**Verso il Sistema IT-Wallet**\nIn attesa della piena operatività del portafoglio digitale italiano, il Sistema IT-Wallet, prevista per il 2025, “Documenti su IO” anticipa alcune funzionalità del futuro IT-Wallet pubblico. La sua realizzazione è stata resa possibile grazie alla collaborazione tra il Dipartimento per la trasformazione digitale della Presidenza del Consiglio dei ministri, in qualità di amministrazione titolare, PagoPA S.p.A., gestore dell’app IO e IT-Wallet provider pubblico, l’Istituto Poligrafico e Zecca dello Stato, società responsabile dell’emissione digitale dei documenti, e gli enti che forniscono i dati necessari alla creazione dei documenti digitali di propria competenza, MIT - Direzione generale per la Motorizzazione, MEF - Ragioneria Generale dello Stato e l’Istituto Nazionale di Previdenza Sociale, oltre a più di quindici altre amministrazioni che, a vario titolo, hanno partecipato attivamente, facilitando la realizzazione dell’iniziativa."])</script><script>self.__next_f.push([1,"14:Tef5,"])</script><script>self.__next_f.push([1,"Roma, 23 ottobre 2024 - In attesa della piena operatività del Sistema di portafoglio digitale italiano - **Sistema IT-Wallet**, inizia il rilascio pubblico di **Documenti su IO**, la nuova funzionalità che permette ai cittadini di aggiungere al **Portafoglio di app IO** – l’app dei servizi pubblici – la versione digitale della Patente di guida, della Tessera Sanitaria - Tessera Europea di Assicurazione Malattia e della Carta Europea della Disabilità.\n\nI tre documenti digitali potranno essere utilizzati in sostituzione dei corrispettivi documenti fisici e nello specifico, in questa prima fase, **solo per contesti di verifica dal vivo**:\n\n- la **Patente di guida** potrà essere utilizzata solo in Italia per dimostrare di essere abilitato alla guida in caso di controlli delle forze dell’ordine;\n- la **Tessera Sanitaria** - Tessera Europea di Assicurazione Malattia permetterà di accedere alle prestazioni fornite dal Servizio Sanitario Nazionale;\n- la **Carta Europea della Disabilità** avrà i medesimi usi già previsti con la versione del documento fisico.\n\nLa funzionalità **Documenti su IO** è stata sperimentata nei mesi scorsi da un gruppo tecnico di valutazione, composto da addetti ai lavori e che ne ha valutato l’efficacia generale. A partire da oggi sarà progressivamente estesa ai cittadini italiani l’opportunità di avere accesso ai documenti, conferendo così piena validità legale alle versioni digitali dei documenti.\n\nIl rilascio per i cittadini vedrà un **calendario di abilitazione**:\n\n- dal 23 ottobre 50.000 cittadini,\n- dal 6 novembre 250.000,\n- dal 30 novembre 1.000.000,\n- dal **4 dicembre per tutti gli utenti dell’app IO**.\nNel rispetto della tutela della privacy e della normativa sulla protezione dei dati personali, gli utenti, all’interno delle prime tre finestre temporali di abilitazione sopracitate, saranno selezionati con criterio randomico all’interno della base utenti dell’app IO.\n\nCon Documenti su IO, la sicurezza e la protezione dei dati dei cittadini sono sempre garantiti e l’identità è sempre verificata grazie all’autenticazione con CIE o SPID. Inoltre, si tratta di uno **strumento non obbligatorio**; i cittadini sono liberi di continuare a usare esclusivamente i documenti fisici.\n\n“Dopo due anni di lavoro costante e discreto, il governo ha mosso il primo passo verso la realizzazione del Sistema IT-Wallet, una rivoluzione digitale che ho fortemente sostenuto fin dal mio insediamento e che andrà a regime nel 2025. Con l’introduzione dell’IT-Wallet, e anticipando i tempi del regolamento europeo EIDAS 2, l’Italia intraprende un percorso ambizioso verso l’evoluzione dei servizi digitali. Questo strumento offrirà ai cittadini nuove opportunità per l’utilizzo della loro identità digitale, garantendo al tempo stesso massima sicurezza e tutela dei dati personali.” ha dichiarato il **Sottosegretario alla Presidenza del Consiglio con delega all’innovazione tecnologica Alessio Butti**.\n\nLa realizzazione del progetto è stata resa possibile grazie alla collaborazione tra il **Dipartimento per la trasformazione digitale della Presidenza del Consiglio dei ministri**, in qualità di amministrazione titolare, **PagoPA S.p.A.**, gestore dell’app IO e IT-Wallet provider pubblico, l’**Istituto Poligrafico e Zecca dello Stato**, società responsabile dell’emissione digitale dei documenti, e gli enti che forniscono i dati necessari alla creazione delle attestazioni e dei documenti digitali di propria competenza, **MIT - Direzione generale per la Motorizzazione**, **MEF - Ragioneria Generale dello Stato** e l’**Istituto Nazionale di Previdenza Sociale**, oltre a più di quindici altre amministrazioni che, a vario titolo, hanno partecipato attivamente, facilitando la realizzazione dell’iniziativa."])</script><script>self.__next_f.push([1,"15:T5c2,Roma, 10 aprile 2024 - Se hai un rimborso in arrivo o la registrazione del tuo contratto di locazione sta per scadere, l’Agenzia delle Entrate ti avvisa con un messaggio personalizzato su [IO, l’app dei servizi pubblici](https://io.italia.it/) sviluppata e gestita da PagoPA. Grazie a questa novità, diventa ancora più semplice tenersi aggiornati e non dimenticare date e adempimenti fiscali: IO consente infatti di ricevere, comodamente in un’unica app sul cellulare, i messaggi del Fisco insieme a quelli delle altre amministrazioni, locali e nazionali, accreditate al servizio.\n\n**Quali messaggi del Fisco arrivano su “IO”** - Rimborsi in arrivo, scadenze di contratti, adempimenti e rate, comunicazioni non recapitate: sono alcuni dei messaggi in forma semplice e chiara che l’Agenzia invia ai cittadini sulle questioni fiscali di maggior interesse. Gli avvisi riguardano anche le abilitazioni conferite alle persone di fiducia per l’accesso alla propria area riservata e alcune date da ricordare, ma nel tempo si aggiungeranno via via nuovi contenuti.\n\n**Dove trovare l’App** - L’app dei servizi pubblici “IO” è disponibile gratuitamente negli store iOS e Android. Per poterla utilizzare è necessario effettuare il login con carta d’identità elettronica (Cie) o con Spid. L’uso dell’app come canale di comunicazione permette di eliminare il ricorso agli sms e alle email, che possono prestarsi con più facilità a campagne di phishing.16:T97a,"])</script><script>self.__next_f.push([1,"Roma, 31 gennaio 2024 - PagoPA annuncia l’introduzione su IO, l’app dei servizi pubblici di una nuova modalità di **accesso rapido che prevede la possibilità di autenticarsi con SPID o CIE solo 1 volta all’anno**, superando l’attuale modalità di identificazione che richiede sempre agli utenti l’inserimento delle proprie credenziali di identità digitale ogni 30 giorni. Una novità che permetterà ai cittadini di accedere più velocemente ai servizi degli enti locali o nazionali integrati su IO, sfruttando la possibilità di entrare in app con il solo riconoscimento biometrico (volto o impronta) o codice di sblocco numerico.\n\nLa nuova funzionalità permetterà di gestire in app le operazioni legate a un servizio pubblico attraverso **un’esperienza utente ancora più semplice e veloce**. L’accesso rapido, infatti, è **un’evoluzione che risponde concretamente all’esigenza espressa dagli utenti di poter accedere a IO in modo più immediato**, rendendo così l’app dei servizi pubblici uno strumento ancora più vicino ai bisogni delle persone.\n\nIO, che raccoglie messaggi, documenti e pagamenti relativi ai servizi delle diverse pubbliche amministrazioni in un unico luogo, è nata per offrire a PA e cittadini un canale di comunicazione personalizzato e sicuro: autenticarsi all’app tramite SPID o CIE, infatti, significa garantire la propria identità certa e inequivocabile agli enti. A ulteriore garanzia di questo aspetto imprescindibile, è stata introdotta anche la possibilità per gli utenti - in caso di smarrimento o furto del dispositivo su cui è installata l’app IO - di effettuare il logout dal web e impedire l’accesso ai propri dati.\n\n**Come funziona**\n\nLa nuova funzionalità sarà disponibile allo scadere dei 30 giorni dall’ultimo accesso in app tramite la propria identità digitale, quando l’utente potrà scegliere di proseguire con l’accesso rapido oppure di mantenere il login ogni mese. Nel primo caso, il cittadino potrà entrare su IO con il solo riconoscimento biometrico (se abilitato sul proprio dispositivo) o codice di sblocco per i successivi 365 giorni utilizzando l’app con delle sessioni brevi, della durata di 15 minuti; al termine di ogni sessione, l’utente verrà informato da una schermata attraverso la quale potrà rinnovarla continuando a navigare sull’app.\n\n[Guarda ora lo spot.](https://youtu.be/vvEXWKXQ6SU?si=swflNICLce5l0OsW)"])</script><script>self.__next_f.push([1,"17:T903,"])</script><script>self.__next_f.push([1,"Si è concluso oggi il servizio [lanciato lo scorso marzo](https://www.pagopa.it/it/media/comunicati-stampa/emergenza-ucraina-da-oggi-e-possibile-donare-anche-con-app-io-e-dal-sito-della-piattaforma-pagopa/) da PagoPA per effettuare donazioni a favore delle organizzazioni umanitarie impegnate nel fornire assistenza alla popolazione ucraina.\n\nDato il contesto di emergenza straordinaria, la Società ha reso disponibili i propri canali per consentire ai cittadini - attraverso l’app IO e la piattaforma pagoPA - di inviare online, in modo semplice, immediato e senza commissioni (in caso di pagamento con carte di credito, debito o prepagate dei circuiti supportati), un contributo a sostegno delle campagne di raccolta fondi delle organizzazioni beneficiarie aderenti.\n\nL’iniziativa, condotta da PagoPA in via eccezionale tramite le proprie infrastrutture digitali, ha permesso di raccogliere in circa nove mesi **oltre 700 mila euro** interamente devoluti a [Croce Rossa Italiana](https://cri.it/emergenza-ucraina/), [Fondazione AVSI](https://www.avsi.org/cosa-facciamo/paesi/ucraina), [Fondazione CESVI](https://cesvi.org/emergenzaucraina/), [Fondazione Soleterre](https://soleterre.org/emergenza-ucraina/), [Save the Children](https://www.savethechildren.it/cosa-facciamo/risposta-alle-emergenze/emergenza-ucraina?utm_source=pagopa\u0026utm_medium=app\u0026utm_campaign=rf-ef-ucraina\u0026utm_content=crowd\u0026utm_term=txt\u0026causale=21882), [UNHCR - Alto Commissariato delle Nazioni Unite per i Rifugiati](https://www.unhcr.org/it/cosa-facciamo/emergenze/ucraina/), [ActionAid](https://dona-ora.actionaid.it/diritti-bambini-actionaid/), [INTERSOS](https://www.intersos.org/dona-ora/), [Medici Senza Frontiere](https://www.medicisenzafrontiere.it/landing/emergenza-ucraina-reg/) e il [Comitato italiano per l’UNICEF – Fondazione Onlus](https://donazioni.unicef.it/landing-emergenze/emergenza-ucraina#/home?utm_source=pagopa\u0026utm_medium=appio\u0026utm_campaign=em_ucraina).\n\nUn risultato che dimostra come il **digitale** possa essere uno strumento prezioso **per la collettività**, anche messo **al servizio di cause umanitarie e sociali**.\n\nPer continuare a sostenere i progetti di assistenza nel contesto della crisi ucraina, è possibile effettuare donazioni online direttamente dai siti delle singole organizzazioni."])</script><script>self.__next_f.push([1,"18:Td40,"])</script><script>self.__next_f.push([1,"[IO, l’app dei servizi pubblici](https://io.italia.it/) sviluppata e gestita da PagoPA S.p.A., si è aggiudicata il **XXVII Premio Compasso d’Oro ADI**, il più autorevole riconoscimento nel settore del design assegnato dal 1954 dall’[Associazione per il disegno industriale](https://www.adi-design.org/compasso-d-oro.html) ai progetti capaci ogni anno di “mettere in evidenza il valore e la qualità dei prodotti del design italiano”.\n\nL’assegnazione del Compasso d’Oro ADI, nel corso della cerimonia tenutasi oggi presso l’ADI Design Museum di Milano, è di particolare rilievo per un progetto come quello da cui prende forma l’app IO: non solo perché **il riconoscimento va a un servizio pubblico**, ma perché testimonia l’effettivo cambio di paradigma introdotto da IO, che permette ai cittadini di fruire dei servizi della Pubblica Amministrazione attraverso il proprio smartphone, in modo semplice, sicuro, veloce e intuitivo. Un **nuovo modello di relazione Stato-cittadino, reso possibile proprio grazie al ruolo cruciale del design**, dove la costruzione di servizi pubblici moderni ed efficienti passa dalla capacità di progettare e realizzare soluzioni digitali mettendo sempre al centro le persone e i loro bisogni.\n\n*“Il Premio ottenuto oggi dall’app IO ha un valore simbolico importantissimo per tutta la Pubblica Amministrazione: dimostra che l’eccellenza non è appannaggio del settore privato, ma si può raggiungere anche nei servizi pubblici se ci dotiamo di visione, di competenze e di risorse che sappiano portare le best practice di mercato al servizio delle persone e delle istituzioni”*, ha affermato **Giuseppe Virgone, Amministratore Unico di PagoPA S.p.A.** *\"Avere un team di designer all’interno di una Società pubblica è una piccola rivoluzione in sé e anche questo denota un cambio di passo fondamentale: ci consente di migliorare costantemente la user experience di qualsiasi prodotto, senza la quale ci sarebbe impossibile realizzare la mission di diffondere servizi digitali a misura di cittadino”.*\n\n*“Siamo orgogliosi e grati per questo riconoscimento: celebra l’essenza dell’app IO, ideata per fare innovazione per e con i cittadini. Da sempre concepiamo questo progetto come patrimonio comune, allo stesso modo in cui guardiamo al Design come un agire inevitabilmente collettivo”*, ha commentato **Matteo De Santi, Chief Product \u0026 Design Officer di PagoPA S.p.A.** oggi sul palco dell’ADI Design Museum a ritirare il Premio Compasso D’Oro insieme al team di designer coinvolti nella progettazione dell’app IO. *“Agire il Design, infatti, implica abbracciare quanta più complessità possibile, ascoltare tutti gli attori che partecipano al servizio, come fruitori o come erogatori, per far emergere bisogni e obiettivi; nella consapevolezza che la soluzione proposta per rispondere a queste esigenze può sempre migliorare. Al cuore dell’app IO c’è proprio questo approccio, con il fine ultimo di semplificare un po’ ogni giorno la vita delle persone.”*\n\nDal lancio negli store ad aprile 2020, oggi l’app IO sfiora i **30 milioni di download** e conta **ogni mese una media di oltre 6 milioni di utenti attivi**, che accedono all’app per fruire dei **circa 88 mila servizi pubblici** erogati **da oltre 7 mila amministrazioni locali e centrali**.\n\nPer maggiori informazioni: io.italia.it"])</script><script>self.__next_f.push([1,"19:Te86,"])</script><script>self.__next_f.push([1,"- Sugli app store la versione aggiornata di IO che integra la nuova funzionalità.\n- Non serve fare richiesta, né inserire codici o altri dati: un messaggio di notifica avviserà l’utente della disponibilità del proprio certificato.\n- I certificati, inviati a IO in assoluta sicurezza dalla Piattaforma del Ministero della Salute, saranno visualizzabili aprendo il messaggio in app e potranno essere salvati nella galleria fotografica del dispositivo mobile.\n\n**IO, l’app dei servizi pubblici ([io.italia.it](https://io.italia.it/)) è uno dei canali attraverso cui ottenere la Certificazione Verde COVID-19**, il cosiddetto “Green Pass”. Gli utenti dell’app IO che lo desiderano (sia che già usino l’app o che intendano scaricarla) senza fare alcuna richiesta riceveranno una notifica sul proprio dispositivo mobile ogni volta che sarà disponibile una certificazione a loro intestata e potranno visualizzarla direttamente aprendo il messaggio in app.\n\nIl servizio è **disponibile con l’ultima versione già presente negli store di IO**, rilasciata da [PagoPA S.p.A.](https://www.pagopa.it/it/) che gestisce l’app. Per i quasi 12 milioni di cittadini che hanno installato e già usano IO, sarà sufficiente aggiornare l’app. Chi ha l’identità digitale SPID o la CIE (Carta d’identità elettronica) potrà usufruire del servizio scaricando IO e accedendo con le proprie credenziali. Basterà questo per **ottenere in app i propri certificati verdi (associati al Codice Fiscale) in corso di validità, **a prescindere da quando siano stati generati**: non fa differenza se in un momento precedente o successivo rispetto al primo ingresso in app.\n\nSu IO, come per tutti gli altri canali a disposizione dei cittadini descritti sul sito www.dgc.gov.it, le Certificazioni verdi Covid-19 già in corso di validità saranno rilasciate gradualmente dall’avvio dell’operatività della Piattaforma nazionale-DGC del Ministero della Salute. I certificati saranno, quindi, disponibili su IO nel momento in cui la Piattaforma li genera anche in base alle tempistiche con cui le varie strutture sanitarie inviano i dati alla stessa.\n\nDall’avvio del servizio a livello nazionale, sull’app IO il cittadino in **due semplici passaggi** potrà visualizzare ed eventualmente archiviare su smartphone o tablet il proprio “green pass”, che attesta la vaccinazione, la negatività al test molecolare o antigenico o la guarigione dal COVID-19:\n\n- **Riceve una notifica** sul proprio dispositivo, senza fare richieste, né inserire codici o altri dati: è sufficiente che abbia **fatto almeno una volta l’accesso con SPID o CIE**.\n- **Entra nell’app IO** (tramite codice di sblocco o riconoscimento biometrico) **per aprire il messaggio con la propria Certificazione verde**: l’app mostrerà il QR code e i dati del certificato, che potrà quindi essere esibito direttamente da IO.\nCliccando sul pulsante **“Dettagli”** della stessa schermata l’utente potrà leggere il contenuto del certificato e i relativi dati sanitari. Le informazioni, le stesse contenute nel QR Code, vengono inviate ad IO in assoluta sicurezza direttamente dalla Piattaforma nazionale e vengono verificate ogni volta che il certificato viene visualizzato.\n\nInoltre tramite il pulsante **“Salva” si potrà conservare il certificato con il suo QR code** (attraverso l’apposita funzione) nella **galleria fotografica** del dispositivo, come una qualsiasi altra immagine, in modo da poterlo mostrare facilmente anche in assenza di connessione ad internet.\n\nMaggiori dettagli su come ottenere la Certificazione verde COVID-19 sull’app IO sono disponibili al link: io.italia.it/certificato-verde-green-pass-covid.\n\n"])</script><script>self.__next_f.push([1,"1a:T508,IO, l’app dei servizi pubblici, ha aggiunto una funzionalità che da oggi permette ai cittadini di donare **a una o più organizzazioni umanitarie che hanno attivato delle campagne di raccolta fondi per assistere le vittime civili della crisi in Ucraina**. Sarà possibile farlo in pochi clic, direttamente dal proprio smartphone, partendo dalla sezione Messaggi dell’app.\n\nGrazie alla collaborazione con **Nexi**, l’importo - detraibile - delle donazioni non sarà soggetto a commissioni in caso di pagamento con carte di credito, debito o prepagate dei circuiti supportati, e sarà quindi interamente devoluto all’organizzazione beneficiaria scelta dall’utente.\n\nQuesta funzionalità è parte dell’iniziativa realizzata da PagoPA S.p.A., con il supporto del *Ministro per l’innovazione tecnologica e la transizione digitale*, **Vittorio Colao**, che vede l’adesione di **Croce Rossa Italiana**, **Fondazione AVSI**, **Fondazione Bambino Gesù Onlus**, **Fondazione Soleterre** e **Save the Children**, tra le realtà in prima linea nel fornire assistenza alle vittimi civili.\n\nÈ, inoltre, possibile effettuare una donazione anche online tramite la piattaforma pagoPA a questo [link](https://checkout.pagopa.it/dona).\n\nPer saperne di più: io.italia.it/donazioni-ucraina1b:T2187,"])</script><script>self.__next_f.push([1,"- Anche ActionAid, INTERSOS, Medici Senza Frontiere e UNICEF aderiscono all’iniziativa di PagoPA S.p.A, che pone due delle principali piattaforme digitali del Paese al servizio di una causa sociale\n- Dal lancio della funzionalità dedicata alle donazioni a fine marzo scorso, raccolti circa 650 mila euro a favore delle prime realtà aderenti: Croce Rossa Italiana, Fondazione AVSI, Fondazione CESVI, Fondazione Soleterre, Save the Children e UNHCR, Alto Commissariato delle Nazioni Unite per i Rifugiati.\nCon il protrarsi dell’emergenza umanitaria legata alla crisi in Ucraina, prosegue la possibilità di sostenere alcune delle principali realtà impegnate in prima linea nel fornire assistenza alle vittime civili, donando tramite le piattaforme digitali gestite dalla società pubblica PagoPA S.p.A. Da oggi, attraverso l’[app IO](https://io.italia.it/) e tramite il sito della piattaforma [pagoPA](https://www.pagopa.gov.it/), i cittadini che lo desiderano possono destinare il proprio supporto a **quattro nuove organizzazioni umanitarie** che hanno scelto di aderire all’iniziativa: **ActionAid**, **INTERSOS**, **Medici Senza Frontiere** e il **Comitato italiano per l’UNICEF - Fondazione Onlus**.\n\nL’esperienza resta invariata: in pochi clic e senza commissioni in caso di pagamento con carte di credito, debito o prepagate dei circuiti supportati, sarà possibile devolvere interamente l’importo prescelto a una o più campagne di raccolta fondi delle organizzazioni presenti all’interno della funzionalità dedicata alle donazioni su app IO e pagoPA.\n\nIn poco più di tre mesi, dal lancio dell’iniziativa lo scorso 24 marzo 2022, attraverso le due piattaforme sono stati donati complessivamente circa **650 mila euro** a favore delle prime sei organizzazioni beneficiarie aderenti: **Croce Rossa Italiana**, Fondazione **AVSI**, Fondazione **CESVI**, Fondazione **Soleterre**, **Save the Children** e **UNHCR**, l’Alto Commissariato delle Nazioni Unite per i Rifugiati.\n\nIn questa speciale circostanza, dato il contesto di emergenza straordinaria, PagoPA ha voluto offrire un asset tecnologico - già noto e consolidato per efficientare il sistema dei pagamenti verso la Pubblica Amministrazione - anche a sostegno di progetti umanitari, mostrando **un concreto esempio di come il digitale possa essere un potente strumento al servizio dei diritti delle persone**. Il valore dell’iniziativa, in particolare sul fronte della raccolta continuativa di **micro-donazioni**, è sottolineato anche da alcune delle organizzazioni umanitarie coinvolte sin qui.\n\n“Dall’inizio del conflitto ad oggi – afferma il **Vicepresidente della Croce Rossa Italiana, Rosario Valastro** – i nostri Volontari hanno fornito un forte supporto alla popolazione ucraina. Penso alle attività di assistenza, alle missioni di evacuazione che hanno interessato centinaia di persone fragili, e alle circa 1.000 tonnellate di beni di prima necessità consegnate. Gli aiuti provenienti dal nostro Paese sono stati molti, anche grazie al sostegno della piattaforma digitale pagoPA, e tutti utili. I tanti contributi ci hanno permesso, tra l’altro, di realizzare un hub logistico di oltre 1.000 mq a Suceava (Romania), per lo stoccaggio delle merci. Stiamo lavorando per l’apertura di ospedali da campo vicino a Kiev. Vogliamo continuare ad essere presenti accanto a chi soffre, rispondendo sia ai bisogni umanitari di chi è rimasto in Ucraina, sia alle necessità dei profughi che cercano asilo oltre confine”.\n\n“Dopo essere intervenuti con tempestività ai confini dell’Ucraina, in Polonia e Romania, e all’interno dell’Ucraina stessa fin dal primo giorno dello scoppio del conflitto, ci siamo resi conto che non potevamo non affrontare l’enorme richiesta di aiuto giunta anche nel nostro Paese e che era importante creare un collegamento con la grande disponibilità e solidarietà dimostrata da tantissime persone - dichiara **Giampaolo Silvestri, Segretario Generale di Fondazione AVSI**. È nata così l’idea di metterci in rete, soggetti diversi, per coordinarci, unire le forze e rispondere al meglio a questa nuova sfida. Vogliamo ringraziare PagoPA, partner prezioso in questa grande operazione, per essere al nostro fianco e dare la possibilità a tutti coloro che vogliono sostenere il nostro operato di essere insieme per proteggere e assistere i rifugiati e gli sfollati ucraini”.\n\n“Grazie al supporto imprescindibile di aziende come PagoPA, noi di CESVI siamo stati in grado di intervenire tempestivamente nella crisi Ucraina operando da subito all’interno del paese ma anche nell’accoglienza di donne e bambini nei Paesi di confine come la Romania, la Polonia e l’Ungheria – racconta Roberto Vignola, Vicedirettore Generale di Fondazione CESVI. Il nostro modello dinamico, tipico di una ONG italiana che da sempre ha agito in contesti emergenziali non con modelli precostituiti ma con soluzioni tailor-made per affrontare e risolvere problematiche specifiche, ci ha consentito di realizzare interventi di aiuto tempestivi con un approccio che parte dai bisogni delle persone, dei territori, dalla collaborazione con la società civile e le istituzioni locali”.\n\n“La guerra non solo distrugge l’economia e lo sviluppo sociale, ma anche i legami familiari, con effetti catastrofici sul benessere mentale della popolazione civile, in particolare quella più povera – dichiara **Damiano Rizzi, presidente di Fondazione Soleterre**. Proviamo quindi a immaginare cosa prova un bambino ucraino che è anche stato colpito da tumore. Per questo, a una settimana dagli attacchi su Kiev, abbiamo organizzato la più grande evacuazione medica di bambini oncomalati attraverso 17 voli medicalmente assistiti. E dall’Italia continuiamo ad assicurare l’invio di farmaci per assistere gli oltre 2.000 bambini ricoverati nei 6 ospedali con cui collaboriamo. Attraverso PagoPA tantissime persone hanno già potuto esprimere la propria solidarietà aiutandoci in questa operazione di pace”.\n\n“Continuano ad essere milioni i bambini e le bambine vittime di questa guerra senza senso che hanno perso la vita, sono stati feriti, hanno dovuto assistere a violenze che nessuno dovrebbe vedere, sono stati costretti ad abbandonare le proprie case e il proprio Paese – ha commentato **Giancarla Pancione, Direttrice Marketing e Fundraising di Save the Children** –. Stiamo lavorando all’interno dell’Ucraina e nei paesi limitrofi fornendo assistenza salvavita, come cibo e acqua, denaro e spazi sicuri ai bambini e alle famiglie. PagoPA è un partner prezioso per noi, che ha consentito in questi mesi a tantissime persone di dare il proprio contributo in un grande slancio collettivo e alla nostra Organizzazione di rafforzare il proprio intervento. Perché ogni guerra è una guerra contro i bambini”.\n\n“Dal 24 febbraio a oggi, sono oltre 5 milioni e 600 mila le persone in fuga dal conflitto in Ucraina che sono state registrate come rifugiati, mentre 6,2 milioni sono sfollate all’interno del Paese – dichiara **Laura Iucci, direttrice della raccolta fondi UNHCR Italia** –. Siamo di fronte a un’emergenza umanitaria colossale e senza precedenti nella storia recente europea. Ci teniamo a ringraziare PagoPA per aver messo a disposizione le sue piattaforme digitali per raccogliere fondi per questa grave crisi umanitaria. Per noi è prezioso poter contare su una piattaforma pubblica di questo livello, affidabile e usata quotidianamente da milioni di cittadini, grazie alla quale possiamo disporre di risorse aggiuntive fondamentali che ci permettono di intensificare le nostre operazioni di protezione e assistenza a beneficio di migliaia di rifugiati e sfollati”.\n\nPer maggiori info su come donare:\n\n- dall’app IO: https://io.italia.it/donazioni-ucraina/\n- come donare tramite il sito web della piattaforma pagoPA: https://checkout.pagopa.it/dona\n**About PagoPA**\nPagoPA S.p.A., istituita dal Decreto Legge “Semplificazioni” n. 135 del 14 dicembre del 2018, è la società interamente partecipata dallo Stato, attraverso il Ministero dell’Economia e delle Finanze (MEF) e sottoposta alla vigilanza del Presidente del Consiglio, per tramite del Ministro per l’Innovazione tecnologica e la Transizione Digitale (MITD). PagoPA S.p.A ha come obiettivo la progettazione e gestione di alcune tra le più importanti infrastrutture immateriali del Paese e la diffusione di servizi pubblici digitali sempre più facili da usare e vicini ai bisogni dei cittadini.\n\n**Contatti Stampa:**\nufficiostampa@pagopa.it"])</script><script>self.__next_f.push([1,"1c:T5a3,Mentre il numero di utenti, Pubbliche Amministrazioni e servizi presenti su IO cresce a ritmo spedito e costante, evolvono anche le funzionalità dell’app, per garantire una user experience sempre più vicina ai bisogni dei cittadini.\n\nLa novità più recente riguarda l’**ampliamento della sezione “Portafoglio”**, che **con l’arrivo di PayPal si arricchisce di un nuovo metodo di pagamento** rapido, semplice e sicuro con cui è possibile pagare servizi, rette, bolli e tributi verso gli enti della Pubblica Amministrazione. Oltre a carte di credito, di debito o prepagate, infatti, **è possibile collegare al proprio conto PayPal anche il conto bancario**, che risulta utile nel caso si debbano pagare importi elevati sia dal messaggio con la notifica di pagamento ricevuto dall’Ente direttamente su IO, sia tramite il QR code riportato sull’avviso pagoPA cartaceo.\n\nGrazie alla collaborazione con PayTipper, il sistema di pagamento di Enel X, l’aggiunta di PayPal agli strumenti di pagamento preferiti, che è possibile registrare nel Portafoglio di IO, segna così un ulteriore passo in avanti nella promozione dei pagamenti digitali.\n\nPer saperne di più [leggi il comunicato di PayPal Italia](https://newsroom.it.paypal-corp.com/paypal-appIo) che dà l’annuncio.\n\nPer conoscere gli altri metodi di pagamento disponibili su IO, [consulta la pagina dedicata sul sito dell’app](https://io.italia.it/metodi-pagamento/).1d:Teff,"])</script><script>self.__next_f.push([1,"Cresce a ritmo sostenuto la presenza di nuovi servizi sull’app IO, concepita per essere il punto di accesso mobile a tutti i servizi digitali della Pubblica Amministrazione. A poco più di un anno dall’arrivo di IO sugli app store nella primavera del 2020, oltre **5 mila Enti pubblici**, a partire dai Comuni, hanno portato più di **12 mila servizi** su questo nuovo canale digitale a disposizione di cittadini e PA. È in aumento continuo anche il numero dei **download** dell’app, che supera oggi gli **11,3 milioni**. Per molti cittadini, IO è diventato uno strumento familiare, da utilizzare nella vita di tutti i giorni: sono in media **3,4 milioni** le persone che aprono e consultano l’app settimanalmente.\n\nDa aprile 2020 ad oggi, i dati relativi alla diffusione di IO - tra le piattaforme in carico alla società **PagoPA S.p.A.** per accelerare la transizione digitale - mostrano un’**adozione progressiva** dell’app da parte delle pubbliche amministrazioni su tutto il territorio nazionale. In particolare, dall’inizio del 2021 si è osservata un’accelerazione. Stando al ritmo registrato solo nell’ultimo mese, **ogni giorno** fanno il loro ingresso in app quasi **30 enti**, che rendono disponibili circa **50 nuovi servizi**. Oltre il 95% degli enti oggi presenti su IO è costituito da Comuni - piccoli e grandi, dal Nord al Sud - che hanno avviato il percorso di integrazione dei propri servizi digitali in app, così da offrire a tutti i cittadini una nuova esperienza di interazione con lo Stato, più semplice, moderna ed efficace.\n\nGuardando ai Comuni, la **tipologia di servizi pubblici** presenti in app varia a seconda delle singole amministrazioni, che - sfruttando le due principali funzionalità attualmente disponibili su IO - possono usarla per l’invio sicuro e personalizzato ai propri utenti di **messaggi di notifica e avvisi di pagamento** di varia natura. Tra i servizi locali già integrati in app:\n\n- quasi **un servizio su tre** di quelli oggi esposti si riferisce **all’anagrafe**: promemoria relativi alla scadenza della carta d’identità o del permesso di soggiorno, avviso di rilascio e pagamento della CIE (Carta d’Identità Elettronica), notifiche sull’aggiornamento di pratiche come il cambio di stato civile;\n- quasi **uno su quattro** dei servizi già integrati riguarda i **tributi**: dagli avvisi di scadenza alla possibilità di eseguire il versamento (come per la TARI);\n- tra le categorie di servizi ricorrenti anche quelli riferiti alla **scuola**: tramite IO si può essere informati - ad esempio - dell’apertura delle iscrizioni agli asili nido, della pubblicazione delle graduatorie e si può gestire il pagamento di diversi servizi scolastici (trasporto, prolungamento dell’orario, mensa);\n- numerosi, inoltre, i Comuni che rendono disponibili su IO i servizi che afferiscono alla **mobilità**: dagli avvisi sulla scadenza del pass per l’area ZTL al pagamento delle multe.\nUn recente contributo all’adozione di IO da parte degli enti locali, quale supporto in termini di risorse, è stato fornito dall’[Avviso Pubblico](https://www.pagopa.it/it/opportunita/fondo-innovazione/avviso-pubblico/) per l’assegnazione di finanziamenti ai Comuni, a valere sul Fondo per l’Innovazione Tecnologica e la Digitalizzazione. Per i mesi e gli anni che verranno l’impegno sarà ancora maggiore, visti gli obiettivi di digitalizzazione della PA a cui mira il Piano nazionale di ripresa e resilienza (Pnrr). IO è, infatti, uno dei pilastri che contribuiranno a rendere concreto il diritto alla cittadinanza digitale, grazie anche all’arrivo graduale in app di sempre più servizi a valore aggiunto di portata nazionale.\n\nPer maggiori dettagli e per vedere quali servizi sono già attivi e quelli presto in arrivo su IO app: https://io.italia.it/enti/"])</script><script>self.__next_f.push([1,"1e:T1d2b,"])</script><script>self.__next_f.push([1,"**Bonus Vacanze: da oggi è possibile richiederlo tramite l’app IO in pochi semplici passaggi**\n*Al via la misura introdotta dal Decreto Rilancio per promuovere e sostenere il turismo in Italia*\n\n*È attiva su IO, l’applicazione dei servizi pubblici, la funzione per richiedere fino al 31 dicembre 2020 il Bonus Vacanze. Necessario possedere un’identità digitale SPID per accedere all’app e aver presentato all’INPS una DSU per il calcolo ISEE.*\n\nRoma, 1° luglio 2020 - È disponibile su **IO, l’applicazione dei servizi pubblici** ([io.italia.it](https://io.italia.it/)) la nuova funzionalità per richiedere e utilizzare, a partire **da oggi e fino al 31 dicembre**, il [Bonus Vacanze](https://www.agenziaentrate.gov.it/portale/web/guest/bonus-vacanze1): l’agevolazione prevista dal “Decreto Rilancio” (art. 176 del DL n. 34 del 19 maggio 2020) come misura di sostegno al turismo in Italia dopo l’emergenza Covid-19.\n\nIl Bonus è rivolto ai nuclei familiari con un **reddito ISEE non superiore a 40 mila euro** e offre un **contributo fino a 500 euro** per soggiorni in alberghi, campeggi, villaggi turistici, agriturismi e bed\u0026breakfast sul territorio italiano. L’importo del Bonus dipende dal numero dei componenti del nucleo familiare: 500 euro per i nuclei composti da 3 o più persone, 300 euro per quelli composti da 2 persone, 150 euro per quelli composti da 1 persona. Il Bonus può essere utilizzato per l’80% sotto forma di sconto sul corrispettivo dovuto alla struttura turistica e per il 20% in detrazione d’imposta nella prossima dichiarazione dei redditi. Come stabilito dal [Provvedimento del Direttore dell’Agenzia delle Entrate](https://www.agenziaentrate.gov.it/portale/documents/20143/2522870/RU+237174+del+17-6-2020.pdf/d7001a95-ba1f-0299-c947-0c706adebc3c) del 17 giugno 2020, il contributo può essere **richiesto ed erogato esclusivamente in forma digitale attraverso l’app IO**, sviluppata da **PagoPA S.p.A.** e disponibile gratuitamente negli store online per dispositivi [Android](https://play.google.com/store/apps/details?id=it.pagopa.io.app) e [iOS (iPhone)](https://apps.apple.com/it/app/io/id1501681835).\n\n**Come si richiede il Bonus Vacanze dall’app IO?**\nDopo aver installato l’app sul proprio telefono, per i cittadini in possesso dei requisiti necessari l’attivazione del Bonus Vacanze tramite IO avviene rapidamente, in pochi passaggi, come descritto su [io.italia.it/bonus-vacanze](https://io.italia.it/bonus-vacanze/).\n\n**1. Accedi con SPID o CIE**\nPer iniziare a utilizzare l’app IO, l’utente deve accedere con la propria identità digitale **[SPID*](https://www.spid.gov.it/)** o, in alternativa, con la **[Carta d’Identità Elettronica (CIE 3.0**)](https://www.cartaidentita.interno.gov.it/)** abbinata al PIN ricevuto al momento del rilascio della nuova carta. In seguito, sarà possibile accedere all’app digitando semplicemente un codice numerico o tramite il riconoscimento biometrico (impronta digitale o riconoscimento del volto) scelti dall’utente alla prima registrazione.\n\n**Per i cittadini sprovvisti di **SPID**, è possibile consultare la lista dei fornitori di identità digitale (dentity provider) e richiederlo su: [spid.gov.it/richiedi-spid](https://www.spid.gov.it/cos-e-spid/come-attivare-spid/)*\n***Al momento, la funzionalità “Entra con CIE” sull’app IO è disponibile su dispositivi Android (versione 6.0 e superiori) dotati di tecnologia NFC. Nelle prossime settimane, lo sarà anche su dispositivi con sistema operativo iOS (versione 13 e superiori).*\n\n**2. Vai nella sezione “Portafoglio” alla voce “Bonus e Sconti”**\nEntrando nella sezione “Portafoglio” dell’app e cliccando su **“Aggiungi”** in corrispondenza della funzionalità **“Bonus e Sconti”**, l’utente maggiorenne può selezionare “Bonus Vacanze” dalla lista di quelli disponibili. Prima di cliccare su **“Richiedi il Tuo Bonus”**, l’app IO ricorda all’utente come funziona e a chi spetta l’agevolazione.\n\n**3. Verifica il tuo ISEE e ottieni il Bonus**\nDopo aver richiesto il Bonus l’app verifica con i sistemi di INPS che l’ISEE* del nucleo familiare del richiedente sia in corso di validità e rientri nella soglia prevista. Il processo di verifica è pressoché immediato. In caso di esito positivo, l’app IO conferma al cittadino che la sua richiesta è valida e mostra in anteprima **l’importo massimo** dell’agevolazione che spetta al suo nucleo familiare, oltre all’**elenco degli altri componenti** che potranno spendere il Bonus. Se i dati sono corretti, è sufficiente cliccare su **“Attiva il Bonus”**: dopo qualche secondo, il cittadino potrà visualizzare il proprio Bonus Vacanze nella sezione “Portafoglio” dell’app.\n\n**Per il calcolo dell’indicatore ISEE del proprio nucleo familiare, occorre presentare all’INPS la Dichiarazione Sostitutiva Unica (DSU) [tramite i canali messi a disposizione dall’Istituto](https://www.inps.it/it/it.html?itemdir=49961)*\n\n**Utilizza personalmente o condividi il tuo Bonus**\nIl Bonus attribuito al proprio nucleo familiare è identificato da **un codice univoco alfanumerico**, a cui è associato anche un codice QR. Per ottenere lo sconto (pari all’80% dell’importo massimo indicato nella schermata di riepilogo del Bonus, oppure all’80% del corrispettivo dovuto per il soggiorno, se questo è inferiore all’importo massimo riconosciuto), **basta comunicare alla struttura turistica questo codice, insieme al proprio codice fiscale**, al momento di pagare presso la struttura dove si trascorreranno le vacanze.\n\nSe il cittadino che ne ha fatto richiesta sull’app IO non utilizzerà personalmente il Bonus, attraverso la funzione **“Condividi”** potrà inoltrarne facilmente una copia agli altri componenti del proprio nucleo familiare che non hanno accesso all’app.\n\nIl Bonus Vacanze rimarrà sempre disponibile nella sezione “Portafoglio” dell’app IO. **Dopo l’avvenuto utilizzo** presso la struttura turistica prescelta, da “attivo” il Bonus **risulterà “speso” e non potrà più essere utilizzato** da nessuno dei componenti del nucleo familiare a cui è stato attribuito.\n\nPer le strutture turistico-ricettive, lo sconto applicato all’ospite in possesso del Bonus Vacanze sarà rimborsato sotto forma di credito d’imposta utilizzabile in compensazione senza limiti di importo, attraverso il modello F24. In alternativa può essere ceduto a terzi, compresi gli istituti di credito e gli intermediari finanziari. Il credito d’imposta non utilizzato dal cessionario, in tutto o in parte, può essere oggetto di ulteriori cessioni.\n\n**Maggiori informazioni**\n- Per dettagli su **come funziona il servizio sull’app IO** per richiedere il Bonus Vacanze, vai su [io.italia.it/bonus-vacanze](https://io.italia.it/bonus-vacanze/) e consulta le relative FAQ [io.italia.it/bonus-vacanze/faq](https://io.italia.it/bonus-vacanze/faq)\n- Per dettagli sulla misura fiscale ed eventuali dubbi su come si utilizza il Bonus Vacanze: consulta la Guida d’Uso disponibile sul sito di Agenzia delle Entrate\nContatti stampa\nMinistero per i Beni e le Attività Culturali e per il Turismo: mattia.morandi@beniculturali.it\n\nAgenzia delle Entrate: ae.ufficiostampa@agenziaentrate.it\n\nMinistro per l’Innovazione Tecnologica e la Digitalizzazione: laura.sala@teamdigitale.governo.it\n\nPagoPA S.p.A, per informazioni sull’app IO: media@io.italia.it"])</script><script>self.__next_f.push([1,"1f:T1ab9,"])</script><script>self.__next_f.push([1,"**Sul sito internet del Comune le modalità per richiedere l’accesso e le istruzioni per scaricare la app. Obbligatorio risiedere sul territorio e avere l’identità digitale SPID**\n\nValsamoggia, 26 novembre 2019 – Pagare il bollo auto, ricevere avvisi e informazioni sui bandi per l’iscrizione ai servizi scolastici o gestire il pagamento di nido d’infanzia, del trasporto scolastico, del prolungamento d’orario e dei buoni pasto a debito; ricevere un promemoria della scadenza di pagamento della TARI o l’avviso di accertamento per il mancato pagamento della TARI dell’anno prima e pagare il relativo importo; ricevere eventuali avvisi di contravvenzione al codice della strada e pagare le sanzioni previste. Ma anche ricevere messaggi informativi di tipo istituzionale ed essere sempre aggiornati in caso di integrazione di nuovi servizi. Tutto questo dal proprio smartphone, in pochi clic e attraverso un’unica applicazione grazie a **IO, l’app dei servizi pubblici**, la cui sperimentazione arriva anche a Valsamoggia: comune di oltre 30mila abitanti della seconda cintura bolognese, primo ente in Emilia-Romagna a entrare nella fase di test in corso in diversi territori (tra cui Milano, Torino e Palermo) grazie al coinvolgimento di migliaia di cittadini. Attualmente, l’app IO è disponibile solo per chi partecipa alla sperimentazione. Nei prossimi mesi, IO sarà disponibile negli app store online con una prima versione beta pubblica.\n**IO** è il progetto ideato e sviluppato dal Team per la Trasformazione Digitale della Presidenza del Consiglio dei Ministri e oggi in carico alla società PagoPA Spa, che ha l’obiettivo di realizzare **l’app che faciliterà l’accesso dei cittadini italiani ai servizi digitali della Pubblica Amministrazione.**\n*“La app IO* – spiega **Federica Govoni**, Assessora all’Innovazione e alla semplificazione del Comune di Valsamoggia – *mette il cittadino al centro del processo di erogazione dei servizi pubblici. Attraverso un’unica applicazione, le amministrazioni locali e nazionali potranno contattare direttamente i singoli cittadini via smartphone in maniera semplice e sicura per avvisarli delle prossime scadenze come ad esempio pagare un tributo, oppure per condividere informazioni relative alle pratiche in corso o ai servizi richiesti, inviando messaggi personalizzati sulle specifiche esigenze dell’utente. Perché tutto questo possa entrare a regime ci serve anche il contributo dei cittadini, che invitiamo a iniziare a testare l’app IO e a segnalare gli aspetti più graditi o eventuali malfunzionamenti, per aiutarci a migliorarla partecipando all’evoluzione di questo progetto nazionale”.*\n\n*«IO è frutto di un progetto open source, aperto e collaborativo, che è nato coinvolgendo i cittadini e gli Enti pubblici sin dall’inizio. Ora che la prima versione beta dell’app è pronta, continuare a raccogliere input dall’esperienza diretta degli utenti finali ci consente di renderla ancora più vicina alle esigenze delle persone, ad esempio aggiungendo man mano nuove funzionalità richieste proprio da chi sta testando IO. Siamo felici di poter estendere la sperimentazione anche al Comune di Valsamoggia e speriamo faccia da traino per l’adesione di altri Enti del territorio: solo portando sull’app IO un numero crescente di servizi digitali potremo fare davvero la differenza per i cittadini»*, ha commentato **Matteo De Santi, Chief Product \u0026 Design Officer di PagoPA Spa** e responsabile del progetto IO.\n\n**Per candidarsi a diventare i primi fruitori della app nell’ambito della sperimentazione è necessario essere residenti sul territorio di Valsamoggia**, possedere uno smartphone Android o iOS, una carta di credito e **un’identità SPID** che si può ottenere in 24 ore in tutti gli sportelli polifunzionali di Valsamoggia previa pre-registrazione online.\n\nIn questa fase sperimentale – che in gergo tecnico si definisce closed-beta – i cittadini che aderiscono a IO hanno una duplice opportunità: da un lato, iniziare a interagire con servizi reali ed effettuare operazioni e pagamenti validi a tutti gli effetti, comodamente da un unico canale sul proprio smartphone; dall’altro, aiutare il team di sviluppo a migliorare continuamente l’efficacia dell’app e l’esperienza utente.\n\nPer esempio, un importante contributo arrivato dagli utenti ha permesso agli sviluppatori di collegare al calendario personale del proprio smartphone tutti i messaggi ricevuti su IO che implicano una scadenza per il cittadino come per esempio gli avvisi di pagamento. Un promemoria che consente di non mancare la scadenza. Un esempio di come non sono più gli utenti a doversi ricordare le scadenze ma è la app che tramite una notifica e un clic, aggiorna il nostro calendario.\n\n**I servizi di Enti pubblici nazionali su IO ad oggi e cosa si riceverà sullo smartphone:**\n\n**ACI**\n- **Bollo auto:** l’intestatario riceve un promemoria in prossimità della scadenza del pagamento del Bollo Auto, con la possibilità di pagare direttamente dall’app e ricevere conferma del pagamento avvenuto.\n- **Certificati di proprietà:** l’intestatario riceve una notifica relativa al certificato di proprietà digitale disponibile per un nuovo veicolo e un riepilogo dei propri certificati di proprietà digitali.\n\n**I servizi del Comune di Valsamoggia su IO e cosa si riceverà sullo smartphone:**\n**Servizio tributi – GIÀ ATTIVO**\n\n- l’intestatario riceve un promemoria all’approssimarsi della scadenza di pagamento della TARI 2019;\n- l’intestatario riceve la visura degli immobili per cui sta pagando la TARI;\n- l’intestatario riceve l’avviso di accertamento per il mancato pagamento della TARI degli anni precedenti e può pagare il relativo importo, oltre a promemoria sulla scadenza IMU.\n\n**Pagamenti per Servizi scolastici – DA GENNAIO 2020**\n\n- il genitore intestatario può gestire il pagamento di nido d’infanzia, trasporto scolastico e prolungamento d’orario.\nAvvisi per Servizi scolastici – DA GENNAIO 2020\n- il genitore intestatario riceve avvisi e informazioni sui bandi per l’iscrizione ai servizi scolastici.\n\n**Polizia Municipale: verbali codice della strada e altre violazioni – DA GENNAIO 2020**\n- si ricevono eventuali avvisi di contravvenzione al codice della strada, con la possibilità di pagare le sanzioni previste;\n- si ricevono avvisi di pre-ruolo per contravvenzioni al codice della strada non pagate e si può procedere al pagamento.\n\n---------------------------------------------\n\n**APP IO – INFORMAZIONI:**\n\nWeb: https://io.italia.it/\nVideo di alcune funzionalità della versione closed-beta di IO: https://bit.ly/35fTqeC\nArticoli di approfondimento sul progetto IO: https://medium.com/team-per-la-trasformazione-digitale/progetto-io-app-servizi-pubblici/home"])</script><script>self.__next_f.push([1,"20:Tbd0,"])</script><script>self.__next_f.push([1,"Palermo, 15 ottobre 2019 - Mettere le persone e i loro bisogni al centro del processo di innovazione della Pubblica Amministrazione, per rendere più semplice ed efficace l’interazione tra i cittadini e gli enti pubblici. È questo lo spirito con cui il Comune di Palermo prosegue il percorso di adesione alle piattaforme nazionali per l’erogazione dei servizi locali in modalità digitale: dopo l’attivazione dei pagamenti digitali con pagoPA e il recente ingresso nell’Anagrafe Nazionale della Popolazione Residente (ANPR), è la volta della sperimentazione di **[IO, l’app dei servizi pubblici](https://io.italia.it/) con il coinvolgimento dei cittadini.**\n\nIdeata e sviluppata dal [Team per la Trasformazione Digitale](https://teamdigitale.governo.it/) della Presidenza del Consiglio dei Ministri, l’app IO propone un nuovo modello per l’erogazione dei servizi pubblici e rappresenta l’attuazione dell’[articolo 64 bis del Codice dell’Amministrazione Digitale](https://docs.italia.it/italia/piano-triennale-ict/codice-amministrazione-digitale-docs/it/v2017-12-13/_rst/capo5_sezione3_art64-bis.html), che istituisce un unico punto di accesso ai cittadini per tutti i servizi digitali.\n\nSe oggi il cittadino deve scoprire da solo dove e come usare i servizi digitali che ciascun ente eroga, identificando quale sito o app risponde alla propria esigenza, in futuro basterà una sola applicazione. **Con IO, infatti, sono gli enti a informare il cittadino, inviandogli messaggi semplici e personalizzati direttamente sullo smartphone**: tramite la stessa app, ogni pubblica amministrazione potrà contattare un cittadino per ricordargli una scadenza - ad esempio, di un documento o di un tributo, che sarà possibile pagare in pochi clic dal telefono grazie a [pagoPA](https://www.pagopa.gov.it/) - oppure inviargli il riepilogo di informazioni e documenti di suo interesse.\n\nDopo Milano e Torino, Palermo è la terza grande città a livello nazionale a offrire la possibilità ai propri cittadini di iniziare a usare l’app, con l’obiettivo di aiutare il Team per la Trasformazione Digitale a migliorarla prima del suo arrivo sugli store online nei prossimi mesi. Già un centinaio di persone si sono candidate a diventare tester di IO a Palermo, ma l’obiettivo è di estendere questa opportunità a molte più persone: per partecipare basta compilare il modulo online all’indirizzo io.italia.it/palermo/ seguendo le indicazioni fornite sul [sito del Comune](https://www.comune.palermo.it/io-app.php).\n\nI cittadini selezionati potranno provare la app nella vita di tutti i giorni e interagire con una prima serie di servizi reali, effettuando operazioni e pagamenti validi a tutti gli effetti; tra cui:\n\n- ricevere promemoria in prossimità della scadenza del proprio pass ZTL\n- ricevere eventuali avvisi di contravvenzione al codice della strada e procedere al pagamento online delle sanzioni previste\n- ricevere un promemoria alla scadenza delle rate della TARI e procedere al pagamento online."])</script><script>self.__next_f.push([1,"21:T1316,"])</script><script>self.__next_f.push([1,"*Il Comune di Ripalta Cremasca insieme a Milano e Torino, è fra i primi enti ad avviare la sperimentazione (in gergo closed beta) sul territorio del progetto IO del Team Digitale. Il Sindaco invita i cittadini a candidarsi come beta-tester per contribuire a perfezionare la app prima del suo arrivo negli store entro la fine dell’anno.*\n\nRipalta Cremasca, 24 Giugno 2019 - Prosegue lo spirito innovativo del Comune di Ripalta Cremasca. Dopo la digitalizzazione del servizio mensa, l’inaugurazione dello sportello telematico polifunzionale, l’attivazione dei pagamenti digitali con pagoPA è la volta della **sperimentazione del [Progetto IO](https://io.italia.it/).**\n\nIdeato e sviluppato dal [Team per la Trasformazione Digitale](https://teamdigitale.governo.it/), IO ha l’obiettivo di realizzare l’app che faciliterà l’accesso dei cittadini italiani ai servizi digitali della Pubblica Amministrazione e propone un nuovo modello per l’erogazione dei servizi pubblici. Se oggi il cittadino deve scoprire autonomamente dove e come usare i servizi digitali che ciascun ente eroga, identificando quale sito o app risponde alla propria esigenza, in futuro basterà una sola applicazione. IO potrà essere usata da tutti gli enti pubblici, locali e nazionali, per contattare i cittadini: sarà l’ente stesso a preoccuparsi di avvisare attivamente il cittadino quando questi debba compiere qualche azione - ad esempio il pagamento di un tributo, che sarà possibile effettuare direttamente dall’app grazie a [pagoPA](https://www.pagopa.gov.it/) - oppure a inviargli il riepilogo di informazioni e documenti che potrebbero essere di suo interesse, attraverso messaggi personalizzati sulle specifiche esigenze dell’utente.\n\nIl Sindaco è intervenuto con parole di apprezzamento verso il programma di sperimentazione «Sono orgoglioso che Ripalta Cremasca possa contribuire alla crescita del Paese e allo sviluppo della digitalizzazione, in cui noi crediamo molto».\n\nOggi, infatti, in vista dell’arrivo dell’ app negli store entro la fine del 2019, IO si apre anche al contributo degli abitanti di Ripalta Cremasca. «IO è un progetto open source, che è nato coinvolgendo i cittadini sin dall’inizio e che vogliamo far crescere e migliorare progressivamente facendo tesoro anche di competenze esterne e dell’esperienza diretta degli utenti finali», ha commentato Matteo De Santi, Chief Product \u0026 Design Officer del Team per la Trasformazione Digitale. «Dall’avvio della sperimentazione ad aprile, sono già centinaia i cittadini che stanno testando l’app per aiutarci a individuare e risolvere malfunzionamenti e a ottimizzare alcune funzionalità. Ne siamo entusiasti, perché sono proprio i feedback delle persone a fare la differenza nello sviluppo di IO».\n\nI cittadini selezionati come beta tester potranno provare la app nella vita di tutti i giorni e interagire con una prima serie di servizi reali, effettuando operazioni e pagamenti validi a tutti gli effetti. Quelli che il Comune di Ripalta Cremasca testerà includono ad esempio: Servizio Mensa Scolastica, Carta d’identità Elettronica; Pagamento della TARI.\n\nLa app che useranno i beta-tester è un work in progress, quindi sarà oggetto di frequenti aggiornamenti nel corso del tempo. Durante la sperimentazione, i cittadini dovranno inviare feedback precisi e con un approccio costruttivo. Essi avranno un ruolo di contributor del progetto IO, prima ancora di fruitori dell’app, consapevoli del valore del proprio impegno che permetterà di far evolvere uno dei pilastri della trasformazione digitale della Pubblica Amministrazione italiana.\n\n**Come diventare beta-tester?**\n**Per l’avvio della sperimentazione è previsto un evento pubblico di presentazione che si terrà presso la Villa San Michele, in via Fontanoni, 4 a Ripalta Cremasca, il prossimo 4 Luglio alle ore 21.00.**\n\nI cittadini che desiderano partecipare alla sperimentazione nel comune di Ripalta Cremasca, devono essere residenti, avere uno smartphone Android o iOS ed essere in possesso di un’identità digitale SPID per accedere all’app. Per candidarsi, è sufficiente compilare il modulo online disponibile al link https://io.italia.it/ripalta/ inserendo il codice **invito 5003**, raggiungibile anche dal sito web comunale. Inserire questo codice invito consentirà ai cittadini di avere la priorità su altri eventuali partecipanti al test.\n\nNei giorni successivi l’accreditamento, i tester riceveranno le istruzioni per scaricare l’app. Non tutti i cittadini che ne faranno richiesta potranno partecipare da subito alla sperimentazione. Il bacino di utenti della versione beta di IO sarà ampliato progressivamente, così da consentire agli sviluppatori del Team Digitale di tenere sotto controllo la risposta dei sistemi e dell’infrastruttura del progetto, nonché l’integrazione dei vari servizi."])</script><script>self.__next_f.push([1,"22:T12f3,"])</script><script>self.__next_f.push([1,"Torino - 28 maggio 2019 - È stato presentato oggi a Torino, presso il Museo Egizio, IO, il progetto ideato e sviluppato dal [Team per la Trasformazione Digitale della Presidenza del Consiglio dei Ministri](https://teamdigitale.governo.it/) per lo sviluppo dell’applicazione che faciliterà l’accesso dei cittadini italiani ai servizi digitali della Pubblica Amministrazione.\n\nL’Amministrazione del capoluogo piemontese, già impegnata nel rendere più facile e diretto il dialogo con il cittadino come dimostra il portale [TorinoFacile](https://servizi.torinofacile.it/info/), da tempo collabora attivamente con il Team per la Trasformazione Digitale sul fronte della digitalizzazione dei servizi pubblici.\n\n*«Come città abbiamo sempre puntato sulla digitalizzazione e sulla semplificazione dei servizi al cittadino. Siamo in un’epoca in cui tutto deve essere di facile utilizzo e veloce. Questo è l’impegno dell’amministrazione di Torino»* spiega **Paola Pisano**, Assessore all’Innovazione del capoluogo piemontese. *«Siamo partiti con TorinoFacile, il portale digitale per i servizi al cittadino e oggi presentiamo un nuovo progetto del Team per la Trasformazione Digitale, invitando i nostri cittadini a dare il proprio contributo alla sua evoluzione per essere, in futuro, sempre più connessi con la PA».*\n\nIO propone un cambio di paradigma nell’erogazione dei servizi pubblici, portando il cittadino al centro del processo. Attraverso un’unica applicazione, tutti gli enti pubblici locali e nazionali potranno contattare direttamente i singoli cittadini via smartphone in maniera semplice, moderna e sicura; per avvisarli delle prossime scadenze - ad esempio pagare un tributo, anche tramite la stessa app grazie all’integrazione di [pagoPA](https://www.pagopa.gov.it/) - oppure per condividere informazioni relative alle pratiche in corso o ai servizi richiesti , inviando messaggi personalizzati sulle specifiche esigenze dell’utente.\n\n*«IO è un progetto open source, che è nato coinvolgendo i cittadini sin dall’inizio e che vogliamo far crescere e migliorare progressivamente facendo tesoro anche di competenze esterne e dell’esperienza diretta degli utenti finali»*, ha commentato **Matteo De Santi**, Chief Product \u0026 Design Officer del Team per la Trasformazione Digitale. *«Dall’avvio della fase di closed beta ad aprile, sono già centinaia i cittadini che stanno testando l’app per aiutarci a individuare e risolvere diversi bug, a ottimizzare alcune funzionalità, a scoprire nuove opportunità e nuovi servizi. Siamo entusiasti di poter estendere la sperimentazione anche ai torinesi, perché sono i feedback delle persone a fare la differenza nello sviluppo di IO, in vista del suo arrivo negli store nella seconda metà del 2019»*.\n\n*«Siamo orgogliosi di aver dato il nostro contributo per la realizzazione di un progetto così strategico, di portata nazionale, come quello di IO, che porterà i servizi digitali pubblici negli smartphone dei cittadini»* spiega **Pietro Pacini**, Direttore Generale CSI Piemonte *«Il CSI, integrando i servizi di notifica del portale Torino Facile con l’app IO, ha permesso alla Città di Torino di essere tra le prime città pilota di questo importante servizio»*. L’app IO è in continuo aggiornamento e oggi è stata lanciata la call for testers anche dal Comune di Torino. I cittadini selezionati potranno provare la app nella vita di tutti i giorni e interagire con una prima serie di servizi reali, effettuando operazioni e pagamenti validi a tutti gli effetti.\n\nL’invito è rivolto a tutti i torinesi: i cittadini che desiderano partecipare alla sperimentazione dovranno essere residenti nel capoluogo piemontese, essere in possesso di uno smartphone Android o iOS e di un’identità digitale SPID per accedere all’app. Per candidarsi a diventare beta tester è sufficiente compilare il modulo online disponibile al link https://io.italia.it/torino/ inserendo il **codice invito 4003**. Inserire questo codice invito consentirà ai cittadini di avere la priorità su altri eventuali partecipanti al test.\n\nEntro metà giugno, i candidati selezionati riceveranno le istruzioni per scaricare l’app. Non tutti i cittadini che ne faranno richiesta potranno partecipare da subito alla sperimentazione. Il bacino di utenti della versione beta di IO sarà ampliato progressivamente, così da consentire agli sviluppatori del Team per la Trasformazione Digitale di tenere sotto controllo la risposta dei sistemi e dell’infrastruttura del progetto, nonché l’integrazione dei vari servizi.\n\nCome Torino, anche altri enti locali e agenzie centrali hanno aderito al progetto e stanno per avviare la sperimentazione, così da far crescere sempre di più su tutto il territorio italiano questa importante azione di digitalizzazione nella PA."])</script><script>self.__next_f.push([1,"23:T180c,"])</script><script>self.__next_f.push([1,"Milano, 15 marzo 2019 - Mettere le persone e i loro bisogn
