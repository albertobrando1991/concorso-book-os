<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Nucleo comune + delta fiscale</title>
  <desc id="desc">La base generale diventa utile solo quando incontra la funzione fiscale.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/></marker>
  </defs>
  <rect class="bg" width="1600" height="1000"/>
  <text class="ink title" x="800" y="72" text-anchor="middle">Nucleo comune + delta fiscale</text>
  <text class="muted subtitle" x="800" y="114" text-anchor="middle">La base generale diventa utile solo quando incontra la funzione fiscale.</text>

  <rect class="card" x="70" y="165" width="1460" height="690" rx="30"/>

  <g data-safe-box="130 275 360 360 8">
    <rect class="softBlue" x="130" y="275" width="360" height="360" rx="28"/>
    <rect x="130" y="275" width="360" height="11" rx="5.5" fill="#10233F"/>
    <text class="navy label" x="310" y="333" text-anchor="middle" style="font-size:24px">Nucleo comune</text>
    <path class="thin" d="M168 361 L452 361"/>
    <text class="muted small" x="310" y="400" text-anchor="middle">amministrativo</text>
<text class="muted small" x="310" y="443" text-anchor="middle">pubblico impiego</text>
<text class="muted small" x="310" y="486" text-anchor="middle">trasparenza</text>
<text class="muted small" x="310" y="529" text-anchor="middle">privacy</text>
<text class="muted small" x="310" y="572" text-anchor="middle">inglese e digitale</text>
  </g>

  <g data-safe-box="525 425 60 60 2">
    <circle cx="555" cy="455" r="28" fill="#D4AF37"/>
    <text class="label" x="555" y="464" text-anchor="middle" fill="#FFFFFF" style="font-size:32px">+</text>
  </g>

  <g data-safe-box="620 275 360 360 8">
    <rect class="softRed" x="620" y="275" width="360" height="360" rx="28"/>
    <rect x="620" y="275" width="360" height="11" rx="5.5" fill="#7A2430"/>
    <text class="bordeaux label" x="800" y="333" text-anchor="middle" style="font-size:24px">Delta fiscale</text>
    <path class="thin" d="M658 361 L942 361"/>
    <text class="muted small" x="800" y="400" text-anchor="middle">tributi</text>
<text class="muted small" x="800" y="443" text-anchor="middle">accertamento</text>
<text class="muted small" x="800" y="486" text-anchor="middle">dogane</text>
<text class="muted small" x="800" y="529" text-anchor="middle">riscossione</text>
<text class="muted small" x="800" y="572" text-anchor="middle">catasto</text>
  </g>

  <g data-safe-box="1015 425 60 60 2">
    <circle cx="1045" cy="455" r="28" fill="#D4AF37"/>
    <text class="label" x="1045" y="464" text-anchor="middle" fill="#FFFFFF" style="font-size:32px">+</text>
  </g>

  <g data-safe-box="1110 275 360 360 8">
    <rect class="softGreen" x="1110" y="275" width="360" height="360" rx="28"/>
    <rect x="1110" y="275" width="360" height="11" rx="5.5" fill="#2F7D5A"/>
    <text class="green label" x="1290" y="333" text-anchor="middle" style="font-size:24px">Prova reale</text>
    <path class="thin" d="M1148 361 L1432 361"/>
    <text class="muted small" x="1290" y="400" text-anchor="middle">quiz</text>
<text class="muted small" x="1290" y="443" text-anchor="middle">orale</text>
<text class="muted small" x="1290" y="486" text-anchor="middle">caso</text>
<text class="muted small" x="1290" y="529" text-anchor="middle">front-office</text>
<text class="muted small" x="1290" y="572" text-anchor="middle">simulazione</text>
  </g>
  <path class="arrowNavy" d="M800 650 L800 710"/>

  <g data-safe-box="455 710 690 135 8">
    <rect class="softGold" x="455" y="710" width="690" height="135" rx="24"/>
    <rect x="455" y="710" width="690" height="11" rx="5.5" fill="#D4AF37"/>
    <text class="gold label" x="800" y="755" text-anchor="middle">Preparazione utilizzabile</text>
    <text class="muted small" x="800" y="788" text-anchor="middle">risposta meno generica</text>
<text class="muted small" x="800" y="815" text-anchor="middle">priorita coerenti con il profilo</text>
  </g>
</svg>
