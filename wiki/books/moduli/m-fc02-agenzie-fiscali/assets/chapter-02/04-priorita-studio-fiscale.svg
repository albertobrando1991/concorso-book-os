<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Priorita di studio nel bando fiscale</title>
  <desc id="desc">Studio subito, studio dopo, verifico sul bando o rinvio ad altro modulo.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/></marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/></marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Priorita di studio nel bando fiscale</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Studio subito, studio dopo, verifico sul bando o rinvio ad altro modulo.</text>

  <rect class="card" x="70" y="158" width="1460" height="650" rx="30"/>
  <g data-safe-box="125 238 290 450 10">
    <rect class="softBlue" x="125" y="238" width="290" height="450" rx="26"/>
    <rect x="125" y="238" width="290" height="12" rx="6" fill="#10233F"/>
    <text class="navy label" x="270" y="292" text-anchor="middle" style="font-size:23px">Studio subito</text>
    <circle cx="163" cy="343" r="7" fill="#D4AF37"/><text class="ink body" x="187" y="350" style="font-size:18px">definisce il profilo</text>
<circle cx="163" cy="381" r="7" fill="#D4AF37"/><text class="ink body" x="187" y="388" style="font-size:18px">compare nella prova</text>
<circle cx="163" cy="419" r="7" fill="#D4AF37"/><text class="ink body" x="187" y="426" style="font-size:18px">blocca altri nuclei</text>
    <rect x="157" y="586" width="226" height="64" rx="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text class="ink small" x="270" y="625" text-anchor="middle" style="font-weight:800;font-size:17px">tributario AE</text>
  </g>
  <g data-safe-box="465 238 290 450 10">
    <rect class="softRed" x="465" y="238" width="290" height="450" rx="26"/>
    <rect x="465" y="238" width="290" height="12" rx="6" fill="#7A2430"/>
    <text class="bordeaux label" x="610" y="292" text-anchor="middle" style="font-size:23px">Studio dopo</text>
    <circle cx="503" cy="343" r="7" fill="#D4AF37"/><text class="ink body" x="527" y="350" style="font-size:18px">completa il profilo</text>
<circle cx="503" cy="381" r="7" fill="#D4AF37"/><text class="ink body" x="527" y="388" style="font-size:18px">serve al secondo giro</text>
<circle cx="503" cy="419" r="7" fill="#D4AF37"/><text class="ink body" x="527" y="426" style="font-size:18px">non decide subito</text>
    <rect x="497" y="586" width="226" height="64" rx="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text class="ink small" x="610" y="625" text-anchor="middle" style="font-weight:800;font-size:17px">civile o contabilita</text>
  </g>
  <g data-safe-box="805 238 290 450 10">
    <rect class="softGold" x="805" y="238" width="290" height="450" rx="26"/>
    <rect x="805" y="238" width="290" height="12" rx="6" fill="#D4AF37"/>
    <text class="gold label" x="950" y="292" text-anchor="middle" style="font-size:23px">Verifico sul bando</text>
    <circle cx="843" cy="343" r="7" fill="#D4AF37"/><text class="ink body" x="867" y="350" style="font-size:18px">sigle profilo</text>
<circle cx="843" cy="381" r="7" fill="#D4AF37"/><text class="ink body" x="867" y="388" style="font-size:18px">allegati e soglie</text>
<circle cx="843" cy="419" r="7" fill="#D4AF37"/><text class="ink body" x="867" y="426" style="font-size:18px">banca dati o avvisi</text>
    <rect x="837" y="586" width="226" height="64" rx="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text class="ink small" x="950" y="625" text-anchor="middle" style="font-weight:800;font-size:17px">codice e prova</text>
  </g>
  <g data-safe-box="1145 238 290 450 10">
    <rect class="softGreen" x="1145" y="238" width="290" height="450" rx="26"/>
    <rect x="1145" y="238" width="290" height="12" rx="6" fill="#2F7D5A"/>
    <text class="green label" x="1290" y="292" text-anchor="middle" style="font-size:23px">Rinvio modulo</text>
    <circle cx="1183" cy="343" r="7" fill="#D4AF37"/><text class="ink body" x="1207" y="350" style="font-size:18px">baricentro non fiscale</text>
<circle cx="1183" cy="381" r="7" fill="#D4AF37"/><text class="ink body" x="1207" y="388" style="font-size:18px">ICT, appalti, tecnico</text>
<circle cx="1183" cy="419" r="7" fill="#D4AF37"/><text class="ink body" x="1207" y="426" style="font-size:18px">M-FC02 solo contesto</text>
    <rect x="1177" y="586" width="226" height="64" rx="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text class="ink small" x="1290" y="625" text-anchor="middle" style="font-weight:800;font-size:17px">M-TR01/02/03</text>
  </g>
  <g data-safe-box="260 810 1080 64 10">
    <rect class="note" x="260" y="810" width="1080" height="64" rx="24"/>
    <text class="ink body" x="800" y="850" text-anchor="middle" style="font-weight:800;font-size:20px">Se tutto e' urgente, niente e' prioritario: la griglia serve a tagliare dispersione.</text>
  </g>

</svg>
