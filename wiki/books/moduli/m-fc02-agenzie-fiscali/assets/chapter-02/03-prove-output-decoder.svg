<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Prove e output del Decoder fiscale</title>
  <desc id="desc">La forma della prova decide se allenare quiz, risposte, casi, orale o checklist.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/></marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/></marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Prove e output del Decoder fiscale</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">La forma della prova decide se allenare quiz, risposte, casi, orale o checklist.</text>

  <rect class="card" x="70" y="160" width="1460" height="640" rx="30"/>
  <g data-safe-box="125 235 250 220 10">
    <rect class="softBlue" x="125" y="235" width="250" height="220" rx="24"/>
    <rect x="125" y="235" width="250" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="250" y="283" text-anchor="middle" style="font-size:25px">Quiz</text>
    <text class="muted small" x="250" y="323" text-anchor="middle" style="font-size:18px">tempo</text>
<text class="muted small" x="250" y="350" text-anchor="middle" style="font-size:18px">differenze secche</text>
    <rect x="153" y="387" width="194" height="44" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text class="ink small" x="250" y="416" text-anchor="middle" style="font-weight:800;font-size:17px">Diario errori</text>
  </g>
  <g data-safe-box="430 235 250 220 10">
    <rect class="softRed" x="430" y="235" width="250" height="220" rx="24"/>
    <rect x="430" y="235" width="250" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="555" y="283" text-anchor="middle" style="font-size:25px">Scritto</text>
    <text class="muted small" x="555" y="323" text-anchor="middle" style="font-size:18px">definizione</text>
<text class="muted small" x="555" y="350" text-anchor="middle" style="font-size:18px">funzione, esempio</text>
    <rect x="458" y="387" width="194" height="44" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text class="ink small" x="555" y="416" text-anchor="middle" style="font-weight:800;font-size:17px">Schema risposta</text>
  </g>
  <g data-safe-box="735 235 250 220 10">
    <rect class="softGold" x="735" y="235" width="250" height="220" rx="24"/>
    <rect x="735" y="235" width="250" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="860" y="283" text-anchor="middle" style="font-size:25px">Caso</text>
    <text class="muted small" x="860" y="323" text-anchor="middle" style="font-size:18px">soggetti</text>
<text class="muted small" x="860" y="350" text-anchor="middle" style="font-size:18px">vincoli, decisione</text>
    <rect x="763" y="387" width="194" height="44" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text class="ink small" x="860" y="416" text-anchor="middle" style="font-weight:800;font-size:17px">Griglia caso</text>
  </g>
  <g data-safe-box="1040 235 250 220 10">
    <rect class="softGreen" x="1040" y="235" width="250" height="220" rx="24"/>
    <rect x="1040" y="235" width="250" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1165" y="283" text-anchor="middle" style="font-size:25px">Orale</text>
    <text class="muted small" x="1165" y="323" text-anchor="middle" style="font-size:18px">lessico fiscale</text>
<text class="muted small" x="1165" y="350" text-anchor="middle" style="font-size:18px">collegamenti</text>
    <rect x="1068" y="387" width="194" height="44" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text class="ink small" x="1165" y="416" text-anchor="middle" style="font-weight:800;font-size:17px">Risposte 2 min</text>
  </g>
  <g data-safe-box="430 545 250 220 10">
    <rect class="softTeal" x="430" y="545" width="250" height="220" rx="24"/>
    <rect x="430" y="545" width="250" height="10" rx="5" fill="#1F6F78"/>
    <text class="teal label" x="555" y="593" text-anchor="middle" style="font-size:25px">Situazionale</text>
    <text class="muted small" x="555" y="633" text-anchor="middle" style="font-size:18px">ruolo</text>
<text class="muted small" x="555" y="660" text-anchor="middle" style="font-size:18px">servizio, legalita</text>
    <rect x="458" y="697" width="194" height="44" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text class="ink small" x="555" y="726" text-anchor="middle" style="font-weight:800;font-size:17px">Gerarchia scelta</text>
  </g>
  <g data-safe-box="735 545 250 220 10">
    <rect class="softBlue" x="735" y="545" width="250" height="220" rx="24"/>
    <rect x="735" y="545" width="250" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="860" y="593" text-anchor="middle" style="font-size:25px">Titoli</text>
    <text class="muted small" x="860" y="633" text-anchor="middle" style="font-size:18px">documenti</text>
<text class="muted small" x="860" y="660" text-anchor="middle" style="font-size:18px">ricevute, prove</text>
    <rect x="763" y="697" width="194" height="44" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text class="ink small" x="860" y="726" text-anchor="middle" style="font-weight:800;font-size:17px">Checklist</text>
  </g>
  <path class="dash" d="M260 478 C370 520, 480 520, 590 478"/>
  <path class="dash" d="M875 478 C985 520, 1095 520, 1205 478"/>
  <g data-safe-box="250 810 1100 64 10">
    <rect class="note" x="250" y="810" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="850" text-anchor="middle" style="font-weight:800;font-size:20px">La stessa materia cambia allenamento: il bando decide quale output produrre.</text>
  </g>

</svg>
