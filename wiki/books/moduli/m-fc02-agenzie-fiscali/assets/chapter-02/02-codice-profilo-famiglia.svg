<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Dal codice profilo alla famiglia M-FC02</title>
  <desc id="desc">Ente, sigla e programma vanno letti insieme prima di scegliere materiali e moduli.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/></marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/></marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Dal codice profilo alla famiglia M-FC02</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Ente, sigla e programma vanno letti insieme prima di scegliere materiali e moduli.</text>

  <rect class="card" x="70" y="160" width="1460" height="640" rx="30"/>
  <g data-safe-box="120 240 300 205 10">
    <rect class="softBlue" x="120" y="240" width="300" height="205" rx="24"/>
    <circle cx="162" cy="288" r="28" fill="#10233F"/>
    <text x="162" y="298" text-anchor="middle" style="fill:#fff;font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:27px;font-weight:900;">1</text>
    <text class="navy label" x="208" y="297" style="font-size:25px">Ente</text>
    <text class="muted body" x="270" y="352" text-anchor="middle" style="font-size:20px">AE</text>
<text class="muted body" x="270" y="383" text-anchor="middle" style="font-size:20px">ADM</text>
<text class="muted body" x="270" y="414" text-anchor="middle" style="font-size:20px">AdER</text>
  </g>
  <g data-safe-box="470 240 300 205 10">
    <rect class="softRed" x="470" y="240" width="300" height="205" rx="24"/>
    <circle cx="512" cy="288" r="28" fill="#7A2430"/>
    <text x="512" y="298" text-anchor="middle" style="fill:#fff;font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:27px;font-weight:900;">2</text>
    <text class="bordeaux label" x="558" y="297" style="font-size:25px">Codice</text>
    <text class="muted body" x="620" y="352" text-anchor="middle" style="font-size:20px">TRIB, SPI, FT</text>
<text class="muted body" x="620" y="383" text-anchor="middle" style="font-size:20px">ADM/FAMM, AdER</text>
  </g>
  <g data-safe-box="820 240 300 205 10">
    <rect class="softGold" x="820" y="240" width="300" height="205" rx="24"/>
    <circle cx="862" cy="288" r="28" fill="#D4AF37"/>
    <text x="862" y="298" text-anchor="middle" style="fill:#fff;font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:27px;font-weight:900;">3</text>
    <text class="gold label" x="908" y="297" style="font-size:25px">Programma</text>
    <text class="muted body" x="970" y="352" text-anchor="middle" style="font-size:20px">materie comuni</text>
<text class="muted body" x="970" y="383" text-anchor="middle" style="font-size:20px">materie fiscali</text>
  </g>
  <g data-safe-box="1170 240 300 205 10">
    <rect class="softGreen" x="1170" y="240" width="300" height="205" rx="24"/>
    <circle cx="1212" cy="288" r="28" fill="#2F7D5A"/>
    <text x="1212" y="298" text-anchor="middle" style="fill:#fff;font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:27px;font-weight:900;">4</text>
    <text class="green label" x="1258" y="297" style="font-size:25px">Famiglia</text>
    <text class="muted body" x="1320" y="352" text-anchor="middle" style="font-size:20px">M-FC02 guida</text>
<text class="muted body" x="1320" y="383" text-anchor="middle" style="font-size:20px">o solo supporto</text>
  </g>
  <path class="arrowNavy" d="M420 340 L462 340"/>
  <path class="arrowBordeaux" d="M770 340 L812 340"/>
  <path class="arrowGold" d="M1120 340 L1162 340"/>
  <g data-safe-box="165 505 1270 62 10">
    <rect class="softBlue" x="165" y="505" width="1270" height="62" rx="16"/>
    <text class="navy label" x="210" y="544" style="font-size:19px">AE</text>
    <text class="ink body" x="385" y="544" style="font-weight:800;font-size:18px">tributario o territorio/SPI</text>
    <text class="muted small" x="900" y="544" style="font-size:17px">tributario, accertamento, catasto</text>
  </g>
  <g data-safe-box="165 590 1270 62 10">
    <rect class="softRed" x="165" y="590" width="1270" height="62" rx="16"/>
    <text class="bordeaux label" x="210" y="629" style="font-size:19px">ADM</text>
    <text class="ink body" x="385" y="629" style="font-weight:800;font-size:18px">dogane, accise, giochi</text>
    <text class="muted small" x="900" y="629" style="font-size:17px">glossario e controlli settoriali</text>
  </g>
  <g data-safe-box="165 675 1270 62 10">
    <rect class="softGreen" x="165" y="675" width="1270" height="62" rx="16"/>
    <text class="green label" x="210" y="714" style="font-size:19px">AdER</text>
    <text class="ink body" x="385" y="714" style="font-weight:800;font-size:18px">riscossione nazionale</text>
    <text class="muted small" x="900" y="714" style="font-size:17px">cartelle, pagamenti, rateizzazioni</text>
  </g>
  <g data-safe-box="300 810 1000 64 10">
    <rect class="note" x="300" y="810" width="1000" height="64" rx="24"/>
    <text class="ink body" x="800" y="850" text-anchor="middle" style="font-weight:800;font-size:20px">Il codice profilo e' un indizio: la prova vera e' il programma del bando.</text>
  </g>

</svg>
