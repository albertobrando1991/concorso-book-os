<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Caso guidato: tre Decoder fiscali</title>
  <desc id="desc">Tre bandi fiscali richiedono tre letture diverse: AE, ADM e AdER.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/></marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/></marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Caso guidato: tre Decoder fiscali</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Tre bandi fiscali richiedono tre letture diverse: AE, ADM e AdER.</text>

  <rect class="card" x="70" y="158" width="1460" height="650" rx="30"/>
  <g data-safe-box="115 240 370 405 10">
    <rect class="softBlue" x="115" y="240" width="370" height="405" rx="28"/>
    <rect x="115" y="240" width="370" height="12" rx="6" fill="#10233F"/>
    <text class="navy label" x="300" y="294" text-anchor="middle" style="font-size:25px">Decoder AE</text>
    <text class="muted small" x="300" y="328" text-anchor="middle" style="font-size:18px">Giuridico-tributario</text>
    <circle cx="169" cy="378" r="7" fill="#D4AF37"/><text class="ink body" x="193" y="385" style="font-size:18px">tributario</text>
<circle cx="169" cy="420" r="7" fill="#D4AF37"/><text class="ink body" x="193" y="427" style="font-size:18px">accertamento</text>
<circle cx="169" cy="462" r="7" fill="#D4AF37"/><text class="ink body" x="193" y="469" style="font-size:18px">adempimenti</text>
    <rect x="149" y="544" width="302" height="62" rx="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text class="ink small" x="300" y="582" text-anchor="middle" style="font-weight:800;font-size:16px">Rischio: restare generico</text>
  </g>
  <g data-safe-box="575 240 370 405 10">
    <rect class="softRed" x="575" y="240" width="370" height="405" rx="28"/>
    <rect x="575" y="240" width="370" height="12" rx="6" fill="#7A2430"/>
    <text class="bordeaux label" x="760" y="294" text-anchor="middle" style="font-size:25px">Decoder ADM</text>
    <text class="muted small" x="760" y="328" text-anchor="middle" style="font-size:18px">Assistente o FAMM</text>
    <circle cx="629" cy="378" r="7" fill="#D4AF37"/><text class="ink body" x="653" y="385" style="font-size:18px">dogane</text>
<circle cx="629" cy="420" r="7" fill="#D4AF37"/><text class="ink body" x="653" y="427" style="font-size:18px">accise</text>
<circle cx="629" cy="462" r="7" fill="#D4AF37"/><text class="ink body" x="653" y="469" style="font-size:18px">giochi e monopoli</text>
    <rect x="609" y="544" width="302" height="62" rx="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text class="ink small" x="760" y="582" text-anchor="middle" style="font-weight:800;font-size:16px">Rischio: copiare il piano AE</text>
  </g>
  <g data-safe-box="1035 240 370 405 10">
    <rect class="softGreen" x="1035" y="240" width="370" height="405" rx="28"/>
    <rect x="1035" y="240" width="370" height="12" rx="6" fill="#2F7D5A"/>
    <text class="green label" x="1220" y="294" text-anchor="middle" style="font-size:25px">Decoder AdER</text>
    <text class="muted small" x="1220" y="328" text-anchor="middle" style="font-size:18px">Addetto riscossione</text>
    <circle cx="1089" cy="378" r="7" fill="#D4AF37"/><text class="ink body" x="1113" y="385" style="font-size:18px">cartelle</text>
<circle cx="1089" cy="420" r="7" fill="#D4AF37"/><text class="ink body" x="1113" y="427" style="font-size:18px">pagamenti</text>
<circle cx="1089" cy="462" r="7" fill="#D4AF37"/><text class="ink body" x="1113" y="469" style="font-size:18px">rateizzazioni</text>
    <rect x="1069" y="544" width="302" height="62" rx="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text class="ink small" x="1220" y="582" text-anchor="middle" style="font-weight:800;font-size:16px">Rischio: confondere con accertamento</text>
  </g>
  <path class="arrowGold" d="M360 642 C525 720, 650 720, 800 642"/>
  <path class="arrowGold" d="M1240 642 C1075 720, 950 720, 800 642"/>
  <g data-safe-box="615 670 370 80 10">
    <rect class="note" x="615" y="670" width="370" height="80" rx="28"/>
    <text class="gold label" x="800" y="704" text-anchor="middle" style="font-size:21px">Una base comune</text>
    <text class="muted small" x="800" y="730" text-anchor="middle" style="font-size:17px">tre piani specialistici diversi</text>
  </g>
  <g data-safe-box="250 812 1100 64 10">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">Il caso guidato mostra la funzione del Decoder: evitare un unico piano per tre profili diversi.</text>
  </g>

</svg>
