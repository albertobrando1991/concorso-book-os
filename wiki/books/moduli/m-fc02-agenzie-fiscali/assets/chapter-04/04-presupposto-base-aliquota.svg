<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Presupposto, base imponibile e aliquota</title>
  <desc id="desc">Tre domande diverse: perche nasce, su cosa si calcola, come si misura.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 24px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/></marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/></marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Presupposto, base imponibile e aliquota</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Tre domande diverse: perche nasce, su cosa si calcola, come si misura.</text>

  <rect class="card" x="70" y="160" width="1460" height="640" rx="30"/>
  <g data-safe-box="120 245 340 300 10">
    <rect class="softBlue" x="120" y="245" width="340" height="300" rx="28"/>
    <rect x="120" y="245" width="340" height="11" rx="5.5" fill="#10233F"/>
    <text class="navy label" x="290" y="301" text-anchor="middle" style="font-size:23px">Presupposto</text>
    <text class="ink small" x="290" y="343" text-anchor="middle" style="font-weight:800;font-size:17px">Perche il tributo puo' nascere?</text>
    <path class="thin" d="M165 369 L415 369"/>
    <text class="muted small" x="290" y="411" text-anchor="middle" style="font-size:18px">fatto, atto o situazione</text>
<text class="muted small" x="290" y="447" text-anchor="middle" style="font-size:18px">previsti dalla legge</text>
  </g>
  <g data-safe-box="445 382 70 76 0">
    <circle cx="480" cy="420" r="29" fill="#D4AF37"/>
    <text x="480" y="430" text-anchor="middle" style="fill:#fff;font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:34px;font-weight:900">+</text>
  </g>
  <g data-safe-box="560 245 340 300 10">
    <rect class="softRed" x="560" y="245" width="340" height="300" rx="28"/>
    <rect x="560" y="245" width="340" height="11" rx="5.5" fill="#7A2430"/>
    <text class="bordeaux label" x="730" y="301" text-anchor="middle" style="font-size:23px">Soggetto</text>
    <text class="ink small" x="730" y="343" text-anchor="middle" style="font-weight:800;font-size:17px">Chi e' tenuto all'obbligo?</text>
    <path class="thin" d="M605 369 L855 369"/>
    <text class="muted small" x="730" y="411" text-anchor="middle" style="font-size:18px">contribuente</text>
<text class="muted small" x="730" y="447" text-anchor="middle" style="font-size:18px">sostituto o responsabile</text>
  </g>
  <g data-safe-box="885 382 70 76 0">
    <circle cx="920" cy="420" r="29" fill="#D4AF37"/>
    <text x="920" y="430" text-anchor="middle" style="fill:#fff;font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:34px;font-weight:900">+</text>
  </g>
  <g data-safe-box="1000 245 340 300 10">
    <rect class="softGold" x="1000" y="245" width="340" height="300" rx="28"/>
    <rect x="1000" y="245" width="340" height="11" rx="5.5" fill="#D4AF37"/>
    <text class="gold label" x="1170" y="301" text-anchor="middle" style="font-size:23px">Base imponibile</text>
    <text class="ink small" x="1170" y="343" text-anchor="middle" style="font-weight:800;font-size:17px">Su quale grandezza calcolo?</text>
    <path class="thin" d="M1045 369 L1295 369"/>
    <text class="muted small" x="1170" y="411" text-anchor="middle" style="font-size:18px">reddito, valore</text>
<text class="muted small" x="1170" y="447" text-anchor="middle" style="font-size:18px">corrispettivo o misura</text>
  </g>
  <path class="arrowGreen" d="M800 610 L800 670"/>
  <g data-safe-box="465 670 670 112 10">
    <rect class="softGreen" x="465" y="670" width="670" height="112" rx="26"/>
    <rect x="465" y="670" width="670" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="800" y="712" text-anchor="middle" style="font-size:22px">Aliquota e disciplina applicabile</text>
    <text class="muted small" x="800" y="744" text-anchor="middle" style="font-size:17px">portano alla determinazione dell'imposta dovuta</text>
<text class="muted small" x="800" y="768" text-anchor="middle" style="font-size:17px">e agli adempimenti successivi</text>
  </g>
  <g data-safe-box="245 815 1110 62 10">
    <rect class="note" x="245" y="815" width="1110" height="62" rx="24"/>
    <text class="ink body" x="800" y="854" text-anchor="middle" style="font-weight:800;font-size:20px">Errore da evitare: chiamare base imponibile la somma finale da pagare.</text>
  </g>

</svg>
