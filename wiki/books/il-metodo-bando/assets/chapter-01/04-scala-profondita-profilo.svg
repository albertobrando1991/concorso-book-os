<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Scala della profondita per profilo concorsuale</title>
  <desc id="desc">Schema editoriale che mostra come cambia la profondita richiesta dalla prova in base al profilo concorsuale.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .ink { fill: #172233; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 50px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 27px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 29px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 24px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; font-weight: 700; }
      .step { fill: #ffffff; stroke: #cfd8e3; stroke-width: 3; }
      .chip { fill: #f1f6fb; stroke: #cfd8e3; stroke-width: 2; }
      .axis { stroke: #1f4e79; stroke-width: 7; stroke-linecap: round; }
      .blue { fill: #1f4e79; }
      .green { fill: #2f7d5a; }
      .amber { fill: #b7791f; }
      .red { fill: #a94442; }
      .gray { fill: #64748b; }
      .band { fill: #e8f0f8; stroke: #b9cde1; stroke-width: 2; }
    </style>
    <marker id="axisArrow" markerWidth="16" markerHeight="16" refX="8" refY="4" orient="auto">
      <path d="M 0 8 L 8 0 L 16 8 z" fill="#1f4e79"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="1100"/>
  <text class="ink title" x="800" y="82" text-anchor="middle">Scala della profondit&#224; per profilo</text>
  <text class="muted subtitle" x="800" y="126" text-anchor="middle">La stessa materia cambia livello: dalla nozione essenziale al governo del processo.</text>

  <line class="axis" x1="188" y1="870" x2="188" y2="330" marker-end="url(#axisArrow)"/>
  <text class="blue small" x="188" y="922" text-anchor="middle">NOZIONE</text>
  <text class="blue small" x="188" y="265" text-anchor="middle">DECISIONE</text>
  <text class="muted small" x="96" y="590" transform="rotate(-90 96 590)" text-anchor="middle">profondit&#224; richiesta</text>

  <g transform="translate(300 225)">
    <rect class="step" x="0" y="0" width="1060" height="122" rx="16"/>
    <rect x="0" y="0" width="18" height="122" rx="9" class="red"/>
    <text class="ink label" x="46" y="47">Dirigenti e carriere speciali</text>
    <text class="muted body" x="46" y="84">Governo del sistema, impatti, responsabilit&#224; e decisioni strategiche.</text>
    <rect class="chip" x="805" y="31" width="210" height="60" rx="30"/>
    <text class="red label" x="910" y="70" text-anchor="middle">governare</text>
  </g>

  <g transform="translate(300 365)">
    <rect class="step" x="0" y="0" width="1060" height="122" rx="16"/>
    <rect x="0" y="0" width="18" height="122" rx="9" class="amber"/>
    <text class="ink label" x="46" y="47">Elevate qualificazioni</text>
    <text class="muted body" x="46" y="84">Coordinamento dei processi, controllo dei risultati e presidio dei rischi.</text>
    <rect class="chip" x="805" y="31" width="210" height="60" rx="30"/>
    <text class="amber label" x="910" y="70" text-anchor="middle">coordinare</text>
  </g>

  <g transform="translate(300 505)">
    <rect class="step" x="0" y="0" width="1060" height="122" rx="16"/>
    <rect x="0" y="0" width="18" height="122" rx="9" class="green"/>
    <text class="ink label" x="46" y="47">Funzionari</text>
    <text class="muted body" x="46" y="84">Applicazione di regole, collegamenti tra materie e casi motivati.</text>
    <rect class="chip" x="805" y="31" width="210" height="60" rx="30"/>
    <text class="green label" x="910" y="70" text-anchor="middle">applicare</text>
  </g>

  <g transform="translate(300 645)">
    <rect class="step" x="0" y="0" width="1060" height="122" rx="16"/>
    <rect x="0" y="0" width="18" height="122" rx="9" class="blue"/>
    <text class="ink label" x="46" y="47">Assistenti e istruttori</text>
    <text class="muted body" x="46" y="84">Basi amministrative, atti principali e precisione nella risposta.</text>
    <rect class="chip" x="805" y="31" width="210" height="60" rx="30"/>
    <text class="blue label" x="910" y="70" text-anchor="middle">orientarsi</text>
  </g>

  <g transform="translate(300 785)">
    <rect class="step" x="0" y="0" width="1060" height="122" rx="16"/>
    <rect x="0" y="0" width="18" height="122" rx="9" class="gray"/>
    <text class="ink label" x="46" y="47">Operatori</text>
    <text class="muted body" x="46" y="84">Istruzioni, procedure essenziali, compiti e comportamento corretto.</text>
    <rect class="chip" x="805" y="31" width="210" height="60" rx="30"/>
    <text class="gray label" x="910" y="70" text-anchor="middle">eseguire</text>
  </g>

  <rect class="band" x="380" y="960" width="840" height="58" rx="29"/>
  <text class="blue" x="800" y="998" text-anchor="middle" style="font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:24px;font-weight:800;">Domanda guida: a che livello devo saper usare questa materia?</text>
</svg>
