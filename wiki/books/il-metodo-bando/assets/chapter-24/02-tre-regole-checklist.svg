<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Tre regole per usare le checklist</title>
  <desc id="desc">La spunta vale solo se nasce da una verifica reale e da una decisione.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Tre regole per usare le checklist</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">La spunta vale solo se nasce da una verifica reale e da una decisione.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="225" text-anchor="middle">Una checklist utile non tranquillizza: impedisce dimenticanze evitabili</text>
  <g data-safe-box="140 315 350 210 8">
    <rect class="softBlue" x="140" y="315" width="350" height="210" rx="26"/>
    <circle cx="315" cy="367" r="33" fill="#10233F"/>
    <text class="label" x="315" y="378" text-anchor="middle" fill="#FFFFFF" style="font-size:23px">1</text>
    <text class="navy label" x="315" y="403" text-anchor="middle" style="font-size:21px">Spunta verificata</text>
    <text class="muted small" x="315" y="427" text-anchor="middle" style="font-size:16px">fonte affidabile</text>
<text class="muted small" x="315" y="457" text-anchor="middle" style="font-size:16px">bando, avviso, ricevuta</text>
  </g>
  <path class="arrowNavy" d="M475 420 L565 420"/>
  <g data-safe-box="615 315 350 210 8">
    <rect class="softRed" x="615" y="315" width="350" height="210" rx="26"/>
    <circle cx="790" cy="367" r="33" fill="#7A2430"/>
    <text class="label" x="790" y="378" text-anchor="middle" fill="#FFFFFF" style="font-size:23px">2</text>
    <text class="bordeaux label" x="790" y="403" text-anchor="middle" style="font-size:21px">Nota il dubbio</text>
    <text class="muted small" x="790" y="427" text-anchor="middle" style="font-size:16px">scrivi fonte</text>
<text class="muted small" x="790" y="457" text-anchor="middle" style="font-size:16px">e scadenza di controllo</text>
  </g>
  <path class="arrowNavy" d="M950 420 L1040 420"/>
  <g data-safe-box="1090 315 350 210 8">
    <rect class="softGreen" x="1090" y="315" width="350" height="210" rx="26"/>
    <circle cx="1265" cy="367" r="33" fill="#2F7D5A"/>
    <text class="label" x="1265" y="378" text-anchor="middle" fill="#FFFFFF" style="font-size:23px">3</text>
    <text class="green label" x="1265" y="403" text-anchor="middle" style="font-size:21px">Criterio stop</text>
    <text class="muted small" x="1265" y="427" text-anchor="middle" style="font-size:16px">se e' essenziale</text>
<text class="muted small" x="1265" y="457" text-anchor="middle" style="font-size:16px">fermati e verifica</text>
  </g>
  <g data-safe-box="250 640 330 78 8">
    <rect x="250" y="640" width="330" height="78" rx="20" fill="#7A2430"/>
    <text class="label" x="415" y="671" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Non spuntare</text>
    <text class="small" x="415" y="698" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">per memoria o fiducia</text>
  </g>
  <g data-safe-box="635 640 330 78 8">
    <rect x="635" y="640" width="330" height="78" rx="20" fill="#10233F"/>
    <text class="label" x="800" y="671" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Scrivi</text>
    <text class="small" x="800" y="698" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">dubbio, fonte, entro quando</text>
  </g>
  <g data-safe-box="1020 640 330 78 8">
    <rect x="1020" y="640" width="330" height="78" rx="20" fill="#2F7D5A"/>
    <text class="label" x="1185" y="671" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Procedi</text>
    <text class="small" x="1185" y="698" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">solo dopo verifica</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">La spunta e' una decisione documentata, non un gesto automatico.</text>
  </g>
</svg>
