<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Ultimi 7 giorni e ultime 24 ore</title>
  <desc id="desc">La fase finale serve a stabilizzare, non ad aprire nuovo materiale.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Ultimi 7 giorni e ultime 24 ore</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">La fase finale serve a stabilizzare, non ad aprire nuovo materiale.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="225" text-anchor="middle">Gli ultimi giorni servono a ridurre rischio e rumore</text>
  <g data-safe-box="165 270 690 378 8">
    <g>
    <rect x="165" y="270" width="690" height="46" rx="12" fill="#EAF2FB" stroke="#CBD5E1" stroke-width="2"/>
    <text class="navy label" x="210" y="301" text-anchor="middle" style="font-size:18px">-7</text>
    <text class="muted small" x="390" y="301" text-anchor="middle" style="font-size:16px">simulazione</text>
    <text class="bordeaux label" x="680" y="301" text-anchor="middle" style="font-size:16px">correzione</text>
  </g>
<g>
    <rect x="165" y="324" width="690" height="46" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text class="navy label" x="210" y="355" text-anchor="middle" style="font-size:18px">-6</text>
    <text class="muted small" x="390" y="355" text-anchor="middle" style="font-size:16px">errori</text>
    <text class="bordeaux label" x="680" y="355" text-anchor="middle" style="font-size:16px">flashcard</text>
  </g>
<g>
    <rect x="165" y="378" width="690" height="46" rx="12" fill="#EAF2FB" stroke="#CBD5E1" stroke-width="2"/>
    <text class="navy label" x="210" y="409" text-anchor="middle" style="font-size:18px">-5</text>
    <text class="muted small" x="390" y="409" text-anchor="middle" style="font-size:16px">core</text>
    <text class="bordeaux label" x="680" y="409" text-anchor="middle" style="font-size:16px">domande brevi</text>
  </g>
<g>
    <rect x="165" y="432" width="690" height="46" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text class="navy label" x="210" y="463" text-anchor="middle" style="font-size:18px">-4</text>
    <text class="muted small" x="390" y="463" text-anchor="middle" style="font-size:16px">prova parziale</text>
    <text class="bordeaux label" x="680" y="463" text-anchor="middle" style="font-size:16px">timer</text>
  </g>
<g>
    <rect x="165" y="486" width="690" height="46" rx="12" fill="#EAF2FB" stroke="#CBD5E1" stroke-width="2"/>
    <text class="navy label" x="210" y="517" text-anchor="middle" style="font-size:18px">-3</text>
    <text class="muted small" x="390" y="517" text-anchor="middle" style="font-size:16px">documenti</text>
    <text class="bordeaux label" x="680" y="517" text-anchor="middle" style="font-size:16px">logistica</text>
  </g>
<g>
    <rect x="165" y="540" width="690" height="46" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text class="navy label" x="210" y="571" text-anchor="middle" style="font-size:18px">-2</text>
    <text class="muted small" x="390" y="571" text-anchor="middle" style="font-size:16px">routine</text>
    <text class="bordeaux label" x="680" y="571" text-anchor="middle" style="font-size:16px">ripasso leggero</text>
  </g>
<g>
    <rect x="165" y="594" width="690" height="46" rx="12" fill="#EAF2FB" stroke="#CBD5E1" stroke-width="2"/>
    <text class="navy label" x="210" y="625" text-anchor="middle" style="font-size:18px">-1</text>
    <text class="muted small" x="390" y="625" text-anchor="middle" style="font-size:16px">sonno</text>
    <text class="bordeaux label" x="680" y="625" text-anchor="middle" style="font-size:16px">materiale</text>
  </g>
  </g>
  <g data-safe-box="965 285 470 220 8">
    <rect class="softRed" x="965" y="285" width="470" height="220" rx="26"/>
    <rect x="965" y="285" width="470" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="1200" y="337" text-anchor="middle" style="font-size:23px">Ultime 24 ore</text>
    <text class="muted small" x="1200" y="377" text-anchor="middle" style="font-size:15px">documento</text>
<text class="muted small" x="1200" y="404" text-anchor="middle" style="font-size:15px">convocazione</text>
<text class="muted small" x="1200" y="431" text-anchor="middle" style="font-size:15px">percorso</text>
<text class="muted small" x="1200" y="458" text-anchor="middle" style="font-size:15px">sveglie</text>
<text class="muted small" x="1200" y="485" text-anchor="middle" style="font-size:15px">schede brevi</text>
  </g>
  <g data-safe-box="965 560 470 220 8">
    <rect class="softGreen" x="965" y="560" width="470" height="220" rx="26"/>
    <rect x="965" y="560" width="470" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1200" y="612" text-anchor="middle" style="font-size:23px">Non fare</text>
    <text class="muted small" x="1200" y="652" text-anchor="middle" style="font-size:15px">manuale nuovo</text>
<text class="muted small" x="1200" y="679" text-anchor="middle" style="font-size:15px">metodo nuovo</text>
<text class="muted small" x="1200" y="706" text-anchor="middle" style="font-size:15px">studio pesante</text>
<text class="muted small" x="1200" y="733" text-anchor="middle" style="font-size:15px">chat al posto fonti</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">Nella fase finale vinci stabilizzando: non aumentando volume all'ultimo minuto.</text>
  </g>
</svg>
