<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Checklist unica BANDO: caso Giulia</title>
  <desc id="desc">Le righe non completate diventano il piano delle prossime 48 ore.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Checklist unica BANDO: caso Giulia</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Le righe non completate diventano il piano delle prossime 48 ore.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="225" text-anchor="middle">Caso Giulia: ogni riga incompleta genera una prossima azione</text>
  <g data-safe-box="180 270 1240 410 8">
    <g data-safe-box="180 270 1240 70 8">
    <rect x="180" y="270" width="1240" height="70" rx="16" fill="#EAF2FB" stroke="#CBD5E1" stroke-width="2"/>
    <circle cx="235" cy="305" r="25" fill="#10233F"/>
    <text class="label" x="235" y="314" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">B</text>
    <text class="navy label" x="355" y="313" text-anchor="middle" style="font-size:18px">Bando</text>
    <text class="muted small" x="690" y="313" text-anchor="middle" style="font-size:16px">sede non verificata</text>
    <text class="green label" x="1105" y="313" text-anchor="middle" style="font-size:16px">controlla percorso</text>
  </g>
<g data-safe-box="180 352 1240 70 8">
    <rect x="180" y="352" width="1240" height="70" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <circle cx="235" cy="387" r="25" fill="#7A2430"/>
    <text class="label" x="235" y="396" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">A</text>
    <text class="navy label" x="355" y="395" text-anchor="middle" style="font-size:18px">Aree</text>
    <text class="muted small" x="690" y="395" text-anchor="middle" style="font-size:16px">core e modulo ok</text>
    <text class="green label" x="1105" y="395" text-anchor="middle" style="font-size:16px">mantieni priorita</text>
  </g>
<g data-safe-box="180 434 1240 70 8">
    <rect x="180" y="434" width="1240" height="70" rx="16" fill="#EAF2FB" stroke="#CBD5E1" stroke-width="2"/>
    <circle cx="235" cy="469" r="25" fill="#D4AF37"/>
    <text class="label" x="235" y="478" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">N</text>
    <text class="navy label" x="355" y="477" text-anchor="middle" style="font-size:18px">Nuclei</text>
    <text class="muted small" x="690" y="477" text-anchor="middle" style="font-size:16px">accesso e Comune</text>
    <text class="green label" x="1105" y="477" text-anchor="middle" style="font-size:16px">ripasso mirato</text>
  </g>
<g data-safe-box="180 516 1240 70 8">
    <rect x="180" y="516" width="1240" height="70" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <circle cx="235" cy="551" r="25" fill="#2F7D5A"/>
    <text class="label" x="235" y="560" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">D</text>
    <text class="navy label" x="355" y="559" text-anchor="middle" style="font-size:18px">Diario</text>
    <text class="muted small" x="690" y="559" text-anchor="middle" style="font-size:16px">negazioni nei quiz</text>
    <text class="green label" x="1105" y="559" text-anchor="middle" style="font-size:16px">drill parole-spia</text>
  </g>
<g data-safe-box="180 598 1240 70 8">
    <rect x="180" y="598" width="1240" height="70" rx="16" fill="#EAF2FB" stroke="#CBD5E1" stroke-width="2"/>
    <circle cx="235" cy="633" r="25" fill="#1F6F78"/>
    <text class="label" x="235" y="642" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">O</text>
    <text class="navy label" x="355" y="641" text-anchor="middle" style="font-size:18px">Output</text>
    <text class="muted small" x="690" y="641" text-anchor="middle" style="font-size:16px">orale troppo lungo</text>
    <text class="green label" x="1105" y="641" text-anchor="middle" style="font-size:16px">3 risposte da 2 min</text>
  </g>
  </g>
  <g data-safe-box="250 765 1100 64 8">
    <rect class="note" x="250" y="765" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="805" text-anchor="middle" style="font-weight:800;font-size:20px">Se una riga BANDO resta vuota, quella e' la prossima azione entro 48 ore.</text>
  </g>
</svg>
