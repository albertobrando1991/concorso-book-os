<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Preparazione delle prove</title>
  <desc id="desc">Quiz, scritto, orale e casi richiedono controlli diversi prima dell'output.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Preparazione delle prove</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Quiz, scritto, orale e casi richiedono controlli diversi prima dell'output.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="225" text-anchor="middle">La preparazione finale deve assomigliare alla prova reale</text>
  <g data-safe-box="170 300 270 225 8">
    <rect class="softBlue" x="170" y="300" width="270" height="225" rx="24"/>
    <rect x="170" y="300" width="270" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="305" y="354" text-anchor="middle" style="font-size:23px">Quiz</text>
    <path class="thin" d="M215 376 L395 376"/>
    <text class="muted small" x="305" y="412" text-anchor="middle" style="font-size:16px">timer</text>
<text class="muted small" x="305" y="446" text-anchor="middle" style="font-size:16px">penalita</text>
<text class="muted small" x="305" y="480" text-anchor="middle" style="font-size:16px">regola salto</text>
  </g>
<g data-safe-box="485 300 270 225 8">
    <rect class="softRed" x="485" y="300" width="270" height="225" rx="24"/>
    <rect x="485" y="300" width="270" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="620" y="354" text-anchor="middle" style="font-size:23px">Scritto</text>
    <path class="thin" d="M530 376 L710 376"/>
    <text class="muted small" x="620" y="412" text-anchor="middle" style="font-size:16px">scaletta</text>
<text class="muted small" x="620" y="446" text-anchor="middle" style="font-size:16px">tempo</text>
<text class="muted small" x="620" y="480" text-anchor="middle" style="font-size:16px">struttura</text>
  </g>
<g data-safe-box="800 300 270 225 8">
    <rect class="softGold" x="800" y="300" width="270" height="225" rx="24"/>
    <rect x="800" y="300" width="270" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="935" y="354" text-anchor="middle" style="font-size:23px">Orale</text>
    <path class="thin" d="M845 376 L1025 376"/>
    <text class="muted small" x="935" y="412" text-anchor="middle" style="font-size:16px">2 minuti</text>
<text class="muted small" x="935" y="446" text-anchor="middle" style="font-size:16px">definizione</text>
<text class="muted small" x="935" y="480" text-anchor="middle" style="font-size:16px">collegamenti</text>
  </g>
<g data-safe-box="1115 300 270 225 8">
    <rect class="softGreen" x="1115" y="300" width="270" height="225" rx="24"/>
    <rect x="1115" y="300" width="270" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1250" y="354" text-anchor="middle" style="font-size:23px">Casi</text>
    <path class="thin" d="M1160 376 L1340 376"/>
    <text class="muted small" x="1250" y="412" text-anchor="middle" style="font-size:16px">fatti</text>
<text class="muted small" x="1250" y="446" text-anchor="middle" style="font-size:16px">competenza</text>
<text class="muted small" x="1250" y="480" text-anchor="middle" style="font-size:16px">decisione</text>
  </g>
  <g data-safe-box="290 590 460 128 8">
    <rect class="softBlue" x="290" y="590" width="460" height="128" rx="25"/>
    <rect x="290" y="590" width="460" height="11" rx="5.5" fill="#10233F"/>
    <text class="navy label" x="520" y="634" text-anchor="middle" style="font-size:24px">Controlli comuni</text>
    <text class="muted small" x="520" y="667" text-anchor="middle" style="font-size:17px">formato, durata, soglie</text>
<text class="muted small" x="520" y="694" text-anchor="middle" style="font-size:17px">strumenti ammessi</text>
  </g>
  <g data-safe-box="850 590 460 128 8">
    <rect class="softGreen" x="850" y="590" width="460" height="128" rx="25"/>
    <rect x="850" y="590" width="460" height="11" rx="5.5" fill="#2F7D5A"/>
    <text class="green label" x="1080" y="634" text-anchor="middle" style="font-size:24px">Correzione</text>
    <text class="muted small" x="1080" y="667" text-anchor="middle" style="font-size:17px">errori ad alta resa</text>
<text class="muted small" x="1080" y="694" text-anchor="middle" style="font-size:17px">diario aggiornato</text>
  </g>
  <path class="arrowNavy" d="M760 660 L840 660"/>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">Senza simulazione, la checklist misura intenzioni: con simulazione misura dati.</text>
  </g>
</svg>
