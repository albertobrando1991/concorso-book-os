<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Routine e diario degli errori</title>
  <desc id="desc">L'allenamento corregge il criterio di scelta, non solo il singolo quesito.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Routine e diario degli errori</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">L'allenamento corregge il criterio di scelta, non solo il singolo quesito.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <g data-safe-box="120 225 610 405 8">
    <rect class="softBlue" x="120" y="225" width="610" height="405" rx="25"/>
    <rect x="120" y="225" width="610" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="425" y="273" text-anchor="middle" style="font-size:25px">Routine in 7 mosse</text>
    <path class="thin" d="M150 290 L700 290"/>
    <text class="muted small" x="154" y="320" style="font-size:18px">1. leggi scenario e ruolo</text>
<text class="muted small" x="154" y="359" style="font-size:18px">2. individua rischio principale</text>
<text class="muted small" x="154" y="398" style="font-size:18px">3. scarta opzioni illegittime</text>
<text class="muted small" x="154" y="437" style="font-size:18px">4. scarta passivita e sproporzione</text>
<text class="muted small" x="154" y="476" style="font-size:18px">5. scegli equilibrio pubblico</text>
<text class="muted small" x="154" y="515" style="font-size:18px">6. scrivi una motivazione</text>
<text class="muted small" x="154" y="554" style="font-size:18px">7. registra l'errore</text>
  </g>
  <g data-safe-box="870 225 610 405 8">
    <rect class="softRed" x="870" y="225" width="610" height="405" rx="25"/>
    <rect x="870" y="225" width="610" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="1175" y="273" text-anchor="middle" style="font-size:25px">Diario degli errori</text>
    <path class="thin" d="M900 290 L1450 290"/>
    <text class="muted small" x="904" y="320" style="font-size:18px">troppa empatia</text>
<text class="muted small" x="904" y="359" style="font-size:18px">troppa rigidita</text>
<text class="muted small" x="904" y="398" style="font-size:18px">passivita</text>
<text class="muted small" x="904" y="437" style="font-size:18px">invasione di competenza</text>
<text class="muted small" x="904" y="476" style="font-size:18px">privacy o conflitto</text>
<text class="muted small" x="904" y="515" style="font-size:18px">comunicazione vaga</text>
<text class="muted small" x="904" y="554" style="font-size:18px">scelta da stress</text>
  </g>
  <path class="arrowGreen" d="M745 445 L855 445"/>
  <path class="arrowTeal" d="M855 590 C720 690 520 690 385 590"/>
  <g data-safe-box="610 690 380 78 8">
    <rect x="610" y="690" width="380" height="78" rx="20" fill="#2F7D5A"/>
    <text class="label" x="800" y="721" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Correzione</text>
    <text class="small" x="800" y="748" text-anchor="middle" fill="#FFFFFF" style="font-size:14px">allena il criterio piu fragile</text>
  </g>

</svg>
