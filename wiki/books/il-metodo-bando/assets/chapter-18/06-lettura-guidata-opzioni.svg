<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Lettura guidata delle opzioni</title>
  <desc id="desc">Ogni alternativa va qualificata: scorretta, debole, accettabile o efficace.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Lettura guidata delle opzioni</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Ogni alternativa va qualificata: scorretta, debole, accettabile o efficace.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="228" text-anchor="middle">Classifica ogni alternativa prima di scegliere</text>
  <g data-safe-box="135 285 1330 88 8">
    <rect class="softRed" x="135" y="285" width="1330" height="88" rx="22"/>
    <rect x="135" y="285" width="13" height="88" rx="6.5" fill="#7A2430"/>
    <text class="bordeaux label" x="295" y="340" text-anchor="middle" style="font-size:24px">Scorretta</text>
    <text class="muted small" x="815" y="339" text-anchor="middle">viola regole, dati, ruolo o imparzialita</text>
    <text class="bordeaux label" x="1295" y="340" text-anchor="middle" style="font-size:21px">scarta subito</text>
  </g>
  <g data-safe-box="135 405 1330 88 8">
    <rect class="softGold" x="135" y="405" width="1330" height="88" rx="22"/>
    <rect x="135" y="405" width="13" height="88" rx="6.5" fill="#D4AF37"/>
    <text class="gold label" x="295" y="460" text-anchor="middle" style="font-size:24px">Debole</text>
    <text class="muted small" x="815" y="459" text-anchor="middle">e' passiva, brusca, sproporzionata o non tracciata</text>
    <text class="gold label" x="1295" y="460" text-anchor="middle" style="font-size:21px">elimina dopo</text>
  </g>
  <g data-safe-box="135 525 1330 88 8">
    <rect class="softTeal" x="135" y="525" width="1330" height="88" rx="22"/>
    <rect x="135" y="525" width="13" height="88" rx="6.5" fill="#1F6F78"/>
    <text class="teal label" x="295" y="580" text-anchor="middle" style="font-size:24px">Accettabile</text>
    <text class="muted small" x="815" y="579" text-anchor="middle">rispetta le regole ma manca servizio o precisione</text>
    <text class="teal label" x="1295" y="580" text-anchor="middle" style="font-size:21px">tieni in riserva</text>
  </g>
  <g data-safe-box="135 645 1330 88 8">
    <rect class="softGreen" x="135" y="645" width="1330" height="88" rx="22"/>
    <rect x="135" y="645" width="13" height="88" rx="6.5" fill="#2F7D5A"/>
    <text class="green label" x="295" y="700" text-anchor="middle" style="font-size:24px">Efficace</text>
    <text class="muted small" x="815" y="699" text-anchor="middle">combina regola, servizio, competenza e traccia</text>
    <text class="green label" x="1295" y="700" text-anchor="middle" style="font-size:21px">scegli e motiva</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">La motivazione in una riga controlla se la scelta e' davvero tua o solo intuitiva.</text>
  </g>

</svg>
