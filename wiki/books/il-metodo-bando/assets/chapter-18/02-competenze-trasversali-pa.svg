<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Competenze trasversali nella PA</title>
  <desc id="desc">Le soft skills diventano comportamenti osservabili dentro regole e servizio.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Competenze trasversali nella PA</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Le soft skills diventano comportamenti osservabili dentro regole e servizio.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <g data-safe-box="620 330 360 170 8">
    <rect x="620" y="330" width="360" height="170" rx="34" fill="#10233F"/>
    <text class="label" x="800" y="392" text-anchor="middle" fill="#FFFFFF">Comportamento</text>
    <text class="small" x="800" y="428" text-anchor="middle" fill="#FFFFFF">pubblico osservabile</text>
  </g>
  <g data-safe-box="125 235 420 165 8">
    <rect class="softBlue" x="125" y="235" width="420" height="165" rx="24"/>
    <rect x="125" y="235" width="420" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="335" y="280" text-anchor="middle" style="font-size:24px">Capire il contesto</text>
    <text class="muted small" x="335" y="318" text-anchor="middle">ruolo, regole, dati</text>
<text class="muted small" x="335" y="348" text-anchor="middle">problema e cambiamento</text>
  </g>
  <g data-safe-box="1055 235 420 165 8">
    <rect class="softRed" x="1055" y="235" width="420" height="165" rx="24"/>
    <rect x="1055" y="235" width="420" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="1265" y="280" text-anchor="middle" style="font-size:24px">Interagire</text>
    <text class="muted small" x="1265" y="318" text-anchor="middle">comunicare</text>
<text class="muted small" x="1265" y="348" text-anchor="middle">collaborare, servire</text>
  </g>
  <g data-safe-box="125 550 420 165 8">
    <rect class="softGreen" x="125" y="550" width="420" height="165" rx="24"/>
    <rect x="125" y="550" width="420" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="335" y="595" text-anchor="middle" style="font-size:24px">Realizzare valore</text>
    <text class="muted small" x="335" y="633" text-anchor="middle">affidabilita</text>
<text class="muted small" x="335" y="663" text-anchor="middle">accuratezza, risultato</text>
  </g>
  <g data-safe-box="1055 550 420 165 8">
    <rect class="softTeal" x="1055" y="550" width="420" height="165" rx="24"/>
    <rect x="1055" y="550" width="420" height="10" rx="5" fill="#1F6F78"/>
    <text class="teal label" x="1265" y="595" text-anchor="middle" style="font-size:24px">Gestire risorse</text>
    <text class="muted small" x="1265" y="633" text-anchor="middle">processi, strumenti</text>
<text class="muted small" x="1265" y="663" text-anchor="middle">persone e responsabilita</text>
  </g>
  <path class="arrowNavy" d="M555 315 L610 365"/>
  <path class="arrowBordeaux" d="M1045 315 L990 365"/>
  <path class="arrowGreen" d="M555 630 L610 505"/>
  <path class="arrowTeal" d="M1045 630 L990 505"/>
  <g data-safe-box="425 725 220 78 8">
    <rect x="425" y="725" width="220" height="78" rx="20" fill="#7A2430"/>
    <text class="label" x="535" y="756" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Integrita</text>
    <text class="small" x="535" y="783" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">niente scorciatoie</text>
  </g>
  <g data-safe-box="690 725 220 78 8">
    <rect x="690" y="725" width="220" height="78" rx="20" fill="#2F7D5A"/>
    <text class="label" x="800" y="756" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Inclusione</text>
    <text class="small" x="800" y="783" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">servizio corretto</text>
  </g>
  <g data-safe-box="955 725 220 78 8">
    <rect x="955" y="725" width="220" height="78" rx="20" fill="#1F6F78"/>
    <text class="label" x="1065" y="756" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Sostenibilita</text>
    <text class="small" x="1065" y="783" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">risorse responsabili</text>
  </g>

</svg>
