<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Le quattro risposte deboli</title>
  <desc id="desc">Buonismo, rigidita, passivita e iniziativa fuori ruolo sono trappole ricorrenti.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Le quattro risposte deboli</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Buonismo, rigidita, passivita e iniziativa fuori ruolo sono trappole ricorrenti.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <g data-safe-box="140 240 580 195 8">
    <rect class="softRed" x="140" y="240" width="580" height="195" rx="25"/>
    <rect x="140" y="240" width="580" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="430" y="287" text-anchor="middle" style="font-size:25px">Risposta buonista</text>
    <path class="thin" d="M180 305 L680 305"/>
    <text class="muted small" x="430" y="330" text-anchor="middle" style="font-size:18px">aiuta violando canali</text>
<text class="muted small" x="430" y="361" text-anchor="middle" style="font-size:18px">o dati personali</text>
  </g>
  <g data-safe-box="880 240 580 195 8">
    <rect class="softBlue" x="880" y="240" width="580" height="195" rx="25"/>
    <rect x="880" y="240" width="580" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="1170" y="287" text-anchor="middle" style="font-size:25px">Risposta autoritaria</text>
    <path class="thin" d="M920 305 L1420 305"/>
    <text class="muted small" x="1170" y="330" text-anchor="middle" style="font-size:18px">applica la regola</text>
<text class="muted small" x="1170" y="361" text-anchor="middle" style="font-size:18px">senza orientare</text>
  </g>
  <g data-safe-box="140 520 580 195 8">
    <rect class="softGold" x="140" y="520" width="580" height="195" rx="25"/>
    <rect x="140" y="520" width="580" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="430" y="567" text-anchor="middle" style="font-size:25px">Risposta passiva</text>
    <path class="thin" d="M180 585 L680 585"/>
    <text class="muted small" x="430" y="610" text-anchor="middle" style="font-size:18px">evita il rischio</text>
<text class="muted small" x="430" y="641" text-anchor="middle" style="font-size:18px">ma non gestisce</text>
  </g>
  <g data-safe-box="880 520 580 195 8">
    <rect class="softGreen" x="880" y="520" width="580" height="195" rx="25"/>
    <rect x="880" y="520" width="580" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1170" y="567" text-anchor="middle" style="font-size:25px">Risposta solitaria</text>
    <path class="thin" d="M920 585 L1420 585"/>
    <text class="muted small" x="1170" y="610" text-anchor="middle" style="font-size:18px">mostra iniziativa</text>
<text class="muted small" x="1170" y="641" text-anchor="middle" style="font-size:18px">ma supera il ruolo</text>
  </g>
  <path class="dash" d="M800 220 L800 720"/>
  <path class="dash" d="M110 485 L1490 485"/>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:19px">La trappola ha sempre un lato seducente: servizio, regola, prudenza o iniziativa usati male.</text>
  </g>

</svg>
