<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Anatomia del quesito situazionale</title>
  <desc id="desc">Scenario, ruolo, tensione, opzioni e richiesta vanno letti separatamente.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Anatomia del quesito situazionale</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Scenario, ruolo, tensione, opzioni e richiesta vanno letti separatamente.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="228" text-anchor="middle">Leggi il quesito in cinque parti, non come una storia unica</text>
  <g data-safe-box="105 345 205 190 8">
    <rect class="softBlue" x="105" y="345" width="205" height="190" rx="24"/>
    <circle cx="207.5" cy="387" r="28" fill="#10233F"/>
    <text class="label" x="207.5" y="396" text-anchor="middle" fill="#FFFFFF">1</text>
    <text class="navy label" x="207.5" y="423" text-anchor="middle" style="font-size:18px">Scenario</text>
    <text class="muted small" x="207" y="439" text-anchor="middle" style="font-size:16px">che cosa</text>
<text class="muted small" x="207" y="466" text-anchor="middle" style="font-size:16px">sta accadendo</text>
  </g>
  <g data-safe-box="380 345 205 190 8">
    <rect class="softRed" x="380" y="345" width="205" height="190" rx="24"/>
    <circle cx="482.5" cy="387" r="28" fill="#7A2430"/>
    <text class="label" x="482.5" y="396" text-anchor="middle" fill="#FFFFFF">2</text>
    <text class="bordeaux label" x="482.5" y="423" text-anchor="middle" style="font-size:18px">Ruolo</text>
    <text class="muted small" x="482" y="439" text-anchor="middle" style="font-size:16px">che cosa puoi</text>
<text class="muted small" x="482" y="466" text-anchor="middle" style="font-size:16px">davvero fare</text>
  </g>
  <g data-safe-box="655 345 205 190 8">
    <rect class="softGold" x="655" y="345" width="205" height="190" rx="24"/>
    <circle cx="757.5" cy="387" r="28" fill="#D4AF37"/>
    <text class="label" x="757.5" y="396" text-anchor="middle" fill="#FFFFFF">3</text>
    <text class="gold label" x="757.5" y="423" text-anchor="middle" style="font-size:18px">Tensione</text>
    <text class="muted small" x="757" y="439" text-anchor="middle" style="font-size:16px">rischio</text>
<text class="muted small" x="757" y="466" text-anchor="middle" style="font-size:16px">o conflitto</text>
  </g>
  <g data-safe-box="930 345 205 190 8">
    <rect class="softGreen" x="930" y="345" width="205" height="190" rx="24"/>
    <circle cx="1032.5" cy="387" r="28" fill="#2F7D5A"/>
    <text class="label" x="1032.5" y="396" text-anchor="middle" fill="#FFFFFF">4</text>
    <text class="green label" x="1032.5" y="423" text-anchor="middle" style="font-size:18px">Opzioni</text>
    <text class="muted small" x="1032" y="439" text-anchor="middle" style="font-size:16px">alternative</text>
<text class="muted small" x="1032" y="466" text-anchor="middle" style="font-size:16px">da classificare</text>
  </g>
  <g data-safe-box="1205 345 205 190 8">
    <rect class="softTeal" x="1205" y="345" width="205" height="190" rx="24"/>
    <circle cx="1307.5" cy="387" r="28" fill="#1F6F78"/>
    <text class="label" x="1307.5" y="396" text-anchor="middle" fill="#FFFFFF">5</text>
    <text class="teal label" x="1307.5" y="423" text-anchor="middle" style="font-size:18px">Richiesta</text>
    <text class="muted small" x="1307" y="439" text-anchor="middle" style="font-size:16px">piu efficace</text>
<text class="muted small" x="1307" y="466" text-anchor="middle" style="font-size:16px">o meno efficace</text>
  </g>
  <path class="arrowNavy" d="M315 440 L370 440"/>
  <path class="arrowBordeaux" d="M590 440 L645 440"/>
  <path class="arrowGold" d="M865 440 L920 440"/>
  <path class="arrowGreen" d="M1140 440 L1195 440"/>
  <g data-safe-box="250 672 1100 64 8">
    <rect class="note" x="250" y="672" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="712" text-anchor="middle" style="font-weight:800;font-size:20px">Prima di scegliere, chiediti sempre quale competenza la traccia sta misurando.</text>
  </g>

</svg>
