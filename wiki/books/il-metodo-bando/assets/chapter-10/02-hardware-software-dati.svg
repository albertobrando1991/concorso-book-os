<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Hardware, software e dati</title>
  <desc id="desc">Il candidato deve distinguere componenti fisiche, programmi, memoria e informazioni.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 44px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 23px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Hardware, software e dati</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Il candidato deve distinguere componenti fisiche, programmi, memoria e informazioni.</text>

  <rect class="card" x="105" y="190" width="1390" height="560" rx="30"/>
  <text class="navy label" x="800" y="245" text-anchor="middle">Dal componente fisico all'informazione utile</text>
  <g data-safe-box="165 315 255 135 8">
    <rect class="softBlue" x="165" y="315" width="255" height="135" rx="22"/>
    <rect x="165" y="315" width="255" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="292.5" y="357" text-anchor="middle" style="font-size:25px">Hardware</text>
    <text class="muted small" x="292.5" y="391" text-anchor="middle">CPU, RAM, disco</text>
<text class="muted small" x="292.5" y="416" text-anchor="middle">monitor, rete</text>
  </g>
  <g data-safe-box="500 315 255 135 8">
    <rect class="softRed" x="500" y="315" width="255" height="135" rx="22"/>
    <rect x="500" y="315" width="255" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="627.5" y="357" text-anchor="middle" style="font-size:23px">Sistema operativo</text>
    <text class="muted small" x="627.5" y="391" text-anchor="middle">gestisce risorse</text>
<text class="muted small" x="627.5" y="416" text-anchor="middle">file e periferiche</text>
  </g>
  <g data-safe-box="835 315 255 135 8">
    <rect class="softGold" x="835" y="315" width="255" height="135" rx="22"/>
    <rect x="835" y="315" width="255" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="962.5" y="357" text-anchor="middle" style="font-size:25px">Applicazioni</text>
    <text class="muted small" x="962.5" y="391" text-anchor="middle">browser, Office</text>
<text class="muted small" x="962.5" y="416" text-anchor="middle">antivirus, gestionali</text>
  </g>
  <g data-safe-box="1170 315 255 135 8">
    <rect class="softGreen" x="1170" y="315" width="255" height="135" rx="22"/>
    <rect x="1170" y="315" width="255" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1297.5" y="357" text-anchor="middle" style="font-size:25px">Dati</text>
    <text class="muted small" x="1297.5" y="391" text-anchor="middle">file, record</text>
<text class="muted small" x="1297.5" y="416" text-anchor="middle">codici e misure</text>
  </g>
  <path class="arrowNavy" d="M430 382 L485 382"/>
  <path class="arrowBordeaux" d="M765 382 L820 382"/>
  <path class="arrowGold" d="M1100 382 L1155 382"/>
  <g data-safe-box="230 565 230 74 8">
    <rect x="230" y="565" width="230" height="74" rx="20" fill="#10233F"/>
    <text class="label" x="345" y="596" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">CPU</text>
    <text class="small" x="345" y="621" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">elabora istruzioni</text>
  </g>
  <g data-safe-box="500 565 230 74 8">
    <rect x="500" y="565" width="230" height="74" rx="20" fill="#7A2430"/>
    <text class="label" x="615" y="596" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">RAM</text>
    <text class="small" x="615" y="621" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">memoria volatile</text>
  </g>
  <g data-safe-box="770 565 230 74 8">
    <rect x="770" y="565" width="230" height="74" rx="20" fill="#D4AF37"/>
    <text class="label" x="885" y="596" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">SSD/HDD</text>
    <text class="small" x="885" y="621" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">archiviazione stabile</text>
  </g>
  <g data-safe-box="1040 565 230 74 8">
    <rect x="1040" y="565" width="230" height="74" rx="20" fill="#2F7D5A"/>
    <text class="label" x="1155" y="596" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">Informazione</text>
    <text class="small" x="1155" y="621" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">dato interpretato</text>
  </g>
  <g data-safe-box="250 795 1100 64 8">
    <rect class="note" x="250" y="795" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="835" text-anchor="middle" style="font-weight:800;font-size:20px">Errore da evitare: RAM, ROM e memoria di massa non svolgono la stessa funzione.</text>
  </g>

</svg>
