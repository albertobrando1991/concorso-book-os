<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Sicurezza informatica nella PA</title>
  <desc id="desc">Riservatezza, integrita e disponibilita richiedono misure tecniche e organizzative.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 44px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 23px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Sicurezza informatica nella PA</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Riservatezza, integrita e disponibilita richiedono misure tecniche e organizzative.</text>

  <g data-safe-box="280 190 260 62 8">
    <rect x="280" y="190" width="260" height="62" rx="31" fill="#10233F"/>
    <text class="label" x="410" y="231" text-anchor="middle" fill="#FFFFFF" style="font-size:22px">Riservatezza</text>
  </g>
  <g data-safe-box="670 190 260 62 8">
    <rect x="670" y="190" width="260" height="62" rx="31" fill="#7A2430"/>
    <text class="label" x="800" y="231" text-anchor="middle" fill="#FFFFFF" style="font-size:22px">Integrita</text>
  </g>
  <g data-safe-box="1060 190 260 62 8">
    <rect x="1060" y="190" width="260" height="62" rx="31" fill="#2F7D5A"/>
    <text class="label" x="1190" y="231" text-anchor="middle" fill="#FFFFFF" style="font-size:22px">Disponibilita</text>
  </g>
  <path class="line" d="M800 275 L800 330"/>
  <rect class="card" x="95" y="330" width="1410" height="390" rx="30"/>
  <g data-safe-box="150 405 330 135 8">
    <rect class="softRed" x="150" y="405" width="330" height="135" rx="22"/>
    <rect x="150" y="405" width="330" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="315" y="447" text-anchor="middle" style="font-size:25px">Minacce</text>
    <text class="muted small" x="315" y="481" text-anchor="middle">phishing, malware</text>
<text class="muted small" x="315" y="506" text-anchor="middle">errore umano</text>
  </g>
  <g data-safe-box="635 405 330 135 8">
    <rect class="softBlue" x="635" y="405" width="330" height="135" rx="22"/>
    <rect x="635" y="405" width="330" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="800" y="447" text-anchor="middle" style="font-size:25px">Controlli</text>
    <text class="muted small" x="800" y="481" text-anchor="middle">MFA, firewall</text>
<text class="muted small" x="800" y="506" text-anchor="middle">backup e patch</text>
  </g>
  <g data-safe-box="1120 405 330 135 8">
    <rect class="softGreen" x="1120" y="405" width="330" height="135" rx="22"/>
    <rect x="1120" y="405" width="330" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1285" y="447" text-anchor="middle" style="font-size:25px">Risposta</text>
    <text class="muted small" x="1285" y="481" text-anchor="middle">rileva, contiene</text>
<text class="muted small" x="1285" y="506" text-anchor="middle">ripristina e segnala</text>
  </g>
  <path class="arrowBordeaux" d="M495 472 L620 472"/>
  <path class="arrowNavy" d="M980 472 L1105 472"/>
  <g data-safe-box="230 610 250 74 8">
    <rect x="230" y="610" width="250" height="74" rx="20" fill="#10233F"/>
    <text class="label" x="355" y="641" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">Accessi</text>
    <text class="small" x="355" y="666" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">autenticazione + permessi</text>
  </g>
  <g data-safe-box="535 610 250 74 8">
    <rect x="535" y="610" width="250" height="74" rx="20" fill="#7A2430"/>
    <text class="label" x="660" y="641" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">Dati</text>
    <text class="small" x="660" y="666" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">cifratura e minimizzazione</text>
  </g>
  <g data-safe-box="840 610 250 74 8">
    <rect x="840" y="610" width="250" height="74" rx="20" fill="#D4AF37"/>
    <text class="label" x="965" y="641" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">Servizi</text>
    <text class="small" x="965" y="666" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">continuita operativa</text>
  </g>
  <g data-safe-box="1145 610 250 74 8">
    <rect x="1145" y="610" width="250" height="74" rx="20" fill="#2F7D5A"/>
    <text class="label" x="1270" y="641" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">Incidenti</text>
    <text class="small" x="1270" y="666" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">log, notifica, correzione</text>
  </g>
  <g data-safe-box="245 795 1110 64 8">
    <rect class="note" x="245" y="795" width="1110" height="64" rx="24"/>
    <text class="ink body" x="800" y="835" text-anchor="middle" style="font-weight:800;font-size:19px">Risposta da concorso: sicurezza = tecnica, organizzazione, formazione e responsabilita.</text>
  </g>

</svg>
