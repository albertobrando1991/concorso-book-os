<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Ecosistema della PA digitale</title>
  <desc id="desc">CAD, identita, documenti, comunicazioni, pagamenti e dati formano un sistema.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 44px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 23px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Ecosistema della PA digitale</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">CAD, identita, documenti, comunicazioni, pagamenti e dati formano un sistema.</text>

  <g data-safe-box="555 185 490 145 8">
    <rect class="card" x="555" y="185" width="490" height="145" rx="22"/>
    <rect x="555" y="185" width="490" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="800" y="227" text-anchor="middle" style="font-size:25px">CAD</text>
    <text class="muted small" x="800" y="261" text-anchor="middle">diritti digitali</text>
<text class="muted small" x="800" y="286" text-anchor="middle">processi e servizi</text>
  </g>
  <path class="line" d="M800 330 L800 390"/>
  <path class="line" d="M245 390 L1355 390"/>
  <path class="line" d="M245 390 L245 455"/>
  <path class="line" d="M467 390 L467 575"/>
  <path class="line" d="M689 390 L689 455"/>
  <path class="line" d="M911 390 L911 575"/>
  <path class="line" d="M1133 390 L1133 455"/>
  <path class="line" d="M1355 390 L1355 575"/>
  <g data-safe-box="105 455 280 130 8">
    <rect class="softBlue" x="105" y="455" width="280" height="130" rx="22"/>
    <rect x="105" y="455" width="280" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="245" y="497" text-anchor="middle" style="font-size:25px">Identita</text>
    <text class="muted small" x="245" y="531" text-anchor="middle">SPID, CIE, CNS</text>
<text class="muted small" x="245" y="556" text-anchor="middle">accesso ai servizi</text>
  </g>
  <g data-safe-box="327 575 280 130 8">
    <rect class="softRed" x="327" y="575" width="280" height="130" rx="22"/>
    <rect x="327" y="575" width="280" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="467" y="617" text-anchor="middle" style="font-size:25px">Documenti</text>
    <text class="muted small" x="467" y="651" text-anchor="middle">firma digitale</text>
<text class="muted small" x="467" y="676" text-anchor="middle">protocollo</text>
  </g>
  <g data-safe-box="549 455 280 130 8">
    <rect class="softGold" x="549" y="455" width="280" height="130" rx="22"/>
    <rect x="549" y="455" width="280" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="689" y="497" text-anchor="middle" style="font-size:25px">Comunicazioni</text>
    <text class="muted small" x="689" y="531" text-anchor="middle">PEC, domicilio</text>
<text class="muted small" x="689" y="556" text-anchor="middle">SEND e App IO</text>
  </g>
  <g data-safe-box="771 575 280 130 8">
    <rect class="softGreen" x="771" y="575" width="280" height="130" rx="22"/>
    <rect x="771" y="575" width="280" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="911" y="617" text-anchor="middle" style="font-size:25px">Pagamenti</text>
    <text class="muted small" x="911" y="651" text-anchor="middle">pagoPA</text>
<text class="muted small" x="911" y="676" text-anchor="middle">tracciabilita</text>
  </g>
  <g data-safe-box="993 455 280 130 8">
    <rect class="softBlue" x="993" y="455" width="280" height="130" rx="22"/>
    <rect x="993" y="455" width="280" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="1133" y="497" text-anchor="middle" style="font-size:25px">Dati</text>
    <text class="muted small" x="1133" y="531" text-anchor="middle">PDND, API</text>
<text class="muted small" x="1133" y="556" text-anchor="middle">open data</text>
  </g>
  <g data-safe-box="1215 575 280 130 8">
    <rect class="softRed" x="1215" y="575" width="280" height="130" rx="22"/>
    <rect x="1215" y="575" width="280" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="1355" y="617" text-anchor="middle" style="font-size:25px">Qualita</text>
    <text class="muted small" x="1355" y="651" text-anchor="middle">cloud, privacy</text>
<text class="muted small" x="1355" y="676" text-anchor="middle">accessibilita</text>
  </g>
  <g data-safe-box="235 795 1130 64 8">
    <rect class="note" x="235" y="795" width="1130" height="64" rx="24"/>
    <text class="ink body" x="800" y="835" text-anchor="middle" style="font-weight:800;font-size:20px">La PA digitale non e' un elenco di sigle: ogni strumento presidia una funzione.</text>
  </g>

</svg>
