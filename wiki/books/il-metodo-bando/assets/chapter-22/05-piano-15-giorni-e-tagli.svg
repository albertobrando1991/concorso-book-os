<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Piano 15 giorni e tagli</title>
  <desc id="desc">Quando il tempo e' minimo, non si aggiunge materiale: si toglie rumore.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Piano 15 giorni e tagli</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Quando il tempo e' minimo, non si aggiunge materiale: si toglie rumore.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="225" text-anchor="middle">Emergenza vera: scegli, riduci, verifica</text>
  <g data-safe-box="150 290 300 250 8">
    <rect class="softBlue" x="150" y="290" width="300" height="250" rx="26"/>
    <circle cx="300" cy="345" r="36" fill="#10233F"/>
    <text class="label" x="300" y="356" text-anchor="middle" fill="#FFFFFF" style="font-size:22px">1-2</text>
    <text class="navy label" x="300" y="412" text-anchor="middle" style="font-size:20px">Bando e diagnosi</text>
    <text class="muted small" x="300" y="468" text-anchor="middle" style="font-size:16px">prova breve</text>
  </g>
<g data-safe-box="520 290 300 250 8">
    <rect class="softRed" x="520" y="290" width="300" height="250" rx="26"/>
    <circle cx="670" cy="345" r="36" fill="#7A2430"/>
    <text class="label" x="670" y="356" text-anchor="middle" fill="#FFFFFF" style="font-size:22px">3-8</text>
    <text class="bordeaux label" x="670" y="412" text-anchor="middle" style="font-size:20px">Core minimo</text>
    <text class="muted small" x="670" y="468" text-anchor="middle" style="font-size:16px">quiz + errori</text>
  </g>
<g data-safe-box="890 290 300 250 8">
    <rect class="softGold" x="890" y="290" width="300" height="250" rx="26"/>
    <circle cx="1040" cy="345" r="36" fill="#D4AF37"/>
    <text class="label" x="1040" y="356" text-anchor="middle" fill="#FFFFFF" style="font-size:22px">9-12</text>
    <text class="gold label" x="1040" y="412" text-anchor="middle" style="font-size:20px">Modulo killer</text>
    <text class="muted small" x="1040" y="468" text-anchor="middle" style="font-size:16px">simulazioni</text>
  </g>
<g data-safe-box="1260 290 300 250 8">
    <rect class="softGreen" x="1260" y="290" width="300" height="250" rx="26"/>
    <circle cx="1410" cy="345" r="36" fill="#2F7D5A"/>
    <text class="label" x="1410" y="356" text-anchor="middle" fill="#FFFFFF" style="font-size:22px">13-15</text>
    <text class="green label" x="1410" y="412" text-anchor="middle" style="font-size:20px">Rifinitura</text>
    <text class="muted small" x="1410" y="468" text-anchor="middle" style="font-size:16px">schede + logistica</text>
  </g>
  <path class="arrowNavy" d="M455 405 L510 405"/>
  <path class="arrowNavy" d="M825 405 L880 405"/>
  <path class="arrowNavy" d="M1195 405 L1250 405"/>
  <g data-safe-box="245 640 330 78 8">
    <rect x="245" y="640" width="330" height="78" rx="20" fill="#7A2430"/>
    <text class="label" x="410" y="671" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Taglia</text>
    <text class="small" x="410" y="698" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">dettagli rari e lettura passiva</text>
  </g>
  <g data-safe-box="635 640 330 78 8">
    <rect x="635" y="640" width="330" height="78" rx="20" fill="#10233F"/>
    <text class="label" x="800" y="671" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Proteggi</text>
    <text class="small" x="800" y="698" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">simulazioni e correzione</text>
  </g>
  <g data-safe-box="1025 640 330 78 8">
    <rect x="1025" y="640" width="330" height="78" rx="20" fill="#2F7D5A"/>
    <text class="label" x="1190" y="671" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Chiudi</text>
    <text class="small" x="1190" y="698" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">documenti e routine prova</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">Negli ultimi 15 giorni non vinci aggiungendo materiale: vinci togliendo rumore.</text>
  </g>
</svg>
