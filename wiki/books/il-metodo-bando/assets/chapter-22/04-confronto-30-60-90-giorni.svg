<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Confronto operativo 30 / 60 / 90 giorni</title>
  <desc id="desc">La durata cambia profondita, margine di correzione e ruolo delle simulazioni.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Confronto operativo 30 / 60 / 90 giorni</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">La durata cambia profondita, margine di correzione e ruolo delle simulazioni.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="225" text-anchor="middle">Piu tempo non significa studiare tutto: significa correggere meglio</text>
  <g data-safe-box="135 260 400 430 8">
    <rect class="softRed" x="135" y="260" width="400" height="430" rx="28"/>
    <rect x="135" y="260" width="400" height="11" rx="5.5" fill="#7A2430"/>
    <text class="bordeaux label" x="335" y="315" text-anchor="middle" style="font-size:25px">30 giorni</text>
    <text class="ink label" x="335" y="360" text-anchor="middle" style="font-size:21px">selezione</text>
    <path class="thin" d="M175 380 L495 380"/>
    <text class="muted small" x="335" y="410" text-anchor="middle">core minimo</text>
<text class="muted small" x="335" y="458" text-anchor="middle">un modulo killer</text>
<text class="muted small" x="335" y="506" text-anchor="middle">simulazioni presto</text>
  </g>
<g data-safe-box="600 260 400 430 8">
    <rect class="softBlue" x="600" y="260" width="400" height="430" rx="28"/>
    <rect x="600" y="260" width="400" height="11" rx="5.5" fill="#10233F"/>
    <text class="navy label" x="800" y="315" text-anchor="middle" style="font-size:25px">60 giorni</text>
    <text class="ink label" x="800" y="360" text-anchor="middle" style="font-size:21px">copertura</text>
    <path class="thin" d="M640 380 L960 380"/>
    <text class="muted small" x="800" y="410" text-anchor="middle">core stabile</text>
<text class="muted small" x="800" y="458" text-anchor="middle">modulo profilo</text>
<text class="muted small" x="800" y="506" text-anchor="middle">simulazioni con margine</text>
  </g>
<g data-safe-box="1065 260 400 430 8">
    <rect class="softGreen" x="1065" y="260" width="400" height="430" rx="28"/>
    <rect x="1065" y="260" width="400" height="11" rx="5.5" fill="#2F7D5A"/>
    <text class="green label" x="1265" y="315" text-anchor="middle" style="font-size:25px">90 giorni</text>
    <text class="ink label" x="1265" y="360" text-anchor="middle" style="font-size:21px">correzione</text>
    <path class="thin" d="M1105 380 L1425 380"/>
    <text class="muted small" x="1265" y="410" text-anchor="middle">fondazione</text>
<text class="muted small" x="1265" y="458" text-anchor="middle">applicazione</text>
<text class="muted small" x="1265" y="506" text-anchor="middle">stabilizzazione</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">La durata decide profondita, numero di moduli e spazio per errori e simulazioni.</text>
  </g>
</svg>
