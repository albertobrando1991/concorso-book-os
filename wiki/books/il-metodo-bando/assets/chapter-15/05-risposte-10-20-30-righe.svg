<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Risposte in 10, 20 e 30 righe</title>
  <desc id="desc">La lunghezza cambia selezione, sviluppo e chiusura della risposta.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Risposte in 10, 20 e 30 righe</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">La lunghezza cambia selezione, sviluppo e chiusura della risposta.</text>

  <rect class="card" x="90" y="165" width="1420" height="630" rx="30"/>
  <text class="navy label" x="800" y="228" text-anchor="middle">Lo spazio disponibile decide quanta selezione serve</text>
  <g data-safe-box="170 310 330 315 8">
    <rect class="softBlue" x="170" y="310" width="330" height="315" rx="28"/>
    <rect x="170" y="310" width="330" height="12" rx="6" fill="#10233F"/>
    <text class="navy label" x="335" y="368" text-anchor="middle" style="font-size:31px">10 righe</text>
    <path class="thin" d="M206 395 L464 395"/>
    <text class="muted small" x="335" y="430" text-anchor="middle" style="font-size:20px">definizione</text>
<text class="muted small" x="335" y="474" text-anchor="middle" style="font-size:20px">due punti chiave</text>
<text class="muted small" x="335" y="518" text-anchor="middle" style="font-size:20px">chiusura secca</text>
  </g>
  <g data-safe-box="635 270 330 395 8">
    <rect class="softGold" x="635" y="270" width="330" height="395" rx="28"/>
    <rect x="635" y="270" width="330" height="12" rx="6" fill="#D4AF37"/>
    <text class="gold label" x="800" y="328" text-anchor="middle" style="font-size:31px">20 righe</text>
    <path class="thin" d="M671 355 L929 355"/>
    <text class="muted small" x="800" y="390" text-anchor="middle" style="font-size:20px">definizione</text>
<text class="muted small" x="800" y="434" text-anchor="middle" style="font-size:20px">funzione</text>
<text class="muted small" x="800" y="478" text-anchor="middle" style="font-size:20px">elementi</text>
<text class="muted small" x="800" y="522" text-anchor="middle" style="font-size:20px">esempio breve</text>
  </g>
  <g data-safe-box="1100 230 330 475 8">
    <rect class="softGreen" x="1100" y="230" width="330" height="475" rx="28"/>
    <rect x="1100" y="230" width="330" height="12" rx="6" fill="#2F7D5A"/>
    <text class="green label" x="1265" y="288" text-anchor="middle" style="font-size:31px">30 righe</text>
    <path class="thin" d="M1136 315 L1394 315"/>
    <text class="muted small" x="1265" y="350" text-anchor="middle" style="font-size:20px">inquadramento</text>
<text class="muted small" x="1265" y="394" text-anchor="middle" style="font-size:20px">sviluppo</text>
<text class="muted small" x="1265" y="438" text-anchor="middle" style="font-size:20px">confronto o caso</text>
<text class="muted small" x="1265" y="482" text-anchor="middle" style="font-size:20px">conclusione</text>
  </g>
  <path class="dash" d="M230 720 L1370 720"/>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">Se non sai scriverla in 10 righe, non hai ancora isolato il nucleo della risposta.</text>
  </g>

</svg>
