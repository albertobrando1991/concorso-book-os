<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Schema della risposta concorsuale</title>
  <desc id="desc">Definizione, riferimento, funzione, applicazione e conclusione danno ordine.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Schema della risposta concorsuale</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Definizione, riferimento, funzione, applicazione e conclusione danno ordine.</text>

  <rect class="card" x="90" y="165" width="1420" height="630" rx="30"/>
  <text class="navy label" x="800" y="228" text-anchor="middle">Una risposta concorsuale ha una sequenza riconoscibile</text>
  <g data-safe-box="130 330 250 190 8">
    <rect class="softBlue" x="130" y="330" width="250" height="190" rx="24"/>
    <circle cx="255" cy="372" r="28" fill="#10233F"/>
    <text class="label" x="255" y="381" text-anchor="middle" fill="#FFFFFF">1</text>
    <text class="navy label" x="255" y="408" text-anchor="middle" style="font-size:20px">Definizione</text>
    <text class="muted small" x="255" y="422" text-anchor="middle" style="font-size:17px">che cos'e</text>
<text class="muted small" x="255" y="449" text-anchor="middle" style="font-size:17px">nucleo</text>
  </g>
  <g data-safe-box="420 330 250 190 8">
    <rect class="softRed" x="420" y="330" width="250" height="190" rx="24"/>
    <circle cx="545" cy="372" r="28" fill="#7A2430"/>
    <text class="label" x="545" y="381" text-anchor="middle" fill="#FFFFFF">2</text>
    <text class="bordeaux label" x="545" y="408" text-anchor="middle" style="font-size:20px">Riferimento</text>
    <text class="muted small" x="545" y="422" text-anchor="middle" style="font-size:17px">fonte sicura</text>
<text class="muted small" x="545" y="449" text-anchor="middle" style="font-size:17px">principio</text>
  </g>
  <g data-safe-box="710 330 250 190 8">
    <rect class="softGold" x="710" y="330" width="250" height="190" rx="24"/>
    <circle cx="835" cy="372" r="28" fill="#D4AF37"/>
    <text class="label" x="835" y="381" text-anchor="middle" fill="#FFFFFF">3</text>
    <text class="gold label" x="835" y="408" text-anchor="middle" style="font-size:20px">Funzione</text>
    <text class="muted small" x="835" y="422" text-anchor="middle" style="font-size:17px">a cosa serve</text>
<text class="muted small" x="835" y="449" text-anchor="middle" style="font-size:17px">perche conta</text>
  </g>
  <g data-safe-box="1000 330 250 190 8">
    <rect class="softGreen" x="1000" y="330" width="250" height="190" rx="24"/>
    <circle cx="1125" cy="372" r="28" fill="#2F7D5A"/>
    <text class="label" x="1125" y="381" text-anchor="middle" fill="#FFFFFF">4</text>
    <text class="green label" x="1125" y="408" text-anchor="middle" style="font-size:20px">Applicazione</text>
    <text class="muted small" x="1125" y="422" text-anchor="middle" style="font-size:17px">esempio</text>
<text class="muted small" x="1125" y="449" text-anchor="middle" style="font-size:17px">caso</text>
  </g>
  <g data-safe-box="1290 330 250 190 8">
    <rect class="softTeal" x="1290" y="330" width="250" height="190" rx="24"/>
    <circle cx="1415" cy="372" r="28" fill="#1F6F78"/>
    <text class="label" x="1415" y="381" text-anchor="middle" fill="#FFFFFF">5</text>
    <text class="teal label" x="1415" y="408" text-anchor="middle" style="font-size:20px">Conclusione</text>
    <text class="muted small" x="1415" y="422" text-anchor="middle" style="font-size:17px">torna alla</text>
<text class="muted small" x="1415" y="449" text-anchor="middle" style="font-size:17px">traccia</text>
  </g>
  <path class="arrowNavy" d="M380 425 L410 425"/>
  <path class="arrowBordeaux" d="M670 425 L700 425"/>
  <path class="arrowGold" d="M960 425 L990 425"/>
  <path class="arrowGreen" d="M1250 425 L1280 425"/>
  <g data-safe-box="455 640 300 78 8">
    <rect x="455" y="640" width="300" height="78" rx="20" fill="#7A2430"/>
    <text class="label" x="605" y="671" text-anchor="middle" fill="#FFFFFF" style="font-size:19px">No articoli incerti</text>
    <text class="small" x="605" y="698" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">meglio principio sicuro</text>
  </g>
  <g data-safe-box="845 640 300 78 8">
    <rect x="845" y="640" width="300" height="78" rx="20" fill="#2F7D5A"/>
    <text class="label" x="995" y="671" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">No riassunto</text>
    <text class="small" x="995" y="698" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">rispondi alla domanda</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">La risposta non deve dire tutto: deve dire cio che serve, nell'ordine giusto.</text>
  </g>

</svg>
