<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Caso teorico-pratico</title>
  <desc id="desc">Dal fatto alla soluzione: soggetti, problema, regola, applicazione e cautele.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Caso teorico-pratico</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Dal fatto alla soluzione: soggetti, problema, regola, applicazione e cautele.</text>

  <rect class="card" x="80" y="165" width="1440" height="630" rx="30"/>
  <text class="navy label" x="800" y="228" text-anchor="middle">Il caso chiede comportamento motivato, non teoria riversata</text>
  <g data-safe-box="110 330 190 160 8">
    <rect class="softBlue" x="110" y="330" width="190" height="160" rx="22"/>
    <text class="navy label" x="205" y="372" text-anchor="middle" style="font-size:21px">Fatti</text>
    <text class="muted small" x="205" y="408" text-anchor="middle" style="font-size:17px">che cosa</text>
<text class="muted small" x="205" y="435" text-anchor="middle" style="font-size:17px">accade</text>
  </g>
  <g data-safe-box="335 330 190 160 8">
    <rect class="softRed" x="335" y="330" width="190" height="160" rx="22"/>
    <text class="bordeaux label" x="430" y="372" text-anchor="middle" style="font-size:21px">Problema</text>
    <text class="muted small" x="430" y="408" text-anchor="middle" style="font-size:17px">punto da</text>
<text class="muted small" x="430" y="435" text-anchor="middle" style="font-size:17px">risolvere</text>
  </g>
  <g data-safe-box="560 330 190 160 8">
    <rect class="softGold" x="560" y="330" width="190" height="160" rx="22"/>
    <text class="gold label" x="655" y="372" text-anchor="middle" style="font-size:21px">Soggetti</text>
    <text class="muted small" x="655" y="408" text-anchor="middle" style="font-size:17px">chi agisce</text>
<text class="muted small" x="655" y="435" text-anchor="middle" style="font-size:17px">chi riceve</text>
  </g>
  <g data-safe-box="785 330 190 160 8">
    <rect class="softGreen" x="785" y="330" width="190" height="160" rx="22"/>
    <text class="green label" x="880" y="372" text-anchor="middle" style="font-size:21px">Regola</text>
    <text class="muted small" x="880" y="408" text-anchor="middle" style="font-size:17px">principio</text>
<text class="muted small" x="880" y="435" text-anchor="middle" style="font-size:17px">sicuro</text>
  </g>
  <g data-safe-box="1010 330 190 160 8">
    <rect class="softTeal" x="1010" y="330" width="190" height="160" rx="22"/>
    <text class="teal label" x="1105" y="372" text-anchor="middle" style="font-size:21px">Applica</text>
    <text class="muted small" x="1105" y="408" text-anchor="middle" style="font-size:17px">regola al</text>
<text class="muted small" x="1105" y="435" text-anchor="middle" style="font-size:17px">caso</text>
  </g>
  <g data-safe-box="1235 330 230 160 8">
    <rect class="softBlue" x="1235" y="330" width="230" height="160" rx="22"/>
    <text class="navy label" x="1350" y="372" text-anchor="middle" style="font-size:21px">Soluzione</text>
    <text class="muted small" x="1350" y="408" text-anchor="middle" style="font-size:17px">esito</text>
<text class="muted small" x="1350" y="435" text-anchor="middle" style="font-size:17px">cautele</text>
  </g>
  <path class="arrowNavy" d="M310 410 L325 410"/>
  <path class="arrowBordeaux" d="M535 410 L550 410"/>
  <path class="arrowGold" d="M760 410 L775 410"/>
  <path class="arrowGreen" d="M985 410 L1000 410"/>
  <path class="arrowTeal" d="M1210 410 L1225 410"/>
  <g data-safe-box="230 620 460 181 8">
    <rect class="softRed" x="230" y="620" width="460" height="181" rx="22"/>
    <rect x="230" y="620" width="460" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="460" y="662" text-anchor="middle" style="font-size:21px">Prima di scrivere</text>
    <path class="thin" d="M254 680 L666 680"/>
    <text class="muted small" x="260" y="700" style="font-size:17px">non aprire tutto il manuale</text>
<text class="muted small" x="260" y="731" style="font-size:17px">leggi soggetti e problema</text>
<text class="muted small" x="260" y="762" style="font-size:17px">decidi l'output</text>
  </g>
  <g data-safe-box="910 620 460 181 8">
    <rect class="softGreen" x="910" y="620" width="460" height="181" rx="22"/>
    <rect x="910" y="620" width="460" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1140" y="662" text-anchor="middle" style="font-size:24px">Risposta attesa</text>
    <path class="thin" d="M934 680 L1346 680"/>
    <text class="muted small" x="940" y="700" style="font-size:17px">comportamento dell'ufficio</text>
<text class="muted small" x="940" y="731" style="font-size:17px">motivazione sintetica</text>
<text class="muted small" x="940" y="762" style="font-size:17px">conclusione operativa</text>
  </g>

</svg>
