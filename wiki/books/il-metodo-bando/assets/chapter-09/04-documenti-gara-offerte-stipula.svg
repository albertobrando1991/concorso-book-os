<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Documenti, requisiti e stipula</title>
  <desc id="desc">Dalla procedura conoscibile al vincolo contrattuale: ogni parola ha una funzione diversa.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 44px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 23px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .tiny { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 16px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Documenti, requisiti e stipula</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Dalla procedura conoscibile al vincolo contrattuale: ogni parola ha una funzione diversa.</text>

  <g data-safe-box="80 210 300 150 8">
    <rect class="softBlue" x="80" y="210" width="300" height="150" rx="22"/>
    <rect x="80" y="210" width="300" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="230" y="252" text-anchor="middle" style="font-size:25px">Bando</text>
    <text class="muted small" x="230" y="286" text-anchor="middle">rende conoscibile</text>
<text class="muted small" x="230" y="311" text-anchor="middle">la procedura</text>
  </g>
  <g data-safe-box="460 210 300 150 8">
    <rect class="softRed" x="460" y="210" width="300" height="150" rx="22"/>
    <rect x="460" y="210" width="300" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="610" y="252" text-anchor="middle" style="font-size:25px">Disciplinare</text>
    <text class="muted small" x="610" y="286" text-anchor="middle">regola partecipazione</text>
<text class="muted small" x="610" y="311" text-anchor="middle">documenti e termini</text>
  </g>
  <g data-safe-box="840 210 300 150 8">
    <rect class="softGold" x="840" y="210" width="300" height="150" rx="22"/>
    <rect x="840" y="210" width="300" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="990" y="252" text-anchor="middle" style="font-size:25px">Capitolato</text>
    <text class="muted small" x="990" y="286" text-anchor="middle">descrive prestazioni</text>
<text class="muted small" x="990" y="311" text-anchor="middle">condizioni tecniche</text>
  </g>
  <g data-safe-box="1220 210 300 150 8">
    <rect class="softGreen" x="1220" y="210" width="300" height="150" rx="22"/>
    <rect x="1220" y="210" width="300" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1370" y="252" text-anchor="middle" style="font-size:25px">Requisiti</text>
    <text class="muted small" x="1370" y="286" text-anchor="middle">chi puo partecipare</text>
<text class="muted small" x="1370" y="311" text-anchor="middle">e con quali prove</text>
  </g>
  <path class="arrowNavy" d="M385 285 L445 285"/>
  <path class="arrowNavy" d="M765 285 L825 285"/>
  <path class="arrowNavy" d="M1145 285 L1205 285"/>
  <path class="line" d="M800 395 L800 455"/>
  <g data-safe-box="190 500 330 145 8">
    <rect class="card" x="190" y="500" width="330" height="145" rx="22"/>
    <rect x="190" y="500" width="330" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="355" y="542" text-anchor="middle" style="font-size:25px">Offerta</text>
    <text class="muted small" x="355" y="576" text-anchor="middle">tecnica ed economica</text>
<text class="muted small" x="355" y="601" text-anchor="middle">secondo criteri noti</text>
  </g>
  <g data-safe-box="635 500 330 145 8">
    <rect class="card" x="635" y="500" width="330" height="145" rx="22"/>
    <rect x="635" y="500" width="330" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="800" y="542" text-anchor="middle" style="font-size:25px">Aggiudicazione</text>
    <text class="muted small" x="800" y="576" text-anchor="middle">individua</text>
<text class="muted small" x="800" y="601" text-anchor="middle">l'operatore scelto</text>
  </g>
  <g data-safe-box="1080 500 330 145 8">
    <rect class="card" x="1080" y="500" width="330" height="145" rx="22"/>
    <rect x="1080" y="500" width="330" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="1245" y="542" text-anchor="middle" style="font-size:25px">Stipula</text>
    <text class="muted small" x="1245" y="576" text-anchor="middle">perfeziona</text>
<text class="muted small" x="1245" y="601" text-anchor="middle">il vincolo contrattuale</text>
  </g>
  <path class="arrowBordeaux" d="M525 572 L620 572"/>
  <path class="arrowBordeaux" d="M970 572 L1065 572"/>
  <g data-safe-box="250 780 1100 64 8">
    <rect class="note" x="250" y="780" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="820" text-anchor="middle" style="font-weight:800;font-size:18px">Formula da ricordare: documenti chiari, offerta valutabile, aggiudicazione distinta dalla stipula.</text>
  </g>

</svg>
