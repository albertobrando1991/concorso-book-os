<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Dal fabbisogno all'esecuzione</title>
  <desc id="desc">La sequenza che impedisce di ridurre il contratto pubblico alla sola gara.</desc>
  <defs>
