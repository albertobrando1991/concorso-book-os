<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Ecosistema digitale dei contratti</title>
  <desc id="desc">BDNCP, PCP, FVOE, CIG e piattaforme non sono sinonimi: presidiano passaggi diversi.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 44px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 23px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .tiny { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 16px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Ecosistema digitale dei contratti</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">BDNCP, PCP, FVOE, CIG e piattaforme non sono sinonimi: presidiano passaggi diversi.</text>

  <g data-safe-box="575 205 450 165 8">
    <rect class="card" x="575" y="205" width="450" height="165" rx="22"/>
    <rect x="575" y="205" width="450" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="800" y="247" text-anchor="middle" style="font-size:25px">ANAC</text>
    <text class="muted small" x="800" y="281" text-anchor="middle">ecosistema dati</text>
<text class="muted small" x="800" y="306" text-anchor="middle">vigilanza e tracciabilita</text>
  </g>
  <path class="line" d="M800 370 L800 425"/>
  <path class="line" d="M250 425 L1350 425"/>
  <path class="line" d="M250 425 L250 470"/>
  <path class="line" d="M525 425 L525 470"/>
  <path class="line" d="M800 425 L800 470"/>
  <path class="line" d="M1075 425 L1075 470"/>
  <path class="line" d="M1350 425 L1350 470"/>
  <g data-safe-box="105 470 290 135 8">
    <rect class="softBlue" x="105" y="470" width="290" height="135" rx="22"/>
    <rect x="105" y="470" width="290" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="250" y="512" text-anchor="middle" style="font-size:25px">BDNCP</text>
    <text class="muted small" x="250" y="546" text-anchor="middle">banca dati nazionale</text>
<text class="muted small" x="250" y="571" text-anchor="middle">dei contratti</text>
  </g>
  <g data-safe-box="380 620 290 135 8">
    <rect class="softRed" x="380" y="620" width="290" height="135" rx="22"/>
    <rect x="380" y="620" width="290" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="525" y="662" text-anchor="middle" style="font-size:25px">PCP</text>
    <text class="muted small" x="525" y="696" text-anchor="middle">piattaforma contratti</text>
<text class="muted small" x="525" y="721" text-anchor="middle">pubblici</text>
  </g>
  <g data-safe-box="655 470 290 135 8">
    <rect class="softGold" x="655" y="470" width="290" height="135" rx="22"/>
    <rect x="655" y="470" width="290" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="800" y="512" text-anchor="middle" style="font-size:25px">FVOE</text>
    <text class="muted small" x="800" y="546" text-anchor="middle">verifica requisiti</text>
<text class="muted small" x="800" y="571" text-anchor="middle">operatore economico</text>
  </g>
  <g data-safe-box="930 620 290 135 8">
    <rect class="softGreen" x="930" y="620" width="290" height="135" rx="22"/>
    <rect x="930" y="620" width="290" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1075" y="662" text-anchor="middle" style="font-size:25px">CIG</text>
    <text class="muted small" x="1075" y="696" text-anchor="middle">identificazione</text>
<text class="muted small" x="1075" y="721" text-anchor="middle">e tracciabilita</text>
  </g>
  <g data-safe-box="1205 470 290 135 8">
    <rect class="softBlue" x="1205" y="470" width="290" height="135" rx="22"/>
    <rect x="1205" y="470" width="290" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="1350" y="512" text-anchor="middle" style="font-size:25px">Piattaforme</text>
    <text class="muted small" x="1350" y="546" text-anchor="middle">procedure, dati</text>
<text class="muted small" x="1350" y="571" text-anchor="middle">comunicazioni</text>
  </g>
  <g data-safe-box="250 800 1100 64 8">
    <rect class="note" x="250" y="800" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="840" text-anchor="middle" style="font-weight:800;font-size:18px">Digitalizzazione non significa solo gara online: collega atti, dati, requisiti, pubblicita e controlli.</text>
  </g>

</svg>
