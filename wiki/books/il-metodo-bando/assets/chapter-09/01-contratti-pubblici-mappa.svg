<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Contratti pubblici essenziali</title>
  <desc id="desc">Il contratto pubblico come ciclo: bisogno, scelta, esecuzione, dati e controllo.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 44px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 23px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .tiny { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 16px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Contratti pubblici essenziali</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Il contratto pubblico come ciclo: bisogno, scelta, esecuzione, dati e controllo.</text>

  <g data-safe-box="565 190 470 150 8">
    <rect class="card" x="565" y="190" width="470" height="150" rx="22"/>
    <rect x="565" y="190" width="470" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="800" y="232" text-anchor="middle" style="font-size:24px">Contratto pubblico</text>
    <text class="muted small" x="800" y="266" text-anchor="middle">risorse pubbliche</text>
<text class="muted small" x="800" y="291" text-anchor="middle">mercato</text>
<text class="muted small" x="800" y="316" text-anchor="middle">interesse pubblico</text>
  </g>
  <path class="line" d="M800 340 L800 410"/>
  <path class="line" d="M250 410 L1350 410"/>
  <path class="line" d="M250 410 L250 455"/>
  <path class="line" d="M525 410 L525 455"/>
  <path class="line" d="M800 410 L800 455"/>
  <path class="line" d="M1075 410 L1075 455"/>
  <path class="line" d="M1350 410 L1350 455"/>
  <g data-safe-box="105 455 290 130 8">
    <rect class="softBlue" x="105" y="455" width="290" height="130" rx="22"/>
    <rect x="105" y="455" width="290" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="250" y="497" text-anchor="middle" style="font-size:25px">Fabbisogno</text>
    <text class="muted small" x="250" y="531" text-anchor="middle">che cosa serve</text>
<text class="muted small" x="250" y="556" text-anchor="middle">e per quale fine</text>
  </g>
  <g data-safe-box="380 605 290 130 8">
    <rect class="softRed" x="380" y="605" width="290" height="130" rx="22"/>
    <rect x="380" y="605" width="290" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="525" y="647" text-anchor="middle" style="font-size:25px">Procedura</text>
    <text class="muted small" x="525" y="681" text-anchor="middle">come si sceglie</text>
<text class="muted small" x="525" y="706" text-anchor="middle">l'operatore</text>
  </g>
  <g data-safe-box="655 455 290 130 8">
    <rect class="softGold" x="655" y="455" width="290" height="130" rx="22"/>
    <rect x="655" y="455" width="290" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="800" y="497" text-anchor="middle" style="font-size:25px">Operatore</text>
    <text class="muted small" x="800" y="531" text-anchor="middle">requisiti</text>
<text class="muted small" x="800" y="556" text-anchor="middle">offerta e ruolo</text>
  </g>
  <g data-safe-box="930 605 290 130 8">
    <rect class="softGreen" x="930" y="605" width="290" height="130" rx="22"/>
    <rect x="930" y="605" width="290" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1075" y="647" text-anchor="middle" style="font-size:25px">Esecuzione</text>
    <text class="muted small" x="1075" y="681" text-anchor="middle">prestazione</text>
<text class="muted small" x="1075" y="706" text-anchor="middle">tempi e qualita</text>
  </g>
  <g data-safe-box="1205 455 290 130 8">
    <rect class="softBlue" x="1205" y="455" width="290" height="130" rx="22"/>
    <rect x="1205" y="455" width="290" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="1350" y="497" text-anchor="middle" style="font-size:25px">Controllo</text>
    <text class="muted small" x="1350" y="531" text-anchor="middle">dati, tracciabilita</text>
<text class="muted small" x="1350" y="556" text-anchor="middle">responsabilita</text>
  </g>
  <g data-safe-box="260 790 1080 64 8">
    <rect class="note" x="260" y="790" width="1080" height="64" rx="24"/>
    <text class="ink body" x="800" y="830" text-anchor="middle" style="font-weight:800;font-size:19px">Domanda guida: la PA ha trasformato un bisogno reale in una prestazione controllata?</text>
  </g>

</svg>
