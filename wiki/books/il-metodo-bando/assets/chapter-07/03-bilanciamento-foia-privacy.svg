<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc">
  <title id="title">Bilanciamento tra accesso e privacy</title>
  <desc id="desc">Schema per valutare richiesta di accesso, limiti, controinteressati, oscuramento e soluzione proporzionata.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .ink { fill: #172233; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 46px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 24px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 26px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 21px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 19px; }
      .card { fill: #ffffff; stroke: #cfd8e3; stroke-width: 3; }
      .chip { fill: #eef4fb; stroke: #c5d7ea; stroke-width: 2.5; }
      .good { fill: #e7f3ed; stroke: #a8d1bd; stroke-width: 2.5; }
      .warn { fill: #fff7ed; stroke: #e7c18e; stroke-width: 2.5; }
      .stop { fill: #f7e0de; stroke: #d4a2a0; stroke-width: 2.5; }
      .blue { fill: #1f4e79; }
      .green { fill: #2f7d5a; }
      .amber { fill: #b7791f; }
      .red { fill: #a94442; }
      .arrow { stroke: #1f4e79; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowHead); }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f4e79"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="820"/>
  <text class="ink title" x="800" y="70" text-anchor="middle">Bilanciamento accesso e privacy</text>
  <text class="muted subtitle" x="800" y="110" text-anchor="middle">La presenza di dati personali richiede valutazione, non diniego automatico.</text>

  <path class="arrow" d="M 360 295 L 430 295"/>
  <path class="arrow" d="M 710 295 L 780 295"/>
  <path class="arrow" d="M 1060 295 L 1130 295"/>

  <g transform="translate(90 210)">
    <rect class="card" width="270" height="170" rx="20"/>
    <text class="blue label" x="135" y="52" text-anchor="middle">1. Richiesta</text>
    <text class="muted body" x="135" y="90" text-anchor="middle">chi chiede?</text>
    <text class="muted body" x="135" y="122" text-anchor="middle">che cosa chiede?</text>
  </g>

  <g transform="translate(430 210)">
    <rect class="card" width="280" height="170" rx="20"/>
    <text class="green label" x="140" y="52" text-anchor="middle">2. Fonte</text>
    <text class="muted body" x="140" y="90" text-anchor="middle">L. 241/1990,</text>
    <text class="muted body" x="140" y="122" text-anchor="middle">D.Lgs. 33/2013, GDPR</text>
  </g>

  <g transform="translate(780 210)">
    <rect class="card" width="280" height="170" rx="20"/>
    <text class="amber label" x="140" y="52" text-anchor="middle">3. Limiti</text>
    <text class="muted body" x="140" y="90" text-anchor="middle">pregiudizio concreto,</text>
    <text class="muted body" x="140" y="122" text-anchor="middle">privacy e segreti</text>
  </g>

  <g transform="translate(1130 210)">
    <rect class="card" width="380" height="170" rx="20"/>
    <text class="red label" x="190" y="52" text-anchor="middle">4. Soluzione</text>
    <text class="muted body" x="190" y="90" text-anchor="middle">totale, parziale,</text>
    <text class="muted body" x="190" y="122" text-anchor="middle">differita o negata</text>
  </g>

  <g transform="translate(140 500)">
    <rect class="good" width="300" height="110" rx="22"/>
    <text class="green label" x="150" y="42" text-anchor="middle">Accesso totale</text>
    <text class="muted small" x="150" y="74" text-anchor="middle">nessun limite prevalente</text>
  </g>
  <g transform="translate(500 500)">
    <rect class="warn" width="300" height="110" rx="22"/>
    <text class="amber label" x="150" y="42" text-anchor="middle">Oscuramento</text>
    <text class="muted small" x="150" y="74" text-anchor="middle">dati non necessari</text>
  </g>
  <g transform="translate(860 500)">
    <rect class="chip" width="300" height="110" rx="22"/>
    <text class="blue label" x="150" y="42" text-anchor="middle">Differimento</text>
    <text class="muted small" x="150" y="74" text-anchor="middle">accesso rinviato</text>
  </g>
  <g transform="translate(1220 500)">
    <rect class="stop" width="300" height="110" rx="22"/>
    <text class="red label" x="150" y="42" text-anchor="middle">Diniego motivato</text>
    <text class="muted small" x="150" y="74" text-anchor="middle">limite non superabile</text>
  </g>

  <rect class="chip" x="245" y="690" width="1110" height="66" rx="24"/>
  <text class="blue" x="800" y="732" text-anchor="middle" style="font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:23px;font-weight:800;">Formula chiave: trasparenza non significa pubblicare tutto; privacy non significa negare sempre.</text>
</svg>
