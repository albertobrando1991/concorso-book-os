<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Materiali: funzione e rischio</title>
  <desc id="desc">Manuale, corso, quiz, dispense e AI servono solo se producono output.</desc>
  <style>
    .bg { fill: #F8FAFC; }
    .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
    .title { font: 800 43px Arial, sans-serif; fill: #0F172A; }
    .subtitle { font: 400 21px Arial, sans-serif; fill: #526174; }
    .label { font: 800 25px Arial, sans-serif; fill: #0F172A; }
    .body { font: 400 19px Arial, sans-serif; fill: #0F172A; }
    .small { font: 400 16px Arial, sans-serif; fill: #0F172A; }
    .strong { font-weight: 800; }
    .whiteText { fill: #FFFFFF; }
    .line { stroke: #10233F; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#10233F"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <g data-safe-box="80 16 1440 118 0">
    <text class="title" x="800" y="68" text-anchor="middle">Materiali: funzione e rischio</text>
    <text class="subtitle" x="800" y="108" text-anchor="middle">Manuale, corso, quiz, dispense e AI servono solo se producono output.</text>
  </g>
  
    <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
    <g data-safe-box="185 245 760 70 6">
        <rect x="185" y="245" width="760" height="70" rx="20" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
        <text class="small strong" style="fill:#10233F" x="315" y="288" text-anchor="middle">Manuale</text>
        <text class="small" x="555" y="288" text-anchor="middle">struttura</text>
        <text class="small strong" x="805" y="288" text-anchor="middle">quattro paralleli</text>
      </g>
<g data-safe-box="185 333 760 70 6">
        <rect x="185" y="333" width="760" height="70" rx="20" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
        <text class="small strong" style="fill:#2F7D5A" x="315" y="376" text-anchor="middle">Corso</text>
        <text class="small" x="555" y="376" text-anchor="middle">percorso</text>
        <text class="small strong" x="805" y="376" text-anchor="middle">dipendenza passiva</text>
      </g>
<g data-safe-box="185 421 760 70 6">
        <rect x="185" y="421" width="760" height="70" rx="20" fill="#FFF4CC" stroke="#D4AF37" stroke-width="3"/>
        <text class="small strong" style="fill:#D4AF37" x="315" y="464" text-anchor="middle">Quiz</text>
        <text class="small" x="555" y="464" text-anchor="middle">allenamento</text>
        <text class="small strong" x="805" y="464" text-anchor="middle">senza ragionamento</text>
      </g>
<g data-safe-box="185 509 760 70 6">
        <rect x="185" y="509" width="760" height="70" rx="20" fill="#E4F4F5" stroke="#1F6F78" stroke-width="3"/>
        <text class="small strong" style="fill:#1F6F78" x="315" y="552" text-anchor="middle">Dispense</text>
        <text class="small" x="555" y="552" text-anchor="middle">ripasso</text>
        <text class="small strong" x="805" y="552" text-anchor="middle">origine incerta</text>
      </g>
<g data-safe-box="185 597 760 70 6">
        <rect x="185" y="597" width="760" height="70" rx="20" fill="#F8E8EA" stroke="#7A2430" stroke-width="3"/>
        <text class="small strong" style="fill:#7A2430" x="315" y="640" text-anchor="middle">AI</text>
        <text class="small" x="555" y="640" text-anchor="middle">trasforma</text>
        <text class="small strong" x="805" y="640" text-anchor="middle">fonte autonoma</text>
      </g>
    <g data-safe-box="1040 325 380 250 8">
    <rect x="1040" y="325" width="380" height="250" rx="26" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
    <text class="label" style="fill:#2F7D5A" x="1230" y="381" text-anchor="middle">Filtro</text>
    <text class="small" x="1230" y="423" text-anchor="middle">serve al bando?</text>
<text class="small" x="1230" y="457" text-anchor="middle">corregge errori?</text>
<text class="small" x="1230" y="491" text-anchor="middle">produce output?</text>
  </g>
    <g data-safe-box="245 810 1110 66 8">
    <rect x="245" y="810" width="1110" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="853" text-anchor="middle">Ogni strumento utile ha anche un rischio: il metodo decide quando usarlo.</text>
  </g>
    
</svg>
