<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Banca dati ufficiale o allenamento</title>
  <desc id="desc">Una banca dati ufficiale cambia il piano; una non ufficiale allena.</desc>
  <style>
    .bg { fill: #F8FAFC; }
    .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
    .title { font: 800 43px Arial, sans-serif; fill: #0F172A; }
    .subtitle { font: 400 21px Arial, sans-serif; fill: #526174; }
    .label { font: 800 25px Arial, sans-serif; fill: #0F172A; }
    .body { font: 400 19px Arial, sans-serif; fill: #0F172A; }
    .small { font: 400 16px Arial, sans-serif; fill: #0F172A; }
    .strong { font-weight: 800; }
    .whiteText { fill: #FFFFFF; }
    .line { stroke: #10233F; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#10233F"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <g data-safe-box="80 16 1440 118 0">
    <text class="title" x="800" y="68" text-anchor="middle">Banca dati ufficiale o allenamento</text>
    <text class="subtitle" x="800" y="108" text-anchor="middle">Una banca dati ufficiale cambia il piano; una non ufficiale allena.</text>
  </g>
  
    <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
    <g data-safe-box="145 285 480 340 8">
    <rect x="145" y="285" width="480" height="340" rx="28" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <rect x="145" y="285" width="480" height="14" rx="7" fill="#10233F"/>
    <text class="label" style="fill:#10233F" x="385" y="357" text-anchor="middle">Ufficiale</text>
    <text class="small strong" x="385" y="417" text-anchor="middle">procedura</text>
<text class="small strong" x="385" y="459" text-anchor="middle">copertura completa</text>
<text class="small strong" x="385" y="501" text-anchor="middle">errori e ritorno</text>
<text class="small strong" x="385" y="543" text-anchor="middle">simulazione finale</text>
  </g>
    <g data-safe-box="835 285 480 340 8">
    <rect x="835" y="285" width="480" height="340" rx="28" fill="#E4F4F5" stroke="#1F6F78" stroke-width="3"/>
    <rect x="835" y="285" width="480" height="14" rx="7" fill="#1F6F78"/>
    <text class="label" style="fill:#1F6F78" x="1075" y="357" text-anchor="middle">Non ufficiale</text>
    <text class="small strong" x="1075" y="417" text-anchor="middle">allenamento</text>
<text class="small strong" x="1075" y="459" text-anchor="middle">distrattori</text>
<text class="small strong" x="1075" y="501" text-anchor="middle">tempo</text>
<text class="small strong" x="1075" y="543" text-anchor="middle">richiamo</text>
  </g>
    <path class="line" marker-end="url(#arrow)" d="M600 455 L735 455"/>
    <g data-safe-box="455 655 690 150 8">
    <rect x="455" y="655" width="690" height="150" rx="24" fill="#FFF4CC" stroke="#D4AF37" stroke-width="3"/>
    <rect x="455" y="655" width="690" height="12" rx="6" fill="#D4AF37"/>
    <text class="label" x="800" y="707" text-anchor="middle">Decisione</text>
    <text class="small" x="800" y="737" text-anchor="middle">se e' ufficiale, entra nel piano</text>
<text class="small" x="800" y="765" text-anchor="middle">se non lo e', resta strumento di allenamento</text>
  </g>
    <g data-safe-box="245 810 1110 66 8">
    <rect x="245" y="810" width="1110" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="853" text-anchor="middle">Il programma lo decide il bando, non una banca dati non ufficiale.</text>
  </g>
    
</svg>
