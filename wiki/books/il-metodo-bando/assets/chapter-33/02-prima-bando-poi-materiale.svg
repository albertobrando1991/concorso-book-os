<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Prima il bando, poi il materiale</title>
  <desc id="desc">Se parti dal manuale, il materiale comanda il piano.</desc>
  <style>
    .bg { fill: #F8FAFC; }
    .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
    .title { font: 800 43px Arial, sans-serif; fill: #0F172A; }
    .subtitle { font: 400 21px Arial, sans-serif; fill: #526174; }
    .label { font: 800 25px Arial, sans-serif; fill: #0F172A; }
    .body { font: 400 19px Arial, sans-serif; fill: #0F172A; }
    .small { font: 400 16px Arial, sans-serif; fill: #0F172A; }
    .strong { font-weight: 800; }
    .whiteText { fill: #FFFFFF; }
    .line { stroke: #10233F; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#10233F"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <g data-safe-box="80 16 1440 118 0">
    <text class="title" x="800" y="68" text-anchor="middle">Prima il bando, poi il materiale</text>
    <text class="subtitle" x="800" y="108" text-anchor="middle">Se parti dal manuale, il materiale comanda il piano.</text>
  </g>
  
    <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
    <g data-safe-box="110 350 205 210 8">
    <rect x="110" y="350" width="205" height="210" rx="24" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <circle cx="212.5" cy="405" r="30" fill="#10233F"/>
    <text class="label whiteText" x="212.5" y="414" text-anchor="middle">1</text>
    <text class="small strong" style="fill:#10233F" x="212.5" y="468" text-anchor="middle">Bando</text>
    <text class="small" x="212.5" y="510" text-anchor="middle">materie e prove</text>
  </g>
<g data-safe-box="350 350 205 210 8">
    <rect x="350" y="350" width="205" height="210" rx="24" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
    <circle cx="452.5" cy="405" r="30" fill="#2F7D5A"/>
    <text class="label whiteText" x="452.5" y="414" text-anchor="middle">2</text>
    <text class="small strong" style="fill:#2F7D5A" x="452.5" y="468" text-anchor="middle">Decoder</text>
    <text class="small" x="452.5" y="510" text-anchor="middle">dati reali</text>
  </g>
<g data-safe-box="590 350 205 210 8">
    <rect x="590" y="350" width="205" height="210" rx="24" fill="#FFF4CC" stroke="#D4AF37" stroke-width="3"/>
    <circle cx="692.5" cy="405" r="30" fill="#D4AF37"/>
    <text class="label whiteText" x="692.5" y="414" text-anchor="middle">3</text>
    <text class="small strong" style="fill:#D4AF37" x="692.5" y="468" text-anchor="middle">Priorita</text>
    <text class="small" x="692.5" y="510" text-anchor="middle">cosa conta</text>
  </g>
<g data-safe-box="830 350 205 210 8">
    <rect x="830" y="350" width="205" height="210" rx="24" fill="#E4F4F5" stroke="#1F6F78" stroke-width="3"/>
    <circle cx="932.5" cy="405" r="30" fill="#1F6F78"/>
    <text class="label whiteText" x="932.5" y="414" text-anchor="middle">4</text>
    <text class="small strong" style="fill:#1F6F78" x="932.5" y="468" text-anchor="middle">Materiali</text>
    <text class="small" x="932.5" y="510" text-anchor="middle">solo dove serve</text>
  </g>
<g data-safe-box="1070 350 205 210 8">
    <rect x="1070" y="350" width="205" height="210" rx="24" fill="#F8E8EA" stroke="#7A2430" stroke-width="3"/>
    <circle cx="1172.5" cy="405" r="30" fill="#7A2430"/>
    <text class="label whiteText" x="1172.5" y="414" text-anchor="middle">5</text>
    <text class="small strong" style="fill:#7A2430" x="1172.5" y="468" text-anchor="middle">Piano</text>
    <text class="small" x="1172.5" y="510" text-anchor="middle">tempo e output</text>
  </g>
<g data-safe-box="1310 350 205 210 8">
    <rect x="1310" y="350" width="205" height="210" rx="24" fill="#EFEAF7" stroke="#5B3B82" stroke-width="3"/>
    <circle cx="1412.5" cy="405" r="30" fill="#5B3B82"/>
    <text class="label whiteText" x="1412.5" y="414" text-anchor="middle">6</text>
    <text class="small strong" style="fill:#5B3B82" x="1412.5" y="468" text-anchor="middle">Prova</text>
    <text class="small" x="1412.5" y="510" text-anchor="middle">risultato allenato</text>
  </g>
    <path class="line" marker-end="url(#arrow)" d="M315 455 L350 455"/>
<path class="line" marker-end="url(#arrow)" d="M555 455 L590 455"/>
<path class="line" marker-end="url(#arrow)" d="M795 455 L830 455"/>
<path class="line" marker-end="url(#arrow)" d="M1035 455 L1070 455"/>
<path class="line" marker-end="url(#arrow)" d="M1275 455 L1310 455"/>
    <g data-safe-box="430 640 740 150 8">
    <rect x="430" y="640" width="740" height="150" rx="24" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
    <rect x="430" y="640" width="740" height="12" rx="6" fill="#2F7D5A"/>
    <text class="label" x="800" y="692" text-anchor="middle">Regola pratica</text>
    <text class="small" x="800" y="722" text-anchor="middle">il piano comanda il materiale</text>
<text class="small" x="800" y="750" text-anchor="middle">non il contrario</text>
  </g>
    <g data-safe-box="245 810 1110 66 8">
    <rect x="245" y="810" width="1110" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="853" text-anchor="middle">Prima del Decoder fai solo ricognizione leggera: la scelta arriva dopo i dati del bando.</text>
  </g>
    
</svg>
