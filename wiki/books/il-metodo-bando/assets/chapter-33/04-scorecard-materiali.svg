<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Scorecard dei materiali</title>
  <desc id="desc">Prima di acquistare o mantenere, verifica i criteri centrali.</desc>
  <style>
    .bg { fill: #F8FAFC; }
    .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
    .title { font: 800 43px Arial, sans-serif; fill: #0F172A; }
    .subtitle { font: 400 21px Arial, sans-serif; fill: #526174; }
    .label { font: 800 25px Arial, sans-serif; fill: #0F172A; }
    .body { font: 400 19px Arial, sans-serif; fill: #0F172A; }
    .small { font: 400 16px Arial, sans-serif; fill: #0F172A; }
    .strong { font-weight: 800; }
    .whiteText { fill: #FFFFFF; }
    .line { stroke: #10233F; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#10233F"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <g data-safe-box="80 16 1440 118 0">
    <text class="title" x="800" y="68" text-anchor="middle">Scorecard dei materiali</text>
    <text class="subtitle" x="800" y="108" text-anchor="middle">Prima di acquistare o mantenere, verifica i criteri centrali.</text>
  </g>
  
    <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
    <g data-safe-box="165 250 360 130 8">
        <rect x="165" y="250" width="360" height="130" rx="22" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
        <text class="label" style="fill:#10233F" x="345" y="302" text-anchor="middle">Allineamento</text>
        <text class="small strong" x="345" y="342" text-anchor="middle">bando</text>
      </g>
<g data-safe-box="585 250 360 130 8">
        <rect x="585" y="250" width="360" height="130" rx="22" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
        <text class="label" style="fill:#2F7D5A" x="765" y="302" text-anchor="middle">Aggiornamento</text>
        <text class="small strong" x="765" y="342" text-anchor="middle">data</text>
      </g>
<g data-safe-box="1005 250 360 130 8">
        <rect x="1005" y="250" width="360" height="130" rx="22" fill="#FFF4CC" stroke="#D4AF37" stroke-width="3"/>
        <text class="label" style="fill:#D4AF37" x="1185" y="302" text-anchor="middle">Tracciabilita</text>
        <text class="small strong" x="1185" y="342" text-anchor="middle">fonti</text>
      </g>
<g data-safe-box="165 410 360 130 8">
        <rect x="165" y="410" width="360" height="130" rx="22" fill="#E4F4F5" stroke="#1F6F78" stroke-width="3"/>
        <text class="label" style="fill:#1F6F78" x="345" y="462" text-anchor="middle">Formato</text>
        <text class="small strong" x="345" y="502" text-anchor="middle">prova</text>
      </g>
<g data-safe-box="585 410 360 130 8">
        <rect x="585" y="410" width="360" height="130" rx="22" fill="#F8E8EA" stroke="#7A2430" stroke-width="3"/>
        <text class="label" style="fill:#7A2430" x="765" y="462" text-anchor="middle">Correzione</text>
        <text class="small strong" x="765" y="502" text-anchor="middle">errori</text>
      </g>
<g data-safe-box="1005 410 360 130 8">
        <rect x="1005" y="410" width="360" height="130" rx="22" fill="#EFEAF7" stroke="#5B3B82" stroke-width="3"/>
        <text class="label" style="fill:#5B3B82" x="1185" y="462" text-anchor="middle">Riuso</text>
        <text class="small strong" x="1185" y="502" text-anchor="middle">capitale</text>
      </g>
    <g data-safe-box="455 645 690 150 8">
    <rect x="455" y="645" width="690" height="150" rx="24" fill="#F8E8EA" stroke="#7A2430" stroke-width="3"/>
    <rect x="455" y="645" width="690" height="12" rx="6" fill="#7A2430"/>
    <text class="label" x="800" y="697" text-anchor="middle">Segnale di stop</text>
    <text class="small" x="800" y="727" text-anchor="middle">se fallisce due o tre criteri centrali</text>
<text class="small" x="800" y="755" text-anchor="middle">non e' un affare: e' distrazione</text>
  </g>
    <g data-safe-box="245 810 1110 66 8">
    <rect x="245" y="810" width="1110" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="853" text-anchor="middle">La scorecard trasforma l'acquisto emotivo in decisione di metodo.</text>
  </g>
    
</svg>
