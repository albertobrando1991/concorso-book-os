<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">La pila minima di studio</title>
  <desc id="desc">Non serve una biblioteca: serve una pila governabile.</desc>
  <style>
    .bg { fill: #F8FAFC; }
    .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
    .title { font: 800 43px Arial, sans-serif; fill: #0F172A; }
    .subtitle { font: 400 21px Arial, sans-serif; fill: #526174; }
    .label { font: 800 25px Arial, sans-serif; fill: #0F172A; }
    .body { font: 400 19px Arial, sans-serif; fill: #0F172A; }
    .small { font: 400 16px Arial, sans-serif; fill: #0F172A; }
    .strong { font-weight: 800; }
    .whiteText { fill: #FFFFFF; }
    .line { stroke: #10233F; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#10233F"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <g data-safe-box="80 16 1440 118 0">
    <text class="title" x="800" y="68" text-anchor="middle">La pila minima di studio</text>
    <text class="subtitle" x="800" y="108" text-anchor="middle">Non serve una biblioteca: serve una pila governabile.</text>
  </g>
  
    <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
    <g data-safe-box="340 240 680 70 6">
        <rect x="340" y="240" width="680" height="70" rx="20" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
        <text class="small strong" style="fill:#10233F" x="550" y="283" text-anchor="middle">Fonti ufficiali</text>
        <text class="small" x="820" y="283" text-anchor="middle">bando, avvisi, norme</text>
      </g>
<g data-safe-box="371 322 618 70 6">
        <rect x="371" y="322" width="618" height="70" rx="20" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
        <text class="small strong" style="fill:#2F7D5A" x="550" y="365" text-anchor="middle">Base ordinata</text>
        <text class="small" x="820" y="365" text-anchor="middle">manuale principale</text>
      </g>
<g data-safe-box="402 404 556 70 6">
        <rect x="402" y="404" width="556" height="70" rx="20" fill="#FFF4CC" stroke="#D4AF37" stroke-width="3"/>
        <text class="small strong" style="fill:#D4AF37" x="550" y="447" text-anchor="middle">Allenamento</text>
        <text class="small" x="820" y="447" text-anchor="middle">quiz, casi, orale</text>
      </g>
<g data-safe-box="433 486 494 70 6">
        <rect x="433" y="486" width="494" height="70" rx="20" fill="#E4F4F5" stroke="#1F6F78" stroke-width="3"/>
        <text class="small strong" style="fill:#1F6F78" x="550" y="529" text-anchor="middle">Modulo profilo</text>
        <text class="small" x="820" y="529" text-anchor="middle">cio che cambia</text>
      </g>
<g data-safe-box="464 568 432 70 6">
        <rect x="464" y="568" width="432" height="70" rx="20" fill="#F8E8EA" stroke="#7A2430" stroke-width="3"/>
        <text class="small strong" style="fill:#7A2430" x="550" y="611" text-anchor="middle">Diario e capitale</text>
        <text class="small" x="820" y="611" text-anchor="middle">errori e riuso</text>
      </g>
    <g data-safe-box="1020 315 380 250 8">
    <rect x="1020" y="315" width="380" height="250" rx="26" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <text class="label" style="fill:#10233F" x="1210" y="371" text-anchor="middle">Aggiungi solo se</text>
    <text class="small" x="1210" y="413" text-anchor="middle">copre una lacuna</text>
<text class="small" x="1210" y="447" text-anchor="middle">produce output</text>
<text class="small" x="1210" y="481" text-anchor="middle">entra nel piano</text>
  </g>
    <g data-safe-box="245 810 1110 66 8">
    <rect x="245" y="810" width="1110" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="853" text-anchor="middle">Una pila minima ben usata batte una libreria parallela che non sai governare.</text>
  </g>
    
</svg>
