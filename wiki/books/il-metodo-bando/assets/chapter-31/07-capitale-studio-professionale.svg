<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Da capitale di studio a capitale professionale</title>
  <desc id="desc">Le nozioni diventano lavoro quando aiutano a leggere atti, dati, ruoli, rischi e risultati.</desc>
  <style>
    .bg { fill: #F8FAFC; }
    .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
    .title { font: 800 43px Arial, sans-serif; fill: #0F172A; }
    .subtitle { font: 400 21px Arial, sans-serif; fill: #526174; }
    .label { font: 800 25px Arial, sans-serif; fill: #0F172A; }
    .body { font: 400 19px Arial, sans-serif; fill: #0F172A; }
    .small { font: 400 16px Arial, sans-serif; fill: #0F172A; }
    .strong { font-weight: 800; }
    .whiteText { fill: #FFFFFF; }
    .line { stroke: #10233F; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#10233F"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <g data-safe-box="80 16 1440 118 0">
    <text class="title" x="800" y="68" text-anchor="middle">Da capitale di studio a capitale professionale</text>
    <text class="subtitle" x="800" y="108" text-anchor="middle">Le nozioni diventano lavoro quando aiutano a leggere atti, dati, ruoli, rischi e risultati.</text>
  </g>

    <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
    <g data-safe-box="180 245 760 74 6">
        <rect x="180" y="245" width="760" height="74" rx="20" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
        <text class="small strong" style="fill:#10233F" x="360" y="290" text-anchor="middle">Diritto amm.</text>
        <path class="line" marker-end="url(#arrow)" d="M490 282 L590 282"/>
        <text class="small" x="760" y="290" text-anchor="middle">atti e procedimenti</text>
      </g>
<g data-safe-box="180 337 760 74 6">
        <rect x="180" y="337" width="760" height="74" rx="20" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
        <text class="small strong" style="fill:#2F7D5A" x="360" y="382" text-anchor="middle">Pubblico impiego</text>
        <path class="line" marker-end="url(#arrow)" d="M490 374 L590 374"/>
        <text class="small" x="760" y="382" text-anchor="middle">ruoli e doveri</text>
      </g>
<g data-safe-box="180 429 760 74 6">
        <rect x="180" y="429" width="760" height="74" rx="20" fill="#FFF4CC" stroke="#D4AF37" stroke-width="3"/>
        <text class="small strong" style="fill:#D4AF37" x="360" y="474" text-anchor="middle">Privacy e trasparenza</text>
        <path class="line" marker-end="url(#arrow)" d="M490 466 L590 466"/>
        <text class="small" x="760" y="474" text-anchor="middle">dati e pubblicazioni</text>
      </g>
<g data-safe-box="180 521 760 74 6">
        <rect x="180" y="521" width="760" height="74" rx="20" fill="#E4F4F5" stroke="#1F6F78" stroke-width="3"/>
        <text class="small strong" style="fill:#1F6F78" x="360" y="566" text-anchor="middle">PA digitale</text>
        <path class="line" marker-end="url(#arrow)" d="M490 558 L590 558"/>
        <text class="small" x="760" y="566" text-anchor="middle">PEC, protocollo, firme</text>
      </g>
<g data-safe-box="180 613 760 74 6">
        <rect x="180" y="613" width="760" height="74" rx="20" fill="#F8E8EA" stroke="#7A2430" stroke-width="3"/>
        <text class="small strong" style="fill:#7A2430" x="360" y="658" text-anchor="middle">Contratti e contabilita</text>
        <path class="line" marker-end="url(#arrow)" d="M490 650 L590 650"/>
        <text class="small" x="760" y="658" text-anchor="middle">vincoli e responsabilita</text>
      </g>
    <g data-safe-box="1040 325 380 285 8">
    <rect x="1040" y="325" width="380" height="285" rx="26" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <text class="label" style="fill:#10233F" x="1230" y="377" text-anchor="middle">Ogni procedura</text>
    <text class="small" x="1230" y="413" text-anchor="middle">quale fonte?</text>
<text class="small" x="1230" y="445" text-anchor="middle">chi e' responsabile?</text>
<text class="small" x="1230" y="477" text-anchor="middle">quale rischio evito?</text>
<text class="small" x="1230" y="509" text-anchor="middle">quale output produce?</text>
  </g>
    <g data-safe-box="245 810 1110 66 8">
    <rect x="245" y="810" width="1110" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="853" text-anchor="middle">La logica dei casi pratici diventa metodo di lavoro dentro l'ufficio.</text>
  </g>

</svg>
