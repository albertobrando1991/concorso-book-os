<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Cartella di ingresso</title>
  <desc id="desc">L'ordine documentale e' gia un comportamento professionale.</desc>
  <style>
