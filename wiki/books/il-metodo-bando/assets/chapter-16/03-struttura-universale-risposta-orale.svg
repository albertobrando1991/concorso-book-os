<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Struttura universale della risposta orale</title>
  <desc id="desc">Apertura, definizione, funzione, riferimento, esempio e chiusura danno ordine.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Struttura universale della risposta orale</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Apertura, definizione, funzione, riferimento, esempio e chiusura danno ordine.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="228" text-anchor="middle">Una risposta orale efficace segue una sequenza flessibile</text>
  <g data-safe-box="110 330 205 190 8">
    <rect class="softBlue" x="110" y="330" width="205" height="190" rx="24"/>
    <circle cx="212.5" cy="372" r="28" fill="#10233F"/>
    <text class="label" x="212.5" y="381" text-anchor="middle" fill="#FFFFFF">1</text>
    <text class="navy label" x="212.5" y="408" text-anchor="middle" style="font-size:19px">Apertura</text>
    <text class="muted small" x="212" y="422" text-anchor="middle" style="font-size:16px">inquadra</text>
<text class="muted small" x="212" y="449" text-anchor="middle" style="font-size:16px">la domanda</text>
  </g>
  <g data-safe-box="345 330 205 190 8">
    <rect class="softRed" x="345" y="330" width="205" height="190" rx="24"/>
    <circle cx="447.5" cy="372" r="28" fill="#7A2430"/>
    <text class="label" x="447.5" y="381" text-anchor="middle" fill="#FFFFFF">2</text>
    <text class="bordeaux label" x="447.5" y="408" text-anchor="middle" style="font-size:19px">Definizione</text>
    <text class="muted small" x="447" y="422" text-anchor="middle" style="font-size:16px">spiega</text>
<text class="muted small" x="447" y="449" text-anchor="middle" style="font-size:16px">il concetto</text>
  </g>
  <g data-safe-box="580 330 205 190 8">
    <rect class="softGold" x="580" y="330" width="205" height="190" rx="24"/>
    <circle cx="682.5" cy="372" r="28" fill="#D4AF37"/>
    <text class="label" x="682.5" y="381" text-anchor="middle" fill="#FFFFFF">3</text>
    <text class="gold label" x="682.5" y="408" text-anchor="middle" style="font-size:19px">Funzione</text>
    <text class="muted small" x="682" y="422" text-anchor="middle" style="font-size:16px">a cosa serve</text>
<text class="muted small" x="682" y="449" text-anchor="middle" style="font-size:16px">perche conta</text>
  </g>
  <g data-safe-box="815 330 205 190 8">
    <rect class="softGreen" x="815" y="330" width="205" height="190" rx="24"/>
    <circle cx="917.5" cy="372" r="28" fill="#2F7D5A"/>
    <text class="label" x="917.5" y="381" text-anchor="middle" fill="#FFFFFF">4</text>
    <text class="green label" x="917.5" y="408" text-anchor="middle" style="font-size:19px">Riferimento</text>
    <text class="muted small" x="917" y="422" text-anchor="middle" style="font-size:16px">solo se</text>
<text class="muted small" x="917" y="449" text-anchor="middle" style="font-size:16px">sicuro</text>
  </g>
  <g data-safe-box="1050 330 205 190 8">
    <rect class="softTeal" x="1050" y="330" width="205" height="190" rx="24"/>
    <circle cx="1152.5" cy="372" r="28" fill="#1F6F78"/>
    <text class="label" x="1152.5" y="381" text-anchor="middle" fill="#FFFFFF">5</text>
    <text class="teal label" x="1152.5" y="408" text-anchor="middle" style="font-size:19px">Esempio</text>
    <text class="muted small" x="1152" y="422" text-anchor="middle" style="font-size:16px">applica</text>
<text class="muted small" x="1152" y="449" text-anchor="middle" style="font-size:16px">o collega</text>
  </g>
  <g data-safe-box="1285 330 205 190 8">
    <rect class="softBlue" x="1285" y="330" width="205" height="190" rx="24"/>
    <circle cx="1387.5" cy="372" r="28" fill="#10233F"/>
    <text class="label" x="1387.5" y="381" text-anchor="middle" fill="#FFFFFF">6</text>
    <text class="navy label" x="1387.5" y="408" text-anchor="middle" style="font-size:19px">Chiusura</text>
    <text class="muted small" x="1387" y="422" text-anchor="middle" style="font-size:16px">torna alla</text>
<text class="muted small" x="1387" y="449" text-anchor="middle" style="font-size:16px">domanda</text>
  </g>
  <path class="arrowNavy" d="M315 425 L335 425"/>
  <path class="arrowBordeaux" d="M550 425 L570 425"/>
  <path class="arrowGold" d="M785 425 L805 425"/>
  <path class="arrowGreen" d="M1020 425 L1040 425"/>
  <path class="arrowTeal" d="M1255 425 L1275 425"/>
  <g data-safe-box="410 650 320 78 8">
    <rect x="410" y="650" width="320" height="78" rx="20" fill="#7A2430"/>
    <text class="label" x="570" y="681" text-anchor="middle" fill="#FFFFFF" style="font-size:19px">No discorso imparato</text>
    <text class="small" x="570" y="708" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">struttura flessibile</text>
  </g>
  <g data-safe-box="870 650 320 78 8">
    <rect x="870" y="650" width="320" height="78" rx="20" fill="#2F7D5A"/>
    <text class="label" x="1030" y="681" text-anchor="middle" fill="#FFFFFF" style="font-size:19px">No citazioni incerte</text>
    <text class="small" x="1030" y="708" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">principio prima del numero</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">La risposta orale deve partire dalla domanda, non dal capitolo studiato.</text>
  </g>

</svg>
