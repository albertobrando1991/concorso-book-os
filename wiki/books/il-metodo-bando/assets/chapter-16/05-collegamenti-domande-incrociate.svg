<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Collegamenti e domande incrociate</title>
  <desc id="desc">La commissione puo spostare il fuoco: rispondi al punto e apri un ponte breve.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Collegamenti e domande incrociate</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">La commissione puo spostare il fuoco: rispondi al punto e apri un ponte breve.</text>

  <rect class="card" x="80" y="165" width="1440" height="630" rx="30"/>
  <text class="navy label" x="800" y="228" text-anchor="middle">Il follow-up non rompe la risposta: cambia il punto da servire</text>
  <g data-safe-box="625 315 350 150 8">
    <rect class="softBlue" x="625" y="315" width="350" height="150" rx="22"/>
    <rect x="625" y="315" width="350" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="800" y="357" text-anchor="middle" style="font-size:22px">Domanda principale</text>
    <text class="muted small" x="800" y="389" text-anchor="middle" style="font-size:18px">rispondi prima</text>
<text class="muted small" x="800" y="414" text-anchor="middle" style="font-size:18px">poi apri un ponte</text>
  </g>
  <g data-safe-box="165 305 230 98 8">
    <rect x="165" y="305" width="230" height="98" rx="22" fill="#2F7D5A"/>
    <text class="label" x="280" y="343" text-anchor="middle" fill="#FFFFFF" style="font-size:22px">Esempio</text>
    <text class="small" x="280" y="373" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">caso semplice</text>
  </g>
  <g data-safe-box="285 560 250 98 8">
    <rect x="285" y="560" width="250" height="98" rx="22" fill="#7A2430"/>
    <text class="label" x="410" y="598" text-anchor="middle" fill="#FFFFFF" style="font-size:22px">Differenza</text>
    <text class="small" x="410" y="628" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">oggetto, funzione, effetti</text>
  </g>
  <g data-safe-box="675 610 250 98 8">
    <rect x="675" y="610" width="250" height="98" rx="22" fill="#D4AF37"/>
    <text class="label" x="800" y="648" text-anchor="middle" fill="#FFFFFF" style="font-size:22px">Collegamento</text>
    <text class="small" x="800" y="678" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">ponte breve</text>
  </g>
  <g data-safe-box="1065 560 250 98 8">
    <rect x="1065" y="560" width="250" height="98" rx="22" fill="#1F6F78"/>
    <text class="label" x="1190" y="598" text-anchor="middle" fill="#FFFFFF" style="font-size:22px">Caso nuovo</text>
    <text class="small" x="1190" y="628" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">applica la regola</text>
  </g>
  <g data-safe-box="1205 305 230 98 8">
    <rect x="1205" y="305" width="230" height="98" rx="22" fill="#10233F"/>
    <text class="label" x="1320" y="343" text-anchor="middle" fill="#FFFFFF" style="font-size:22px">Precisione</text>
    <text class="small" x="1320" y="373" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">stringi il punto</text>
  </g>
  <path class="arrowGreen" d="M395 350 L615 370"/>
  <path class="arrowBordeaux" d="M535 600 L650 465"/>
  <path class="arrowGold" d="M800 610 L800 475"/>
  <path class="arrowTeal" d="M1065 600 L950 465"/>
  <path class="arrowNavy" d="M1205 350 L985 370"/>
  <g data-safe-box="165 705 340 78 8">
    <rect x="165" y="705" width="340" height="78" rx="20" fill="#1F6F78"/>
    <text class="label" x="335" y="736" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">Formula ponte</text>
    <text class="small" x="335" y="763" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">Si collega a..., perche...</text>
  </g>
  <g data-safe-box="1085 705 340 78 8">
    <rect x="1085" y="705" width="340" height="78" rx="20" fill="#2F7D5A"/>
    <text class="label" x="1255" y="736" text-anchor="middle" fill="#FFFFFF" style="font-size:19px">Regola di tenuta</text>
    <text class="small" x="1255" y="763" text-anchor="middle" fill="#FFFFFF" style="font-size:14px">ascolta, rispondi, torna al punto</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:19px">Il collegamento non deve diventare fuga: una frase basta se la domanda principale e' servita.</text>
  </g>

</svg>
