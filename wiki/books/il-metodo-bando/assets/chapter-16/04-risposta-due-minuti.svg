<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Risposta orale in due minuti</title>
  <desc id="desc">Il timer obbliga a selezionare il nucleo e a chiudere senza dispersione.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Risposta orale in due minuti</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Il timer obbliga a selezionare il nucleo e a chiudere senza dispersione.</text>

  <rect class="card" x="90" y="165" width="1420" height="630" rx="30"/>
  <text class="navy label" x="800" y="228" text-anchor="middle">Centoventi secondi bastano per una risposta completa e proporzionata</text>
  <g data-safe-box="145 312 260 153 8">
    <rect class="softBlue" x="145" y="320" width="260" height="145" rx="20"/>
    <rect x="145" y="320" width="260" height="38" rx="18" fill="#10233F"/>
    <text class="label" x="275" y="348" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">0-20 s</text>
    <text class="navy label" x="275" y="402" text-anchor="middle" style="font-size:21px">Inquadra</text>
    <text class="muted small" x="275" y="433" text-anchor="middle" style="font-size:16px">domanda e definizione</text>
  </g>
  <g data-safe-box="455 312 260 153 8">
    <rect class="softRed" x="455" y="320" width="260" height="145" rx="20"/>
    <rect x="455" y="320" width="260" height="38" rx="18" fill="#7A2430"/>
    <text class="label" x="585" y="348" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">20-60 s</text>
    <text class="bordeaux label" x="585" y="402" text-anchor="middle" style="font-size:21px">Sviluppa</text>
    <text class="muted small" x="585" y="433" text-anchor="middle" style="font-size:16px">elementi principali</text>
  </g>
  <g data-safe-box="765 312 260 153 8">
    <rect class="softGold" x="765" y="320" width="260" height="145" rx="20"/>
    <rect x="765" y="320" width="260" height="38" rx="18" fill="#D4AF37"/>
    <text class="label" x="895" y="348" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">60-100 s</text>
    <text class="gold label" x="895" y="402" text-anchor="middle" style="font-size:21px">Collega</text>
    <text class="muted small" x="895" y="433" text-anchor="middle" style="font-size:16px">esempio o ponte</text>
  </g>
  <g data-safe-box="1075 312 260 153 8">
    <rect class="softGreen" x="1075" y="320" width="260" height="145" rx="20"/>
    <rect x="1075" y="320" width="260" height="38" rx="18" fill="#2F7D5A"/>
    <text class="label" x="1205" y="348" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">100-120 s</text>
    <text class="green label" x="1205" y="402" text-anchor="middle" style="font-size:21px">Chiudi</text>
    <text class="muted small" x="1205" y="433" text-anchor="middle" style="font-size:16px">risposta al punto</text>
  </g>
  <path class="arrowNavy" d="M420 400 L445 400"/>
  <path class="arrowBordeaux" d="M730 400 L755 400"/>
  <path class="arrowGold" d="M1040 400 L1065 400"/>
  <g data-safe-box="245 610 430 181 8">
    <rect class="softBlue" x="245" y="610" width="430" height="181" rx="22"/>
    <rect x="245" y="610" width="430" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="460" y="652" text-anchor="middle" style="font-size:24px">Partenze utili</text>
    <path class="thin" d="M269 670 L651 670"/>
    <text class="muted small" x="275" y="690" style="font-size:17px">Il tema si inquadra...</text>
<text class="muted small" x="275" y="721" style="font-size:17px">La distinzione principale e...</text>
<text class="muted small" x="275" y="752" style="font-size:17px">Nel caso occorre considerare...</text>
  </g>
  <g data-safe-box="925 610 430 181 8">
    <rect class="softRed" x="925" y="610" width="430" height="181" rx="22"/>
    <rect x="925" y="610" width="430" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="1140" y="652" text-anchor="middle" style="font-size:21px">Partenze da evitare</text>
    <path class="thin" d="M949 670 L1331 670"/>
    <text class="muted small" x="955" y="690" style="font-size:17px">E' una cosa importante...</text>
<text class="muted small" x="955" y="721" style="font-size:17px">Non ricordo bene...</text>
<text class="muted small" x="955" y="752" style="font-size:17px">Dipende... senza spiegare</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">Se non riesci a chiudere in due minuti, non hai ancora isolato il nucleo.</text>
  </g>

</svg>
