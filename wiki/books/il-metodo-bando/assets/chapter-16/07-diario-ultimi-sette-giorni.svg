<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Diario orale e ultimi sette giorni</title>
  <desc id="desc">Correggi durata, chiarezza, esempi e logistica prima della prova.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Diario orale e ultimi sette giorni</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Correggi durata, chiarezza, esempi e logistica prima della prova.</text>

  <rect class="card" x="90" y="165" width="1420" height="630" rx="30"/>
  <text class="navy label" x="800" y="228" text-anchor="middle">Il diario orale trasforma ogni simulazione in correzione mirata</text>
  <g data-safe-box="140 305 230 160 8">
    <rect class="softBlue" x="140" y="305" width="230" height="160" rx="22"/>
    <text class="navy label" x="255" y="347" text-anchor="middle" style="font-size:21px">Simula</text>
    <text class="muted small" x="255" y="383" text-anchor="middle" style="font-size:17px">domanda</text>
<text class="muted small" x="255" y="410" text-anchor="middle" style="font-size:17px">timer</text>
  </g>
  <g data-safe-box="445 305 230 160 8">
    <rect class="softRed" x="445" y="305" width="230" height="160" rx="22"/>
    <text class="bordeaux label" x="560" y="347" text-anchor="middle" style="font-size:21px">Registra</text>
    <text class="muted small" x="560" y="383" text-anchor="middle" style="font-size:17px">durata</text>
<text class="muted small" x="560" y="410" text-anchor="middle" style="font-size:17px">chiarezza</text>
  </g>
  <g data-safe-box="750 305 230 160 8">
    <rect class="softGold" x="750" y="305" width="230" height="160" rx="22"/>
    <text class="gold label" x="865" y="347" text-anchor="middle" style="font-size:21px">Classifica</text>
    <text class="muted small" x="865" y="383" text-anchor="middle" style="font-size:17px">problema</text>
<text class="muted small" x="865" y="410" text-anchor="middle" style="font-size:17px">categoria</text>
  </g>
  <g data-safe-box="1055 305 230 160 8">
    <rect class="softGreen" x="1055" y="305" width="230" height="160" rx="22"/>
    <text class="green label" x="1170" y="347" text-anchor="middle" style="font-size:21px">Correggi</text>
    <text class="muted small" x="1170" y="383" text-anchor="middle" style="font-size:17px">prossima</text>
<text class="muted small" x="1170" y="410" text-anchor="middle" style="font-size:17px">azione</text>
  </g>
  <path class="arrowNavy" d="M385 385 L435 385"/>
  <path class="arrowBordeaux" d="M690 385 L740 385"/>
  <path class="arrowGold" d="M995 385 L1045 385"/>
  <path class="arrowGreen" d="M1170 465 C1040 570 520 570 255 465"/>
  <g data-safe-box="155 630 140 78 8">
    <rect class="softTeal" x="155" y="630" width="140" height="78" rx="18"/>
    <text class="teal label" x="225" y="661" text-anchor="middle" style="font-size:20px">-7/-6</text>
    <text class="muted small" x="225" y="687" text-anchor="middle" style="font-size:14px">mappa nuclei</text>
  </g>
  <g data-safe-box="325 630 140 78 8">
    <rect class="softTeal" x="325" y="630" width="140" height="78" rx="18"/>
    <text class="teal label" x="395" y="661" text-anchor="middle" style="font-size:20px">-5</text>
    <text class="muted small" x="395" y="687" text-anchor="middle" style="font-size:14px">simulazione</text>
  </g>
  <g data-safe-box="495 630 140 78 8">
    <rect class="softTeal" x="495" y="630" width="140" height="78" rx="18"/>
    <text class="teal label" x="565" y="661" text-anchor="middle" style="font-size:20px">-4</text>
    <text class="muted small" x="565" y="687" text-anchor="middle" style="font-size:14px">definizioni</text>
  </g>
  <g data-safe-box="665 630 140 78 8">
    <rect class="softTeal" x="665" y="630" width="140" height="78" rx="18"/>
    <text class="teal label" x="735" y="661" text-anchor="middle" style="font-size:20px">-3</text>
    <text class="muted small" x="735" y="687" text-anchor="middle" style="font-size:14px">casi e ponti</text>
  </g>
  <g data-safe-box="835 630 140 78 8">
    <rect class="softTeal" x="835" y="630" width="140" height="78" rx="18"/>
    <text class="teal label" x="905" y="661" text-anchor="middle" style="font-size:20px">-2</text>
    <text class="muted small" x="905" y="687" text-anchor="middle" style="font-size:14px">lingua e digitale</text>
  </g>
  <g data-safe-box="1005 630 140 78 8">
    <rect class="softTeal" x="1005" y="630" width="140" height="78" rx="18"/>
    <text class="teal label" x="1075" y="661" text-anchor="middle" style="font-size:20px">-1</text>
    <text class="muted small" x="1075" y="687" text-anchor="middle" style="font-size:14px">logistica</text>
  </g>
  <g data-safe-box="1175 630 140 78 8">
    <rect class="softTeal" x="1175" y="630" width="140" height="78" rx="18"/>
    <text class="teal label" x="1245" y="661" text-anchor="middle" style="font-size:20px">prova</text>
    <text class="muted small" x="1245" y="687" text-anchor="middle" style="font-size:14px">ascolto e calma</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">Negli ultimi sette giorni non aprire nuovi mondi: consolida, simula e arriva lucido.</text>
  </g>

</svg>
