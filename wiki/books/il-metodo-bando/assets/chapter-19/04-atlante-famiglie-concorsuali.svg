<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Atlante operativo delle famiglie</title>
  <desc id="desc">Le famiglie sono categorie di lavoro: non etichette ufficiali rigide.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/></marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/></marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Atlante operativo delle famiglie</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Le famiglie sono categorie di lavoro: non etichette ufficiali rigide.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="228" text-anchor="middle">Raggruppa per contesto, rischio e modulo da aggiungere</text>
  <g data-safe-box="115 260 405 155 8">
    <rect class="softBlue" x="115" y="260" width="405" height="155" rx="23"/>
    <rect x="115" y="260" width="405" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="317.5" y="305" text-anchor="middle" style="font-size:21px">Base amministrativa</text>
    <path class="thin" d="M145 328 L490 328"/>
    <text class="muted small" x="317.5" y="368" text-anchor="middle" style="font-size:16px">amm. generale, contabile, enti locali</text>
  </g>
<g data-safe-box="600 260 405 155 8">
    <rect class="softRed" x="600" y="260" width="405" height="155" rx="23"/>
    <rect x="600" y="260" width="405" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="802.5" y="305" text-anchor="middle" style="font-size:21px">Centrale e giustizia</text>
    <path class="thin" d="M630 328 L975 328"/>
    <text class="muted small" x="802.5" y="368" text-anchor="middle" style="font-size:16px">ministeri, funzioni centrali, giustizia</text>
  </g>
<g data-safe-box="1085 260 405 155 8">
    <rect class="softGold" x="1085" y="260" width="405" height="155" rx="23"/>
    <rect x="1085" y="260" width="405" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="1287.5" y="305" text-anchor="middle" style="font-size:21px">Specialistiche forti</text>
    <path class="thin" d="M1115 328 L1460 328"/>
    <text class="muted small" x="1287.5" y="368" text-anchor="middle" style="font-size:16px">fiscale, lavoro, previdenza, vigilanza</text>
  </g>
<g data-safe-box="115 485 405 155 8">
    <rect class="softGreen" x="115" y="485" width="405" height="155" rx="23"/>
    <rect x="115" y="485" width="405" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="317.5" y="530" text-anchor="middle" style="font-size:21px">Tecniche e digitali</text>
    <path class="thin" d="M145 553 L490 553"/>
    <text class="muted small" x="317.5" y="593" text-anchor="middle" style="font-size:16px">tecnici PA, ICT, digitale, cybersecurity</text>
  </g>
<g data-safe-box="600 485 405 155 8">
    <rect class="softTeal" x="600" y="485" width="405" height="155" rx="23"/>
    <rect x="600" y="485" width="405" height="10" rx="5" fill="#1F6F78"/>
    <text class="teal label" x="802.5" y="530" text-anchor="middle" style="font-size:21px">Servizi territoriali</text>
    <path class="thin" d="M630 553 L975 553"/>
    <text class="muted small" x="802.5" y="593" text-anchor="middle" style="font-size:16px">polizia locale, sanita, scuola, universita</text>
  </g>
<g data-safe-box="1085 485 405 155 8">
    <rect class="softBlue" x="1085" y="485" width="405" height="155" rx="23"/>
    <rect x="1085" y="485" width="405" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="1287.5" y="530" text-anchor="middle" style="font-size:21px">Progetti e carriere</text>
    <path class="thin" d="M1115 553 L1460 553"/>
    <text class="muted small" x="1287.5" y="593" text-anchor="middle" style="font-size:16px">PNRR, appalti, UE, dirigenza, speciali</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">Le famiglie sono mappe operative: il bando resta la fonte che decide dettaglio e priorita.</text>
  </g>

</svg>
