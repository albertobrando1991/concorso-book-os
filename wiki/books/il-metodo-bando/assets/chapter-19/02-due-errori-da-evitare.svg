<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Due errori opposti da evitare</title>
  <desc id="desc">Tutto uguale disperde il profilo; tutto diverso spreca capitale di studio.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/></marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/></marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Due errori opposti da evitare</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Tutto uguale disperde il profilo; tutto diverso spreca capitale di studio.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <g data-safe-box="135 245 560 315 8">
    <rect class="softRed" x="135" y="245" width="560" height="315" rx="28"/>
    <rect x="135" y="245" width="560" height="11" rx="5.5" fill="#7A2430"/>
    <text class="bordeaux label" x="415" y="297" text-anchor="middle">Tutti uguali</text>
    <path class="thin" d="M175 315 L655 315"/>
    <text class="muted small" x="415" y="345" text-anchor="middle">preparazione generica</text>
<text class="muted small" x="415" y="379" text-anchor="middle">profilo ignorato</text>
<text class="muted small" x="415" y="413" text-anchor="middle">materia killer scoperta tardi</text>
  </g>
  <g data-safe-box="650 360 300 150 8">
    <rect x="650" y="360" width="300" height="150" rx="32" fill="#10233F"/>
    <text class="label" x="800" y="412" text-anchor="middle" fill="#FFFFFF">Equilibrio</text>
    <text class="small" x="800" y="448" text-anchor="middle" fill="#FFFFFF">nucleo comune</text>
<text class="small" x="800" y="476" text-anchor="middle" fill="#FFFFFF">+ modulo profilo</text>
  </g>
  <g data-safe-box="905 245 560 315 8">
    <rect class="softGold" x="905" y="245" width="560" height="315" rx="28"/>
    <rect x="905" y="245" width="560" height="11" rx="5.5" fill="#D4AF37"/>
    <text class="gold label" x="1185" y="297" text-anchor="middle">Tutti diversi</text>
    <path class="thin" d="M945 315 L1425 315"/>
    <text class="muted small" x="1185" y="345" text-anchor="middle">si ricomincia da zero</text>
<text class="muted small" x="1185" y="379" text-anchor="middle">materiali moltiplicati</text>
<text class="muted small" x="1185" y="413" text-anchor="middle">capitale gia studiato disperso</text>
  </g>
  <path class="arrowBordeaux" d="M705 420 L640 420"/>
  <path class="arrowGold" d="M895 420 L960 420"/>
  <g data-safe-box="205 675 330 78 8">
    <rect x="205" y="675" width="330" height="78" rx="20" fill="#7A2430"/>
    <text class="label" x="370" y="706" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Errore</text>
    <text class="small" x="370" y="733" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">stesso piano per ogni bando</text>
  </g>
  <g data-safe-box="1035 675 330 78 8">
    <rect x="1035" y="675" width="330" height="78" rx="20" fill="#D4AF37"/>
    <text class="label" x="1200" y="706" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Errore</text>
    <text class="small" x="1200" y="733" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">nessun riuso strategico</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">La risposta corretta sta in mezzo: riusa la base, ma cambia priorita, linguaggio e prova.</text>
  </g>

</svg>
