<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Caso guidato: tre bandi aperti</title>
  <desc id="desc">Stesso nucleo comune, tre moduli diversi e tre rischi da pesare.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/></marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/></marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Caso guidato: tre bandi aperti</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Stesso nucleo comune, tre moduli diversi e tre rischi da pesare.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="228" text-anchor="middle">Tre bandi, una base comune, moduli separati</text>
  <g data-safe-box="120 300 405 250 8">
    <rect class="softBlue" x="120" y="300" width="405" height="250" rx="25"/>
    <rect x="120" y="300" width="405" height="11" rx="5.5" fill="#10233F"/>
    <text class="navy label" x="322.5" y="350" text-anchor="middle" style="font-size:23px">Comune contabile</text>
    <path class="thin" d="M155 372 L490 372"/>
    <text class="muted small" x="322.5" y="400" text-anchor="middle">enti locali</text>
<text class="muted small" x="322.5" y="436" text-anchor="middle">bilancio, atti</text>
<text class="muted small" x="322.5" y="472" text-anchor="middle">rischio: contabilita tardi</text>
  </g>
  <g data-safe-box="575 300 405 250 8">
    <rect class="softRed" x="575" y="300" width="405" height="250" rx="25"/>
    <rect x="575" y="300" width="405" height="11" rx="5.5" fill="#7A2430"/>
    <text class="bordeaux label" x="777.5" y="350" text-anchor="middle" style="font-size:23px">Agenzia fiscale</text>
    <path class="thin" d="M610 372 L945 372"/>
    <text class="muted small" x="777.5" y="400" text-anchor="middle">organizzazione agenzia</text>
<text class="muted small" x="777.5" y="436" text-anchor="middle">tributario</text>
<text class="muted small" x="777.5" y="472" text-anchor="middle">rischio: modulo killer</text>
  </g>
  <g data-safe-box="1030 300 405 250 8">
    <rect class="softGreen" x="1030" y="300" width="405" height="250" rx="25"/>
    <rect x="1030" y="300" width="405" height="11" rx="5.5" fill="#2F7D5A"/>
    <text class="green label" x="1232.5" y="350" text-anchor="middle" style="font-size:23px">Universita</text>
    <path class="thin" d="M1065 372 L1400 372"/>
    <text class="muted small" x="1232.5" y="400" text-anchor="middle">segreterie e studenti</text>
<text class="muted small" x="1232.5" y="436" text-anchor="middle">ordinamento settore</text>
<text class="muted small" x="1232.5" y="472" text-anchor="middle">rischio: contesto ignorato</text>
  </g>
  <path class="dash" d="M180 615 L1420 615"/>
  <g data-safe-box="270 665 290 78 8">
    <rect x="270" y="665" width="290" height="78" rx="20" fill="#10233F"/>
    <text class="label" x="415" y="696" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Base comune</text>
    <text class="small" x="415" y="723" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">amministrativo, impiego</text>
  </g>
  <g data-safe-box="635 665 290 78 8">
    <rect x="635" y="665" width="290" height="78" rx="20" fill="#D4AF37"/>
    <text class="label" x="780" y="696" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Pesatura</text>
    <text class="small" x="780" y="723" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">prove e punteggi</text>
  </g>
  <g data-safe-box="1000 665 290 78 8">
    <rect x="1000" y="665" width="290" height="78" rx="20" fill="#2F7D5A"/>
    <text class="label" x="1145" y="696" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Blocchi separati</text>
    <text class="small" x="1145" y="723" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">moduli etichettati</text>
  </g>

</svg>
