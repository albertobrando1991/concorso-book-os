<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Nucleo comune e modulo profilo</title>
  <desc id="desc">La base riutilizzabile non sostituisce il modulo che decide il punteggio.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/></marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/></marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Nucleo comune e modulo profilo</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">La base riutilizzabile non sostituisce il modulo che decide il punteggio.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <g data-safe-box="135 260 430 455 8">
    <rect class="softBlue" x="135" y="260" width="430" height="455" rx="28"/>
    <rect x="135" y="260" width="430" height="11" rx="5.5" fill="#10233F"/>
    <text class="navy label" x="350" y="315" text-anchor="middle">Nucleo comune</text>
    <path class="thin" d="M173 338 L527 338"/>
    <text class="muted small" x="350" y="370" text-anchor="middle">amministrativo</text>
<text class="muted small" x="350" y="412" text-anchor="middle">pubblico impiego</text>
<text class="muted small" x="350" y="454" text-anchor="middle">trasparenza, privacy</text>
<text class="muted small" x="350" y="496" text-anchor="middle">informatica, inglese</text>
<text class="muted small" x="350" y="538" text-anchor="middle">quiz, scritto, orale</text>
  </g>
  <g data-safe-box="600 260 430 455 8">
    <rect class="softRed" x="600" y="260" width="430" height="455" rx="28"/>
    <rect x="600" y="260" width="430" height="11" rx="5.5" fill="#7A2430"/>
    <text class="bordeaux label" x="815" y="315" text-anchor="middle">Modulo profilo</text>
    <path class="thin" d="M638 338 L992 338"/>
    <text class="muted small" x="815" y="370" text-anchor="middle">tributario</text>
<text class="muted small" x="815" y="412" text-anchor="middle">bilancio</text>
<text class="muted small" x="815" y="454" text-anchor="middle">codice strada</text>
<text class="muted small" x="815" y="496" text-anchor="middle">sanita, scuola</text>
<text class="muted small" x="815" y="538" text-anchor="middle">tecnico o ICT</text>
  </g>
  <g data-safe-box="1065 260 430 455 8">
    <rect class="softGreen" x="1065" y="260" width="430" height="455" rx="28"/>
    <rect x="1065" y="260" width="430" height="11" rx="5.5" fill="#2F7D5A"/>
    <text class="green label" x="1280" y="315" text-anchor="middle">Output di prova</text>
    <path class="thin" d="M1103 338 L1457 338"/>
    <text class="muted small" x="1280" y="370" text-anchor="middle">quiz a tempo</text>
<text class="muted small" x="1280" y="412" text-anchor="middle">risposta breve</text>
<text class="muted small" x="1280" y="454" text-anchor="middle">caso pratico</text>
<text class="muted small" x="1280" y="496" text-anchor="middle">orale</text>
<text class="muted small" x="1280" y="538" text-anchor="middle">prova pratica</text>
  </g>
  <path class="arrowNavy" d="M575 445 L590 445"/>
  <path class="arrowBordeaux" d="M1040 445 L1055 445"/>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">Il nucleo comune riduce dispersione; il modulo profilo impedisce di arrivare generici.</text>
  </g>

</svg>
