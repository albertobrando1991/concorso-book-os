<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="880" viewBox="0 0 1600 880" role="img" aria-labelledby="title desc">
  <title id="title">Competenza, cassa e residui</title>
  <desc id="desc">Schema per distinguere competenza, cassa, residui attivi e passivi, FPV e FCDE.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .ink { fill: #172233; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 46px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 24px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 27px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 21px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 19px; }
      .card { fill: #ffffff; stroke: #cfd8e3; stroke-width: 3; }
      .chip { fill: #eef4fb; stroke: #c5d7ea; stroke-width: 2.5; }
      .note { fill: #fff7ed; stroke: #e7c18e; stroke-width: 2.5; }
      .warn { fill: #f7e0de; stroke: #d4a2a0; stroke-width: 2.5; }
      .blue { fill: #1f4e79; }
      .green { fill: #2f7d5a; }
      .amber { fill: #b7791f; }
      .red { fill: #a94442; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="880"/>
  <text class="ink title" x="800" y="70" text-anchor="middle">Competenza, cassa e residui</text>
  <text class="muted subtitle" x="800" y="110" text-anchor="middle">La gestione si legge distinguendo diritto, movimento di denaro e fine esercizio.</text>

  <g transform="translate(120 190)">
    <rect class="card" width="400" height="190" rx="22"/>
    <text class="blue label" x="200" y="52" text-anchor="middle">Competenza</text>
    <text class="muted body" x="200" y="92" text-anchor="middle">quando nasce o si imputa</text>
    <text class="muted body" x="200" y="124" text-anchor="middle">l'obbligazione</text>
    <rect class="chip" x="70" y="145" width="260" height="34" rx="14"/>
    <text class="blue small" x="200" y="168" text-anchor="middle" style="font-weight:800;">accertamento / impegno</text>
  </g>

  <g transform="translate(600 190)">
    <rect class="card" width="400" height="190" rx="22"/>
    <text class="green label" x="200" y="52" text-anchor="middle">Cassa</text>
    <text class="muted body" x="200" y="92" text-anchor="middle">quando il denaro entra</text>
    <text class="muted body" x="200" y="124" text-anchor="middle">o viene pagato</text>
    <rect class="chip" x="70" y="145" width="260" height="34" rx="14"/>
    <text class="green small" x="200" y="168" text-anchor="middle" style="font-weight:800;">riscossione / pagamento</text>
  </g>

  <g transform="translate(1080 190)">
    <rect class="card" width="400" height="190" rx="22"/>
    <text class="amber label" x="200" y="52" text-anchor="middle">Residui</text>
    <text class="muted body" x="200" y="92" text-anchor="middle">operazioni nate ma</text>
    <text class="muted body" x="200" y="124" text-anchor="middle">non concluse in cassa</text>
    <rect class="chip" x="70" y="145" width="260" height="34" rx="14"/>
    <text class="amber small" x="200" y="168" text-anchor="middle" style="font-weight:800;">attivi / passivi</text>
  </g>

  <g transform="translate(200 500)">
    <rect class="note" width="500" height="145" rx="24"/>
    <text class="amber label" x="250" y="45" text-anchor="middle">FPV</text>
    <text class="muted body" x="250" y="82" text-anchor="middle">risorse già accertate</text>
    <text class="muted body" x="250" y="114" text-anchor="middle">per spese esigibili dopo</text>
  </g>

  <g transform="translate(900 500)">
    <rect class="warn" width="500" height="145" rx="24"/>
    <text class="red label" x="250" y="45" text-anchor="middle">FCDE</text>
    <text class="muted body" x="250" y="82" text-anchor="middle">accantonamento prudenziale</text>
    <text class="muted body" x="250" y="114" text-anchor="middle">per crediti difficili</text>
  </g>

  <rect class="chip" x="260" y="735" width="1080" height="64" rx="24"/>
  <text class="blue" x="800" y="776" text-anchor="middle" style="font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:23px;font-weight:800;">Errore da evitare: residui, avanzo, FPV e FCDE non sono sinonimi.</text>
</svg>
