<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Dal punteggio al diario errori</title>
  <desc id="desc">La simulazione vale solo se produce categorie di errore, drill mirato e nuova decisione.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Dal punteggio al diario errori</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">La simulazione vale solo se produce categorie di errore, drill mirato e nuova decisione.</text>

  <rect class="card" x="90" y="165" width="1420" height="630" rx="30"/>
  <text class="navy label" x="800" y="228" text-anchor="middle">Il punteggio e' un risultato; il diario spiega il processo</text>
  <g data-safe-box="130 330 250 160 8">
    <rect class="softBlue" x="130" y="330" width="250" height="160" rx="22"/>
    <text class="navy label" x="255" y="372" text-anchor="middle" style="font-size:22px">Simulazione</text>
    <text class="muted small" x="255" y="408" text-anchor="middle" style="font-size:17px">timer</text>
<text class="muted small" x="255" y="435" text-anchor="middle" style="font-size:17px">numero reale</text>
  </g>
  <g data-safe-box="420 330 250 160 8">
    <rect class="softRed" x="420" y="330" width="250" height="160" rx="22"/>
    <text class="bordeaux label" x="545" y="372" text-anchor="middle" style="font-size:22px">Punteggio</text>
    <text class="muted small" x="545" y="408" text-anchor="middle" style="font-size:17px">corrette</text>
<text class="muted small" x="545" y="435" text-anchor="middle" style="font-size:17px">errate, omesse</text>
  </g>
  <g data-safe-box="710 330 250 160 8">
    <rect class="softGold" x="710" y="330" width="250" height="160" rx="22"/>
    <text class="gold label" x="835" y="372" text-anchor="middle" style="font-size:22px">Categorie</text>
    <text class="muted small" x="835" y="408" text-anchor="middle" style="font-size:17px">memoria, concetto</text>
<text class="muted small" x="835" y="435" text-anchor="middle" style="font-size:17px">lettura, tempo</text>
  </g>
  <g data-safe-box="1000 330 250 160 8">
    <rect class="softGreen" x="1000" y="330" width="250" height="160" rx="22"/>
    <text class="green label" x="1125" y="372" text-anchor="middle" style="font-size:22px">Drill</text>
    <text class="muted small" x="1125" y="408" text-anchor="middle" style="font-size:17px">15-30 minuti</text>
<text class="muted small" x="1125" y="435" text-anchor="middle" style="font-size:17px">una causa</text>
  </g>
  <g data-safe-box="1290 330 180 160 8">
    <rect class="softTeal" x="1290" y="330" width="180" height="160" rx="22"/>
    <text class="teal label" x="1380" y="372" text-anchor="middle" style="font-size:22px">Prossima</text>
    <text class="muted small" x="1380" y="408" text-anchor="middle" style="font-size:17px">regola</text>
<text class="muted small" x="1380" y="435" text-anchor="middle" style="font-size:17px">test</text>
  </g>
  <path class="arrowNavy" d="M390 410 L410 410"/>
  <path class="arrowBordeaux" d="M680 410 L700 410"/>
  <path class="arrowGold" d="M970 410 L990 410"/>
  <path class="arrowGreen" d="M1260 410 L1280 410"/>
  <g data-safe-box="190 635 200 78 8">
    <rect x="190" y="635" width="200" height="78" rx="20" fill="#10233F"/>
    <text class="label" x="290" y="666" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">Memoria</text>
    <text class="small" x="290" y="693" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">flashcard</text>
  </g>
  <g data-safe-box="440 635 200 78 8">
    <rect x="440" y="635" width="200" height="78" rx="20" fill="#7A2430"/>
    <text class="label" x="540" y="666" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">Concetto</text>
    <text class="small" x="540" y="693" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">tabella</text>
  </g>
  <g data-safe-box="690 635 200 78 8">
    <rect x="690" y="635" width="200" height="78" rx="20" fill="#D4AF37"/>
    <text class="label" x="790" y="666" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">Lettura</text>
    <text class="small" x="790" y="693" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">routine lenta</text>
  </g>
  <g data-safe-box="940 635 200 78 8">
    <rect x="940" y="635" width="200" height="78" rx="20" fill="#2F7D5A"/>
    <text class="label" x="1040" y="666" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">Tempo</text>
    <text class="small" x="1040" y="693" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">soglia stop</text>
  </g>
  <g data-safe-box="1190 635 200 78 8">
    <rect x="1190" y="635" width="200" height="78" rx="20" fill="#1F6F78"/>
    <text class="label" x="1290" y="666" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">Strategia</text>
    <text class="small" x="1290" y="693" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">tre giri</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">Una simulazione senza correzione e' consumo di domande, non allenamento.</text>
  </g>

</svg>
