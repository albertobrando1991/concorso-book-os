<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Scheda tecnica della prova</title>
  <desc id="desc">Prima di allenarti devi conoscere tempo medio, soglia, punteggio e penalita.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Scheda tecnica della prova</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Prima di allenarti devi conoscere tempo medio, soglia, punteggio e penalita.</text>

  <rect class="card" x="80" y="170" width="1440" height="625" rx="30"/>
  <text class="navy label" x="800" y="225" text-anchor="middle">Compila questi dati prima di fare la prima simulazione</text>
  <g data-safe-box="115 255 320 130 8">
    <rect class="softBlue" x="115" y="255" width="320" height="130" rx="22"/>
    <rect x="115" y="255" width="320" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="275" y="297" text-anchor="middle" style="font-size:25px">Domande</text>
    <text class="muted small" x="275" y="329" text-anchor="middle" style="font-size:18px">quante e di che tipo</text>
  </g>
<g data-safe-box="480 255 320 130 8">
    <rect class="softRed" x="480" y="255" width="320" height="130" rx="22"/>
    <rect x="480" y="255" width="320" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="640" y="297" text-anchor="middle" style="font-size:25px">Tempo</text>
    <text class="muted small" x="640" y="329" text-anchor="middle" style="font-size:18px">medio e soglia stop</text>
  </g>
<g data-safe-box="845 255 320 130 8">
    <rect class="softGold" x="845" y="255" width="320" height="130" rx="22"/>
    <rect x="845" y="255" width="320" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="1005" y="297" text-anchor="middle" style="font-size:25px">Materie</text>
    <text class="muted small" x="1005" y="329" text-anchor="middle" style="font-size:18px">peso e priorita</text>
  </g>
<g data-safe-box="1210 255 320 130 8">
    <rect class="softGreen" x="1210" y="255" width="320" height="130" rx="22"/>
    <rect x="1210" y="255" width="320" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1370" y="297" text-anchor="middle" style="font-size:25px">Punteggi</text>
    <text class="muted small" x="1370" y="329" text-anchor="middle" style="font-size:18px">corretta, errata, omessa</text>
  </g>
<g data-safe-box="115 445 320 130 8">
    <rect class="softTeal" x="115" y="445" width="320" height="130" rx="22"/>
    <rect x="115" y="445" width="320" height="10" rx="5" fill="#1F6F78"/>
    <text class="teal label" x="275" y="487" text-anchor="middle" style="font-size:25px">Soglia</text>
    <text class="muted small" x="275" y="519" text-anchor="middle" style="font-size:18px">idoneita e graduatoria</text>
  </g>
<g data-safe-box="480 445 320 130 8">
    <rect class="softBlue" x="480" y="445" width="320" height="130" rx="22"/>
    <rect x="480" y="445" width="320" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="640" y="487" text-anchor="middle" style="font-size:25px">Banca dati</text>
    <text class="muted small" x="640" y="519" text-anchor="middle" style="font-size:18px">si, no, promessa</text>
  </g>
<g data-safe-box="845 445 320 130 8">
    <rect class="softRed" x="845" y="445" width="320" height="130" rx="22"/>
    <rect x="845" y="445" width="320" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="1005" y="487" text-anchor="middle" style="font-size:25px">Modalita</text>
    <text class="muted small" x="1005" y="519" text-anchor="middle" style="font-size:18px">digitale o cartacea</text>
  </g>
<g data-safe-box="1210 445 320 130 8">
    <rect class="softGold" x="1210" y="445" width="320" height="130" rx="22"/>
    <rect x="1210" y="445" width="320" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="1370" y="487" text-anchor="middle" style="font-size:25px">Ritorno</text>
    <text class="muted small" x="1370" y="519" text-anchor="middle" style="font-size:18px">si puo tornare indietro?</text>
  </g>
  <g data-safe-box="310 665 270 78 8">
    <rect x="310" y="665" width="270" height="78" rx="20" fill="#10233F"/>
    <text class="label" x="445" y="696" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">60 domande</text>
    <text class="small" x="445" y="723" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">dato grezzo</text>
  </g>
  <g data-safe-box="665 665 270 78 8">
    <rect x="665" y="665" width="270" height="78" rx="20" fill="#7A2430"/>
    <text class="label" x="800" y="696" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">60 minuti</text>
    <text class="small" x="800" y="723" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">vincolo reale</text>
  </g>
  <g data-safe-box="1020 665 270 78 8">
    <rect x="1020" y="665" width="270" height="78" rx="20" fill="#2F7D5A"/>
    <text class="label" x="1155" y="696" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">1 minuto</text>
    <text class="small" x="1155" y="723" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">tempo teorico</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:19px">Il tempo medio e' teorico: una domanda facile non deve finanziare una domanda bloccante.</text>
  </g>

</svg>
