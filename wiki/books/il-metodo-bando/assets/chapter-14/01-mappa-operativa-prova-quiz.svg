<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Mappa operativa della prova a quiz</title>
  <desc id="desc">Il punteggio nasce da bando, tempo, rischio, distrattori e correzione degli errori.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Mappa operativa della prova a quiz</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Il punteggio nasce da bando, tempo, rischio, distrattori e correzione degli errori.</text>

  <g data-safe-box="575 170 450 125 8">
    <rect class="card" x="575" y="170" width="450" height="125" rx="22"/>
    <rect x="575" y="170" width="450" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="800" y="212" text-anchor="middle" style="font-size:25px">Prova a quiz</text>
    <text class="muted small" x="800" y="244" text-anchor="middle" style="font-size:18px">rapidita e precisione</text>
<text class="muted small" x="800" y="269" text-anchor="middle" style="font-size:18px">gestione rischio</text>
  </g>
  <path class="line" d="M800 295 L800 365"/>
  <path class="line" d="M210 365 L1390 365"/>
  <path class="line" d="M210 365 L210 450"/>
  <path class="line" d="M505 365 L505 570"/>
  <path class="line" d="M800 365 L800 450"/>
  <path class="line" d="M1095 365 L1095 570"/>
  <path class="line" d="M1390 365 L1390 450"/>
  <g data-safe-box="75 450 270 130 8">
    <rect class="softBlue" x="75" y="450" width="270" height="130" rx="22"/>
    <rect x="75" y="450" width="270" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="210" y="492" text-anchor="middle" style="font-size:25px">Bando</text>
    <text class="muted small" x="210" y="524" text-anchor="middle" style="font-size:18px">quesiti, tempo</text>
<text class="muted small" x="210" y="549" text-anchor="middle" style="font-size:18px">soglia, penalita</text>
  </g>
  <g data-safe-box="370 570 270 130 8">
    <rect class="softRed" x="370" y="570" width="270" height="130" rx="22"/>
    <rect x="370" y="570" width="270" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="505" y="612" text-anchor="middle" style="font-size:25px">Aree</text>
    <text class="muted small" x="505" y="644" text-anchor="middle" style="font-size:18px">materie</text>
<text class="muted small" x="505" y="669" text-anchor="middle" style="font-size:18px">pesi e priorita</text>
  </g>
  <g data-safe-box="665 450 270 130 8">
    <rect class="softGold" x="665" y="450" width="270" height="130" rx="22"/>
    <rect x="665" y="450" width="270" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="800" y="492" text-anchor="middle" style="font-size:25px">Nuclei</text>
    <text class="muted small" x="800" y="524" text-anchor="middle" style="font-size:18px">definizioni</text>
<text class="muted small" x="800" y="549" text-anchor="middle" style="font-size:18px">eccezioni, confronti</text>
  </g>
  <g data-safe-box="960 570 270 130 8">
    <rect class="softGreen" x="960" y="570" width="270" height="130" rx="22"/>
    <rect x="960" y="570" width="270" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1095" y="612" text-anchor="middle" style="font-size:25px">Diario</text>
    <text class="muted small" x="1095" y="644" text-anchor="middle" style="font-size:18px">memoria, concetto</text>
<text class="muted small" x="1095" y="669" text-anchor="middle" style="font-size:18px">lettura, tempo</text>
  </g>
  <g data-safe-box="1255 450 270 130 8">
    <rect class="softTeal" x="1255" y="450" width="270" height="130" rx="22"/>
    <rect x="1255" y="450" width="270" height="10" rx="5" fill="#1F6F78"/>
    <text class="teal label" x="1390" y="492" text-anchor="middle" style="font-size:25px">Output</text>
    <text class="muted small" x="1390" y="524" text-anchor="middle" style="font-size:18px">drill, batterie</text>
<text class="muted small" x="1390" y="549" text-anchor="middle" style="font-size:18px">simulazioni</text>
  </g>
  <g data-safe-box="250 792 1100 64 8">
    <rect class="note" x="250" y="792" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="832" text-anchor="middle" style="font-weight:800;font-size:19px">Non basta fare domande: ogni quiz deve produrre tempo misurato, errore corretto e prossima decisione.</text>
  </g>

</svg>
