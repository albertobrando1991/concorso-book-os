<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Protocollo in sei passaggi</title>
  <desc id="desc">Il diario si chiude solo quando il secondo tentativo conferma il miglioramento.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Protocollo in sei passaggi</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Il diario si chiude solo quando il secondo tentativo conferma il miglioramento.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="225" text-anchor="middle">Un errore registrato senza scadenza resta archivio</text>
  <g data-safe-box="155 275 335 170 8">
    <rect class="softBlue" x="155" y="275" width="335" height="170" rx="24"/>
    <circle cx="213" cy="339" r="32" fill="#10233F"/>
    <text class="label" x="213" y="350" text-anchor="middle" fill="#FFFFFF" style="font-size:23px">1</text>
    <text class="navy label" x="345" y="332" text-anchor="middle" style="font-size:22px">Registra</text>
    <text class="muted small" x="345" y="381" text-anchor="middle" style="font-size:17px">subito dopo la prova</text>
  </g>
<g data-safe-box="605 275 335 170 8">
    <rect class="softRed" x="605" y="275" width="335" height="170" rx="24"/>
    <circle cx="663" cy="339" r="32" fill="#7A2430"/>
    <text class="label" x="663" y="350" text-anchor="middle" fill="#FFFFFF" style="font-size:23px">2</text>
    <text class="bordeaux label" x="795" y="332" text-anchor="middle" style="font-size:22px">Classifica</text>
    <text class="muted small" x="795" y="381" text-anchor="middle" style="font-size:17px">causa prevalente</text>
  </g>
<g data-safe-box="1055 275 335 170 8">
    <rect class="softGold" x="1055" y="275" width="335" height="170" rx="24"/>
    <circle cx="1113" cy="339" r="32" fill="#D4AF37"/>
    <text class="label" x="1113" y="350" text-anchor="middle" fill="#FFFFFF" style="font-size:23px">3</text>
    <text class="gold label" x="1245" y="332" text-anchor="middle" style="font-size:22px">Regola</text>
    <text class="muted small" x="1245" y="381" text-anchor="middle" style="font-size:17px">scritta con parole tue</text>
  </g>
  <path class="arrowNavy" d="M505 390 L585 390"/>
  <path class="arrowNavy" d="M955 390 L1035 390"/>
  <path class="arrowNavy" d="M1225 480 L1225 520"/>
  <g data-safe-box="1055 535 335 170 8">
    <rect class="softGreen" x="1055" y="535" width="335" height="170" rx="24"/>
    <circle cx="1113" cy="599" r="32" fill="#2F7D5A"/>
    <text class="label" x="1113" y="610" text-anchor="middle" fill="#FFFFFF" style="font-size:23px">4</text>
    <text class="green label" x="1245" y="592" text-anchor="middle" style="font-size:22px">Output</text>
    <text class="muted small" x="1245" y="641" text-anchor="middle" style="font-size:17px">quiz, orale, caso</text>
  </g>
<g data-safe-box="605 535 335 170 8">
    <rect class="softTeal" x="605" y="535" width="335" height="170" rx="24"/>
    <circle cx="663" cy="599" r="32" fill="#1F6F78"/>
    <text class="label" x="663" y="610" text-anchor="middle" fill="#FFFFFF" style="font-size:23px">5</text>
    <text class="teal label" x="795" y="592" text-anchor="middle" style="font-size:22px">Ripasso</text>
    <text class="muted small" x="795" y="641" text-anchor="middle" style="font-size:17px">data e controllo</text>
  </g>
<g data-safe-box="155 535 335 170 8">
    <rect class="softBlue" x="155" y="535" width="335" height="170" rx="24"/>
    <circle cx="213" cy="599" r="32" fill="#10233F"/>
    <text class="label" x="213" y="610" text-anchor="middle" fill="#FFFFFF" style="font-size:23px">6</text>
    <text class="navy label" x="345" y="592" text-anchor="middle" style="font-size:22px">Verifica</text>
    <text class="muted small" x="345" y="641" text-anchor="middle" style="font-size:17px">secondo tentativo</text>
  </g>
  <path class="arrowNavy" d="M1035 650 L955 650"/>
  <path class="arrowNavy" d="M585 650 L505 650"/>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">Il diario si chiude quando l'errore non si ripete, non quando la risposta sembra capita.</text>
  </g>
</svg>
