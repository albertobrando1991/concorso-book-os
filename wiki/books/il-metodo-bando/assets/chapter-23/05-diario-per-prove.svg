<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Usare il diario nelle diverse prove</title>
  <desc id="desc">Quiz, scritto, orale e casi pratici richiedono errori letti in modo diverso.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Usare il diario nelle diverse prove</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Quiz, scritto, orale e casi pratici richiedono errori letti in modo diverso.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="225" text-anchor="middle">Ogni prova produce un tipo diverso di errore utile</text>
  <g data-safe-box="190 270 580 205 8">
    <rect class="softBlue" x="190" y="270" width="580" height="205" rx="24"/>
    <rect x="190" y="270" width="580" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="490" y="322" text-anchor="middle" style="font-size:24px">Quiz</text>
    <path class="thin" d="M265 344 L695 344"/>
    <text class="muted small" x="490" y="382" text-anchor="middle" style="font-size:17px">errori ripetuti</text>
<text class="muted small" x="490" y="416" text-anchor="middle" style="font-size:17px">lettura e tempo</text>
<text class="muted small" x="490" y="450" text-anchor="middle" style="font-size:17px">risposte incerte</text>
  </g>
<g data-safe-box="830 270 580 205 8">
    <rect class="softRed" x="830" y="270" width="580" height="205" rx="24"/>
    <rect x="830" y="270" width="580" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="1130" y="322" text-anchor="middle" style="font-size:24px">Scritto</text>
    <path class="thin" d="M905 344 L1335 344"/>
    <text class="muted small" x="1130" y="382" text-anchor="middle" style="font-size:17px">traccia centrata</text>
<text class="muted small" x="1130" y="416" text-anchor="middle" style="font-size:17px">struttura</text>
<text class="muted small" x="1130" y="450" text-anchor="middle" style="font-size:17px">linguaggio</text>
  </g>
<g data-safe-box="190 520 580 205 8">
    <rect class="softGold" x="190" y="520" width="580" height="205" rx="24"/>
    <rect x="190" y="520" width="580" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="490" y="572" text-anchor="middle" style="font-size:24px">Orale</text>
    <path class="thin" d="M265 594 L695 594"/>
    <text class="muted small" x="490" y="632" text-anchor="middle" style="font-size:17px">definizione</text>
<text class="muted small" x="490" y="666" text-anchor="middle" style="font-size:17px">ordine</text>
<text class="muted small" x="490" y="700" text-anchor="middle" style="font-size:17px">collegamenti</text>
  </g>
<g data-safe-box="830 520 580 205 8">
    <rect class="softGreen" x="830" y="520" width="580" height="205" rx="24"/>
    <rect x="830" y="520" width="580" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1130" y="572" text-anchor="middle" style="font-size:24px">Casi pratici</text>
    <path class="thin" d="M905 594 L1335 594"/>
    <text class="muted small" x="1130" y="632" text-anchor="middle" style="font-size:17px">problema</text>
<text class="muted small" x="1130" y="666" text-anchor="middle" style="font-size:17px">competenza</text>
<text class="muted small" x="1130" y="700" text-anchor="middle" style="font-size:17px">decisione</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">Il diario non misura solo contenuti: misura anche forma, procedura e gestione della prova.</text>
  </g>
</svg>
