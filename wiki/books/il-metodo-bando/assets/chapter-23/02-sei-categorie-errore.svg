<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Le sei categorie di errore</title>
  <desc id="desc">La categoria non etichetta il candidato: decide il rimedio operativo.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Le sei categorie di errore</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">La categoria non etichetta il candidato: decide il rimedio operativo.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="225" text-anchor="middle">Scrivere solo "sbagliato" non basta: serve una diagnosi</text>
  <g data-safe-box="155 265 390 190 8">
    <rect class="softBlue" x="155" y="265" width="390" height="190" rx="24"/>
    <rect x="155" y="265" width="390" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="350" y="312" text-anchor="middle" style="font-size:23px">Memoria</text>
    <text class="muted small" x="350" y="359" text-anchor="middle" style="font-size:17px">dato o definizione non recuperati</text>
    <path class="thin" d="M210 380 L490 380"/>
    <text class="ink label" x="350" y="417" text-anchor="middle" style="font-size:18px">flashcard</text>
  </g>
<g data-safe-box="605 265 390 190 8">
    <rect class="softRed" x="605" y="265" width="390" height="190" rx="24"/>
    <rect x="605" y="265" width="390" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="800" y="312" text-anchor="middle" style="font-size:23px">Concetto</text>
    <text class="muted small" x="800" y="359" text-anchor="middle" style="font-size:17px">istituti confusi tra loro</text>
    <path class="thin" d="M660 380 L940 380"/>
    <text class="ink label" x="800" y="417" text-anchor="middle" style="font-size:18px">schema comparativo</text>
  </g>
<g data-safe-box="1055 265 390 190 8">
    <rect class="softGold" x="1055" y="265" width="390" height="190" rx="24"/>
    <rect x="1055" y="265" width="390" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="1250" y="312" text-anchor="middle" style="font-size:23px">Lettura</text>
    <text class="muted small" x="1250" y="359" text-anchor="middle" style="font-size:17px">negazione o eccezione saltata</text>
    <path class="thin" d="M1110 380 L1390 380"/>
    <text class="ink label" x="1250" y="417" text-anchor="middle" style="font-size:18px">drill parole-spia</text>
  </g>
<g data-safe-box="155 510 390 190 8">
    <rect class="softGreen" x="155" y="510" width="390" height="190" rx="24"/>
    <rect x="155" y="510" width="390" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="350" y="557" text-anchor="middle" style="font-size:23px">Tempo</text>
    <text class="muted small" x="350" y="604" text-anchor="middle" style="font-size:17px">risposta veloce o incompleta</text>
    <path class="thin" d="M210 625 L490 625"/>
    <text class="ink label" x="350" y="662" text-anchor="middle" style="font-size:18px">timer e doppio giro</text>
  </g>
<g data-safe-box="605 510 390 190 8">
    <rect class="softTeal" x="605" y="510" width="390" height="190" rx="24"/>
    <rect x="605" y="510" width="390" height="10" rx="5" fill="#1F6F78"/>
    <text class="teal label" x="800" y="557" text-anchor="middle" style="font-size:23px">Strategia</text>
    <text class="muted small" x="800" y="604" text-anchor="middle" style="font-size:17px">energia spesa nel punto sbagliato</text>
    <path class="thin" d="M660 625 L940 625"/>
    <text class="ink label" x="800" y="662" text-anchor="middle" style="font-size:18px">regola di salto</text>
  </g>
<g data-safe-box="1055 510 390 190 8">
    <rect class="softBlue" x="1055" y="510" width="390" height="190" rx="24"/>
    <rect x="1055" y="510" width="390" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="1250" y="557" text-anchor="middle" style="font-size:23px">Ansia</text>
    <text class="muted small" x="1250" y="604" text-anchor="middle" style="font-size:17px">ordine e lucidita perduti</text>
    <path class="thin" d="M1110 625 L1390 625"/>
    <text class="ink label" x="1250" y="662" text-anchor="middle" style="font-size:18px">simulazione progressiva</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">La categoria decide il rimedio: stesso punteggio, azioni completamente diverse.</text>
  </g>
</svg>
