<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Caso Marta: leggere i pattern</title>
  <desc id="desc">Quattordici errori non chiedono piu studio generico, ma decisioni selettive.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Caso Marta: leggere i pattern</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Quattordici errori non chiedono piu studio generico, ma decisioni selettive.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="225" text-anchor="middle">50 quiz, 14 errori: il punteggio non basta a decidere</text>
  <g data-safe-box="185 265 1230 460 8">
    <g data-safe-box="185 265 1230 72 8">
    <rect x="185" y="265" width="1230" height="72" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text class="navy label" x="295" y="310" text-anchor="middle" style="font-size:19px">Accesso</text>
    <rect class="softBlue" x="420" y="287" width="420" height="28" rx="14"/>
    <rect x="420" y="287" width="420" height="28" rx="14" fill="#10233F"/>
    <text class="label" x="890" y="310" text-anchor="middle" style="font-size:20px;fill:#0F172A">5</text>
    <text class="muted small" x="1135" y="310" text-anchor="middle" style="font-size:17px">schema comparativo</text>
  </g>
<g data-safe-box="185 357 1230 72 8">
    <rect x="185" y="357" width="1230" height="72" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text class="bordeaux label" x="295" y="402" text-anchor="middle" style="font-size:19px">Silenzio</text>
    <rect class="softRed" x="420" y="379" width="420" height="28" rx="14"/>
    <rect x="420" y="379" width="252" height="28" rx="14" fill="#7A2430"/>
    <text class="label" x="890" y="402" text-anchor="middle" style="font-size:20px;fill:#0F172A">3</text>
    <text class="muted small" x="1135" y="402" text-anchor="middle" style="font-size:17px">flashcard + 10 quiz</text>
  </g>
<g data-safe-box="185 449 1230 72 8">
    <rect x="185" y="449" width="1230" height="72" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text class="gold label" x="295" y="494" text-anchor="middle" style="font-size:19px">Negazioni</text>
    <rect class="softGold" x="420" y="471" width="420" height="28" rx="14"/>
    <rect x="420" y="471" width="168" height="28" rx="14" fill="#D4AF37"/>
    <text class="label" x="890" y="494" text-anchor="middle" style="font-size:20px;fill:#0F172A">2</text>
    <text class="muted small" x="1135" y="494" text-anchor="middle" style="font-size:17px">parole-spia</text>
  </g>
<g data-safe-box="185 541 1230 72 8">
    <rect x="185" y="541" width="1230" height="72" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text class="green label" x="295" y="586" text-anchor="middle" style="font-size:19px">Tempo</text>
    <rect class="softGreen" x="420" y="563" width="420" height="28" rx="14"/>
    <rect x="420" y="563" width="168" height="28" rx="14" fill="#2F7D5A"/>
    <text class="label" x="890" y="586" text-anchor="middle" style="font-size:20px;fill:#0F172A">2</text>
    <text class="muted small" x="1135" y="586" text-anchor="middle" style="font-size:17px">due giri</text>
  </g>
<g data-safe-box="185 633 1230 72 8">
    <rect x="185" y="633" width="1230" height="72" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text class="teal label" x="295" y="678" text-anchor="middle" style="font-size:19px">Dettagli</text>
    <rect class="softTeal" x="420" y="655" width="420" height="28" rx="14"/>
    <rect x="420" y="655" width="168" height="28" rx="14" fill="#1F6F78"/>
    <text class="label" x="890" y="678" text-anchor="middle" style="font-size:20px;fill:#0F172A">2</text>
    <text class="muted small" x="1135" y="678" text-anchor="middle" style="font-size:17px">non priorita</text>
  </g>
  </g>
  <g data-safe-box="250 765 1100 64 8">
    <rect class="note" x="250" y="765" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="805" text-anchor="middle" style="font-weight:800;font-size:20px">Marta non deve studiare tutto di piu: deve correggere i pattern che si ripetono.</text>
  </g>
</svg>
