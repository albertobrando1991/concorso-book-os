<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Dall'errore al ripasso mirato</title>
  <desc id="desc">Flashcard, segnali di peggioramento e rimedi devono stare nello stesso ciclo.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Dall'errore al ripasso mirato</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Flashcard, segnali di peggioramento e rimedi devono stare nello stesso ciclo.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="225" text-anchor="middle">Le flashcard migliori nascono dagli errori ad alta resa</text>
  <g data-safe-box="110 315 245 210 8">
    <rect class="softRed" x="110" y="315" width="245" height="210" rx="24"/>
    <circle cx="232.5" cy="370" r="34" fill="#7A2430"/>
    <text class="label" x="232.5" y="447" text-anchor="middle" style="font-size:22px;fill:#7A2430">Errore</text>
    <text class="muted small" x="232.5" y="485" text-anchor="middle" style="font-size:16px">confusione o lacuna</text>
  </g>
  <path class="arrowNavy" d="M355 420 L445 420"/>
  <g data-safe-box="470 315 245 210 8">
    <rect class="softBlue" x="470" y="315" width="245" height="210" rx="24"/>
    <circle cx="592.5" cy="370" r="34" fill="#10233F"/>
    <text class="label" x="592.5" y="447" text-anchor="middle" style="font-size:22px;fill:#10233F">Flashcard</text>
    <text class="muted small" x="592.5" y="485" text-anchor="middle" style="font-size:16px">una domanda precisa</text>
  </g>
  <path class="arrowNavy" d="M715 420 L805 420"/>
  <g data-safe-box="830 315 245 210 8">
    <rect class="softGreen" x="830" y="315" width="245" height="210" rx="24"/>
    <circle cx="952.5" cy="370" r="34" fill="#2F7D5A"/>
    <text class="label" x="952.5" y="447" text-anchor="middle" style="font-size:22px;fill:#2F7D5A">Ripasso</text>
    <text class="muted small" x="952.5" y="485" text-anchor="middle" style="font-size:16px">24-48 ore e 5-7 giorni</text>
  </g>
  <path class="arrowNavy" d="M1075 420 L1165 420"/>
  <g data-safe-box="1190 315 245 210 8">
    <rect class="softTeal" x="1190" y="315" width="245" height="210" rx="24"/>
    <circle cx="1312.5" cy="370" r="34" fill="#1F6F78"/>
    <text class="label" x="1312.5" y="447" text-anchor="middle" style="font-size:22px;fill:#1F6F78">Esito</text>
    <text class="muted small" x="1312.5" y="485" text-anchor="middle" style="font-size:16px">secondo tentativo</text>
  </g>
  <g data-safe-box="170 590 540 180 8">
    <rect class="softRed" x="170" y="590" width="540" height="180" rx="24"/>
    <rect x="170" y="590" width="540" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="440" y="638" text-anchor="middle" style="font-size:21px">Materia che peggiora</text>
    <text class="muted small" x="440" y="680" text-anchor="middle" style="font-size:15px">errori aumentano</text>
<text class="muted small" x="440" y="707" text-anchor="middle" style="font-size:15px">istituti simili confusi</text>
<text class="muted small" x="440" y="734" text-anchor="middle" style="font-size:15px">quiz corretti solo subito dopo</text>
  </g>
  <g data-safe-box="890 590 540 180 8">
    <rect class="softGreen" x="890" y="590" width="540" height="180" rx="24"/>
    <rect x="890" y="590" width="540" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1160" y="638" text-anchor="middle" style="font-size:21px">Rimedio minimo</text>
    <text class="muted small" x="1160" y="680" text-anchor="middle" style="font-size:15px">sospendi pagine nuove</text>
<text class="muted small" x="1160" y="707" text-anchor="middle" style="font-size:15px">schema comparativo</text>
<text class="muted small" x="1160" y="734" text-anchor="middle" style="font-size:15px">20 domande mirate</text>
  </g>
  <path class="arrowNavy" d="M735 665 L865 665"/>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">Se una materia peggiora, non aggiungere teoria: blocca, confronta, prova e misura di nuovo.</text>
  </g>
</svg>
