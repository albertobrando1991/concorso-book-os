<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Calendario inverso</title>
  <desc id="desc">Parti dalla prova e risali a setup, apprendimento, consolidamento e rifinitura.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 44px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 23px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Calendario inverso</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Parti dalla prova e risali a setup, apprendimento, consolidamento e rifinitura.</text>

  <rect class="card" x="90" y="175" width="1420" height="610" rx="30"/>
  <text class="navy label" x="800" y="232" text-anchor="middle">La data prova decide il ritmo delle fasi</text>
  <path class="line" d="M190 405 L1410 405"/>
  <g data-safe-box="135 297 190 190 8">
    <circle cx="230" cy="405" r="28" fill="#10233F"/>
    <text class="label" x="230" y="349" text-anchor="middle" fill="#10233F" style="font-size:20px">Setup</text>
    <text class="muted small" x="230" y="477" text-anchor="middle" style="font-size:16px">bando, fonti</text>
  </g>
  <g data-safe-box="425 297 190 190 8">
    <circle cx="520" cy="405" r="28" fill="#7A2430"/>
    <text class="label" x="520" y="349" text-anchor="middle" fill="#7A2430" style="font-size:20px">Base</text>
    <text class="muted small" x="520" y="477" text-anchor="middle" style="font-size:16px">lettura attiva</text>
  </g>
  <g data-safe-box="720 297 190 190 8">
    <circle cx="815" cy="405" r="28" fill="#D4AF37"/>
    <text class="label" x="815" y="349" text-anchor="middle" fill="#D4AF37" style="font-size:20px">Consolida</text>
    <text class="muted small" x="815" y="477" text-anchor="middle" style="font-size:16px">quiz e recall</text>
  </g>
  <g data-safe-box="1015 297 190 190 8">
    <circle cx="1110" cy="405" r="28" fill="#2F7D5A"/>
    <text class="label" x="1110" y="349" text-anchor="middle" fill="#2F7D5A" style="font-size:20px">Rifinisci</text>
    <text class="muted small" x="1110" y="477" text-anchor="middle" style="font-size:16px">simulazioni</text>
  </g>
  <g data-safe-box="1295 297 190 190 8">
    <circle cx="1390" cy="405" r="28" fill="#1F6F78"/>
    <text class="label" x="1390" y="349" text-anchor="middle" fill="#1F6F78" style="font-size:20px">Prova</text>
    <text class="muted small" x="1390" y="477" text-anchor="middle" style="font-size:16px">output reale</text>
  </g>
  <g data-safe-box="130 560 290 125 8">
    <rect class="softBlue" x="130" y="560" width="290" height="125" rx="22"/>
    <rect x="130" y="560" width="290" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="275" y="602" text-anchor="middle" style="font-size:25px">10-15%</text>
    <text class="muted small" x="275" y="636" text-anchor="middle" style="font-size:18px">setup</text>
<text class="muted small" x="275" y="661" text-anchor="middle" style="font-size:18px">perimetro e materiali</text>
  </g>
  <g data-safe-box="455 560 290 125 8">
    <rect class="softRed" x="455" y="560" width="290" height="125" rx="22"/>
    <rect x="455" y="560" width="290" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="600" y="602" text-anchor="middle" style="font-size:25px">40-45%</text>
    <text class="muted small" x="600" y="636" text-anchor="middle" style="font-size:18px">apprendimento</text>
<text class="muted small" x="600" y="661" text-anchor="middle" style="font-size:18px">nuclei base</text>
  </g>
  <g data-safe-box="780 560 290 125 8">
    <rect class="softGold" x="780" y="560" width="290" height="125" rx="22"/>
    <rect x="780" y="560" width="290" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="925" y="602" text-anchor="middle" style="font-size:25px">25-30%</text>
    <text class="muted small" x="925" y="636" text-anchor="middle" style="font-size:18px">consolidamento</text>
<text class="muted small" x="925" y="661" text-anchor="middle" style="font-size:18px">test e ripasso</text>
  </g>
  <g data-safe-box="1105 560 290 125 8">
    <rect class="softGreen" x="1105" y="560" width="290" height="125" rx="22"/>
    <rect x="1105" y="560" width="290" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1250" y="602" text-anchor="middle" style="font-size:25px">15-20%</text>
    <text class="muted small" x="1250" y="636" text-anchor="middle" style="font-size:18px">rifinitura</text>
<text class="muted small" x="1250" y="661" text-anchor="middle" style="font-size:18px">simulazioni e tagli</text>
  </g>
  <g data-safe-box="250 805 1100 64 8">
    <rect class="note" x="250" y="805" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="845" text-anchor="middle" style="font-weight:800;font-size:20px">Errore da evitare: leggere fino all'ultimo giorno e simulare troppo tardi.</text>
  </g>

</svg>
