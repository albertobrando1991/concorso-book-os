<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">SQ3R per i nuclei ad alta resa</title>
  <desc id="desc">La lettura diventa domanda, richiamo e verifica su argomenti che sbloccano il programma.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 44px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 23px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">SQ3R per i nuclei ad alta resa</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">La lettura diventa domanda, richiamo e verifica su argomenti che sbloccano il programma.</text>

  <rect class="card" x="90" y="175" width="1420" height="610" rx="30"/>
  <text class="navy label" x="800" y="232" text-anchor="middle">Ogni nucleo deve diventare domanda e verifica</text>
  <g data-safe-box="140 315 240 155 8">
    <rect class="card" x="140" y="315" width="240" height="155" rx="20"/>
    <circle cx="260" cy="350" r="23" fill="#10233F"/>
    <text class="label" x="260" y="359" text-anchor="middle" fill="#FFFFFF" style="font-size:22px">1</text>
    <text class="navy label" x="260" y="403" text-anchor="middle" style="font-size:19px">Survey</text>
    <text class="muted small" x="260" y="436" text-anchor="middle" style="font-size:16px">scorri titoli</text>
  </g>
  <g data-safe-box="420 315 240 155 8">
    <rect class="card" x="420" y="315" width="240" height="155" rx="20"/>
    <circle cx="540" cy="350" r="23" fill="#7A2430"/>
    <text class="label" x="540" y="359" text-anchor="middle" fill="#FFFFFF" style="font-size:22px">2</text>
    <text class="bordeaux label" x="540" y="403" text-anchor="middle" style="font-size:19px">Question</text>
    <text class="muted small" x="540" y="436" text-anchor="middle" style="font-size:16px">trasforma in domande</text>
  </g>
  <g data-safe-box="700 315 240 155 8">
    <rect class="card" x="700" y="315" width="240" height="155" rx="20"/>
    <circle cx="820" cy="350" r="23" fill="#D4AF37"/>
    <text class="label" x="820" y="359" text-anchor="middle" fill="#FFFFFF" style="font-size:22px">3</text>
    <text class="gold label" x="820" y="403" text-anchor="middle" style="font-size:19px">Read</text>
    <text class="muted small" x="820" y="436" text-anchor="middle" style="font-size:16px">cerca risposte</text>
  </g>
  <g data-safe-box="980 315 240 155 8">
    <rect class="card" x="980" y="315" width="240" height="155" rx="20"/>
    <circle cx="1100" cy="350" r="23" fill="#2F7D5A"/>
    <text class="label" x="1100" y="359" text-anchor="middle" fill="#FFFFFF" style="font-size:22px">4</text>
    <text class="green label" x="1100" y="403" text-anchor="middle" style="font-size:19px">Recite</text>
    <text class="muted small" x="1100" y="436" text-anchor="middle" style="font-size:16px">spiega senza testo</text>
  </g>
  <g data-safe-box="1260 315 240 155 8">
    <rect class="card" x="1260" y="315" width="240" height="155" rx="20"/>
    <circle cx="1380" cy="350" r="23" fill="#1F6F78"/>
    <text class="label" x="1380" y="359" text-anchor="middle" fill="#FFFFFF" style="font-size:22px">5</text>
    <text class="teal label" x="1380" y="403" text-anchor="middle" style="font-size:19px">Review</text>
    <text class="muted small" x="1380" y="436" text-anchor="middle" style="font-size:16px">quiz e correzione</text>
  </g>
  <path class="arrowNavy" d="M385 395 L410 395"/>
  <path class="arrowBordeaux" d="M665 395 L690 395"/>
  <path class="arrowGold" d="M945 395 L970 395"/>
  <path class="arrowGreen" d="M1225 395 L1250 395"/>
  <g data-safe-box="190 600 430 191 8">
    <rect class="softBlue" x="190" y="600" width="430" height="191" rx="22"/>
    <rect x="190" y="600" width="430" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="405" y="644" text-anchor="middle" style="font-size:21px">Nucleo ad alta resa</text>
    <path class="thin" d="M214 664 L596 664"/>
    <text class="muted small" x="220" y="682" style="font-size:17px">ritorna nei quiz</text>
<text class="muted small" x="220" y="715" style="font-size:17px">collega piu materie</text>
<text class="muted small" x="220" y="748" style="font-size:17px">serve all'orale</text>
  </g>
  <g data-safe-box="790 600 430 191 8">
    <rect class="softGreen" x="790" y="600" width="430" height="191" rx="22"/>
    <rect x="790" y="600" width="430" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1005" y="644" text-anchor="middle" style="font-size:24px">Output minimo</text>
    <path class="thin" d="M814 664 L1196 664"/>
    <text class="muted small" x="820" y="682" style="font-size:17px">5 domande</text>
<text class="muted small" x="820" y="715" style="font-size:17px">risposta breve</text>
<text class="muted small" x="820" y="748" style="font-size:17px">errore classificato</text>
  </g>
  <g data-safe-box="250 805 1100 64 8">
    <rect class="note" x="250" y="805" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="845" text-anchor="middle" style="font-weight:800;font-size:20px">Capire mentre leggi non basta: devi recuperare e spiegare senza guardare.</text>
  </g>

</svg>
