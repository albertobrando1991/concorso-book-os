<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Diario, output e recupero</title>
  <desc id="desc">Gli errori diventano dati: classificazione, drill mirato e scelta di cosa tagliare.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 44px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 23px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Diario, output e recupero</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Gli errori diventano dati: classificazione, drill mirato e scelta di cosa tagliare.</text>

  <rect class="card" x="90" y="175" width="1420" height="610" rx="30"/>
  <text class="navy label" x="800" y="232" text-anchor="middle">Dal dato al recupero: ogni errore indica una mossa</text>
  <g data-safe-box="125 310 305 257 8">
    <rect class="softRed" x="125" y="310" width="305" height="257" rx="22"/>
    <rect x="125" y="310" width="305" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="277.5" y="354" text-anchor="middle" style="font-size:24px">Errore</text>
    <path class="thin" d="M149 374 L406 374"/>
    <text class="muted small" x="155" y="392" style="font-size:17px">lacuna</text>
<text class="muted small" x="155" y="425" style="font-size:17px">confusione</text>
<text class="muted small" x="155" y="458" style="font-size:17px">lettura</text>
<text class="muted small" x="155" y="491" style="font-size:17px">memoria</text>
<text class="muted small" x="155" y="524" style="font-size:17px">tempo</text>
  </g>
  <g data-safe-box="470 310 305 224 8">
    <rect class="softBlue" x="470" y="310" width="305" height="224" rx="22"/>
    <rect x="470" y="310" width="305" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="622.5" y="354" text-anchor="middle" style="font-size:24px">Output</text>
    <path class="thin" d="M494 374 L751 374"/>
    <text class="muted small" x="500" y="392" style="font-size:17px">quiz svolti</text>
<text class="muted small" x="500" y="425" style="font-size:17px">risposta orale</text>
<text class="muted small" x="500" y="458" style="font-size:17px">caso breve</text>
<text class="muted small" x="500" y="491" style="font-size:17px">simulazione</text>
  </g>
  <g data-safe-box="815 310 305 224 8">
    <rect class="softGold" x="815" y="310" width="305" height="224" rx="22"/>
    <rect x="815" y="310" width="305" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="967.5" y="354" text-anchor="middle" style="font-size:24px">Decisione</text>
    <path class="thin" d="M839 374 L1096 374"/>
    <text class="muted small" x="845" y="392" style="font-size:17px">recupero immediato</text>
<text class="muted small" x="845" y="425" style="font-size:17px">ripasso breve</text>
<text class="muted small" x="845" y="458" style="font-size:17px">drill mirato</text>
<text class="muted small" x="845" y="491" style="font-size:17px">taglio</text>
  </g>
  <g data-safe-box="1160 310 305 224 8">
    <rect class="softGreen" x="1160" y="310" width="305" height="224" rx="22"/>
    <rect x="1160" y="310" width="305" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1312.5" y="354" text-anchor="middle" style="font-size:24px">Piano</text>
    <path class="thin" d="M1184 374 L1441 374"/>
    <text class="muted small" x="1190" y="392" style="font-size:17px">prossima sessione</text>
<text class="muted small" x="1190" y="425" style="font-size:17px">flashcard</text>
<text class="muted small" x="1190" y="458" style="font-size:17px">simulazione</text>
<text class="muted small" x="1190" y="491" style="font-size:17px">review bando</text>
  </g>
  <path class="arrowBordeaux" d="M440 440 L460 440"/>
  <path class="arrowNavy" d="M785 440 L805 440"/>
  <path class="arrowGold" d="M1130 440 L1150 440"/>
  <g data-safe-box="220 680 300 78 8">
    <rect x="220" y="680" width="300" height="78" rx="20" fill="#7A2430"/>
    <text class="label" x="370" y="712" text-anchor="middle" fill="#FFFFFF" style="font-size:19px">Centrale e debole</text>
    <text class="small" x="370" y="738" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">recupero subito</text>
  </g>
  <g data-safe-box="620 680 300 78 8">
    <rect x="620" y="680" width="300" height="78" rx="20" fill="#10233F"/>
    <text class="label" x="770" y="712" text-anchor="middle" fill="#FFFFFF" style="font-size:19px">Centrale sufficiente</text>
    <text class="small" x="770" y="738" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">ripasso + quiz</text>
  </g>
  <g data-safe-box="1020 680 300 78 8">
    <rect x="1020" y="680" width="300" height="78" rx="20" fill="#2F7D5A"/>
    <text class="label" x="1170" y="712" text-anchor="middle" fill="#FFFFFF" style="font-size:19px">Accessorio debole</text>
    <text class="small" x="1170" y="738" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">trattazione minima</text>
  </g>
  <g data-safe-box="250 805 1100 64 8">
    <rect class="note" x="250" y="805" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="845" text-anchor="middle" style="font-weight:800;font-size:20px">Il candidato maturo non recupera tutto: recupera cio che cambia il risultato.</text>
  </g>

</svg>
