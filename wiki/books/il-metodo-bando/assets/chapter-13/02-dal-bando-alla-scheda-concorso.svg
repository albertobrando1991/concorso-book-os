<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Dal bando alla scheda concorso</title>
  <desc id="desc">Prima di pianificare devi estrarre prove, materie, vincoli, tempi e output.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 44px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 23px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Dal bando alla scheda concorso</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Prima di pianificare devi estrarre prove, materie, vincoli, tempi e output.</text>

  <rect class="card" x="90" y="175" width="1420" height="610" rx="30"/>
  <text class="navy label" x="800" y="232" text-anchor="middle">Prima estrai il perimetro, poi apri manuali e calendari</text>
  <g data-safe-box="125 310 300 224 8">
    <rect class="softBlue" x="125" y="310" width="300" height="224" rx="22"/>
    <rect x="125" y="310" width="300" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="275" y="354" text-anchor="middle" style="font-size:24px">Dal bando</text>
    <path class="thin" d="M149 374 L401 374"/>
    <text class="muted small" x="155" y="392" style="font-size:17px">prove previste</text>
<text class="muted small" x="155" y="425" style="font-size:17px">materie richieste</text>
<text class="muted small" x="155" y="458" style="font-size:17px">punteggi e soglie</text>
<text class="muted small" x="155" y="491" style="font-size:17px">scadenze</text>
  </g>
  <g data-safe-box="470 310 300 224 8">
    <rect class="softRed" x="470" y="310" width="300" height="224" rx="22"/>
    <rect x="470" y="310" width="300" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="620" y="354" text-anchor="middle" style="font-size:24px">Vincoli</text>
    <path class="thin" d="M494 374 L746 374"/>
    <text class="muted small" x="500" y="392" style="font-size:17px">giorni disponibili</text>
<text class="muted small" x="500" y="425" style="font-size:17px">ore reali</text>
<text class="muted small" x="500" y="458" style="font-size:17px">banca dati</text>
<text class="muted small" x="500" y="491" style="font-size:17px">penalita</text>
  </g>
  <g data-safe-box="815 310 300 224 8">
    <rect class="softGold" x="815" y="310" width="300" height="224" rx="22"/>
    <rect x="815" y="310" width="300" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="965" y="354" text-anchor="middle" style="font-size:24px">Decisioni</text>
    <path class="thin" d="M839 374 L1091 374"/>
    <text class="muted small" x="845" y="392" style="font-size:17px">priorita aree</text>
<text class="muted small" x="845" y="425" style="font-size:17px">fonti minime</text>
<text class="muted small" x="845" y="458" style="font-size:17px">cosa tagliare</text>
<text class="muted small" x="845" y="491" style="font-size:17px">output iniziale</text>
  </g>
  <g data-safe-box="1160 310 300 224 8">
    <rect class="softGreen" x="1160" y="310" width="300" height="224" rx="22"/>
    <rect x="1160" y="310" width="300" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1310" y="354" text-anchor="middle" style="font-size:24px">Scheda</text>
    <path class="thin" d="M1184 374 L1436 374"/>
    <text class="muted small" x="1190" y="392" style="font-size:17px">concorso in 1 pagina</text>
<text class="muted small" x="1190" y="425" style="font-size:17px">rischi aperti</text>
<text class="muted small" x="1190" y="458" style="font-size:17px">prossimo passo</text>
<text class="muted small" x="1190" y="491" style="font-size:17px">review bando</text>
  </g>
  <path class="arrowNavy" d="M435 440 L460 440"/>
  <path class="arrowBordeaux" d="M780 440 L805 440"/>
  <path class="arrowGold" d="M1125 440 L1150 440"/>
  <g data-safe-box="220 675 330 78 8">
    <rect x="220" y="675" width="330" height="78" rx="20" fill="#7A2430"/>
    <text class="label" x="385" y="707" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">Non compilata</text>
    <text class="small" x="385" y="733" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">non pianificare</text>
  </g>
  <g data-safe-box="615 675 330 78 8">
    <rect x="615" y="675" width="330" height="78" rx="20" fill="#10233F"/>
    <text class="label" x="780" y="707" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">Compilata</text>
    <text class="small" x="780" y="733" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">inizia il calendario</text>
  </g>
  <g data-safe-box="1010 675 330 78 8">
    <rect x="1010" y="675" width="330" height="78" rx="20" fill="#2F7D5A"/>
    <text class="label" x="1175" y="707" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">Da verificare</text>
    <text class="small" x="1175" y="733" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">segnalo nel diario</text>
  </g>
  <g data-safe-box="250 805 1100 64 8">
    <rect class="note" x="250" y="805" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="845" text-anchor="middle" style="font-weight:800;font-size:20px">Se una riga della scheda resta vuota, quello e' il primo compito di studio.</text>
  </g>

</svg>
