<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Metodo di studio per concorsi</title>
  <desc id="desc">Il Metodo BANDO trasforma ore, materiali ed errori in una settimana governata.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 44px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 23px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Metodo di studio per concorsi</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Il Metodo BANDO trasforma ore, materiali ed errori in una settimana governata.</text>

  <g data-safe-box="565 175 470 135 8">
    <rect class="card" x="565" y="175" width="470" height="135" rx="22"/>
    <rect x="565" y="175" width="470" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="800" y="217" text-anchor="middle" style="font-size:22px">Settimana governata</text>
    <text class="muted small" x="800" y="251" text-anchor="middle" style="font-size:18px">tempo reale</text>
<text class="muted small" x="800" y="276" text-anchor="middle" style="font-size:18px">prove e dati</text>
  </g>
  <path class="line" d="M800 310 L800 380"/>
  <path class="line" d="M250 380 L1350 380"/>
  <path class="line" d="M250 380 L250 455"/>
  <path class="line" d="M525 380 L525 575"/>
  <path class="line" d="M800 380 L800 455"/>
  <path class="line" d="M1075 380 L1075 575"/>
  <path class="line" d="M1350 380 L1350 455"/>
  <g data-safe-box="115 455 270 130 8">
    <rect class="softBlue" x="115" y="455" width="270" height="130" rx="22"/>
    <rect x="115" y="455" width="270" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="250" y="497" text-anchor="middle" style="font-size:25px">Bando</text>
    <text class="muted small" x="250" y="531" text-anchor="middle" style="font-size:18px">prove, soglie</text>
<text class="muted small" x="250" y="556" text-anchor="middle" style="font-size:18px">materie e tempi</text>
  </g>
  <g data-safe-box="390 575 270 130 8">
    <rect class="softRed" x="390" y="575" width="270" height="130" rx="22"/>
    <rect x="390" y="575" width="270" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="525" y="617" text-anchor="middle" style="font-size:25px">Aree</text>
    <text class="muted small" x="525" y="651" text-anchor="middle" style="font-size:18px">blocchi</text>
<text class="muted small" x="525" y="676" text-anchor="middle" style="font-size:18px">peso e priorita</text>
  </g>
  <g data-safe-box="665 455 270 130 8">
    <rect class="softGold" x="665" y="455" width="270" height="130" rx="22"/>
    <rect x="665" y="455" width="270" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="800" y="497" text-anchor="middle" style="font-size:25px">Nuclei</text>
    <text class="muted small" x="800" y="531" text-anchor="middle" style="font-size:18px">alta resa</text>
<text class="muted small" x="800" y="556" text-anchor="middle" style="font-size:18px">domande guida</text>
  </g>
  <g data-safe-box="940 575 270 130 8">
    <rect class="softGreen" x="940" y="575" width="270" height="130" rx="22"/>
    <rect x="940" y="575" width="270" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1075" y="617" text-anchor="middle" style="font-size:25px">Diario</text>
    <text class="muted small" x="1075" y="651" text-anchor="middle" style="font-size:18px">errori</text>
<text class="muted small" x="1075" y="676" text-anchor="middle" style="font-size:18px">ripassi</text>
  </g>
  <g data-safe-box="1215 455 270 130 8">
    <rect class="softTeal" x="1215" y="455" width="270" height="130" rx="22"/>
    <rect x="1215" y="455" width="270" height="10" rx="5" fill="#1F6F78"/>
    <text class="teal label" x="1350" y="497" text-anchor="middle" style="font-size:25px">Output</text>
    <text class="muted small" x="1350" y="531" text-anchor="middle" style="font-size:18px">quiz, orale</text>
<text class="muted small" x="1350" y="556" text-anchor="middle" style="font-size:18px">risposta, caso</text>
  </g>
  <g data-safe-box="250 795 1100 64 8">
    <rect class="note" x="250" y="795" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="835" text-anchor="middle" style="font-weight:800;font-size:20px">Il piano non misura solo ore: misura output prodotti e errori corretti.</text>
  </g>

</svg>
