<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Dal principio costituzionale al bando di concorso</title>
  <desc id="desc">Flusso che collega gli articoli costituzionali alla costruzione di requisiti, prove, valutazione e tutela nel concorso pubblico.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .ink { fill: #172233; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 50px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 27px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 29px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 22px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 19px; }
      .card { fill: #ffffff; stroke: #cfd8e3; stroke-width: 3; }
      .panel { fill: #ffffff; stroke: #d3dce7; stroke-width: 2; }
      .chip { fill: #eef4fb; stroke: #c5d7ea; stroke-width: 2; }
      .blue { fill: #1f4e79; }
      .green { fill: #2f7d5a; }
      .amber { fill: #b7791f; }
      .red { fill: #a94442; }
      .gray { fill: #64748b; }
      .line { stroke: #1f4e79; stroke-width: 5; stroke-linecap: round; }
      .band { fill: #e8f0f8; stroke: #b9cde1; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="24" markerHeight="24" refX="21" refY="12" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 3 3 L 21 12 L 3 21 z" fill="#1f4e79"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="1000"/>
  <text class="ink title" x="800" y="82" text-anchor="middle">Dal principio costituzionale al bando di concorso</text>
  <text class="muted subtitle" x="800" y="126" text-anchor="middle">Il concorso pubblico è il punto in cui Costituzione, PA e diritti diventano procedura.</text>

  <g transform="translate(80 210)">
    <rect class="card" x="0" y="0" width="420" height="545" rx="18"/>
    <text class="blue label" x="210" y="58" text-anchor="middle">Principi da richiamare</text>

    <g transform="translate(36 92)">
      <rect class="panel" x="0" y="0" width="348" height="68" rx="14"/>
      <text class="blue body" x="28" y="42" style="font-weight:800;">Art. 3</text>
      <text class="muted body" x="132" y="42">eguaglianza</text>
    </g>
    <g transform="translate(36 176)">
      <rect class="panel" x="0" y="0" width="348" height="68" rx="14"/>
      <text class="green body" x="28" y="42" style="font-weight:800;">Art. 51</text>
      <text class="muted body" x="132" y="42">accesso agli uffici</text>
    </g>
    <g transform="translate(36 260)">
      <rect class="panel" x="0" y="0" width="348" height="82" rx="14"/>
      <text class="amber body" x="28" y="39" style="font-weight:800;">Art. 97</text>
      <text class="muted body" x="132" y="36">imparzialità, buon</text>
      <text class="muted body" x="132" y="64">andamento e concorso</text>
    </g>
    <g transform="translate(36 358)">
      <rect class="panel" x="0" y="0" width="348" height="68" rx="14"/>
      <text class="gray body" x="28" y="42" style="font-weight:800;">Art. 98</text>
      <text class="muted body" x="132" y="42">servizio alla Nazione</text>
    </g>
    <g transform="translate(36 442)">
      <rect class="panel" x="0" y="0" width="348" height="68" rx="14"/>
      <text class="red body" x="28" y="42" style="font-weight:800;">Art. 113</text>
      <text class="muted body" x="132" y="42">tutela contro atti PA</text>
    </g>
  </g>

  <path class="line" marker-end="url(#arrowhead)" d="M520 482 H605"/>

  <g transform="translate(625 250)">
    <rect class="card" x="0" y="0" width="350" height="490" rx="18"/>
    <text class="green label" x="175" y="58" text-anchor="middle">Bando</text>
    <text class="muted body" x="175" y="98" text-anchor="middle">atto che traduce</text>
    <text class="muted body" x="175" y="128" text-anchor="middle">i principi in regole</text>

    <rect class="chip" x="56" y="174" width="238" height="58" rx="29"/>
    <text class="ink body" x="175" y="212" text-anchor="middle">requisiti</text>
    <rect class="chip" x="56" y="252" width="238" height="58" rx="29"/>
    <text class="ink body" x="175" y="290" text-anchor="middle">prove</text>
    <rect class="chip" x="56" y="330" width="238" height="58" rx="29"/>
    <text class="ink body" x="175" y="368" text-anchor="middle">punteggi</text>
    <rect class="chip" x="56" y="408" width="238" height="58" rx="29"/>
    <text class="ink body" x="175" y="446" text-anchor="middle">graduatoria</text>
  </g>

  <path class="line" marker-end="url(#arrowhead)" d="M995 482 H1080"/>

  <g transform="translate(1100 210)">
    <rect class="card" x="0" y="0" width="420" height="545" rx="18"/>
    <text class="red label" x="210" y="58" text-anchor="middle">Controllo in prova</text>

    <g transform="translate(38 105)">
      <circle class="blue" cx="24" cy="24" r="24"/>
      <text x="24" y="32" text-anchor="middle" style="fill:#fff;font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:22px;font-weight:900;">1</text>
      <text class="ink small" x="70" y="32">disciplina applicabile</text>
    </g>
    <g transform="translate(38 188)">
      <circle class="green" cx="24" cy="24" r="24"/>
      <text x="24" y="32" text-anchor="middle" style="fill:#fff;font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:22px;font-weight:900;">2</text>
      <text class="ink small" x="70" y="22">ragionevole</text>
      <text class="ink small" x="70" y="48">non discriminatorio</text>
    </g>
    <g transform="translate(38 271)">
      <circle class="amber" cx="24" cy="24" r="24"/>
      <text x="24" y="32" text-anchor="middle" style="fill:#fff;font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:22px;font-weight:900;">3</text>
      <text class="ink small" x="70" y="32">proporzionato</text>
    </g>
    <g transform="translate(38 354)">
      <circle class="gray" cx="24" cy="24" r="24"/>
      <text x="24" y="32" text-anchor="middle" style="fill:#fff;font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:22px;font-weight:900;">4</text>
      <text class="ink small" x="70" y="22">imparzialità</text>
      <text class="ink small" x="70" y="48">buon andamento</text>
    </g>
    <g transform="translate(38 437)">
      <circle class="red" cx="24" cy="24" r="24"/>
      <text x="24" y="32" text-anchor="middle" style="fill:#fff;font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:22px;font-weight:900;">5</text>
      <text class="ink small" x="70" y="32">tutela davanti al giudice</text>
    </g>
  </g>

  <rect class="band" x="430" y="875" width="740" height="62" rx="31"/>
  <text class="blue" x="800" y="915" text-anchor="middle" style="font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:24px;font-weight:800;">Risposta modello: fonte, principio, requisito.</text>
</svg>
