<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Quattro requisiti del modulo</title>
  <desc id="desc">Un modulo utile nasce da un bisogno, chiude una lacuna, produce output e ha limiti.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Quattro requisiti del modulo</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Un modulo utile nasce da un bisogno, chiude una lacuna, produce output e ha limiti.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="230" text-anchor="middle">Senza questi quattro elementi il modulo diventa dispersione</text>
  <g data-safe-box="150 300 300 250 8">
    <rect class="softBlue" x="150" y="300" width="300" height="250" rx="26"/>
    <circle cx="300" cy="355" r="34" fill="#10233F"/>
    <text class="label" x="300" y="366" text-anchor="middle" fill="#FFFFFF">1</text>
    <text class="navy label" x="300" y="420" text-anchor="middle" style="font-size:20px">Esigenza del bando</text>
    <text class="muted small" x="300" y="478" text-anchor="middle" style="font-size:15px">materia, prova o competenza richiesta</text>
  </g>
<g data-safe-box="520 300 300 250 8">
    <rect class="softRed" x="520" y="300" width="300" height="250" rx="26"/>
    <circle cx="670" cy="355" r="34" fill="#7A2430"/>
    <text class="label" x="670" y="366" text-anchor="middle" fill="#FFFFFF">2</text>
    <text class="bordeaux label" x="670" y="420" text-anchor="middle" style="font-size:20px">Lacuna del core</text>
    <text class="muted small" x="670" y="478" text-anchor="middle" style="font-size:14px">il libro base non basta per quel profilo</text>
  </g>
<g data-safe-box="890 300 300 250 8">
    <rect class="softGold" x="890" y="300" width="300" height="250" rx="26"/>
    <circle cx="1040" cy="355" r="34" fill="#D4AF37"/>
    <text class="label" x="1040" y="366" text-anchor="middle" fill="#FFFFFF">3</text>
    <text class="gold label" x="1040" y="420" text-anchor="middle" style="font-size:20px">Output verificabile</text>
    <text class="muted small" x="1040" y="478" text-anchor="middle" style="font-size:15px">quiz, caso, orale, schema o prova</text>
  </g>
<g data-safe-box="1260 300 300 250 8">
    <rect class="softGreen" x="1260" y="300" width="300" height="250" rx="26"/>
    <circle cx="1410" cy="355" r="34" fill="#2F7D5A"/>
    <text class="label" x="1410" y="366" text-anchor="middle" fill="#FFFFFF">4</text>
    <text class="green label" x="1410" y="420" text-anchor="middle" style="font-size:20px">Limite di profondita</text>
    <text class="muted small" x="1410" y="478" text-anchor="middle" style="font-size:15px">tempo massimo e cosa non studiare</text>
  </g>
  <path class="arrowNavy" d="M455 420 L510 420"/>
  <path class="arrowNavy" d="M825 420 L880 420"/>
  <path class="arrowNavy" d="M1195 420 L1250 420"/>
  <g data-safe-box="250 705 1100 64 8">
    <rect class="note" x="250" y="705" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="745" text-anchor="middle" style="font-weight:800;font-size:20px">La risposta non valida e': aver letto il modulo. Serve un prodotto osservabile.</text>
  </g>
</svg>
