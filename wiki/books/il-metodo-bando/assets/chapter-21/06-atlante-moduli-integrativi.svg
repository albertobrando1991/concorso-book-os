<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Atlante operativo dei moduli</title>
  <desc id="desc">Ogni modulo deve collegare profilo, materia, prova e prodotto finale.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Atlante operativo dei moduli</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Ogni modulo deve collegare profilo, materia, prova e prodotto finale.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="225" text-anchor="middle">Ogni modulo deve finire in quiz, caso, orale, schema o simulazione</text>
  <g data-safe-box="110 255 300 150 8">
    <rect class="softBlue" x="110" y="255" width="300" height="150" rx="23"/>
    <rect x="110" y="255" width="300" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="260" y="302" text-anchor="middle" style="font-size:20px">Ente locale</text>
    <path class="thin" d="M140 324 L380 324"/>
    <text class="muted small" x="260" y="364" text-anchor="middle" style="font-size:16px">organi, atti, servizi</text>
  </g>
<g data-safe-box="475 255 300 150 8">
    <rect class="softRed" x="475" y="255" width="300" height="150" rx="23"/>
    <rect x="475" y="255" width="300" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="625" y="302" text-anchor="middle" style="font-size:20px">Amm.-contabile</text>
    <path class="thin" d="M505 324 L745 324"/>
    <text class="muted small" x="625" y="364" text-anchor="middle" style="font-size:16px">bilancio, entrata, spesa</text>
  </g>
<g data-safe-box="840 255 300 150 8">
    <rect class="softGold" x="840" y="255" width="300" height="150" rx="23"/>
    <rect x="840" y="255" width="300" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="990" y="302" text-anchor="middle" style="font-size:20px">Tributario</text>
    <path class="thin" d="M870 324 L1110 324"/>
    <text class="muted small" x="990" y="364" text-anchor="middle" style="font-size:16px">accertamento, riscossione</text>
  </g>
<g data-safe-box="1205 255 300 150 8">
    <rect class="softGreen" x="1205" y="255" width="300" height="150" rx="23"/>
    <rect x="1205" y="255" width="300" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1355" y="302" text-anchor="middle" style="font-size:20px">Giustizia</text>
    <path class="thin" d="M1235 324 L1475 324"/>
    <text class="muted small" x="1355" y="364" text-anchor="middle" style="font-size:16px">uffici, funzioni, lessico</text>
  </g>
<g data-safe-box="110 480 300 150 8">
    <rect class="softTeal" x="110" y="480" width="300" height="150" rx="23"/>
    <rect x="110" y="480" width="300" height="10" rx="5" fill="#1F6F78"/>
    <text class="teal label" x="260" y="527" text-anchor="middle" style="font-size:20px">Lavoro e vigilanza</text>
    <path class="thin" d="M140 549 L380 549"/>
    <text class="muted small" x="260" y="589" text-anchor="middle" style="font-size:16px">previdenza, controlli</text>
  </g>
<g data-safe-box="475 480 300 150 8">
    <rect class="softBlue" x="475" y="480" width="300" height="150" rx="23"/>
    <rect x="475" y="480" width="300" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="625" y="527" text-anchor="middle" style="font-size:20px">Tecnico PA</text>
    <path class="thin" d="M505 549 L745 549"/>
    <text class="muted small" x="625" y="589" text-anchor="middle" style="font-size:16px">procedimento + settore</text>
  </g>
<g data-safe-box="840 480 300 150 8">
    <rect class="softRed" x="840" y="480" width="300" height="150" rx="23"/>
    <rect x="840" y="480" width="300" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="990" y="527" text-anchor="middle" style="font-size:20px">ICT e digitale</text>
    <path class="thin" d="M870 549 L1110 549"/>
    <text class="muted small" x="990" y="589" text-anchor="middle" style="font-size:16px">dati, sicurezza, servizi</text>
  </g>
<g data-safe-box="1205 480 300 150 8">
    <rect class="softGreen" x="1205" y="480" width="300" height="150" rx="23"/>
    <rect x="1205" y="480" width="300" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1355" y="527" text-anchor="middle" style="font-size:20px">Situazionale</text>
    <path class="thin" d="M1235 549 L1475 549"/>
    <text class="muted small" x="1355" y="589" text-anchor="middle" style="font-size:16px">ruolo, legalita, servizio</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">Il modulo non dice: studia tutto. Dice: studia questo per produrre questo.</text>
  </g>
</svg>
