<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Schema di risposta al caso pratico</title>
  <desc id="desc">Fatti, problema, regola, applicazione, soluzione e cautele chiudono il ragionamento.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Schema di risposta al caso pratico</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Fatti, problema, regola, applicazione, soluzione e cautele chiudono il ragionamento.</text>

  <rect class="card" x="80" y="165" width="1440" height="630" rx="30"/>
  <text class="navy label" x="800" y="228" text-anchor="middle">Dalla traccia alla soluzione motivata</text>
  <g data-safe-box="115 330 205 190 8">
    <rect class="softBlue" x="115" y="330" width="205" height="190" rx="24"/>
    <circle cx="217.5" cy="372" r="28" fill="#10233F"/>
    <text class="label" x="217.5" y="381" text-anchor="middle" fill="#FFFFFF">1</text>
    <text class="navy label" x="217.5" y="408" text-anchor="middle" style="font-size:18px">Fatti</text>
    <text class="muted small" x="217" y="422" text-anchor="middle" style="font-size:16px">riassumi</text>
<text class="muted small" x="217" y="449" text-anchor="middle" style="font-size:16px">senza divagare</text>
  </g>
  <g data-safe-box="350 330 205 190 8">
    <rect class="softRed" x="350" y="330" width="205" height="190" rx="24"/>
    <circle cx="452.5" cy="372" r="28" fill="#7A2430"/>
    <text class="label" x="452.5" y="381" text-anchor="middle" fill="#FFFFFF">2</text>
    <text class="bordeaux label" x="452.5" y="408" text-anchor="middle" style="font-size:18px">Problema</text>
    <text class="muted small" x="452" y="422" text-anchor="middle" style="font-size:16px">individua</text>
<text class="muted small" x="452" y="449" text-anchor="middle" style="font-size:16px">il nodo</text>
  </g>
  <g data-safe-box="585 330 205 190 8">
    <rect class="softGold" x="585" y="330" width="205" height="190" rx="24"/>
    <circle cx="687.5" cy="372" r="28" fill="#D4AF37"/>
    <text class="label" x="687.5" y="381" text-anchor="middle" fill="#FFFFFF">3</text>
    <text class="gold label" x="687.5" y="408" text-anchor="middle" style="font-size:18px">Regola</text>
    <text class="muted small" x="687" y="422" text-anchor="middle" style="font-size:16px">principio</text>
<text class="muted small" x="687" y="449" text-anchor="middle" style="font-size:16px">pertinente</text>
  </g>
  <g data-safe-box="820 330 205 190 8">
    <rect class="softGreen" x="820" y="330" width="205" height="190" rx="24"/>
    <circle cx="922.5" cy="372" r="28" fill="#2F7D5A"/>
    <text class="label" x="922.5" y="381" text-anchor="middle" fill="#FFFFFF">4</text>
    <text class="green label" x="922.5" y="408" text-anchor="middle" style="font-size:18px">Applicazione</text>
    <text class="muted small" x="922" y="422" text-anchor="middle" style="font-size:16px">porta la regola</text>
<text class="muted small" x="922" y="449" text-anchor="middle" style="font-size:16px">nel caso</text>
  </g>
  <g data-safe-box="1055 330 205 190 8">
    <rect class="softTeal" x="1055" y="330" width="205" height="190" rx="24"/>
    <circle cx="1157.5" cy="372" r="28" fill="#1F6F78"/>
    <text class="label" x="1157.5" y="381" text-anchor="middle" fill="#FFFFFF">5</text>
    <text class="teal label" x="1157.5" y="408" text-anchor="middle" style="font-size:18px">Soluzione</text>
    <text class="muted small" x="1157" y="422" text-anchor="middle" style="font-size:16px">azione</text>
<text class="muted small" x="1157" y="449" text-anchor="middle" style="font-size:16px">concreta</text>
  </g>
  <g data-safe-box="1290 330 205 190 8">
    <rect class="softBlue" x="1290" y="330" width="205" height="190" rx="24"/>
    <circle cx="1392.5" cy="372" r="28" fill="#10233F"/>
    <text class="label" x="1392.5" y="381" text-anchor="middle" fill="#FFFFFF">6</text>
    <text class="navy label" x="1392.5" y="408" text-anchor="middle" style="font-size:18px">Cautele</text>
    <text class="muted small" x="1392" y="422" text-anchor="middle" style="font-size:16px">termini, dati</text>
<text class="muted small" x="1392" y="449" text-anchor="middle" style="font-size:16px">traccia</text>
  </g>
  <path class="arrowNavy" d="M320 425 L340 425"/>
  <path class="arrowBordeaux" d="M555 425 L575 425"/>
  <path class="arrowGold" d="M790 425 L810 425"/>
  <path class="arrowGreen" d="M1025 425 L1045 425"/>
  <path class="arrowTeal" d="M1260 425 L1280 425"/>
  <g data-safe-box="310 650 330 78 8">
    <rect x="310" y="650" width="330" height="78" rx="20" fill="#2F7D5A"/>
    <text class="label" x="475" y="681" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Apertura forte</text>
    <text class="small" x="475" y="708" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">il caso riguarda...</text>
  </g>
  <g data-safe-box="960 650 330 78 8">
    <rect x="960" y="650" width="330" height="78" rx="20" fill="#7A2430"/>
    <text class="label" x="1125" y="681" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Apertura debole</text>
    <text class="small" x="1125" y="708" text-anchor="middle" fill="#FFFFFF" style="font-size:14px">la PA deve rispettare la legge</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">Una risposta forte applica poca teoria pertinente, non molta teoria scollegata.</text>
  </g>

</svg>
