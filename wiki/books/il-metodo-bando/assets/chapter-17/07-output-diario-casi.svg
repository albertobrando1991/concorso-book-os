<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Output e diario dei casi</title>
  <desc id="desc">Quiz, scritto e orale cambiano forma; il diario corregge il modo di decidere.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Output e diario dei casi</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Quiz, scritto e orale cambiano forma; il diario corregge il modo di decidere.</text>

  <rect class="card" x="80" y="165" width="1440" height="630" rx="30"/>
  <text class="navy label" x="800" y="228" text-anchor="middle">Stesso ragionamento, tre forme di prova</text>
  <g data-safe-box="145 310 300 170 8">
    <rect class="softBlue" x="145" y="310" width="300" height="170" rx="22"/>
    <text class="navy label" x="295" y="355" text-anchor="middle" style="font-size:24px">Quiz</text>
    <text class="muted small" x="295" y="392" text-anchor="middle" style="font-size:17px">scegli opzione</text>
<text class="muted small" x="295" y="420" text-anchor="middle" style="font-size:17px">escludi scorciatoie</text>
  </g>
  <g data-safe-box="650 310 300 170 8">
    <rect class="softRed" x="650" y="310" width="300" height="170" rx="22"/>
    <text class="bordeaux label" x="800" y="355" text-anchor="middle" style="font-size:24px">Scritto</text>
    <text class="muted small" x="800" y="392" text-anchor="middle" style="font-size:17px">argomenta</text>
<text class="muted small" x="800" y="420" text-anchor="middle" style="font-size:17px">in 12-15 righe</text>
  </g>
  <g data-safe-box="1155 310 300 170 8">
    <rect class="softGold" x="1155" y="310" width="300" height="170" rx="22"/>
    <text class="gold label" x="1305" y="355" text-anchor="middle" style="font-size:24px">Orale</text>
    <text class="muted small" x="1305" y="392" text-anchor="middle" style="font-size:17px">spiega</text>
<text class="muted small" x="1305" y="420" text-anchor="middle" style="font-size:17px">ragionamento</text>
  </g>
  <path class="arrowNavy" d="M460 390 L635 390"/>
  <path class="arrowBordeaux" d="M965 390 L1140 390"/>
  <path class="dash" d="M170 555 L1430 555"/>
  <g data-safe-box="165 620 230 78 8">
    <rect x="165" y="620" width="230" height="78" rx="20" fill="#10233F"/>
    <text class="label" x="280" y="651" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Fatti</text>
    <text class="small" x="280" y="678" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">ho capito il caso?</text>
  </g>
  <g data-safe-box="425 620 230 78 8">
    <rect x="425" y="620" width="230" height="78" rx="20" fill="#7A2430"/>
    <text class="label" x="540" y="651" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Competenza</text>
    <text class="small" x="540" y="678" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">chi agisce?</text>
  </g>
  <g data-safe-box="685 620 230 78 8">
    <rect x="685" y="620" width="230" height="78" rx="20" fill="#D4AF37"/>
    <text class="label" x="800" y="651" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Regola</text>
    <text class="small" x="800" y="678" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">principio giusto?</text>
  </g>
  <g data-safe-box="945 620 230 78 8">
    <rect x="945" y="620" width="230" height="78" rx="20" fill="#2F7D5A"/>
    <text class="label" x="1060" y="651" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Output</text>
    <text class="small" x="1060" y="678" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">azione concreta?</text>
  </g>
  <g data-safe-box="1205 620 230 78 8">
    <rect x="1205" y="620" width="230" height="78" rx="20" fill="#1F6F78"/>
    <text class="label" x="1320" y="651" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Tempo</text>
    <text class="small" x="1320" y="678" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">partenza rapida?</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">Nel diario non scrivere solo 'sbagliato': classifica l'errore e correggi il passaggio.</text>
  </g>

</svg>
