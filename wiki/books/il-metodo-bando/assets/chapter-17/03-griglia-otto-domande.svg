<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Griglia in otto domande</title>
  <desc id="desc">Una sequenza stabile impedisce risposte generiche e salti logici.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Griglia in otto domande</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Una sequenza stabile impedisce risposte generiche e salti logici.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <g data-safe-box="110 220 320 150 8">
    <rect class="softBlue" x="110" y="220" width="320" height="150" rx="22"/>
    <circle cx="152" cy="265" r="27" fill="#10233F"/>
    <text class="label" x="152" y="274" text-anchor="middle" fill="#FFFFFF" style="font-size:24px">1</text>
    <text class="navy label" x="290" y="266" text-anchor="middle" style="font-size:21px">Richiesta</text>
    <text class="muted small" x="290" y="308" text-anchor="middle" style="font-size:16px">che cosa vuole la traccia?</text>
  </g>
<g data-safe-box="480 220 320 150 8">
    <rect class="softRed" x="480" y="220" width="320" height="150" rx="22"/>
    <circle cx="522" cy="265" r="27" fill="#7A2430"/>
    <text class="label" x="522" y="274" text-anchor="middle" fill="#FFFFFF" style="font-size:24px">2</text>
    <text class="bordeaux label" x="660" y="266" text-anchor="middle" style="font-size:21px">Fatti</text>
    <text class="muted small" x="660" y="308" text-anchor="middle" style="font-size:16px">quali dati sono essenziali?</text>
  </g>
<g data-safe-box="850 220 320 150 8">
    <rect class="softGold" x="850" y="220" width="320" height="150" rx="22"/>
    <circle cx="892" cy="265" r="27" fill="#D4AF37"/>
    <text class="label" x="892" y="274" text-anchor="middle" fill="#FFFFFF" style="font-size:24px">3</text>
    <text class="gold label" x="1030" y="266" text-anchor="middle" style="font-size:21px">Soggetti</text>
    <text class="muted small" x="1030" y="308" text-anchor="middle" style="font-size:16px">chi chiede e chi decide?</text>
  </g>
<g data-safe-box="1220 220 320 150 8">
    <rect class="softGreen" x="1220" y="220" width="320" height="150" rx="22"/>
    <circle cx="1262" cy="265" r="27" fill="#2F7D5A"/>
    <text class="label" x="1262" y="274" text-anchor="middle" fill="#FFFFFF" style="font-size:24px">4</text>
    <text class="green label" x="1400" y="266" text-anchor="middle" style="font-size:21px">Competenza</text>
    <text class="muted small" x="1400" y="308" text-anchor="middle" style="font-size:16px">qual e' l'ufficio giusto?</text>
  </g>
<g data-safe-box="110 465 320 150 8">
    <rect class="softTeal" x="110" y="465" width="320" height="150" rx="22"/>
    <circle cx="152" cy="510" r="27" fill="#1F6F78"/>
    <text class="label" x="152" y="519" text-anchor="middle" fill="#FFFFFF" style="font-size:24px">5</text>
    <text class="teal label" x="290" y="511" text-anchor="middle" style="font-size:21px">Nucleo</text>
    <text class="muted small" x="290" y="553" text-anchor="middle" style="font-size:16px">quale materia sblocca?</text>
  </g>
<g data-safe-box="480 465 320 150 8">
    <rect class="softBlue" x="480" y="465" width="320" height="150" rx="22"/>
    <circle cx="522" cy="510" r="27" fill="#10233F"/>
    <text class="label" x="522" y="519" text-anchor="middle" fill="#FFFFFF" style="font-size:24px">6</text>
    <text class="navy label" x="660" y="511" text-anchor="middle" style="font-size:21px">Vincoli</text>
    <text class="muted small" x="660" y="553" text-anchor="middle" style="font-size:16px">termini, dati, risorse?</text>
  </g>
<g data-safe-box="850 465 320 150 8">
    <rect class="softRed" x="850" y="465" width="320" height="150" rx="22"/>
    <circle cx="892" cy="510" r="27" fill="#7A2430"/>
    <text class="label" x="892" y="519" text-anchor="middle" fill="#FFFFFF" style="font-size:24px">7</text>
    <text class="bordeaux label" x="1030" y="511" text-anchor="middle" style="font-size:21px">Soluzione</text>
    <text class="muted small" x="1030" y="553" text-anchor="middle" style="font-size:16px">azione legittima e possibile</text>
  </g>
<g data-safe-box="1220 465 320 150 8">
    <rect class="softGreen" x="1220" y="465" width="320" height="150" rx="22"/>
    <circle cx="1262" cy="510" r="27" fill="#2F7D5A"/>
    <text class="label" x="1262" y="519" text-anchor="middle" fill="#FFFFFF" style="font-size:24px">8</text>
    <text class="green label" x="1400" y="511" text-anchor="middle" style="font-size:21px">Output</text>
    <text class="muted small" x="1400" y="553" text-anchor="middle" style="font-size:16px">comunicazione o atto finale</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">La griglia vale per scritto, orale e quiz: cambia solo la forma dell'output.</text>
  </g>

</svg>
