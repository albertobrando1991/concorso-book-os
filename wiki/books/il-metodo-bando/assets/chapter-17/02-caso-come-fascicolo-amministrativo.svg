<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Il caso non e' una storia</title>
  <desc id="desc">Leggi la traccia come un fascicolo: fatti, soggetti, competenza e vincoli.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Il caso non e' una storia</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Leggi la traccia come un fascicolo: fatti, soggetti, competenza e vincoli.</text>

  <rect class="card" x="80" y="165" width="1440" height="630" rx="30"/>
  <g data-safe-box="145 255 390 212 8">
    <rect class="softRed" x="145" y="255" width="390" height="212" rx="22"/>
    <rect x="145" y="255" width="390" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="340" y="297" text-anchor="middle" style="font-size:21px">Traccia narrativa</text>
    <path class="thin" d="M169 315 L511 315"/>
    <text class="muted small" x="175" y="335" style="font-size:17px">dettagli descrittivi</text>
<text class="muted small" x="175" y="366" style="font-size:17px">richieste implicite</text>
<text class="muted small" x="175" y="397" style="font-size:17px">emozioni del caso</text>
<text class="muted small" x="175" y="428" style="font-size:17px">dati secondari</text>
  </g>
  <g data-safe-box="620 340 360 155 8">
    <rect class="softGold" x="620" y="340" width="360" height="155" rx="22"/>
    <rect x="620" y="340" width="360" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="800" y="382" text-anchor="middle" style="font-size:25px">Separare</text>
    <text class="muted small" x="800" y="414" text-anchor="middle" style="font-size:18px">cio che serve</text>
<text class="muted small" x="800" y="439" text-anchor="middle" style="font-size:18px">da cio che distrae</text>
  </g>
  <g data-safe-box="1065 255 390 212 8">
    <rect class="softGreen" x="1065" y="255" width="390" height="212" rx="22"/>
    <rect x="1065" y="255" width="390" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1260" y="297" text-anchor="middle" style="font-size:21px">Fascicolo operativo</text>
    <path class="thin" d="M1089 315 L1431 315"/>
    <text class="muted small" x="1095" y="335" style="font-size:17px">fatti essenziali</text>
<text class="muted small" x="1095" y="366" style="font-size:17px">soggetti e ufficio</text>
<text class="muted small" x="1095" y="397" style="font-size:17px">procedimento</text>
<text class="muted small" x="1095" y="428" style="font-size:17px">regola, vincoli, output</text>
  </g>
  <path class="arrowBordeaux" d="M545 350 L610 390"/>
  <path class="arrowGold" d="M990 390 L1055 350"/>
  <g data-safe-box="205 650 260 78 8">
    <rect x="205" y="650" width="260" height="78" rx="20" fill="#7A2430"/>
    <text class="label" x="335" y="681" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Rischio</text>
    <text class="small" x="335" y="708" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">frasi generiche</text>
  </g>
  <g data-safe-box="670 650 260 78 8">
    <rect x="670" y="650" width="260" height="78" rx="20" fill="#10233F"/>
    <text class="label" x="800" y="681" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Metodo</text>
    <text class="small" x="800" y="708" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">griglia stabile</text>
  </g>
  <g data-safe-box="1135 650 260 78 8">
    <rect x="1135" y="650" width="260" height="78" rx="20" fill="#2F7D5A"/>
    <text class="label" x="1265" y="681" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Risultato</text>
    <text class="small" x="1265" y="708" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">prossimo passo</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">Se non estrai i dati del fascicolo, finisci per raccontare il caso invece di risolverlo.</text>
  </g>

</svg>
