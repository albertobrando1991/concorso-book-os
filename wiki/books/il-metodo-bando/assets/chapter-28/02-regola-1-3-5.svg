<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Regola 1-3-5</title>
  <desc id="desc">Una fonte, tre strumenti, cinque output: meno app, piu decisioni.</desc>
  <style>
    .bg { fill: #F8FAFC; }
    .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
    .title { font: 800 44px Arial, sans-serif; fill: #0F172A; }
    .subtitle { font: 400 22px Arial, sans-serif; fill: #526174; }
    .label { font: 800 25px Arial, sans-serif; fill: #0F172A; }
    .body { font: 400 19px Arial, sans-serif; fill: #0F172A; }
    .small { font: 400 16px Arial, sans-serif; fill: #0F172A; }
    .strong { font-weight: 800; }
    .whiteText { fill: #FFFFFF; }
    .line { stroke: #10233F; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#10233F"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <g data-safe-box="80 16 1440 118 0">
    <text class="title" x="800" y="68" text-anchor="middle">Regola 1-3-5</text>
    <text class="subtitle" x="800" y="108" text-anchor="middle">Una fonte, tre strumenti, cinque output: meno app, piu decisioni.</text>
  </g>

    <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
    <g data-safe-box="130 265 350 375 8">
    <rect x="130" y="265" width="350" height="375" rx="30" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <text class="title" style="fill:#10233F" x="305" y="371" text-anchor="middle">1</text>
    <text class="label" x="305" y="425" text-anchor="middle">Fonte ufficiale</text>
    <text class="small" x="305" y="480" text-anchor="middle">bando</text>
<text class="small" x="305" y="511" text-anchor="middle">avvisi</text>
<text class="small" x="305" y="542" text-anchor="middle">ricevute</text>
  </g>
    <g data-safe-box="605 265 350 375 8">
    <rect x="605" y="265" width="350" height="375" rx="30" fill="#FFF4CC" stroke="#D4AF37" stroke-width="3"/>
    <text class="title" style="fill:#D4AF37" x="780" y="371" text-anchor="middle">3</text>
    <text class="label" x="780" y="425" text-anchor="middle">Strumenti stabili</text>
    <text class="small" x="780" y="480" text-anchor="middle">archivio</text>
<text class="small" x="780" y="511" text-anchor="middle">calendario</text>
<text class="small" x="780" y="542" text-anchor="middle">foglio</text>
  </g>
    <g data-safe-box="1080 265 350 375 8">
    <rect x="1080" y="265" width="350" height="375" rx="30" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
    <text class="title" style="fill:#2F7D5A" x="1255" y="371" text-anchor="middle">5</text>
    <text class="label" x="1255" y="425" text-anchor="middle">Output da produrre</text>
    <text class="small" x="1255" y="480" text-anchor="middle">quiz</text>
<text class="small" x="1255" y="511" text-anchor="middle">risposte</text>
<text class="small" x="1255" y="542" text-anchor="middle">casi</text>
<text class="small" x="1255" y="573" text-anchor="middle">orale</text>
<text class="small" x="1255" y="604" text-anchor="middle">diario</text>
  </g>
    <path class="line" marker-end="url(#arrow)" d="M500 445 L605 445"/>
    <path class="line" marker-end="url(#arrow)" d="M975 445 L1080 445"/>
    <g data-safe-box="250 812 1100 66 8">
    <rect x="250" y="812" width="1100" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="855" text-anchor="middle">La qualita del sistema si misura dagli output, non dal numero di strumenti.</text>
  </g>

</svg>
