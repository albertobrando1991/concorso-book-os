<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Cartella minima del candidato</title>
  <desc id="desc">Cinque cartelle numerate separano fonti, piano, nuclei, output e diario.</desc>
  <style>
    .bg { fill: #F8FAFC; }
    .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
    .title { font: 800 44px Arial, sans-serif; fill: #0F172A; }
    .subtitle { font: 400 22px Arial, sans-serif; fill: #526174; }
    .label { font: 800 25px Arial, sans-serif; fill: #0F172A; }
    .body { font: 400 19px Arial, sans-serif; fill: #0F172A; }
    .small { font: 400 16px Arial, sans-serif; fill: #0F172A; }
    .strong { font-weight: 800; }
    .whiteText { fill: #FFFFFF; }
    .line { stroke: #10233F; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#10233F"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <g data-safe-box="80 16 1440 118 0">
    <text class="title" x="800" y="68" text-anchor="middle">Cartella minima del candidato</text>
    <text class="subtitle" x="800" y="108" text-anchor="middle">Cinque cartelle numerate separano fonti, piano, nuclei, output e diario.</text>
  </g>

    <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
    <g data-safe-box="130 220 690 78 8">
    <rect x="130" y="220" width="690" height="78" rx="18" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <rect x="130" y="220" width="106" height="78" rx="18" fill="#10233F"/>
    <text class="label whiteText" x="183" y="269" text-anchor="middle">01</text>
    <text class="label" x="380" y="254" text-anchor="middle">bando-fonti</text>
    <text class="small" x="540" y="280" text-anchor="middle">bando, avvisi, allegati, ricevute</text>
  </g>
<g data-safe-box="130 325 690 78 8">
    <rect x="130" y="325" width="690" height="78" rx="18" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <rect x="130" y="325" width="106" height="78" rx="18" fill="#10233F"/>
    <text class="label whiteText" x="183" y="374" text-anchor="middle">02</text>
    <text class="label" x="380" y="359" text-anchor="middle">decoder-piano</text>
    <text class="small" x="540" y="385" text-anchor="middle">decoder, calendario, priorita</text>
  </g>
<g data-safe-box="130 430 690 78 8">
    <rect x="130" y="430" width="690" height="78" rx="18" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <rect x="130" y="430" width="106" height="78" rx="18" fill="#10233F"/>
    <text class="label whiteText" x="183" y="479" text-anchor="middle">03</text>
    <text class="label" x="380" y="464" text-anchor="middle">materie-nuclei</text>
    <text class="small" x="540" y="490" text-anchor="middle">schemi, mappe, domande</text>
  </g>
<g data-safe-box="130 535 690 78 8">
    <rect x="130" y="535" width="690" height="78" rx="18" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <rect x="130" y="535" width="106" height="78" rx="18" fill="#10233F"/>
    <text class="label whiteText" x="183" y="584" text-anchor="middle">04</text>
    <text class="label" x="380" y="569" text-anchor="middle">output</text>
    <text class="small" x="540" y="595" text-anchor="middle">quiz, casi, risposte, simulazioni</text>
  </g>
<g data-safe-box="130 640 690 78 8">
    <rect x="130" y="640" width="690" height="78" rx="18" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <rect x="130" y="640" width="106" height="78" rx="18" fill="#10233F"/>
    <text class="label whiteText" x="183" y="689" text-anchor="middle">05</text>
    <text class="label" x="380" y="674" text-anchor="middle">diario-errori</text>
    <text class="small" x="540" y="700" text-anchor="middle">errore, causa, azione, verifica</text>
  </g>
    <g data-safe-box="930 245 470 118 8">
    <rect x="930" y="245" width="470" height="118" rx="22" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <text class="label" style="fill:#10233F" x="1165" y="288" text-anchor="middle">Regola 1</text>
    <text class="small strong" x="1165" y="325" text-anchor="middle">nessun riassunto senza fonte</text>
  </g>
    <g data-safe-box="930 400 470 118 8">
    <rect x="930" y="400" width="470" height="118" rx="22" fill="#FFF4CC" stroke="#D4AF37" stroke-width="3"/>
    <text class="label" style="fill:#D4AF37" x="1165" y="443" text-anchor="middle">Regola 2</text>
    <text class="small strong" x="1165" y="480" text-anchor="middle">una sola versione aggiornata</text>
  </g>
    <g data-safe-box="930 555 470 118 8">
    <rect x="930" y="555" width="470" height="118" rx="22" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
    <text class="label" style="fill:#2F7D5A" x="1165" y="598" text-anchor="middle">Regola 3</text>
    <text class="small strong" x="1165" y="635" text-anchor="middle">ogni output ha una data</text>
  </g>
    <g data-safe-box="250 812 1100 66 8">
    <rect x="250" y="812" width="1100" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="855" text-anchor="middle">La numerazione impedisce alla cartella Concorso di diventare ingestibile.</text>
  </g>

</svg>
