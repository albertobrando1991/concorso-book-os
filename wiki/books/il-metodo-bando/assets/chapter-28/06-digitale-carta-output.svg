<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Digitale e carta devono parlarsi</title>
  <desc id="desc">Ogni contenuto essenziale deve essere ritrovabile, esportabile e allenabile.</desc>
  <style>
    .bg { fill: #F8FAFC; }
    .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
    .title { font: 800 44px Arial, sans-serif; fill: #0F172A; }
    .subtitle { font: 400 22px Arial, sans-serif; fill: #526174; }
    .label { font: 800 25px Arial, sans-serif; fill: #0F172A; }
    .body { font: 400 19px Arial, sans-serif; fill: #0F172A; }
    .small { font: 400 16px Arial, sans-serif; fill: #0F172A; }
    .strong { font-weight: 800; }
    .whiteText { fill: #FFFFFF; }
    .line { stroke: #10233F; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#10233F"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <g data-safe-box="80 16 1440 118 0">
    <text class="title" x="800" y="68" text-anchor="middle">Digitale e carta devono parlarsi</text>
    <text class="subtitle" x="800" y="108" text-anchor="middle">Ogni contenuto essenziale deve essere ritrovabile, esportabile e allenabile.</text>
  </g>

    <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
    <g data-safe-box="115 330 240 245 8">
    <rect x="115" y="330" width="240" height="245" rx="26" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <text class="label" style="fill:#10233F" x="235" y="392" text-anchor="middle">Digitale</text>
    <text class="small" x="235" y="460" text-anchor="middle">cartella</text>
<text class="small" x="235" y="491" text-anchor="middle">foglio</text>
<text class="small" x="235" y="522" text-anchor="middle">AI</text>
  </g>
    <g data-safe-box="425 330 240 245 8">
    <rect x="425" y="330" width="240" height="245" rx="26" fill="#FFF4CC" stroke="#D4AF37" stroke-width="3"/>
    <text class="label" style="fill:#D4AF37" x="545" y="392" text-anchor="middle">Export</text>
    <text class="small" x="545" y="460" text-anchor="middle">PDF</text>
<text class="small" x="545" y="491" text-anchor="middle">stampa</text>
<text class="small" x="545" y="522" text-anchor="middle">backup</text>
  </g>
    <g data-safe-box="735 330 240 245 8">
    <rect x="735" y="330" width="240" height="245" rx="26" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
    <text class="label" style="fill:#2F7D5A" x="855" y="392" text-anchor="middle">Workbook</text>
    <text class="small" x="855" y="460" text-anchor="middle">scheda</text>
<text class="small" x="855" y="491" text-anchor="middle">settimana</text>
<text class="small" x="855" y="522" text-anchor="middle">20 errori</text>
  </g>
    <g data-safe-box="1045 330 240 245 8">
    <rect x="1045" y="330" width="240" height="245" rx="26" fill="#E4F4F5" stroke="#1F6F78" stroke-width="3"/>
    <text class="label" style="fill:#1F6F78" x="1165" y="392" text-anchor="middle">Output</text>
    <text class="small" x="1165" y="460" text-anchor="middle">quiz</text>
<text class="small" x="1165" y="491" text-anchor="middle">caso</text>
<text class="small" x="1165" y="522" text-anchor="middle">orale</text>
  </g>
    <path class="line" marker-end="url(#arrow)" d="M355 455 L425 455"/>
    <path class="line" marker-end="url(#arrow)" d="M665 455 L735 455"/>
    <path class="line" marker-end="url(#arrow)" d="M975 455 L1045 455"/>
    <g data-safe-box="455 645 690 150 8">
    <rect x="455" y="645" width="690" height="150" rx="24" fill="#F8E8EA" stroke="#7A2430" stroke-width="3"/>
    <rect x="455" y="645" width="690" height="12" rx="6" fill="#7A2430"/>
    <text class="label" x="800" y="697" text-anchor="middle">Tre controlli</text>
    <text class="small" x="800" y="727" text-anchor="middle">ritrovare</text>
<text class="small" x="800" y="755" text-anchor="middle">verificare</text>
<text class="small" x="800" y="783" text-anchor="middle">esportare</text>
  </g>
    <g data-safe-box="250 812 1100 66 8">
    <rect x="250" y="812" width="1100" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="855" text-anchor="middle">Se non puoi recuperarlo nei giorni pieni, non affidargli una parte essenziale.</text>
  </g>

</svg>
