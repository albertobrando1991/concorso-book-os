<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Ansia da prova: trasformarla in procedura</title>
  <desc id="desc">Il Diario distingue lacuna, fretta, disordine e routine mancante.</desc>
  <style>
    .bg { fill: #F8FAFC; }
    .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
    .title { font: 800 44px Arial, sans-serif; fill: #0F172A; }
    .subtitle { font: 400 22px Arial, sans-serif; fill: #526174; }
    .label { font: 800 25px Arial, sans-serif; fill: #0F172A; }
    .body { font: 400 19px Arial, sans-serif; fill: #0F172A; }
    .small { font: 400 16px Arial, sans-serif; fill: #0F172A; }
    .strong { font-weight: 800; }
    .whiteText { fill: #FFFFFF; }
    .line { stroke: #10233F; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#10233F"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <g data-safe-box="80 16 1440 118 0">
    <text class="title" x="800" y="68" text-anchor="middle">Ansia da prova: trasformarla in procedura</text>
    <text class="subtitle" x="800" y="108" text-anchor="middle">Il Diario distingue lacuna, fretta, disordine e routine mancante.</text>
  </g>

    <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
    <g data-safe-box="115 340 360 150 8">
    <rect x="115" y="340" width="360" height="150" rx="24" fill="#F8E8EA" stroke="#7A2430" stroke-width="3"/>
    <rect x="115" y="340" width="360" height="12" rx="6" fill="#7A2430"/>
    <text class="label" x="295" y="392" text-anchor="middle">Segnale</text>
    <text class="small" x="295" y="422" text-anchor="middle">errore sotto pressione</text>
<text class="small" x="295" y="450" text-anchor="middle">blocco o fretta</text>
  </g>
    <g data-safe-box="620 250 360 150 8">
    <rect x="620" y="250" width="360" height="150" rx="24" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <rect x="620" y="250" width="360" height="12" rx="6" fill="#10233F"/>
    <text class="label" x="800" y="302" text-anchor="middle">Diario</text>
    <text class="small" x="800" y="332" text-anchor="middle">non sapevo?</text>
<text class="small" x="800" y="360" text-anchor="middle">ho letto male?</text>
<text class="small" x="800" y="388" text-anchor="middle">ho perso ordine?</text>
  </g>
    <g data-safe-box="1125 340 360 150 8">
    <rect x="1125" y="340" width="360" height="150" rx="24" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
    <rect x="1125" y="340" width="360" height="12" rx="6" fill="#2F7D5A"/>
    <text class="label" x="1305" y="392" text-anchor="middle">Azione</text>
    <text class="small" x="1305" y="422" text-anchor="middle">simulazione breve</text>
<text class="small" x="1305" y="450" text-anchor="middle">timer realistico</text>
<text class="small" x="1305" y="478" text-anchor="middle">routine consegne</text>
  </g>
    <path class="line" marker-end="url(#arrow)" d="M475 415 L620 360"/>
    <path class="line" marker-end="url(#arrow)" d="M980 360 L1125 415"/>
    <g data-safe-box="250 812 1100 66 8">
    <rect x="250" y="812" width="1100" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="855" text-anchor="middle">Se il disagio e' intenso o persistente, serve supporto qualificato.</text>
  </g>

</svg>
