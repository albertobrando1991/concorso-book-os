<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Energia alta, media, bassa, minima</title>
  <desc id="desc">Le ore non valgono tutte uguale: assegna il compito giusto all'energia reale.</desc>
  <style>
    .bg { fill: #F8FAFC; }
    .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
    .title { font: 800 44px Arial, sans-serif; fill: #0F172A; }
    .subtitle { font: 400 22px Arial, sans-serif; fill: #526174; }
    .label { font: 800 25px Arial, sans-serif; fill: #0F172A; }
    .body { font: 400 19px Arial, sans-serif; fill: #0F172A; }
    .small { font: 400 16px Arial, sans-serif; fill: #0F172A; }
    .strong { font-weight: 800; }
    .whiteText { fill: #FFFFFF; }
    .line { stroke: #10233F; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#10233F"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <g data-safe-box="80 16 1440 118 0">
    <text class="title" x="800" y="68" text-anchor="middle">Energia alta, media, bassa, minima</text>
    <text class="subtitle" x="800" y="108" text-anchor="middle">Le ore non valgono tutte uguale: assegna il compito giusto all'energia reale.</text>
  </g>

    <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
    <g data-safe-box="130 285 300 345 8">
    <rect x="130" y="285" width="300" height="345" rx="28" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <rect x="130" y="285" width="300" height="14" rx="7" fill="#10233F"/>
    <text class="label" style="fill:#10233F" x="280" y="355" text-anchor="middle">Alta</text>
    <text class="small strong" x="280" y="427" text-anchor="middle">Usa per</text>
    <text class="small" x="280" y="461" text-anchor="middle">simulazioni e casi</text>
    <text class="small strong" x="280" y="530" text-anchor="middle">Evita</text>
    <text class="small" x="280" y="564" text-anchor="middle">non riordinare file</text>
  </g>
<g data-safe-box="490 285 300 345 8">
    <rect x="490" y="285" width="300" height="345" rx="28" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
    <rect x="490" y="285" width="300" height="14" rx="7" fill="#2F7D5A"/>
    <text class="label" style="fill:#2F7D5A" x="640" y="355" text-anchor="middle">Media</text>
    <text class="small strong" x="640" y="427" text-anchor="middle">Usa per</text>
    <text class="small" x="640" y="461" text-anchor="middle">quiz e ripasso</text>
    <text class="small strong" x="640" y="530" text-anchor="middle">Evita</text>
    <text class="small" x="640" y="564" text-anchor="middle">non aprire tre materie</text>
  </g>
<g data-safe-box="850 285 300 345 8">
    <rect x="850" y="285" width="300" height="345" rx="28" fill="#FFF4CC" stroke="#D4AF37" stroke-width="3"/>
    <rect x="850" y="285" width="300" height="14" rx="7" fill="#D4AF37"/>
    <text class="label" style="fill:#D4AF37" x="1000" y="355" text-anchor="middle">Bassa</text>
    <text class="small strong" x="1000" y="427" text-anchor="middle">Usa per</text>
    <text class="small" x="1000" y="461" text-anchor="middle">correzione errori</text>
    <text class="small strong" x="1000" y="530" text-anchor="middle">Evita</text>
    <text class="small" x="1000" y="564" text-anchor="middle">non forzare studio profondo</text>
  </g>
<g data-safe-box="1210 285 300 345 8">
    <rect x="1210" y="285" width="300" height="345" rx="28" fill="#F8E8EA" stroke="#7A2430" stroke-width="3"/>
    <rect x="1210" y="285" width="300" height="14" rx="7" fill="#7A2430"/>
    <text class="label" style="fill:#7A2430" x="1360" y="355" text-anchor="middle">Minima</text>
    <text class="small strong" x="1360" y="427" text-anchor="middle">Usa per</text>
    <text class="small" x="1360" y="461" text-anchor="middle">una azione piccola</text>
    <text class="small strong" x="1360" y="530" text-anchor="middle">Evita</text>
    <text class="small" x="1360" y="564" text-anchor="middle">non recuperare tutto</text>
  </g>
    <g data-safe-box="455 660 690 150 8">
    <rect x="455" y="660" width="690" height="150" rx="24" fill="#E4F4F5" stroke="#1F6F78" stroke-width="3"/>
    <rect x="455" y="660" width="690" height="12" rx="6" fill="#1F6F78"/>
    <text class="label" x="800" y="712" text-anchor="middle">Regola pratica</text>
    <text class="small" x="800" y="742" text-anchor="middle">ore migliori agli output difficili</text>
<text class="small" x="800" y="770" text-anchor="middle">ore peggiori alla manutenzione del sistema</text>
  </g>
    <g data-safe-box="250 812 1100 66 8">
    <rect x="250" y="812" width="1100" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="855" text-anchor="middle">Un calendario sostenibile prevede anche giornate basse.</text>
  </g>

</svg>
