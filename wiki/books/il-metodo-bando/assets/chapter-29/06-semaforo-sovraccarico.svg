<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Semaforo del sovraccarico</title>
  <desc id="desc">Verde mantiene, giallo riduce, rosso taglia e protegge il sistema.</desc>
  <style>
    .bg { fill: #F8FAFC; }
    .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
    .title { font: 800 44px Arial, sans-serif; fill: #0F172A; }
    .subtitle { font: 400 22px Arial, sans-serif; fill: #526174; }
    .label { font: 800 25px Arial, sans-serif; fill: #0F172A; }
    .body { font: 400 19px Arial, sans-serif; fill: #0F172A; }
    .small { font: 400 16px Arial, sans-serif; fill: #0F172A; }
    .strong { font-weight: 800; }
    .whiteText { fill: #FFFFFF; }
    .line { stroke: #10233F; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#10233F"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <g data-safe-box="80 16 1440 118 0">
    <text class="title" x="800" y="68" text-anchor="middle">Semaforo del sovraccarico</text>
    <text class="subtitle" x="800" y="108" text-anchor="middle">Verde mantiene, giallo riduce, rosso taglia e protegge il sistema.</text>
  </g>

    <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
    <g data-safe-box="240 250 710 125 8">
    <rect x="240" y="250" width="710" height="125" rx="24" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
    <circle cx="310" cy="312.5" r="34" fill="#2F7D5A"/>
    <text class="label" style="fill:#2F7D5A" x="420" y="304" text-anchor="middle">Verde</text>
    <text class="small" x="660" y="298" text-anchor="middle">studio e output procedono</text>
    <text class="small strong" x="660" y="334" text-anchor="middle">mantieni</text>
  </g>
<g data-safe-box="240 405 710 125 8">
    <rect x="240" y="405" width="710" height="125" rx="24" fill="#FFF4CC" stroke="#D4AF37" stroke-width="3"/>
    <circle cx="310" cy="467.5" r="34" fill="#D4AF37"/>
    <text class="label" style="fill:#D4AF37" x="420" y="459" text-anchor="middle">Giallo</text>
    <text class="small" x="660" y="453" text-anchor="middle">ritardi ed errori aumentano</text>
    <text class="small strong" x="660" y="489" text-anchor="middle">riduci e proteggi</text>
  </g>
<g data-safe-box="240 560 710 125 8">
    <rect x="240" y="560" width="710" height="125" rx="24" fill="#F8E8EA" stroke="#7A2430" stroke-width="3"/>
    <circle cx="310" cy="622.5" r="34" fill="#7A2430"/>
    <text class="label" style="fill:#7A2430" x="420" y="614" text-anchor="middle">Rosso</text>
    <text class="small" x="660" y="608" text-anchor="middle">piano irrealistico</text>
    <text class="small strong" x="660" y="644" text-anchor="middle">taglia e chiedi supporto</text>
  </g>
    <g data-safe-box="1010 330 380 230 8">
    <rect x="1010" y="330" width="380" height="230" rx="26" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <text class="label" style="fill:#10233F" x="1200" y="386" text-anchor="middle">Decisione</text>
    <text class="small" x="1200" y="430" text-anchor="middle">il colore non giudica</text>
<text class="small" x="1200" y="462" text-anchor="middle">serve a scegliere il prossimo passo</text>
  </g>
    <g data-safe-box="250 812 1100 66 8">
    <rect x="250" y="812" width="1100" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="855" text-anchor="middle">Il rosso non e' fallimento: e' un piano non piu sostenibile.</text>
  </g>

</svg>
