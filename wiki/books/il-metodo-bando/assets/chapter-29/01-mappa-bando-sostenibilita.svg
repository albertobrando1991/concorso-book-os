    <text class="label whiteText" x="1387.5" y="436" text-anchor="middle">O</text>
    <text class="label" x="1387.5" y="491" text-anchor="middle">Output</text>
    <text class="small" x="1387.5" y="533" text-anchor="middle">prova minima</text>
  </g>
    <path class="line" marker-end="url(#arrow)" d="M365 490 L395 490"/>
<path class="line" marker-end="url(#arrow)" d="M655 490 L685 490"/>
<path class="line" marker-end="url(#arrow)" d="M945 490 L975 490"/>
<path class="line" marker-end="url(#arrow)" d="M1235 490 L1265 490"/>
    <g data-safe-box="250 812 1100 66 8">
    <rect x="250" y="812" width="1100" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="855" text-anchor="middle">La continuita nasce dal non perdere il filo, non dallo studiare sempre tanto.</text>
  </g>

</svg>
