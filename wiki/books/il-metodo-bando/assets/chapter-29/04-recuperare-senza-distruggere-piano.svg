<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Recuperare senza distruggere il piano</title>
  <desc id="desc">Il recupero corretto taglia, protegge output e aggiorna la settimana.</desc>
  <style>
    .bg { fill: #F8FAFC; }
    .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
    .title { font: 800 44px Arial, sans-serif; fill: #0F172A; }
    .subtitle { font: 400 22px Arial, sans-serif; fill: #526174; }
    .label { font: 800 25px Arial, sans-serif; fill: #0F172A; }
    .body { font: 400 19px Arial, sans-serif; fill: #0F172A; }
    .small { font: 400 16px Arial, sans-serif; fill: #0F172A; }
    .strong { font-weight: 800; }
    .whiteText { fill: #FFFFFF; }
    .line { stroke: #10233F; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#10233F"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <g data-safe-box="80 16 1440 118 0">
    <text class="title" x="800" y="68" text-anchor="middle">Recuperare senza distruggere il piano</text>
    <text class="subtitle" x="800" y="108" text-anchor="middle">Il recupero corretto taglia, protegge output e aggiorna la settimana.</text>
  </g>

    <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
    <g data-safe-box="135 305 390 310 8">
    <rect x="135" y="305" width="390" height="310" rx="28" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <text class="label" style="fill:#10233F" x="330" y="383" text-anchor="middle">Essenziale?</text>
    <line x1="205" y1="417" x2="455" y2="417" stroke="#CBD5E1" stroke-width="3"/>
    <text class="small strong" x="330" y="480" text-anchor="middle">recupero solo il nucleo ad alta resa</text>
  </g>
<g data-safe-box="620 305 390 310 8">
    <rect x="620" y="305" width="390" height="310" rx="28" fill="#FFF4CC" stroke="#D4AF37" stroke-width="3"/>
    <text class="label" style="fill:#D4AF37" x="815" y="383" text-anchor="middle">Tagliare?</text>
    <line x1="690" y1="417" x2="940" y2="417" stroke="#CBD5E1" stroke-width="3"/>
    <text class="small strong" x="815" y="480" text-anchor="middle">elimino duplicati e letture passive</text>
  </g>
<g data-safe-box="1105 305 390 310 8">
    <rect x="1105" y="305" width="390" height="310" rx="28" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
    <text class="label" style="fill:#2F7D5A" x="1300" y="383" text-anchor="middle">Proteggere?</text>
    <line x1="1175" y1="417" x2="1425" y2="417" stroke="#CBD5E1" stroke-width="3"/>
    <text class="small strong" x="1300" y="480" text-anchor="middle">salvo quiz, caso, orale o simulazione</text>
  </g>
    <path class="line" marker-end="url(#arrow)" d="M520 465 L620 465"/>
    <path class="line" marker-end="url(#arrow)" d="M1005 465 L1105 465"/>
    <g data-safe-box="485 645 630 150 8">
    <rect x="485" y="645" width="630" height="150" rx="24" fill="#F8E8EA" stroke="#7A2430" stroke-width="3"/>
    <rect x="485" y="645" width="630" height="12" rx="6" fill="#7A2430"/>
    <text class="label" x="800" y="697" text-anchor="middle">No al recupero punitivo</text>
    <text class="small" x="800" y="727" text-anchor="middle">non trasformare tre ore perse in sei ore impossibili</text>
  </g>
    <g data-safe-box="250 812 1100 66 8">
    <rect x="250" y="812" width="1100" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="855" text-anchor="middle">Se perdi due giorni, non fingi che nulla sia accaduto: aggiorni il piano.</text>
  </g>

</svg>
