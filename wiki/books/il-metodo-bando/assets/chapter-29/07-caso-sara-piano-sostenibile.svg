<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Caso Sara: recuperare cio che conta</title>
  <desc id="desc">Una settimana difficile non deve distruggere l'intero piano.</desc>
  <style>
    .bg { fill: #F8FAFC; }
    .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
    .title { font: 800 44px Arial, sans-serif; fill: #0F172A; }
    .subtitle { font: 400 22px Arial, sans-serif; fill: #526174; }
    .label { font: 800 25px Arial, sans-serif; fill: #0F172A; }
    .body { font: 400 19px Arial, sans-serif; fill: #0F172A; }
    .small { font: 400 16px Arial, sans-serif; fill: #0F172A; }
    .strong { font-weight: 800; }
    .whiteText { fill: #FFFFFF; }
    .line { stroke: #10233F; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#10233F"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <g data-safe-box="80 16 1440 118 0">
    <text class="title" x="800" y="68" text-anchor="middle">Caso Sara: recuperare cio che conta</text>
    <text class="subtitle" x="800" y="108" text-anchor="middle">Una settimana difficile non deve distruggere l'intero piano.</text>
  </g>

    <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
    <g data-safe-box="105 285 390 360 8">
    <rect x="105" y="285" width="390" height="360" rx="28" fill="#F8E8EA" stroke="#7A2430" stroke-width="3"/>
    <rect x="105" y="285" width="390" height="14" rx="7" fill="#7A2430"/>
    <text class="label" style="fill:#7A2430" x="300" y="357" text-anchor="middle">Problema</text>
    <text class="small" x="300" y="415" text-anchor="middle">due sere saltate</text>
<text class="small" x="300" y="457" text-anchor="middle">simulazione debole</text>
<text class="small" x="300" y="499" text-anchor="middle">ansia sul tempo</text>
  </g>
    <g data-safe-box="590 285 390 360 8">
    <rect x="590" y="285" width="390" height="360" rx="28" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <rect x="590" y="285" width="390" height="14" rx="7" fill="#10233F"/>
    <text class="label" style="fill:#10233F" x="785" y="357" text-anchor="middle">Diario</text>
    <text class="small" x="785" y="415" text-anchor="middle">lettura frettolosa</text>
<text class="small" x="785" y="457" text-anchor="middle">fasi della spesa</text>
<text class="small" x="785" y="499" text-anchor="middle">gestione tempo</text>
  </g>
    <g data-safe-box="1075 285 390 360 8">
    <rect x="1075" y="285" width="390" height="360" rx="28" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
    <rect x="1075" y="285" width="390" height="14" rx="7" fill="#2F7D5A"/>
    <text class="label" style="fill:#2F7D5A" x="1270" y="357" text-anchor="middle">Revisione</text>
    <text class="small" x="1270" y="415" text-anchor="middle">taglia lettura passiva</text>
<text class="small" x="1270" y="457" text-anchor="middle">blocco errori</text>
<text class="small" x="1270" y="499" text-anchor="middle">routine tre giri</text>
  </g>
    <path class="line" marker-end="url(#arrow)" d="M500 455 L590 455"/>
    <path class="line" marker-end="url(#arrow)" d="M985 455 L1075 455"/>
    <g data-safe-box="250 812 1100 66 8">
    <rect x="250" y="812" width="1100" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="855" text-anchor="middle">Sara non recupera tutto: recupera cio che incide sulla prova.</text>
  </g>

</svg>
