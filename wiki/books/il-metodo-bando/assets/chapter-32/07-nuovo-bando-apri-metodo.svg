<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Nuovo bando: apri prima il metodo</title>
  <desc id="desc">Il bando viene prima di manuali, corsi, quiz e strumenti.</desc>
  <style>
    .bg { fill: #F8FAFC; }
    .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
    .title { font: 800 43px Arial, sans-serif; fill: #0F172A; }
    .subtitle { font: 400 21px Arial, sans-serif; fill: #526174; }
    .label { font: 800 25px Arial, sans-serif; fill: #0F172A; }
    .body { font: 400 19px Arial, sans-serif; fill: #0F172A; }
    .small { font: 400 16px Arial, sans-serif; fill: #0F172A; }
    .strong { font-weight: 800; }
    .whiteText { fill: #FFFFFF; }
    .line { stroke: #10233F; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#10233F"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <g data-safe-box="80 16 1440 118 0">
    <text class="title" x="800" y="68" text-anchor="middle">Nuovo bando: apri prima il metodo</text>
    <text class="subtitle" x="800" y="108" text-anchor="middle">Il bando viene prima di manuali, corsi, quiz e strumenti.</text>
  </g>
  
    <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
    <g data-safe-box="95 365 170 185 8">
    <rect x="95" y="365" width="170" height="185" rx="24" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <circle cx="180" cy="413" r="27" fill="#10233F"/>
    <text class="small strong whiteText" x="180" y="420" text-anchor="middle">1</text>
    <text class="small strong" style="fill:#10233F" x="180" y="470" text-anchor="middle">Leggi</text>
    <text class="small" x="180" y="510" text-anchor="middle">requisiti</text>
  </g>
<g data-safe-box="300 365 170 185 8">
    <rect x="300" y="365" width="170" height="185" rx="24" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
    <circle cx="385" cy="413" r="27" fill="#2F7D5A"/>
    <text class="small strong whiteText" x="385" y="420" text-anchor="middle">2</text>
    <text class="small strong" style="fill:#2F7D5A" x="385" y="470" text-anchor="middle">Decoder</text>
    <text class="small" x="385" y="510" text-anchor="middle">bando</text>
  </g>
<g data-safe-box="505 365 170 185 8">
    <rect x="505" y="365" width="170" height="185" rx="24" fill="#FFF4CC" stroke="#D4AF37" stroke-width="3"/>
    <circle cx="590" cy="413" r="27" fill="#D4AF37"/>
    <text class="small strong whiteText" x="590" y="420" text-anchor="middle">3</text>
    <text class="small strong" style="fill:#D4AF37" x="590" y="470" text-anchor="middle">Matrice</text>
    <text class="small" x="590" y="510" text-anchor="middle">confronto</text>
  </g>
<g data-safe-box="710 365 170 185 8">
    <rect x="710" y="365" width="170" height="185" rx="24" fill="#E4F4F5" stroke="#1F6F78" stroke-width="3"/>
