    <text class="small strong" style="fill:#5B3B82" x="1205" y="470" text-anchor="middle">Piano</text>
    <text class="small" x="1205" y="510" text-anchor="middle">settimana</text>
  </g>
<g data-safe-box="1325 365 170 185 8">
    <rect x="1325" y="365" width="170" height="185" rx="24" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <circle cx="1410" cy="413" r="27" fill="#10233F"/>
    <text class="small strong whiteText" x="1410" y="420" text-anchor="middle">7</text>
    <text class="small strong" style="fill:#10233F" x="1410" y="470" text-anchor="middle">Output</text>
    <text class="small" x="1410" y="510" text-anchor="middle">prova</text>
  </g>
    <path class="line" marker-end="url(#arrow)" d="M265 455 L300 455"/>
<path class="line" marker-end="url(#arrow)" d="M470 455 L505 455"/>
<path class="line" marker-end="url(#arrow)" d="M675 455 L710 455"/>
<path class="line" marker-end="url(#arrow)" d="M880 455 L915 455"/>
<path class="line" marker-end="url(#arrow)" d="M1085 455 L1120 455"/>
<path class="line" marker-end="url(#arrow)" d="M1290 455 L1325 455"/>
    <g data-safe-box="455 635 690 150 8">
    <rect x="455" y="635" width="690" height="150" rx="24" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <rect x="455" y="635" width="690" height="12" rx="6" fill="#10233F"/>
    <text class="label" x="800" y="687" text-anchor="middle">Solo dopo</text>
    <text class="small" x="800" y="717" text-anchor="middle">scegli libri, corsi, quiz e strumenti</text>
<text class="small" x="800" y="745" text-anchor="middle">il materiale segue il bando</text>
  </g>
    <g data-safe-box="245 810 1110 66 8">
    <rect x="245" y="810" width="1110" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="853" text-anchor="middle">Il sistema non elimina la lettura del bando: la rende piu veloce e piu precisa.</text>
  </g>
    
</svg>
