    <text class="small strong whiteText" x="795" y="420" text-anchor="middle">4</text>
    <text class="small strong" style="fill:#1F6F78" x="795" y="470" text-anchor="middle">Capitale</text>
    <text class="small" x="795" y="510" text-anchor="middle">riuso</text>
  </g>
<g data-safe-box="915 365 170 185 8">
    <rect x="915" y="365" width="170" height="185" rx="24" fill="#F8E8EA" stroke="#7A2430" stroke-width="3"/>
    <circle cx="1000" cy="413" r="27" fill="#7A2430"/>
    <text class="small strong whiteText" x="1000" y="420" text-anchor="middle">5</text>
    <text class="small strong" style="fill:#7A2430" x="1000" y="470" text-anchor="middle">Moduli</text>
    <text class="small" x="1000" y="510" text-anchor="middle">mancanti</text>
  </g>
<g data-safe-box="1120 365 170 185 8">
    <rect x="1120" y="365" width="170" height="185" rx="24" fill="#EFEAF7" stroke="#5B3B82" stroke-width="3"/>
    <circle cx="1205" cy="413" r="27" fill="#5B3B82"/>
