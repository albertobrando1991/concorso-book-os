<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Protocollo 15/30/60</title>
  <desc id="desc">La manutenzione deve essere breve, altrimenti diventa un lavoro parallelo.</desc>
  <style>
    .bg { fill: #F8FAFC; }
    .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
    .title { font: 800 43px Arial, sans-serif; fill: #0F172A; }
    .subtitle { font: 400 21px Arial, sans-serif; fill: #526174; }
    .label { font: 800 25px Arial, sans-serif; fill: #0F172A; }
    .body { font: 400 19px Arial, sans-serif; fill: #0F172A; }
    .small { font: 400 16px Arial, sans-serif; fill: #0F172A; }
    .strong { font-weight: 800; }
    .whiteText { fill: #FFFFFF; }
    .line { stroke: #10233F; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#10233F"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <g data-safe-box="80 16 1440 118 0">
    <text class="title" x="800" y="68" text-anchor="middle">Protocollo 15/30/60</text>
    <text class="subtitle" x="800" y="108" text-anchor="middle">La manutenzione deve essere breve, altrimenti diventa un lavoro parallelo.</text>
  </g>
  
    <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
    <g data-safe-box="140 285 360 350 8">
    <rect x="140" y="285" width="360" height="350" rx="28" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
    <circle cx="320" cy="359" r="48" fill="#2F7D5A"/>
    <text class="label whiteText" x="320" y="369" text-anchor="middle">15</text>
    <text class="label" style="fill:#2F7D5A" x="320" y="435" text-anchor="middle">fine settimana</text>
    <text class="small strong" x="320" y="475" text-anchor="middle">piano</text>
<text class="small strong" x="320" y="511" text-anchor="middle">output</text>
<text class="small strong" x="320" y="547" text-anchor="middle">priorita</text>
  </g>
<g data-safe-box="605 285 360 350 8">
    <rect x="605" y="285" width="360" height="350" rx="28" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <circle cx="785" cy="359" r="48" fill="#10233F"/>
    <text class="label whiteText" x="785" y="369" text-anchor="middle">30</text>
    <text class="label" style="fill:#10233F" x="785" y="435" text-anchor="middle">dopo evento</text>
    <text class="small strong" x="785" y="475" text-anchor="middle">Decoder</text>
<text class="small strong" x="785" y="511" text-anchor="middle">Diario</text>
<text class="small strong" x="785" y="547" text-anchor="middle">decisione</text>
  </g>
<g data-safe-box="1070 285 360 350 8">
    <rect x="1070" y="285" width="360" height="350" rx="28" fill="#FFF4CC" stroke="#D4AF37" stroke-width="3"/>
    <circle cx="1250" cy="359" r="48" fill="#D4AF37"/>
    <text class="label whiteText" x="1250" y="369" text-anchor="middle">60</text>
    <text class="label" style="fill:#D4AF37" x="1250" y="435" text-anchor="middle">fine mese</text>
    <text class="small strong" x="1250" y="475" text-anchor="middle">portafoglio</text>
<text class="small strong" x="1250" y="511" text-anchor="middle">materiali</text>
<text class="small strong" x="1250" y="547" text-anchor="middle">sostenibilita</text>
  </g>
    <path class="line" marker-end="url(#arrow)" d="M505 455 L605 455"/>
    <path class="line" marker-end="url(#arrow)" d="M970 455 L1070 455"/>
    <g data-safe-box="245 810 1110 66 8">
    <rect x="245" y="810" width="1110" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="853" text-anchor="middle">Non usare 60 minuti per ogni quiz sbagliato, ne' 15 minuti per un nuovo bando importante.</text>
  </g>
    
</svg>
