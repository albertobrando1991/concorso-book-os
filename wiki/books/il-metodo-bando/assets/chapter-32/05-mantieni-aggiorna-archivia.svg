<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Mantieni, aggiorna, archivia</title>
  <desc id="desc">Ogni materiale deve avere un destino operativo.</desc>
  <style>
    .bg { fill: #F8FAFC; }
    .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
    .title { font: 800 43px Arial, sans-serif; fill: #0F172A; }
    .subtitle { font: 400 21px Arial, sans-serif; fill: #526174; }
    .label { font: 800 25px Arial, sans-serif; fill: #0F172A; }
    .body { font: 400 19px Arial, sans-serif; fill: #0F172A; }
    .small { font: 400 16px Arial, sans-serif; fill: #0F172A; }
    .strong { font-weight: 800; }
    .whiteText { fill: #FFFFFF; }
    .line { stroke: #10233F; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#10233F"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <g data-safe-box="80 16 1440 118 0">
    <text class="title" x="800" y="68" text-anchor="middle">Mantieni, aggiorna, archivia</text>
    <text class="subtitle" x="800" y="108" text-anchor="middle">Ogni materiale deve avere un destino operativo.</text>
  </g>
  
    <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
    <g data-safe-box="145 305 390 310 8">
    <rect x="145" y="305" width="390" height="310" rx="28" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
    <rect x="145" y="305" width="390" height="14" rx="7" fill="#2F7D5A"/>
    <text class="label" style="fill:#2F7D5A" x="340" y="383" text-anchor="middle">Mantieni</text>
    <text class="small strong" x="340" y="455" text-anchor="middle">corretto</text>
<text class="small strong" x="340" y="497" text-anchor="middle">breve</text>
<text class="small strong" x="340" y="539" text-anchor="middle">riusabile</text>
  </g>
<g data-safe-box="630 305 390 310 8">
    <rect x="630" y="305" width="390" height="310" rx="28" fill="#FFF4CC" stroke="#D4AF37" stroke-width="3"/>
    <rect x="630" y="305" width="390" height="14" rx="7" fill="#D4AF37"/>
    <text class="label" style="fill:#D4AF37" x="825" y="383" text-anchor="middle">Aggiorna</text>
    <text class="small strong" x="825" y="455" text-anchor="middle">utile</text>
<text class="small strong" x="825" y="497" text-anchor="middle">incompleto</text>
<text class="small strong" x="825" y="539" text-anchor="middle">superato</text>
  </g>
<g data-safe-box="1115 305 390 310 8">
    <rect x="1115" y="305" width="390" height="310" rx="28" fill="#F8E8EA" stroke="#7A2430" stroke-width="3"/>
    <rect x="1115" y="305" width="390" height="14" rx="7" fill="#7A2430"/>
    <text class="label" style="fill:#7A2430" x="1310" y="383" text-anchor="middle">Archivia</text>
    <text class="small strong" x="1310" y="455" text-anchor="middle">duplicato</text>
<text class="small strong" x="1310" y="497" text-anchor="middle">passivo</text>
<text class="small strong" x="1310" y="539" text-anchor="middle">senza output</text>
  </g>
    <path class="line" marker-end="url(#arrow)" d="M525 465 L625 465"/>
    <path class="line" marker-end="url(#arrow)" d="M1010 465 L1110 465"/>
    <g data-safe-box="455 660 690 150 8">
    <rect x="455" y="660" width="690" height="150" rx="24" fill="#E4F4F5" stroke="#1F6F78" stroke-width="3"/>
    <rect x="455" y="660" width="690" height="12" rx="6" fill="#1F6F78"/>
    <text class="label" x="800" y="712" text-anchor="middle">Capitale vero</text>
    <text class="small" x="800" y="742" text-anchor="middle">puoi riaprirlo tra un mese</text>
<text class="small" x="800" y="770" text-anchor="middle">e usarlo senza ricostruire tutto</text>
  </g>
    <g data-safe-box="245 810 1110 66 8">
    <rect x="245" y="810" width="1110" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="853" text-anchor="middle">La cartella piena non e' capitale: il capitale e' cio che torna utile alla prova.</text>
  </g>
    
</svg>
