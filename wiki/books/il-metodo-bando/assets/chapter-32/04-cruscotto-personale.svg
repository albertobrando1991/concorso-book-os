        <text class="label" style="fill:#D4AF37" x="935" y="297" text-anchor="middle">Output</text>
        <text class="small strong" x="935" y="337" text-anchor="middle">prodotti</text>
      </g>
<g data-safe-box="1100 245 260 130 8">
        <rect x="1100" y="245" width="260" height="130" rx="22" fill="#E4F4F5" stroke="#1F6F78" stroke-width="3"/>
        <text class="label" style="fill:#1F6F78" x="1230" y="297" text-anchor="middle">Errori</text>
        <text class="small strong" x="1230" y="337" text-anchor="middle">ricorrenti</text>
      </g>
<g data-safe-box="215 405 260 130 8">
        <rect x="215" y="405" width="260" height="130" rx="22" fill="#F8E8EA" stroke="#7A2430" stroke-width="3"/>
        <text class="label" style="fill:#7A2430" x="345" y="457" text-anchor="middle">Fonti</text>
        <text class="small strong" x="345" y="497" text-anchor="middle">da controllare</text>
      </g>
<g data-safe-box="510 405 260 130 8">
        <rect x="510" y="405" width="260" height="130" rx="22" fill="#EFEAF7" stroke="#5B3B82" stroke-width="3"/>
        <text class="label" style="fill:#5B3B82" x="640" y="457" text-anchor="middle">Capitale</text>
        <text class="small strong" x="640" y="497" text-anchor="middle">riutilizzabile</text>
      </g>
<g data-safe-box="805 405 260 130 8">
        <rect x="805" y="405" width="260" height="130" rx="22" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
        <text class="label" style="fill:#10233F" x="935" y="457" text-anchor="middle">Energia</text>
        <text class="small strong" x="935" y="497" text-anchor="middle">sostenibilita</text>
      </g>
<g data-safe-box="1100 405 260 130 8">
        <rect x="1100" y="405" width="260" height="130" rx="22" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
        <text class="label" style="fill:#2F7D5A" x="1230" y="457" text-anchor="middle">Decisione</text>
        <text class="small strong" x="1230" y="497" text-anchor="middle">settimana</text>
      </g>
    <g data-safe-box="455 655 690 150 8">
    <rect x="455" y="655" width="690" height="150" rx="24" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <rect x="455" y="655" width="690" height="12" rx="6" fill="#10233F"/>
    <text class="label" x="800" y="707" text-anchor="middle">Regola</text>
    <text class="small" x="800" y="737" text-anchor="middle">se il cruscotto e' vuoto</text>
<text class="small" x="800" y="765" text-anchor="middle">mancano dati, non motivazione</text>
  </g>
    <g data-safe-box="245 810 1110 66 8">
    <rect x="245" y="810" width="1110" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="853" text-anchor="middle">Quando non sai cosa fare, leggi il cruscotto e scegli la prossima azione verificabile.</text>
  </g>
    
</svg>
