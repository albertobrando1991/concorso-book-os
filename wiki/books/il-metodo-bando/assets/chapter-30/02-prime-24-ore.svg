<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Prime 24 ore: non decidere sul rumore</title>
  <desc id="desc">Subito dopo la prova servono conservazione, memoria a caldo e fonti ufficiali.</desc>
  <style>
    .bg { fill: #F8FAFC; }
    .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
    .title { font: 800 43px Arial, sans-serif; fill: #0F172A; }
    .subtitle { font: 400 21px Arial, sans-serif; fill: #526174; }
    .label { font: 800 25px Arial, sans-serif; fill: #0F172A; }
    .body { font: 400 19px Arial, sans-serif; fill: #0F172A; }
    .small { font: 400 16px Arial, sans-serif; fill: #0F172A; }
    .strong { font-weight: 800; }
    .whiteText { fill: #FFFFFF; }
    .line { stroke: #10233F; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#10233F"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <g data-safe-box="80 16 1440 118 0">
    <text class="title" x="800" y="68" text-anchor="middle">Prime 24 ore: non decidere sul rumore</text>
    <text class="subtitle" x="800" y="108" text-anchor="middle">Subito dopo la prova servono conservazione, memoria a caldo e fonti ufficiali.</text>
  </g>

    <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
    <g data-safe-box="120 300 390 315 8">
    <rect x="120" y="300" width="390" height="315" rx="28" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <rect x="120" y="300" width="390" height="14" rx="7" fill="#10233F"/>
    <text class="label" style="fill:#10233F" x="315" y="372" text-anchor="middle">Conserva</text>
    <text class="small" x="315" y="430" text-anchor="middle">convocazione</text>
<text class="small" x="315" y="472" text-anchor="middle">ricevute</text>
<text class="small" x="315" y="514" text-anchor="middle">avvisi e codici</text>
  </g>
<g data-safe-box="605 300 390 315 8">
    <rect x="605" y="300" width="390" height="315" rx="28" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
    <rect x="605" y="300" width="390" height="14" rx="7" fill="#2F7D5A"/>
    <text class="label" style="fill:#2F7D5A" x="800" y="372" text-anchor="middle">Scrivi</text>
    <text class="small" x="800" y="430" text-anchor="middle">memoria a caldo</text>
<text class="small" x="800" y="472" text-anchor="middle">domande ricordate</text>
<text class="small" x="800" y="514" text-anchor="middle">tempo e difficolta</text>
  </g>
<g data-safe-box="1090 300 390 315 8">
    <rect x="1090" y="300" width="390" height="315" rx="28" fill="#E4F4F5" stroke="#1F6F78" stroke-width="3"/>
    <rect x="1090" y="300" width="390" height="14" rx="7" fill="#1F6F78"/>
    <text class="label" style="fill:#1F6F78" x="1285" y="372" text-anchor="middle">Controlla</text>
    <text class="small" x="1285" y="430" text-anchor="middle">una fonte ufficiale</text>
<text class="small" x="1285" y="472" text-anchor="middle">bando e avvisi</text>
<text class="small" x="1285" y="514" text-anchor="middle">niente chat come prova</text>
  </g>
    <path class="line" marker-end="url(#arrow)" d="M510 455 L605 455"/>
    <path class="line" marker-end="url(#arrow)" d="M995 455 L1090 455"/>
    <g data-safe-box="485 675 630 150 8">
    <rect x="485" y="675" width="630" height="150" rx="24" fill="#F8E8EA" stroke="#7A2430" stroke-width="3"/>
    <rect x="485" y="675" width="630" height="12" rx="6" fill="#7A2430"/>
    <text class="label" x="800" y="727" text-anchor="middle">Decisioni pesanti</text>
    <text class="small" x="800" y="757" text-anchor="middle">rimandale dopo l'atto ufficiale</text>
<text class="small" x="800" y="785" text-anchor="middle">o dopo una lettura piu fredda</text>
  </g>
    <g data-safe-box="245 810 1110 66 8">
    <rect x="245" y="810" width="1110" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="853" text-anchor="middle">Nelle prime ore il candidato registra dati; non riscrive tutto il metodo.</text>
  </g>

</svg>
