<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Scheda aggiornamento</title>
  <desc id="desc">Ogni cambiamento utile deve diventare una decisione entro 48 ore.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Scheda aggiornamento</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Ogni cambiamento utile deve diventare una decisione entro 48 ore.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="225" text-anchor="middle">Non salvare messaggi a caso: chiudi il ciclo in una scheda</text>
  <g data-safe-box="170 250 1260 462 8">
    <g>
    <rect x="170" y="250" width="1260" height="56" rx="12" fill="#EAF2FB" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="170" y="250" width="245" height="56" rx="12" fill="#10233F" opacity="0.96"/>
    <text class="label" x="292" y="286" text-anchor="middle" fill="#FFFFFF" style="font-size:17px">Data</text>
    <text class="muted small" x="470" y="286" style="font-size:17px">giorno del controllo</text>
  </g>
<g>
    <rect x="170" y="316" width="1260" height="56" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="170" y="316" width="245" height="56" rx="12" fill="#10233F" opacity="0.96"/>
    <text class="label" x="292" y="352" text-anchor="middle" fill="#FFFFFF" style="font-size:17px">Fonte</text>
    <text class="muted small" x="470" y="352" style="font-size:17px">bando, inPA, ente, norma</text>
  </g>
<g>
    <rect x="170" y="382" width="1260" height="56" rx="12" fill="#EAF2FB" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="170" y="382" width="245" height="56" rx="12" fill="#10233F" opacity="0.96"/>
    <text class="label" x="292" y="418" text-anchor="middle" fill="#FFFFFF" style="font-size:17px">Cambio</text>
    <text class="muted small" x="470" y="418" style="font-size:17px">sintesi in una riga</text>
  </g>
<g>
    <rect x="170" y="448" width="1260" height="56" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="170" y="448" width="245" height="56" rx="12" fill="#10233F" opacity="0.96"/>
    <text class="label" x="292" y="484" text-anchor="middle" fill="#FFFFFF" style="font-size:17px">Area BANDO</text>
    <text class="muted small" x="470" y="484" style="font-size:17px">bando, aree, nuclei, diario, output</text>
  </g>
<g>
    <rect x="170" y="514" width="1260" height="56" rx="12" fill="#EAF2FB" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="170" y="514" width="245" height="56" rx="12" fill="#10233F" opacity="0.96"/>
    <text class="label" x="292" y="550" text-anchor="middle" fill="#FFFFFF" style="font-size:17px">Impatto</text>
    <text class="muted small" x="470" y="550" style="font-size:17px">scadenza, prova, materia, documento</text>
  </g>
<g>
    <rect x="170" y="580" width="1260" height="56" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="170" y="580" width="245" height="56" rx="12" fill="#10233F" opacity="0.96"/>
    <text class="label" x="292" y="616" text-anchor="middle" fill="#FFFFFF" style="font-size:17px">Decisione</text>
    <text class="muted small" x="470" y="616" style="font-size:17px">cosa fai entro 48 ore</text>
  </g>
<g>
    <rect x="170" y="646" width="1260" height="56" rx="12" fill="#EAF2FB" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="170" y="646" width="245" height="56" rx="12" fill="#10233F" opacity="0.96"/>
    <text class="label" x="292" y="682" text-anchor="middle" fill="#FFFFFF" style="font-size:17px">Prossimo</text>
    <text class="muted small" x="470" y="682" style="font-size:17px">data del nuovo controllo</text>
  </g>
  </g>
  <g data-safe-box="250 765 1100 64 8">
    <rect class="note" x="250" y="765" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="805" text-anchor="middle" style="font-weight:800;font-size:20px">La scheda costringe a passare da sapere a decidere.</text>
  </g>
</svg>
