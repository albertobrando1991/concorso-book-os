<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Gerarchia delle fonti</title>
  <desc id="desc">Quando le informazioni divergono, decide la fonte piu vicina alla procedura.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Gerarchia delle fonti</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Quando le informazioni divergono, decide la fonte piu vicina alla procedura.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="215" text-anchor="middle">La domanda non e' cosa mi piace, ma quale fonte comanda</text>
  <g data-safe-box="190 230 1220 552 8">
    <g data-safe-box="190 230 1220 70 8">
    <rect x="190" y="230" width="1220" height="70" rx="16" fill="#EAF2FB" stroke="#CBD5E1" stroke-width="2"/>
    <circle cx="242" cy="265" r="25" fill="#10233F"/>
    <text class="label" x="242" y="274" text-anchor="middle" fill="#FFFFFF" style="font-size:19px">1</text>
    <text class="navy label" x="440" y="273" text-anchor="middle" style="font-size:18px">Bando e avvisi</text>
    <text class="muted small" x="950" y="273" text-anchor="middle" style="font-size:16px">requisiti, scadenze, prove</text>
  </g>
<g data-safe-box="190 322 1220 70 8">
    <rect x="190" y="322" width="1220" height="70" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <circle cx="242" cy="357" r="25" fill="#7A2430"/>
    <text class="label" x="242" y="366" text-anchor="middle" fill="#FFFFFF" style="font-size:19px">2</text>
    <text class="bordeaux label" x="440" y="365" text-anchor="middle" style="font-size:18px">inPA e sito ente</text>
    <text class="muted small" x="950" y="365" text-anchor="middle" style="font-size:16px">candidature e comunicazioni</text>
  </g>
<g data-safe-box="190 414 1220 70 8">
    <rect x="190" y="414" width="1220" height="70" rx="16" fill="#EAF2FB" stroke="#CBD5E1" stroke-width="2"/>
    <circle cx="242" cy="449" r="25" fill="#D4AF37"/>
    <text class="label" x="242" y="458" text-anchor="middle" fill="#FFFFFF" style="font-size:19px">3</text>
    <text class="gold label" x="440" y="457" text-anchor="middle" style="font-size:18px">Gazzetta Ufficiale</text>
    <text class="muted small" x="950" y="457" text-anchor="middle" style="font-size:16px">pubblicazioni e avvisi</text>
  </g>
<g data-safe-box="190 506 1220 70 8">
    <rect x="190" y="506" width="1220" height="70" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <circle cx="242" cy="541" r="25" fill="#2F7D5A"/>
    <text class="label" x="242" y="550" text-anchor="middle" fill="#FFFFFF" style="font-size:19px">4</text>
    <text class="green label" x="440" y="549" text-anchor="middle" style="font-size:18px">Normattiva</text>
    <text class="muted small" x="950" y="549" text-anchor="middle" style="font-size:16px">testo vigente</text>
  </g>
<g data-safe-box="190 598 1220 70 8">
    <rect x="190" y="598" width="1220" height="70" rx="16" fill="#EAF2FB" stroke="#CBD5E1" stroke-width="2"/>
    <circle cx="242" cy="633" r="25" fill="#1F6F78"/>
    <text class="label" x="242" y="642" text-anchor="middle" fill="#FFFFFF" style="font-size:19px">5</text>
    <text class="teal label" x="440" y="641" text-anchor="middle" style="font-size:18px">Autorita settore</text>
    <text class="muted small" x="950" y="641" text-anchor="middle" style="font-size:16px">ANAC, AgID, Garante, DFP</text>
  </g>
<g data-safe-box="190 690 1220 70 8">
    <rect x="190" y="690" width="1220" height="70" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <circle cx="242" cy="725" r="25" fill="#10233F"/>
    <text class="label" x="242" y="734" text-anchor="middle" fill="#FFFFFF" style="font-size:19px">6</text>
    <text class="navy label" x="440" y="733" text-anchor="middle" style="font-size:18px">Manuali e gruppi</text>
    <text class="muted small" x="950" y="733" text-anchor="middle" style="font-size:16px">spiegazione, mai comando</text>
  </g>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">Il piano parte dal bando; le fonti di supporto spiegano, non sostituiscono.</text>
  </g>
</svg>
