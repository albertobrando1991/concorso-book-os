<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Protocollo dei 20 minuti</title>
  <desc id="desc">Un controllo breve chiude il ciclo: fonte, impatto, decisione e data.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Protocollo dei 20 minuti</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Un controllo breve chiude il ciclo: fonte, impatto, decisione e data.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="225" text-anchor="middle">Il controllo settimanale evita dieci ricontrolli mentali</text>
  <g data-safe-box="155 275 335 170 8">
    <rect class="softBlue" x="155" y="275" width="335" height="170" rx="24"/>
    <circle cx="217" cy="339" r="34" fill="#10233F"/>
    <text class="label" x="217" y="348" text-anchor="middle" fill="#FFFFFF" style="font-size:18px">0-4</text>
    <text class="navy label" x="357" y="333" text-anchor="middle" style="font-size:22px">inPA</text>
    <text class="muted small" x="357" y="381" text-anchor="middle" style="font-size:16px">procedura e avvisi</text>
  </g>
<g data-safe-box="605 275 335 170 8">
    <rect class="softRed" x="605" y="275" width="335" height="170" rx="24"/>
    <circle cx="667" cy="339" r="34" fill="#7A2430"/>
    <text class="label" x="667" y="348" text-anchor="middle" fill="#FFFFFF" style="font-size:18px">4-8</text>
    <text class="bordeaux label" x="807" y="333" text-anchor="middle" style="font-size:22px">Sito ente</text>
    <text class="muted small" x="807" y="381" text-anchor="middle" style="font-size:16px">diario e sede</text>
  </g>
<g data-safe-box="1055 275 335 170 8">
    <rect class="softGold" x="1055" y="275" width="335" height="170" rx="24"/>
    <circle cx="1117" cy="339" r="34" fill="#D4AF37"/>
    <text class="label" x="1117" y="348" text-anchor="middle" fill="#FFFFFF" style="font-size:18px">8-11</text>
    <text class="gold label" x="1257" y="333" text-anchor="middle" style="font-size:22px">Bando</text>
    <text class="muted small" x="1257" y="381" text-anchor="middle" style="font-size:16px">allegati e regole</text>
  </g>
  <path class="arrowNavy" d="M505 390 L585 390"/>
  <path class="arrowNavy" d="M955 390 L1035 390"/>
  <path class="arrowNavy" d="M1225 480 L1225 520"/>
  <g data-safe-box="1055 535 335 170 8">
    <rect class="softGreen" x="1055" y="535" width="335" height="170" rx="24"/>
    <circle cx="1117" cy="599" r="34" fill="#2F7D5A"/>
    <text class="label" x="1117" y="608" text-anchor="middle" fill="#FFFFFF" style="font-size:18px">11-15</text>
    <text class="green label" x="1257" y="593" text-anchor="middle" style="font-size:22px">Fonte mirata</text>
    <text class="muted small" x="1257" y="641" text-anchor="middle" style="font-size:16px">norma o settore</text>
  </g>
<g data-safe-box="605 535 335 170 8">
    <rect class="softTeal" x="605" y="535" width="335" height="170" rx="24"/>
    <circle cx="667" cy="599" r="34" fill="#1F6F78"/>
    <text class="label" x="667" y="608" text-anchor="middle" fill="#FFFFFF" style="font-size:18px">15-18</text>
    <text class="teal label" x="807" y="593" text-anchor="middle" style="font-size:22px">Decoder</text>
    <text class="muted small" x="807" y="641" text-anchor="middle" style="font-size:16px">cosa cambia</text>
  </g>
<g data-safe-box="155 535 335 170 8">
    <rect class="softBlue" x="155" y="535" width="335" height="170" rx="24"/>
    <circle cx="217" cy="599" r="34" fill="#10233F"/>
    <text class="label" x="217" y="608" text-anchor="middle" fill="#FFFFFF" style="font-size:18px">18-20</text>
    <text class="navy label" x="357" y="593" text-anchor="middle" style="font-size:22px">Diario</text>
    <text class="muted small" x="357" y="641" text-anchor="middle" style="font-size:16px">decisione e data</text>
  </g>
  <path class="arrowNavy" d="M1035 650 L955 650"/>
  <path class="arrowNavy" d="M585 650 L505 650"/>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">Se non trovi cambiamenti operativi, scrivi: nessun cambio operativo, proseguo piano.</text>
  </g>
</svg>
