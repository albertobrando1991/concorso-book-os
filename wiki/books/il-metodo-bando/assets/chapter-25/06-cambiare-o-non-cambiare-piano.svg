<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Cambiare o non cambiare il piano</title>
  <desc id="desc">Il calendario cambia solo quando l'informazione modifica un'azione.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Cambiare o non cambiare il piano</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Il calendario cambia solo quando l'informazione modifica un'azione.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="225" text-anchor="middle">La domanda decisiva: cambia un'azione gia pianificata?</text>
  <g data-safe-box="145 300 590 355 8">
    <rect class="softGreen" x="145" y="300" width="590" height="355" rx="26"/>
    <rect x="145" y="300" width="590" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="440" y="348" text-anchor="middle" style="font-size:23px">Cambia il piano</text>
    <g>
        <text class="green label" x="300" y="395" text-anchor="middle" style="font-size:16px">Nuova data prova</text>
        <text class="muted small" x="555" y="395" text-anchor="middle" style="font-size:16px">ricalcola calendario</text>
      </g>
<g>
        <text class="green label" x="300" y="450" text-anchor="middle" style="font-size:16px">Rettifica materie</text>
        <text class="muted small" x="555" y="450" text-anchor="middle" style="font-size:16px">aggiorna matrice</text>
      </g>
<g>
        <text class="green label" x="300" y="505" text-anchor="middle" style="font-size:16px">Cambio formato</text>
        <text class="muted small" x="555" y="505" text-anchor="middle" style="font-size:16px">modifica output</text>
      </g>
<g>
        <text class="green label" x="300" y="560" text-anchor="middle" style="font-size:16px">Documento richiesto</text>
        <text class="muted small" x="555" y="560" text-anchor="middle" style="font-size:16px">verifica domanda</text>
      </g>
  </g>
  <g data-safe-box="865 300 590 355 8">
    <rect class="softRed" x="865" y="300" width="590" height="355" rx="26"/>
    <rect x="865" y="300" width="590" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="1160" y="348" text-anchor="middle" style="font-size:23px">Non cambia il piano</text>
    <g>
        <text class="bordeaux label" x="1020" y="395" text-anchor="middle" style="font-size:16px">Articolo generico</text>
        <text class="muted small" x="1275" y="395" text-anchor="middle" style="font-size:16px">solo spiegazione</text>
      </g>
<g>
        <text class="bordeaux label" x="1020" y="450" text-anchor="middle" style="font-size:16px">Discussione gruppo</text>
        <text class="muted small" x="1275" y="450" text-anchor="middle" style="font-size:16px">verifica prima</text>
      </g>
<g>
        <text class="bordeaux label" x="1020" y="505" text-anchor="middle" style="font-size:16px">Corso aggiunge lezione</text>
        <text class="muted small" x="1275" y="505" text-anchor="middle" style="font-size:16px">non cambia bando</text>
      </g>
<g>
        <text class="bordeaux label" x="1020" y="560" text-anchor="middle" style="font-size:16px">Norma interessante</text>
        <text class="muted small" x="1275" y="560" text-anchor="middle" style="font-size:16px">attesa se irrilevante</text>
      </g>
  </g>
  <path class="arrowNavy" d="M755 500 L845 500"/>
  <g data-safe-box="320 690 330 78 8">
    <rect x="320" y="690" width="330" height="78" rx="20" fill="#2F7D5A"/>
    <text class="label" x="485" y="721" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">Si</text>
    <text class="small" x="485" y="748" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">aggiorna calendario o output</text>
  </g>
  <g data-safe-box="930 690 330 78 8">
    <rect x="930" y="690" width="330" height="78" rx="20" fill="#7A2430"/>
    <text class="label" x="1095" y="721" text-anchor="middle" fill="#FFFFFF" style="font-size:20px">No</text>
    <text class="small" x="1095" y="748" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">scrivi e torna al piano</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">Una novita ufficiale puo essere importante in generale ma irrilevante per il tuo concorso.</text>
  </g>
</svg>
