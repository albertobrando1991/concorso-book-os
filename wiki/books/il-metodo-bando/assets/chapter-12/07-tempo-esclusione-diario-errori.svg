<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Tempo, esclusione e diario errori</title>
  <desc id="desc">Il punteggio cresce quando sai saltare, tornare e correggere per categoria.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 44px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 23px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Tempo, esclusione e diario errori</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Il punteggio cresce quando sai saltare, tornare e correggere per categoria.</text>

  <rect class="card" x="90" y="175" width="1420" height="610" rx="30"/>
  <text class="navy label" x="800" y="232" text-anchor="middle">La gestione conta quanto la soluzione</text>
  <g data-safe-box="135 315 280 125 8">
    <rect class="softBlue" x="135" y="315" width="280" height="125" rx="22"/>
    <rect x="135" y="315" width="280" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="275" y="357" text-anchor="middle" style="font-size:25px">Primo giro</text>
    <text class="muted small" x="275" y="391" text-anchor="middle" style="font-size:18px">quesiti riconoscibili</text>
<text class="muted small" x="275" y="416" text-anchor="middle" style="font-size:18px">risposte rapide</text>
  </g>
  <g data-safe-box="485 315 280 125 8">
    <rect class="softRed" x="485" y="315" width="280" height="125" rx="22"/>
    <rect x="485" y="315" width="280" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="625" y="357" text-anchor="middle" style="font-size:25px">Secondo giro</text>
    <text class="muted small" x="625" y="391" text-anchor="middle" style="font-size:18px">schemi e calcoli</text>
<text class="muted small" x="625" y="416" text-anchor="middle" style="font-size:18px">domande segnate</text>
  </g>
  <g data-safe-box="835 315 280 125 8">
    <rect class="softGold" x="835" y="315" width="280" height="125" rx="22"/>
    <rect x="835" y="315" width="280" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="975" y="357" text-anchor="middle" style="font-size:25px">Terzo giro</text>
    <text class="muted small" x="975" y="391" text-anchor="middle" style="font-size:18px">dubbi residui</text>
<text class="muted small" x="975" y="416" text-anchor="middle" style="font-size:18px">scelta controllata</text>
  </g>
  <g data-safe-box="1185 315 280 125 8">
    <rect class="softGreen" x="1185" y="315" width="280" height="125" rx="22"/>
    <rect x="1185" y="315" width="280" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1325" y="357" text-anchor="middle" style="font-size:25px">Chiusura</text>
    <text class="muted small" x="1325" y="391" text-anchor="middle" style="font-size:18px">nessun blocco</text>
<text class="muted small" x="1325" y="416" text-anchor="middle" style="font-size:18px">tempo protetto</text>
  </g>
  <path class="arrowNavy" d="M425 375 L470 375"/>
  <path class="arrowBordeaux" d="M775 375 L820 375"/>
  <path class="arrowGold" d="M1125 375 L1170 375"/>
  <g data-safe-box="175 555 360 191 8">
    <rect class="softBlue" x="175" y="555" width="360" height="191" rx="22"/>
    <rect x="175" y="555" width="360" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="355" y="599" text-anchor="middle" style="font-size:24px">Esclusione</text>
    <path class="thin" d="M199 619 L511 619"/>
    <text class="muted small" x="205" y="637" style="font-size:17px">contraddice un dato</text>
<text class="muted small" x="205" y="670" style="font-size:17px">troppo assoluta</text>
<text class="muted small" x="205" y="703" style="font-size:17px">relazione invertita</text>
  </g>
  <g data-safe-box="620 555 360 191 8">
    <rect class="softRed" x="620" y="555" width="360" height="191" rx="22"/>
    <rect x="620" y="555" width="360" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="800" y="599" text-anchor="middle" style="font-size:24px">Soglie</text>
    <path class="thin" d="M644 619 L956 619"/>
    <text class="muted small" x="650" y="637" style="font-size:17px">serie: 30-45 sec</text>
<text class="muted small" x="650" y="670" style="font-size:17px">vincoli: schema rapido</text>
<text class="muted small" x="650" y="703" style="font-size:17px">brano: evidenza</text>
  </g>
  <g data-safe-box="1065 555 360 191 8">
    <rect class="softGreen" x="1065" y="555" width="360" height="191" rx="22"/>
    <rect x="1065" y="555" width="360" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1245" y="599" text-anchor="middle" style="font-size:24px">Diario errori</text>
    <path class="thin" d="M1089 619 L1401 619"/>
    <text class="muted small" x="1095" y="637" style="font-size:17px">lettura</text>
<text class="muted small" x="1095" y="670" style="font-size:17px">condizionale</text>
<text class="muted small" x="1095" y="703" style="font-size:17px">calcolo, tempo</text>
  </g>
  <g data-safe-box="250 805 1100 64 8">
    <rect class="note" x="250" y="805" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="845" text-anchor="middle" style="font-weight:800;font-size:20px">Correggere significa classificare l'errore: solo cosi il ripasso diventa mirato.</text>
  </g>

</svg>
