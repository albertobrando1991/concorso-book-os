<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Le parole logiche decisive</title>
  <desc id="desc">Negazioni, quantificatori e condizioni cambiano la risposta corretta.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 44px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 23px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Le parole logiche decisive</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Negazioni, quantificatori e condizioni cambiano la risposta corretta.</text>

  <rect class="card" x="90" y="175" width="1420" height="610" rx="30"/>
  <text class="navy label" x="800" y="232" text-anchor="middle">Piccole parole, grande differenza di risposta</text>
  <g data-safe-box="135 300 300 224 8">
    <rect class="softBlue" x="135" y="300" width="300" height="224" rx="22"/>
    <rect x="135" y="300" width="300" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="285" y="344" text-anchor="middle" style="font-size:24px">Connettivi</text>
    <path class="thin" d="M159 364 L411 364"/>
    <text class="muted small" x="165" y="382" style="font-size:17px">non A = A escluso</text>
<text class="muted small" x="165" y="415" style="font-size:17px">A e B = entrambi</text>
<text class="muted small" x="165" y="448" style="font-size:17px">A o B = almeno uno</text>
<text class="muted small" x="165" y="481" style="font-size:17px">o A o B = uno solo</text>
  </g>
  <g data-safe-box="485 300 300 224 8">
    <rect class="softRed" x="485" y="300" width="300" height="224" rx="22"/>
    <rect x="485" y="300" width="300" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="635" y="344" text-anchor="middle" style="font-size:24px">Condizioni</text>
    <path class="thin" d="M509 364 L761 364"/>
    <text class="muted small" x="515" y="382" style="font-size:17px">se A allora B</text>
<text class="muted small" x="515" y="415" style="font-size:17px">A sufficiente per B</text>
<text class="muted small" x="515" y="448" style="font-size:17px">solo se B: B necessario</text>
<text class="muted small" x="515" y="481" style="font-size:17px">non invertire la freccia</text>
  </g>
  <g data-safe-box="835 300 300 224 8">
    <rect class="softGold" x="835" y="300" width="300" height="224" rx="22"/>
    <rect x="835" y="300" width="300" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="985" y="344" text-anchor="middle" style="font-size:24px">Quantificatori</text>
    <path class="thin" d="M859 364 L1111 364"/>
    <text class="muted small" x="865" y="382" style="font-size:17px">tutti = ogni caso</text>
<text class="muted small" x="865" y="415" style="font-size:17px">nessuno = zero casi</text>
<text class="muted small" x="865" y="448" style="font-size:17px">alcuni = almeno uno</text>
<text class="muted small" x="865" y="481" style="font-size:17px">non tutti = almeno uno no</text>
  </g>
  <g data-safe-box="1185 300 300 224 8">
    <rect class="softGreen" x="1185" y="300" width="300" height="224" rx="22"/>
    <rect x="1185" y="300" width="300" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1335" y="344" text-anchor="middle" style="font-size:24px">Negazioni</text>
    <path class="thin" d="M1209 364 L1461 364"/>
    <text class="muted small" x="1215" y="382" style="font-size:17px">tutti -&gt; almeno uno no</text>
<text class="muted small" x="1215" y="415" style="font-size:17px">nessuno -&gt; almeno uno si</text>
<text class="muted small" x="1215" y="448" style="font-size:17px">alcuni -&gt; nessuno</text>
<text class="muted small" x="1215" y="481" style="font-size:17px">esattamente uno -&gt; zero o piu</text>
  </g>
  <g data-safe-box="245 650 330 78 8">
    <rect x="245" y="650" width="330" height="78" rx="20" fill="#10233F"/>
    <text class="label" x="410" y="682" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">A -&gt; B</text>
    <text class="small" x="410" y="708" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">se A, allora B</text>
  </g>
  <g data-safe-box="635 650 330 78 8">
    <rect x="635" y="650" width="330" height="78" rx="20" fill="#7A2430"/>
    <text class="label" x="800" y="682" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">non B -&gt; non A</text>
    <text class="small" x="800" y="708" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">contrapposizione</text>
  </g>
  <g data-safe-box="1025 650 330 78 8">
    <rect x="1025" y="650" width="330" height="78" rx="20" fill="#2F7D5A"/>
    <text class="label" x="1190" y="682" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">B -&gt; A?</text>
    <text class="small" x="1190" y="708" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">inversione non valida</text>
  </g>
  <g data-safe-box="250 805 1100 64 8">
    <rect class="note" x="250" y="805" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="845" text-anchor="middle" style="font-weight:800;font-size:19px">Quando leggi 'solo se', fermati: indica una condizione necessaria, non sempre sufficiente.</text>
  </g>

</svg>
