<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Ragionamento numerico rapido</title>
  <desc id="desc">Percentuali, proporzioni e tabelle richiedono base corretta e controllo di scala.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 44px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 23px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .dash { stroke: #94A3B8; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 9 10; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
      .arrowTeal { stroke: #1F6F78; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F78"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Ragionamento numerico rapido</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Percentuali, proporzioni e tabelle richiedono base corretta e controllo di scala.</text>

  <rect class="card" x="90" y="175" width="1420" height="610" rx="30"/>
  <text class="navy label" x="800" y="232" text-anchor="middle">Il calcolo corretto nasce dalla base corretta</text>
  <g data-safe-box="130 315 300 130 8">
    <rect class="softBlue" x="130" y="315" width="300" height="130" rx="22"/>
    <rect x="130" y="315" width="300" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="280" y="357" text-anchor="middle" style="font-size:25px">Percentuale</text>
    <text class="muted small" x="280" y="391" text-anchor="middle" style="font-size:18px">di quale base?</text>
<text class="muted small" x="280" y="416" text-anchor="middle" style="font-size:18px">aumento o calo?</text>
  </g>
  <g data-safe-box="480 315 300 130 8">
    <rect class="softRed" x="480" y="315" width="300" height="130" rx="22"/>
    <rect x="480" y="315" width="300" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="630" y="357" text-anchor="middle" style="font-size:25px">Proporzione</text>
    <text class="muted small" x="630" y="391" text-anchor="middle" style="font-size:18px">diretta</text>
<text class="muted small" x="630" y="416" text-anchor="middle" style="font-size:18px">oppure inversa</text>
  </g>
  <g data-safe-box="830 315 300 130 8">
    <rect class="softGold" x="830" y="315" width="300" height="130" rx="22"/>
    <rect x="830" y="315" width="300" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="980" y="357" text-anchor="middle" style="font-size:25px">Tabella</text>
    <text class="muted small" x="980" y="391" text-anchor="middle" style="font-size:18px">riga, colonna</text>
<text class="muted small" x="980" y="416" text-anchor="middle" style="font-size:18px">grandezza chiesta</text>
  </g>
  <g data-safe-box="1180 315 300 130 8">
    <rect class="softGreen" x="1180" y="315" width="300" height="130" rx="22"/>
    <rect x="1180" y="315" width="300" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1330" y="357" text-anchor="middle" style="font-size:25px">Stima</text>
    <text class="muted small" x="1330" y="391" text-anchor="middle" style="font-size:18px">ordine di grandezza</text>
<text class="muted small" x="1330" y="416" text-anchor="middle" style="font-size:18px">risultato plausibile</text>
  </g>
  <path class="arrowNavy" d="M440 380 L465 380"/>
  <path class="arrowBordeaux" d="M790 380 L815 380"/>
  <path class="arrowGold" d="M1140 380 L1165 380"/>
  <g data-safe-box="175 560 280 78 8">
    <rect x="175" y="560" width="280" height="78" rx="20" fill="#10233F"/>
    <text class="label" x="315" y="592" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">20 / 80 = 25%</text>
    <text class="small" x="315" y="618" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">base iniziale</text>
  </g>
  <g data-safe-box="500 560 280 78 8">
    <rect x="500" y="560" width="280" height="78" rx="20" fill="#7A2430"/>
    <text class="label" x="640" y="592" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">5 addetti</text>
    <text class="small" x="640" y="618" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">piu lavoro se tempo uguale</text>
  </g>
  <g data-safe-box="825 560 280 78 8">
    <rect x="825" y="560" width="280" height="78" rx="20" fill="#D4AF37"/>
    <text class="label" x="965" y="592" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">64 / 80 = 80%</text>
    <text class="small" x="965" y="618" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">quota, non valore assoluto</text>
  </g>
  <g data-safe-box="1150 560 280 78 8">
    <rect x="1150" y="560" width="280" height="78" rx="20" fill="#2F7D5A"/>
    <text class="label" x="1290" y="592" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">scala</text>
    <text class="small" x="1290" y="618" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">scarta valori impossibili</text>
  </g>
  <g data-safe-box="250 805 1100 64 8">
    <rect class="note" x="250" y="805" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="845" text-anchor="middle" style="font-weight:800;font-size:19px">Prima di calcolare scrivi cosa stai cercando: valore finale, differenza o percentuale.</text>
  </g>

</svg>
