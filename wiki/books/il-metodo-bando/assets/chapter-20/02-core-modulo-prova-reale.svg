<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Formula core + modulo + prova reale</title>
  <desc id="desc">La preparazione resta continua, ma cambia peso in base al bando.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Formula core + modulo + prova reale</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">La preparazione resta continua, ma cambia peso in base al bando.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <g data-safe-box="130 275 360 350 8">
    <rect class="softBlue" x="130" y="275" width="360" height="350" rx="28"/>
    <rect x="130" y="275" width="360" height="11" rx="5.5" fill="#10233F"/>
    <text class="navy label" x="310" y="330" text-anchor="middle" style="font-size:24px">Nucleo comune</text>
    <path class="thin" d="M168 353 L452 353"/>
    <text class="muted small" x="310" y="387" text-anchor="middle">amministrativo</text>
<text class="muted small" x="310" y="430" text-anchor="middle">pubblico impiego</text>
<text class="muted small" x="310" y="473" text-anchor="middle">trasparenza e privacy</text>
<text class="muted small" x="310" y="516" text-anchor="middle">digitale, inglese</text>
<text class="muted small" x="310" y="559" text-anchor="middle">metodo di prova</text>
  </g>
  <g data-safe-box="485 415 70 70 2">
    <circle cx="520" cy="450" r="34" fill="#D4AF37"/>
    <text class="label" x="520" y="460" text-anchor="middle" fill="#FFFFFF" style="font-size:34px">+</text>
  </g>
  <g data-safe-box="620 275 360 350 8">
    <rect class="softRed" x="620" y="275" width="360" height="350" rx="28"/>
    <rect x="620" y="275" width="360" height="11" rx="5.5" fill="#7A2430"/>
    <text class="bordeaux label" x="800" y="330" text-anchor="middle" style="font-size:24px">Modulo profilo</text>
    <path class="thin" d="M658 353 L942 353"/>
    <text class="muted small" x="800" y="387" text-anchor="middle">enti locali</text>
<text class="muted small" x="800" y="430" text-anchor="middle">contabilita</text>
<text class="muted small" x="800" y="473" text-anchor="middle">tributario</text>
<text class="muted small" x="800" y="516" text-anchor="middle">tecnico, ICT</text>
<text class="muted small" x="800" y="559" text-anchor="middle">sanita, scuola</text>
  </g>
  <g data-safe-box="975 415 70 70 2">
    <circle cx="1010" cy="450" r="34" fill="#D4AF37"/>
    <text class="label" x="1010" y="460" text-anchor="middle" fill="#FFFFFF" style="font-size:34px">+</text>
  </g>
  <g data-safe-box="1110 275 360 350 8">
    <rect class="softGreen" x="1110" y="275" width="360" height="350" rx="28"/>
    <rect x="1110" y="275" width="360" height="11" rx="5.5" fill="#2F7D5A"/>
    <text class="green label" x="1290" y="330" text-anchor="middle" style="font-size:24px">Prova reale</text>
    <path class="thin" d="M1148 353 L1432 353"/>
    <text class="muted small" x="1290" y="387" text-anchor="middle">quiz a tempo</text>
<text class="muted small" x="1290" y="430" text-anchor="middle">risposta breve</text>
<text class="muted small" x="1290" y="473" text-anchor="middle">caso pratico</text>
<text class="muted small" x="1290" y="516" text-anchor="middle">orale</text>
<text class="muted small" x="1290" y="559" text-anchor="middle">prova pratica</text>
  </g>
  <path class="arrowNavy" d="M800 650 L800 705"/>
  <g data-safe-box="455 705 690 128 8">
    <rect class="softGold" x="455" y="705" width="690" height="128" rx="25"/>
    <rect x="455" y="705" width="690" height="11" rx="5.5" fill="#D4AF37"/>
    <text class="gold label" x="800" y="749" text-anchor="middle">Preparazione utile</text>
    <text class="muted small" x="800" y="782" text-anchor="middle">continuita senza rigidita</text>
<text class="muted small" x="800" y="809" text-anchor="middle">adattamento senza ripartenza da zero</text>
  </g>
</svg>
