<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Profili specialistici e servizi</title>
  <desc id="desc">Quando il modulo pesa molto, il piano deve cambiare fin dal primo giorno.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 43px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 22px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; letter-spacing: 0; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/></marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Profili specialistici e servizi</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Quando il modulo pesa molto, il piano deve cambiare fin dal primo giorno.</text>

  <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
  <text class="navy label" x="800" y="220" text-anchor="middle">Nei profili verticali il modulo puo decidere la graduatoria</text>
  <g data-safe-box="115 245 405 146 8">
    <rect class="softRed" x="115" y="245" width="405" height="146" rx="22"/>
    <rect x="115" y="245" width="405" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="317.5" y="287" text-anchor="middle" style="font-size:18px">Lavoro e previdenza</text>
    <text class="muted small" x="317.5" y="329" text-anchor="middle" style="font-size:16px">glossario specialistico</text>
    <text class="muted small" x="317.5" y="361" text-anchor="middle" style="font-size:15px">modulo presto</text>
  </g>
<g data-safe-box="600 245 405 146 8">
    <rect class="softGreen" x="600" y="245" width="405" height="146" rx="22"/>
    <rect x="600" y="245" width="405" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="802.5" y="287" text-anchor="middle" style="font-size:20px">Tecnico PA</text>
    <text class="muted small" x="802.5" y="329" text-anchor="middle" style="font-size:16px">disciplina + procedimento</text>
    <text class="muted small" x="802.5" y="361" text-anchor="middle" style="font-size:15px">casi e atti</text>
  </g>
<g data-safe-box="1085 245 405 146 8">
    <rect class="softTeal" x="1085" y="245" width="405" height="146" rx="22"/>
    <rect x="1085" y="245" width="405" height="10" rx="5" fill="#1F6F78"/>
    <text class="teal label" x="1287.5" y="287" text-anchor="middle" style="font-size:20px">ICT e digitale</text>
    <text class="muted small" x="1287.5" y="329" text-anchor="middle" style="font-size:16px">sistemi, dati, sicurezza</text>
    <text class="muted small" x="1287.5" y="361" text-anchor="middle" style="font-size:15px">PA digitale</text>
  </g>
<g data-safe-box="115 447 405 146 8">
    <rect class="softBlue" x="115" y="447" width="405" height="146" rx="22"/>
    <rect x="115" y="447" width="405" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="317.5" y="489" text-anchor="middle" style="font-size:20px">Polizia locale</text>
    <text class="muted small" x="317.5" y="531" text-anchor="middle" style="font-size:16px">codice strada + casi</text>
    <text class="muted small" x="317.5" y="563" text-anchor="middle" style="font-size:15px">non concorso generico</text>
  </g>
<g data-safe-box="600 447 405 146 8">
    <rect class="softGold" x="600" y="447" width="405" height="146" rx="22"/>
    <rect x="600" y="447" width="405" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="802.5" y="489" text-anchor="middle" style="font-size:20px">Sanita amm.</text>
    <text class="muted small" x="802.5" y="531" text-anchor="middle" style="font-size:16px">privacy + servizio</text>
    <text class="muted small" x="802.5" y="563" text-anchor="middle" style="font-size:15px">dati e utenza</text>
  </g>
<g data-safe-box="1085 447 405 146 8">
    <rect class="softRed" x="1085" y="447" width="405" height="146" rx="22"/>
    <rect x="1085" y="447" width="405" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="1287.5" y="489" text-anchor="middle" style="font-size:18px">Scuola e universita</text>
    <text class="muted small" x="1287.5" y="531" text-anchor="middle" style="font-size:16px">segreterie + ordinamento</text>
    <text class="muted small" x="1287.5" y="563" text-anchor="middle" style="font-size:15px">processi reali</text>
  </g>
  <g data-safe-box="390 660 820 92 8">
    <rect class="softGreen" x="390" y="660" width="820" height="92" rx="24"/>
    <rect x="390" y="660" width="820" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="555" y="717" text-anchor="middle" style="font-size:22px">Appalti e fondi</text>
    <text class="muted small" x="870" y="717" text-anchor="middle" style="font-size:17px">ciclo progetto-controllo</text>
    <text class="muted small" x="1080" y="717" text-anchor="middle" style="font-size:16px">rendicontazione</text>
  </g>
  <g data-safe-box="250 812 1100 64 8">
    <rect class="note" x="250" y="812" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="852" text-anchor="middle" style="font-weight:800;font-size:20px">Se il modulo e' rosso, va avviato in parallelo al core: non negli ultimi giorni.</text>
  </g>
</svg>
