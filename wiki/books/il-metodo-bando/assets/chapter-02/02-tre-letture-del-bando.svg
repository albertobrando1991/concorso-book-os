<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Le tre letture del bando</title>
  <desc id="desc">Schema operativo delle tre letture del bando: ammissibilita, profilo e prove con punteggi e soglie.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .ink { fill: #172233; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 50px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 27px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 31px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 24px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 21px; }
      .card { fill: #ffffff; stroke: #cfd8e3; stroke-width: 3; }
      .pill { fill: #f1f6fb; stroke: #cfd8e3; stroke-width: 2; }
      .blue { fill: #1f4e79; }
      .green { fill: #2f7d5a; }
      .amber { fill: #b7791f; }
      .red { fill: #a94442; }
      .line { stroke: #1f4e79; stroke-width: 5; stroke-linecap: round; }
      .band { fill: #e8f0f8; stroke: #b9cde1; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#1f4e79"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="1000"/>
  <text class="ink title" x="800" y="82" text-anchor="middle">Le tre letture del bando</text>
  <text class="muted subtitle" x="800" y="126" text-anchor="middle">Non leggere il bando una volta sola: ogni lettura serve a prendere una decisione diversa.</text>

  <g transform="translate(100 250)">
    <rect class="card" x="0" y="0" width="410" height="430" rx="22"/>
    <circle cx="64" cy="68" r="36" class="blue"/>
    <text x="64" y="81" text-anchor="middle" style="fill:#fff;font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:34px;font-weight:900;">1</text>
    <text class="ink label" x="118" y="60">Ammissibilit&#224;</text>
    <text class="muted small" x="118" y="96">Posso partecipare?</text>
    <g transform="translate(44 150)">
      <rect class="pill" x="0" y="0" width="322" height="52" rx="13"/>
      <text class="ink body" x="24" y="35">titolo di studio</text>
      <rect class="pill" x="0" y="70" width="322" height="52" rx="13"/>
      <text class="ink body" x="24" y="105">requisiti specifici</text>
      <rect class="pill" x="0" y="140" width="322" height="52" rx="13"/>
      <text class="ink body" x="24" y="175">documenti e scadenza</text>
      <rect class="pill" x="0" y="245" width="322" height="62" rx="31"/>
      <text class="blue body" x="161" y="285" text-anchor="middle">decidere se entrare</text>
    </g>
  </g>

  <path class="line" marker-end="url(#arrowhead)" d="M535 465 H590"/>

  <g transform="translate(595 250)">
    <rect class="card" x="0" y="0" width="410" height="430" rx="22"/>
    <circle cx="64" cy="68" r="36" class="green"/>
    <text x="64" y="81" text-anchor="middle" style="fill:#fff;font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:34px;font-weight:900;">2</text>
    <text class="ink label" x="118" y="60">Profilo reale</text>
    <text class="muted small" x="118" y="96">Che lavoro cercano?</text>
    <g transform="translate(44 150)">
      <rect class="pill" x="0" y="0" width="322" height="52" rx="13"/>
      <text class="ink body" x="24" y="35">area e famiglia</text>
      <rect class="pill" x="0" y="70" width="322" height="52" rx="13"/>
      <text class="ink body" x="24" y="105">mansioni e responsabilit&#224;</text>
      <rect class="pill" x="0" y="140" width="322" height="52" rx="13"/>
      <text class="ink body" x="24" y="175">livello atteso</text>
      <rect class="pill" x="0" y="245" width="322" height="62" rx="31"/>
      <text class="green body" x="161" y="285" text-anchor="middle">capire la profondit&#224;</text>
    </g>
  </g>

  <path class="line" marker-end="url(#arrowhead)" d="M1030 465 H1085"/>

  <g transform="translate(1090 250)">
    <rect class="card" x="0" y="0" width="410" height="430" rx="22"/>
    <circle cx="64" cy="68" r="36" class="amber"/>
    <text x="64" y="81" text-anchor="middle" style="fill:#fff;font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:34px;font-weight:900;">3</text>
    <text class="ink label" x="118" y="60">Prove e soglie</text>
    <text class="muted small" x="118" y="96">Dove si vince o si perde?</text>
    <g transform="translate(44 150)">
      <rect class="pill" x="0" y="0" width="322" height="52" rx="13"/>
      <text class="ink body" x="24" y="35">quiz, scritto, orale</text>
      <rect class="pill" x="0" y="70" width="322" height="52" rx="13"/>
      <text class="ink body" x="24" y="105">punteggi minimi</text>
      <rect class="pill" x="0" y="140" width="322" height="52" rx="13"/>
      <text class="ink body" x="24" y="175">titoli e graduatoria</text>
      <rect class="pill" x="0" y="245" width="322" height="62" rx="31"/>
      <text class="amber body" x="161" y="285" text-anchor="middle">costruire il piano</text>
    </g>
  </g>

  <rect class="band" x="310" y="825" width="980" height="58" rx="29"/>
  <text class="blue" x="800" y="863" text-anchor="middle" style="font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:24px;font-weight:800;">Tre letture, tre decisioni: partecipare, capire il profilo, allenare la prova decisiva.</text>
</svg>
