<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Gerarchia delle materie nel bando</title>
  <desc id="desc">Schema che trasforma la lista delle materie del bando in categorie operative: obbligatorie, probabili, accessorie, killer e solo orali.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .ink { fill: #172233; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 50px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 27px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 29px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 23px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .card { fill: #ffffff; stroke: #cfd8e3; stroke-width: 3; }
      .tag { fill: #f1f6fb; stroke: #cfd8e3; stroke-width: 2; }
      .blue { fill: #1f4e79; }
      .green { fill: #2f7d5a; }
      .amber { fill: #b7791f; }
      .red { fill: #a94442; }
      .gray { fill: #64748b; }
      .band { fill: #e8f0f8; stroke: #b9cde1; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1100"/>
  <text class="ink title" x="800" y="82" text-anchor="middle">Classificare le materie del bando</text>
  <text class="muted subtitle" x="800" y="126" text-anchor="middle">La lista delle materie sembra piatta; il piano di studio deve diventare gerarchico.</text>

  <g transform="translate(130 210)">
    <rect class="card" x="0" y="0" width="640" height="205" rx="20"/>
    <rect x="0" y="0" width="18" height="205" rx="9" class="blue"/>
    <text class="blue label" x="48" y="55">Obbligatorie</text>
    <text class="muted body" x="48" y="94">Indicate espressamente e collegate alla prova principale.</text>
    <rect class="tag" x="48" y="128" width="250" height="46" rx="23"/>
    <text class="ink small" x="173" y="158" text-anchor="middle">piano centrale</text>
  </g>

  <g transform="translate(830 210)">
    <rect class="card" x="0" y="0" width="640" height="205" rx="20"/>
    <rect x="0" y="0" width="18" height="205" rx="9" class="green"/>
    <text class="green label" x="48" y="55">Probabili</text>
    <text class="muted body" x="48" y="94">Coerenti con profilo e prove, anche se non dominano.</text>
    <rect class="tag" x="48" y="128" width="250" height="46" rx="23"/>
    <text class="ink small" x="173" y="158" text-anchor="middle">priorit&#224; media</text>
  </g>

  <g transform="translate(130 460)">
    <rect class="card" x="0" y="0" width="640" height="205" rx="20"/>
    <rect x="0" y="0" width="18" height="205" rx="9" class="gray"/>
    <text class="gray label" x="48" y="55">Accessorie</text>
    <text class="muted body" x="48" y="91">Completano la preparazione,</text>
    <text class="muted body" x="48" y="121">ma raramente decidono da sole.</text>
    <rect class="tag" x="48" y="140" width="250" height="46" rx="23"/>
    <text class="ink small" x="173" y="170" text-anchor="middle">dopo i nuclei</text>
  </g>

  <g transform="translate(830 460)">
    <rect class="card" x="0" y="0" width="640" height="205" rx="20"/>
    <rect x="0" y="0" width="18" height="205" rx="9" class="red"/>
    <text class="red label" x="48" y="55">Killer</text>
    <text class="muted body" x="48" y="94">Eliminano molti candidati o generano errori frequenti.</text>
    <rect class="tag" x="48" y="128" width="250" height="46" rx="23"/>
    <text class="ink small" x="173" y="158" text-anchor="middle">prima, con esercizi</text>
  </g>

  <g transform="translate(360 710)">
    <rect class="card" x="0" y="0" width="880" height="185" rx="20"/>
    <rect x="0" y="0" width="18" height="185" rx="9" class="amber"/>
    <text class="amber label" x="48" y="55">Solo orali</text>
    <text class="muted body" x="48" y="94">Servono per collegamenti, esempi e colloquio finale.</text>
    <rect class="tag" x="48" y="122" width="330" height="46" rx="23"/>
    <text class="ink small" x="213" y="152" text-anchor="middle">risposte brevi e ordinate</text>
  </g>

  <rect class="band" x="350" y="975" width="900" height="58" rx="29"/>
  <text class="blue" x="800" y="1013" text-anchor="middle" style="font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:24px;font-weight:800;">Una materia breve pu&#242; decidere; una materia ampia richiede selezione.</text>
</svg>
