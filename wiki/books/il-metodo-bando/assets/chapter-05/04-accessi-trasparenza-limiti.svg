<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Accesso e trasparenza</title>
  <desc id="desc">Confronto tra accesso documentale, accesso civico semplice e accesso civico generalizzato, con filtro dei limiti.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .ink { fill: #172233; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 50px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 27px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 28px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 22px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .panel { fill: #ffffff; stroke: #cfd8e3; stroke-width: 3; }
      .chip { fill: #eef4fb; stroke: #c5d7ea; stroke-width: 2; }
      .limit { fill: #f7e0de; stroke: #d4a2a0; stroke-width: 2; }
      .blue { fill: #1f4e79; }
      .green { fill: #2f7d5a; }
      .amber { fill: #b7791f; }
      .red { fill: #a94442; }
      .gray { fill: #64748b; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1000"/>
  <text class="ink title" x="800" y="82" text-anchor="middle">Accesso e trasparenza: tre strumenti</text>
  <text class="muted subtitle" x="800" y="126" text-anchor="middle">Non basta dire trasparenza: qualifica richiesta, interesse e limiti.</text>

  <g transform="translate(80 205)">
    <rect class="panel" width="430" height="520" rx="20"/>
    <circle class="blue" cx="215" cy="84" r="38"/>
    <text x="215" y="97" text-anchor="middle" style="fill:#fff;font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:34px;font-weight:900;">1</text>
    <text class="blue label" x="215" y="155" text-anchor="middle">Accesso documentale</text>
    <text class="muted small" x="215" y="188" text-anchor="middle">Legge 241/1990</text>
    <g transform="translate(45 235)">
      <rect class="chip" width="340" height="72" rx="15"/>
      <text class="ink body" x="170" y="30" text-anchor="middle" style="font-weight:800;">Documento amministrativo</text>
      <text class="muted small" x="170" y="56" text-anchor="middle">visione o copia</text>
    </g>
    <g transform="translate(45 330)">
      <rect class="chip" width="340" height="92" rx="15"/>
      <text class="ink body" x="170" y="30" text-anchor="middle" style="font-weight:800;">Interesse qualificato</text>
      <text class="muted small" x="170" y="58" text-anchor="middle">diretto, concreto</text>
      <text class="muted small" x="170" y="82" text-anchor="middle">e attuale</text>
    </g>
  </g>

  <g transform="translate(585 205)">
    <rect class="panel" width="430" height="520" rx="20"/>
    <circle class="green" cx="215" cy="84" r="38"/>
    <text x="215" y="97" text-anchor="middle" style="fill:#fff;font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:34px;font-weight:900;">2</text>
    <text class="green label" x="215" y="155" text-anchor="middle">Accesso civico semplice</text>
    <text class="muted small" x="215" y="188" text-anchor="middle">D.Lgs. 33/2013</text>
    <g transform="translate(45 235)">
      <rect class="chip" width="340" height="72" rx="15"/>
      <text class="ink body" x="170" y="30" text-anchor="middle" style="font-weight:800;">Obbligo di pubblicazione</text>
      <text class="muted small" x="170" y="56" text-anchor="middle">dato, documento o informazione</text>
    </g>
    <g transform="translate(45 330)">
      <rect class="chip" width="340" height="92" rx="15"/>
      <text class="ink body" x="170" y="30" text-anchor="middle" style="font-weight:800;">Mancata pubblicazione</text>
      <text class="muted small" x="170" y="58" text-anchor="middle">si chiede di pubblicare</text>
      <text class="muted small" x="170" y="82" text-anchor="middle">ciò che era dovuto</text>
    </g>
  </g>

  <g transform="translate(1090 205)">
    <rect class="panel" width="430" height="520" rx="20"/>
    <circle class="amber" cx="215" cy="84" r="38"/>
    <text x="215" y="97" text-anchor="middle" style="fill:#fff;font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;font-size:34px;font-weight:900;">3</text>
    <text class="amber label" x="215" y="155" text-anchor="middle">Accesso generalizzato</text>
    <text class="muted small" x="215" y="188" text-anchor="middle">FOIA italiano</text>
    <g transform="translate(45 235)">
      <rect class="chip" width="340" height="72" rx="15"/>
      <text class="ink body" x="170" y="30" text-anchor="middle" style="font-weight:800;">Controllo diffuso</text>
      <text class="muted small" x="170" y="56" text-anchor="middle">dati e documenti ulteriori</text>
    </g>
    <g transform="translate(45 330)">
      <rect class="chip" width="340" height="92" rx="15"/>
      <text class="ink body" x="170" y="30" text-anchor="middle" style="font-weight:800;">Bilanciamento</text>
      <text class="muted small" x="170" y="58" text-anchor="middle">interessi pubblici</text>
      <text class="muted small" x="170" y="82" text-anchor="middle">e privati</text>
    </g>
  </g>

  <g transform="translate(185 795)">
    <rect class="limit" width="1230" height="92" rx="22"/>
    <text class="red label" x="615" y="38" text-anchor="middle">Filtro comune dei limiti</text>
    <text class="muted body" x="615" y="70" text-anchor="middle">riservatezza, sicurezza, segreti, dati personali e controinteressati</text>
  </g>
</svg>
