<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Portafoglio concorsi</title>
  <desc id="desc">Non tutti i bandi hanno lo stesso ruolo: guida, satellite o parcheggio.</desc>
  <style>
    .bg { fill: #F8FAFC; }
    .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
    .title { font: 800 44px Arial, sans-serif; fill: #0F172A; }
    .subtitle { font: 400 22px Arial, sans-serif; fill: #526174; }
    .label { font: 800 25px Arial, sans-serif; fill: #0F172A; }
    .body { font: 400 19px Arial, sans-serif; fill: #0F172A; }
    .small { font: 400 16px Arial, sans-serif; fill: #0F172A; }
    .strong { font-weight: 800; }
    .muted { fill: #526174; }
    .navy { fill: #10233F; }
    .whiteText { fill: #FFFFFF; }
    .line { stroke: #10233F; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#10233F"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <g data-safe-box="80 16 1440 118 0">
    <text class="title" x="800" y="68" text-anchor="middle">Portafoglio concorsi</text>
    <text class="subtitle" x="800" y="108" text-anchor="middle">Non tutti i bandi hanno lo stesso ruolo: guida, satellite o parcheggio.</text>
  </g>

    <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
    <g data-safe-box="115 275 350 360 8">
    <rect x="115" y="275" width="350" height="360" rx="28" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <rect x="115" y="275" width="350" height="14" rx="7" fill="#10233F"/>
    <text class="label" x="290" y="347" text-anchor="middle" fill="#10233F">Guida</text>
    <line x1="185" y1="375" x2="395" y2="375" stroke="#CBD5E1" stroke-width="3"/>
    <text class="small" x="290" y="421" text-anchor="middle">migliori ore</text>
<text class="small" x="290" y="455" text-anchor="middle">simulazioni</text>
<text class="small" x="290" y="489" text-anchor="middle">tagli</text>
  </g>
    <g data-safe-box="620 275 350 360 8">
    <rect x="620" y="275" width="350" height="360" rx="28" fill="#FFF4CC" stroke="#D4AF37" stroke-width="3"/>
    <rect x="620" y="275" width="350" height="14" rx="7" fill="#D4AF37"/>
    <text class="label" x="795" y="347" text-anchor="middle" fill="#D4AF37">Satellite</text>
    <line x1="690" y1="375" x2="900" y2="375" stroke="#CBD5E1" stroke-width="3"/>
    <text class="small" x="795" y="421" text-anchor="middle">aggancia il core</text>
<text class="small" x="795" y="455" text-anchor="middle">usa moduli avviati</text>
<text class="small" x="795" y="489" text-anchor="middle">non crea piano autonomo</text>
  </g>
    <g data-safe-box="1125 275 350 360 8">
    <rect x="1125" y="275" width="350" height="360" rx="28" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
    <rect x="1125" y="275" width="350" height="14" rx="7" fill="#2F7D5A"/>
    <text class="label" x="1300" y="347" text-anchor="middle" fill="#2F7D5A">Parcheggio</text>
    <line x1="1195" y1="375" x2="1405" y2="375" stroke="#CBD5E1" stroke-width="3"/>
    <text class="small" x="1300" y="421" text-anchor="middle">scheda minima</text>
<text class="small" x="1300" y="455" text-anchor="middle">scadenze salvate</text>
<text class="small" x="1300" y="489" text-anchor="middle">nessuno studio quotidiano</text>
  </g>
    <path class="line" marker-end="url(#arrow)" d="M490 455 L620 455"/>
    <path class="line" marker-end="url(#arrow)" d="M995 455 L1125 455"/>
    <g data-safe-box="250 812 1100 66 8">
    <rect x="250" y="812" width="1100" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="855" text-anchor="middle">Un bando interessante non deve entrare per forza nel calendario attivo.</text>
  </g>

</svg>
