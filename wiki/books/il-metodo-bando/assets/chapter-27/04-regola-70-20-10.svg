<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Regola 70 / 20 / 10</title>
  <desc id="desc">Il concorso guida comanda, il satellite aggancia, il controllo impedisce errori.</desc>
  <style>
    .bg { fill: #F8FAFC; }
    .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
    .title { font: 800 44px Arial, sans-serif; fill: #0F172A; }
    .subtitle { font: 400 22px Arial, sans-serif; fill: #526174; }
    .label { font: 800 25px Arial, sans-serif; fill: #0F172A; }
    .body { font: 400 19px Arial, sans-serif; fill: #0F172A; }
    .small { font: 400 16px Arial, sans-serif; fill: #0F172A; }
    .strong { font-weight: 800; }
    .muted { fill: #526174; }
    .navy { fill: #10233F; }
    .whiteText { fill: #FFFFFF; }
    .line { stroke: #10233F; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#10233F"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <g data-safe-box="80 16 1440 118 0">
    <text class="title" x="800" y="68" text-anchor="middle">Regola 70 / 20 / 10</text>
    <text class="subtitle" x="800" y="108" text-anchor="middle">Il concorso guida comanda, il satellite aggancia, il controllo impedisce errori.</text>
  </g>

    <rect class="card" x="70" y="165" width="1460" height="630" rx="30"/>
    <g data-safe-box="155 260 1290 360 10">
      <g data-safe-box="155 260 710 360 8">
    <rect x="155" y="260" width="710" height="360" rx="30" fill="#EAF2FB" stroke="#10233F" stroke-width="3"/>
    <text class="title" x="510" y="365" text-anchor="middle" fill="#10233F">70%</text>
    <text class="label" x="510" y="420" text-anchor="middle">Concorso guida</text>
    <text class="small" x="510" y="480" text-anchor="middle">priorita</text>
<text class="small" x="510" y="510" text-anchor="middle">simulazioni</text>
<text class="small" x="510" y="540" text-anchor="middle">tagli</text>
  </g>
      <g data-safe-box="895 260 300 360 8">
    <rect x="895" y="260" width="300" height="360" rx="30" fill="#FFF4CC" stroke="#D4AF37" stroke-width="3"/>
    <text class="title" x="1045" y="365" text-anchor="middle" fill="#D4AF37">20%</text>
    <text class="label" x="1045" y="420" text-anchor="middle">Satellite</text>
    <text class="small" x="1045" y="480" text-anchor="middle">aggancio</text>
<text class="small" x="1045" y="510" text-anchor="middle">differenze</text>
  </g>
      <g data-safe-box="1225 260 220 360 8">
    <rect x="1225" y="260" width="220" height="360" rx="30" fill="#E7F3ED" stroke="#2F7D5A" stroke-width="3"/>
    <text class="title" x="1335" y="365" text-anchor="middle" fill="#2F7D5A">10%</text>
    <text class="label" x="1335" y="420" text-anchor="middle">Controllo</text>
    <text class="small" x="1335" y="480" text-anchor="middle">avvisi</text>
<text class="small" x="1335" y="510" text-anchor="middle">logistica</text>
  </g>
    </g>
    <g data-safe-box="470 650 660 150 8">
    <rect x="470" y="650" width="660" height="150" rx="24" fill="#E4F4F5" stroke="#1F6F78" stroke-width="3"/>
    <rect x="470" y="650" width="660" height="12" rx="6" fill="#1F6F78"/>
    <text class="label" x="800" y="702" text-anchor="middle">Il 10% non si sacrifica</text>
    <text class="small" x="800" y="732" text-anchor="middle">evita scadenze dimenticate, ricevute non salvate e avvisi non letti</text>
  </g>
    <g data-safe-box="250 812 1100 66 8">
    <rect x="250" y="812" width="1100" height="66" rx="22" fill="#FFF7ED" stroke="#EFC58D" stroke-width="3"/>
    <text class="body strong" x="800" y="855" text-anchor="middle">Se il satellite richiede troppo, non aumentare la quota: cambia decisione.</text>
  </g>

</svg>
