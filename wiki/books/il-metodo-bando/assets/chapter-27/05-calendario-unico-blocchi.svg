<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Calendario unico a blocchi</title>
  <desc id="desc">Un solo calendario: comune, specifico, output e controllo.</desc>
  <style>
