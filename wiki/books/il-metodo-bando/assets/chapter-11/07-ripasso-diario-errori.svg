<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Piano di ripasso e diario errori</title>
  <desc id="desc">Pochi giorni richiedono priorita, simulazione e correzione per categoria.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 44px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 23px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Piano di ripasso e diario errori</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Pochi giorni richiedono priorita, simulazione e correzione per categoria.</text>

  <rect class="card" x="90" y="185" width="1420" height="600" rx="30"/>
  <text class="navy label" x="800" y="240" text-anchor="middle">Da priorita a simulazione: non ripassare tutto allo stesso modo</text>
  <g data-safe-box="135 315 280 130 8">
    <rect class="softRed" x="135" y="315" width="280" height="130" rx="22"/>
    <rect x="135" y="315" width="280" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="275" y="357" text-anchor="middle" style="font-size:25px">3 giorni</text>
    <text class="muted small" x="275" y="391" text-anchor="middle" style="font-size:18px">tempi + cloze</text>
<text class="muted small" x="275" y="416" text-anchor="middle" style="font-size:18px">preposizioni + reading</text>
  </g>
  <g data-safe-box="490 315 280 130 8">
    <rect class="softBlue" x="490" y="315" width="280" height="130" rx="22"/>
    <rect x="490" y="315" width="280" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="630" y="357" text-anchor="middle" style="font-size:25px">7 giorni</text>
    <text class="muted small" x="630" y="391" text-anchor="middle" style="font-size:18px">bando, grammatica</text>
<text class="muted small" x="630" y="416" text-anchor="middle" style="font-size:18px">lessico e simulazione</text>
  </g>
  <g data-safe-box="845 315 280 130 8">
    <rect class="softGreen" x="845" y="315" width="280" height="130" rx="22"/>
    <rect x="845" y="315" width="280" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="985" y="357" text-anchor="middle" style="font-size:25px">30 giorni</text>
    <text class="muted small" x="985" y="391" text-anchor="middle" style="font-size:18px">alternanza settimanale</text>
<text class="muted small" x="985" y="416" text-anchor="middle" style="font-size:18px">quiz e correzione</text>
  </g>
  <g data-safe-box="1200 315 280 130 8">
    <rect class="softGold" x="1200" y="315" width="280" height="130" rx="22"/>
    <rect x="1200" y="315" width="280" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="1340" y="357" text-anchor="middle" style="font-size:25px">Output</text>
    <text class="muted small" x="1340" y="391" text-anchor="middle" style="font-size:18px">30 quiz</text>
<text class="muted small" x="1340" y="416" text-anchor="middle" style="font-size:18px">2 reading, 10 frasi</text>
  </g>
  <path class="arrowBordeaux" d="M425 380 L475 380"/>
  <path class="arrowNavy" d="M780 380 L830 380"/>
  <path class="arrowGreen" d="M1135 380 L1185 380"/>
  <g data-safe-box="230 555 500 228 8">
    <rect class="softBlue" x="230" y="555" width="500" height="228" rx="22"/>
    <rect x="230" y="555" width="500" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="480" y="599" text-anchor="middle" style="font-size:24px">Diario errori</text>
    <path class="thin" d="M254 619 L706 619"/>
    <text class="muted small" x="262" y="637" style="font-size:18px">tempo verbale</text>
<text class="muted small" x="262" y="671" style="font-size:18px">preposizione</text>
<text class="muted small" x="262" y="705" style="font-size:18px">articolo o pronome</text>
<text class="muted small" x="262" y="739" style="font-size:18px">lessico o distrazione</text>
  </g>
  <g data-safe-box="870 555 500 228 8">
    <rect class="softGreen" x="870" y="555" width="500" height="228" rx="22"/>
    <rect x="870" y="555" width="500" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1120" y="599" text-anchor="middle" style="font-size:24px">Correzione utile</text>
    <path class="thin" d="M894 619 L1346 619"/>
    <text class="muted small" x="902" y="637" style="font-size:18px">categoria</text>
<text class="muted small" x="902" y="671" style="font-size:18px">frase corretta</text>
<text class="muted small" x="902" y="705" style="font-size:18px">regola breve</text>
<text class="muted small" x="902" y="739" style="font-size:18px">ripasso mirato</text>
  </g>
  <g data-safe-box="250 795 1100 64 8">
    <rect class="note" x="250" y="795" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="835" text-anchor="middle" style="font-weight:800;font-size:20px">Scrivere solo 'inglese sbagliato' non basta: serve la categoria dell'errore.</text>
  </g>

</svg>
