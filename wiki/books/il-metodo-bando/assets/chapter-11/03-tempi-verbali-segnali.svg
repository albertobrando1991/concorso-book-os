<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Tempi verbali e segnali</title>
  <desc id="desc">Nei quiz la scelta corretta nasce dal tempo indicato dalla frase.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 44px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 23px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Tempi verbali e segnali</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Nei quiz la scelta corretta nasce dal tempo indicato dalla frase.</text>

  <rect class="card" x="95" y="180" width="1410" height="560" rx="30"/>
  <text class="navy label" x="800" y="238" text-anchor="middle">Scegli il tempo dal segnale, non dalla traduzione italiana</text>
  <g data-safe-box="145 305 360 125 8">
    <rect class="softBlue" x="145" y="305" width="360" height="125" rx="22"/>
    <rect x="145" y="305" width="360" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="325" y="347" text-anchor="middle" style="font-size:23px">Present simple</text>
    <text class="muted small" x="325" y="381" text-anchor="middle" style="font-size:18px">routine, regole</text>
<text class="muted small" x="325" y="406" text-anchor="middle" style="font-size:18px">every day, usually</text>
  </g>
  <g data-safe-box="620 305 360 125 8">
    <rect class="softRed" x="620" y="305" width="360" height="125" rx="22"/>
    <rect x="620" y="305" width="360" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="800" y="347" text-anchor="middle" style="font-size:25px">Past simple</text>
    <text class="muted small" x="800" y="381" text-anchor="middle" style="font-size:18px">passato concluso</text>
<text class="muted small" x="800" y="406" text-anchor="middle" style="font-size:18px">yesterday, last year</text>
  </g>
  <g data-safe-box="1095 305 360 125 8">
    <rect class="softGreen" x="1095" y="305" width="360" height="125" rx="22"/>
    <rect x="1095" y="305" width="360" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="1275" y="347" text-anchor="middle" style="font-size:23px">Present perfect</text>
    <text class="muted small" x="1275" y="381" text-anchor="middle" style="font-size:18px">passato + presente</text>
<text class="muted small" x="1275" y="406" text-anchor="middle" style="font-size:18px">since, for, already</text>
  </g>
  <g data-safe-box="145 530 360 125 8">
    <rect class="softGold" x="145" y="530" width="360" height="125" rx="22"/>
    <rect x="145" y="530" width="360" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="325" y="572" text-anchor="middle" style="font-size:25px">Future forms</text>
    <text class="muted small" x="325" y="606" text-anchor="middle" style="font-size:18px">will, going to</text>
<text class="muted small" x="325" y="631" text-anchor="middle" style="font-size:18px">tomorrow, soon</text>
  </g>
  <g data-safe-box="620 530 360 125 8">
    <rect class="softTeal" x="620" y="530" width="360" height="125" rx="22"/>
    <rect x="620" y="530" width="360" height="10" rx="5" fill="#1F6F78"/>
    <text class="teal label" x="800" y="572" text-anchor="middle" style="font-size:25px">Passive voice</text>
    <text class="muted small" x="800" y="606" text-anchor="middle" style="font-size:18px">be + participio</text>
<text class="muted small" x="800" y="631" text-anchor="middle" style="font-size:18px">document focus</text>
  </g>
  <g data-safe-box="1095 530 360 125 8">
    <rect class="softBlue" x="1095" y="530" width="360" height="125" rx="22"/>
    <rect x="1095" y="530" width="360" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="1275" y="572" text-anchor="middle" style="font-size:25px">Conditionals</text>
    <text class="muted small" x="1275" y="606" text-anchor="middle" style="font-size:18px">if + forma</text>
<text class="muted small" x="1275" y="631" text-anchor="middle" style="font-size:18px">ipotesi e conseguenze</text>
  </g>
  <g data-safe-box="240 795 1120 64 8">
    <rect class="note" x="240" y="795" width="1120" height="64" rx="24"/>
    <text class="ink body" x="800" y="835" text-anchor="middle" style="font-weight:800;font-size:19px">Controllo finale: soggetto, tempo, ausiliare e forma del verbo devono combaciare.</text>
  </g>

</svg>
