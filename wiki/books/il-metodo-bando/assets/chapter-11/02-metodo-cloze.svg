<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Cloze: risolvere la frase prima delle opzioni</title>
  <desc id="desc">Il completamento premia segnali grammaticali, collocazioni e scarto dei distrattori.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 44px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 23px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Cloze: risolvere la frase prima delle opzioni</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Il completamento premia segnali grammaticali, collocazioni e scarto dei distrattori.</text>

  <rect class="card" x="95" y="175" width="1410" height="220" rx="30"/>
  <text class="navy label" x="800" y="230" text-anchor="middle">Esempio guida</text>
  <g data-safe-box="175 275 520 84 8">
    <rect x="175" y="275" width="520" height="84" rx="22" fill="#10233F"/>
    <text class="label" x="435" y="328" text-anchor="middle" fill="#FFFFFF" style="font-size:24px">She ___ here since 2021.</text>
  </g>
  <g data-safe-box="765 275 220 78 8">
    <rect x="765" y="275" width="220" height="78" rx="20" fill="#7A2430"/>
    <text class="label" x="875" y="307" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">since</text>
    <text class="small" x="875" y="333" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">segnale di durata</text>
  </g>
  <g data-safe-box="1060 275 330 84 8">
    <rect x="1060" y="275" width="330" height="84" rx="22" fill="#2F7D5A"/>
    <text class="label" x="1225" y="328" text-anchor="middle" fill="#FFFFFF" style="font-size:27px">has worked</text>
  </g>
  <path class="arrowBordeaux" d="M705 315 L750 315"/>
  <path class="arrowGreen" d="M995 315 L1045 315"/>
  <rect class="card" x="95" y="455" width="1410" height="270" rx="30"/>
  <g data-safe-box="130 510 205 150 8">
    <rect class="card" x="130" y="510" width="205" height="150" rx="20"/>
    <circle cx="232.5" cy="545" r="23" fill="#D4AF37"/>
    <text class="ink label" x="232.5" y="554" text-anchor="middle" style="font-size:22px">1</text>
    <text class="navy label" x="232.5" y="597" text-anchor="middle" style="font-size:19px">Leggi tutto</text>
    <text class="muted small" x="232.5" y="629" text-anchor="middle" style="font-size:16px">non solo il vuoto</text>
  </g>
  <g data-safe-box="365 510 205 150 8">
    <rect class="card" x="365" y="510" width="205" height="150" rx="20"/>
    <circle cx="467.5" cy="545" r="23" fill="#D4AF37"/>
    <text class="ink label" x="467.5" y="554" text-anchor="middle" style="font-size:22px">2</text>
    <text class="navy label" x="467.5" y="597" text-anchor="middle" style="font-size:19px">Trova soggetto</text>
    <text class="muted small" x="467.5" y="629" text-anchor="middle" style="font-size:16px">chi compie l'azione</text>
  </g>
  <g data-safe-box="600 510 205 150 8">
    <rect class="card" x="600" y="510" width="205" height="150" rx="20"/>
    <circle cx="702.5" cy="545" r="23" fill="#D4AF37"/>
    <text class="ink label" x="702.5" y="554" text-anchor="middle" style="font-size:22px">3</text>
    <text class="navy label" x="702.5" y="597" text-anchor="middle" style="font-size:19px">Cerca segnali</text>
    <text class="muted small" x="702.5" y="629" text-anchor="middle" style="font-size:16px">since, yesterday</text>
  </g>
  <g data-safe-box="835 510 205 150 8">
    <rect class="card" x="835" y="510" width="205" height="150" rx="20"/>
    <circle cx="937.5" cy="545" r="23" fill="#D4AF37"/>
    <text class="ink label" x="937.5" y="554" text-anchor="middle" style="font-size:22px">4</text>
    <text class="navy label" x="937.5" y="597" text-anchor="middle" style="font-size:19px">Classifica</text>
    <text class="muted small" x="937.5" y="629" text-anchor="middle" style="font-size:16px">tempo o lessico</text>
  </g>
  <g data-safe-box="1070 510 205 150 8">
    <rect class="card" x="1070" y="510" width="205" height="150" rx="20"/>
    <circle cx="1172.5" cy="545" r="23" fill="#D4AF37"/>
    <text class="ink label" x="1172.5" y="554" text-anchor="middle" style="font-size:22px">5</text>
    <text class="navy label" x="1172.5" y="597" text-anchor="middle" style="font-size:19px">Scarta</text>
    <text class="muted small" x="1172.5" y="629" text-anchor="middle" style="font-size:16px">opzioni impossibili</text>
  </g>
  <g data-safe-box="1305 510 205 150 8">
    <rect class="card" x="1305" y="510" width="205" height="150" rx="20"/>
    <circle cx="1407.5" cy="545" r="23" fill="#D4AF37"/>
    <text class="ink label" x="1407.5" y="554" text-anchor="middle" style="font-size:22px">6</text>
    <text class="navy label" x="1407.5" y="597" text-anchor="middle" style="font-size:19px">Rileggi</text>
    <text class="muted small" x="1407.5" y="629" text-anchor="middle" style="font-size:16px">frase completa</text>
  </g>
  <g data-safe-box="250 795 1100 64 8">
    <rect class="note" x="250" y="795" width="1100" height="64" rx="24"/>
    <text class="ink body" x="800" y="835" text-anchor="middle" style="font-weight:800;font-size:20px">Regola pratica: prima il contesto, poi la grammatica, infine le opzioni.</text>
  </g>

</svg>
