<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Be, do, have e modali</title>
  <desc id="desc">Domande, negazioni, tempi composti e obblighi dipendono dall'ausiliare.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 3; }
      .softBlue { fill: #EAF2FB; stroke: #B9CBE0; stroke-width: 2.5; }
      .softRed { fill: #F8E8EA; stroke: #E3B9BF; stroke-width: 2.5; }
      .softGold { fill: #FFF4CC; stroke: #E8D080; stroke-width: 2.5; }
      .softGreen { fill: #E7F3ED; stroke: #A8D1BD; stroke-width: 2.5; }
      .softTeal { fill: #E4F4F5; stroke: #A3D5D8; stroke-width: 2.5; }
      .note { fill: #FFF7ED; stroke: #E7C18E; stroke-width: 2.5; }
      .ink { fill: #0F172A; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #526174; font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 44px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 23px; }
      .label { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 800; }
      .body { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .small { font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .navy { fill: #10233F; }
      .bordeaux { fill: #7A2430; }
      .gold { fill: #D4AF37; }
      .green { fill: #2F7D5A; }
      .teal { fill: #1F6F78; }
      .line { stroke: #94A3B8; stroke-width: 4; stroke-linecap: round; fill: none; }
      .thin { stroke: #CBD5E1; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .arrowNavy { stroke: #10233F; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowNavy); }
      .arrowBordeaux { stroke: #7A2430; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowBordeaux); }
      .arrowGold { stroke: #D4AF37; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGold); }
      .arrowGreen { stroke: #2F7D5A; stroke-width: 5; stroke-linecap: round; fill: none; marker-end: url(#arrowGreen); }
    </style>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10233F"/>
    </marker>
    <marker id="arrowBordeaux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A2430"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F7D5A"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="ink title" x="800" y="68" text-anchor="middle">Be, do, have e modali</text>
  <text class="muted subtitle" x="800" y="108" text-anchor="middle">Domande, negazioni, tempi composti e obblighi dipendono dall'ausiliare.</text>

  <rect class="card" x="95" y="185" width="1410" height="555" rx="30"/>
  <text class="navy label" x="800" y="240" text-anchor="middle">L'ausiliare regge la struttura della frase</text>
  <g data-safe-box="150 315 295 130 8">
    <rect class="softBlue" x="150" y="315" width="295" height="130" rx="22"/>
    <rect x="150" y="315" width="295" height="10" rx="5" fill="#10233F"/>
    <text class="navy label" x="297.5" y="357" text-anchor="middle" style="font-size:25px">Be</text>
    <text class="muted small" x="297.5" y="391" text-anchor="middle" style="font-size:18px">stato</text>
<text class="muted small" x="297.5" y="416" text-anchor="middle" style="font-size:18px">progressivo, passivo</text>
  </g>
  <g data-safe-box="500 315 295 130 8">
    <rect class="softRed" x="500" y="315" width="295" height="130" rx="22"/>
    <rect x="500" y="315" width="295" height="10" rx="5" fill="#7A2430"/>
    <text class="bordeaux label" x="647.5" y="357" text-anchor="middle" style="font-size:25px">Do</text>
    <text class="muted small" x="647.5" y="391" text-anchor="middle" style="font-size:18px">domande</text>
<text class="muted small" x="647.5" y="416" text-anchor="middle" style="font-size:18px">negazioni semplici</text>
  </g>
  <g data-safe-box="850 315 295 130 8">
    <rect class="softGreen" x="850" y="315" width="295" height="130" rx="22"/>
    <rect x="850" y="315" width="295" height="10" rx="5" fill="#2F7D5A"/>
    <text class="green label" x="997.5" y="357" text-anchor="middle" style="font-size:25px">Have</text>
    <text class="muted small" x="997.5" y="391" text-anchor="middle" style="font-size:18px">tempi perfetti</text>
<text class="muted small" x="997.5" y="416" text-anchor="middle" style="font-size:18px">azione collegata</text>
  </g>
  <g data-safe-box="1200 315 295 130 8">
    <rect class="softGold" x="1200" y="315" width="295" height="130" rx="22"/>
    <rect x="1200" y="315" width="295" height="10" rx="5" fill="#D4AF37"/>
    <text class="gold label" x="1347.5" y="357" text-anchor="middle" style="font-size:25px">Modali</text>
    <text class="muted small" x="1347.5" y="391" text-anchor="middle" style="font-size:18px">can, must, should</text>
<text class="muted small" x="1347.5" y="416" text-anchor="middle" style="font-size:18px">verbo base</text>
  </g>
  <path class="arrowNavy" d="M455 380 L485 380"/>
  <path class="arrowBordeaux" d="M805 380 L835 380"/>
  <path class="arrowGreen" d="M1155 380 L1185 380"/>
  <g data-safe-box="225 570 300 78 8">
    <rect x="225" y="570" width="300" height="78" rx="20" fill="#10233F"/>
    <text class="label" x="375" y="602" text-anchor="middle" fill="#FFFFFF" style="font-size:19px">Is she available?</text>
    <text class="small" x="375" y="628" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">Yes, she is.</text>
  </g>
  <g data-safe-box="650 570 300 78 8">
    <rect x="650" y="570" width="300" height="78" rx="20" fill="#7A2430"/>
    <text class="label" x="800" y="602" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">Does she work?</text>
    <text class="small" x="800" y="628" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">Yes, she does.</text>
  </g>
  <g data-safe-box="1075 570 300 78 8">
    <rect x="1075" y="570" width="300" height="78" rx="20" fill="#2F7D5A"/>
    <text class="label" x="1225" y="602" text-anchor="middle" fill="#FFFFFF" style="font-size:21px">Must send</text>
    <text class="small" x="1225" y="628" text-anchor="middle" fill="#FFFFFF" style="font-size:16px">non must to send</text>
  </g>
  <g data-safe-box="245 795 1110 64 8">
    <rect class="note" x="245" y="795" width="1110" height="64" rx="24"/>
    <text class="ink body" x="800" y="835" text-anchor="middle" style="font-weight:800;font-size:20px">Trappola classica: con does il verbo principale torna alla forma base.</text>
  </g>

</svg>
